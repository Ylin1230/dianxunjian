<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>安全检查</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --panel: #ffffff;
        --border: #d7deea;
        --line: #e5ebf4;
        --text: #1f2a3a;
        --muted: #6f7d93;
        --accent: #2c79ea;
        --accent-soft: #edf4ff;
        --danger: #d24b4b;
        --warning: #c07a1a;
        --success: #1e8750;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .app {
        max-width: 480px;
        min-height: 100vh;
        margin: 0 auto;
        background: var(--bg);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        background: #fff;
        border-bottom: 1px solid var(--border);
        padding: 12px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 18px;
      }

      h2 {
        font-size: 16px;
      }

      h3 {
        font-size: 15px;
      }

      .view {
        display: none;
        min-height: 0;
        overflow: auto;
        padding: 14px 14px 92px;
      }

      .view.active {
        display: block;
      }

      .toolbar {
        display: grid;
        gap: 8px;
        margin-bottom: 10px;
      }

      .home-stack {
        display: grid;
        gap: 12px;
      }

      .overview-card {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        overflow: visible;
      }

      .overview-main {
        padding: 14px;
      }

      .overview-title {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
      }

      .overview-copy {
        min-width: 0;
      }

      .overview-copy h2,
      .overview-copy .meta {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .overview-inspector {
        position: relative;
        width: auto;
        min-width: 82px;
        max-width: min(148px, 36vw);
        justify-self: end;
        overflow: visible;
        z-index: 8;
      }

      .overview-inspector .select {
        position: absolute;
        inset: 0;
        width: 1px;
        height: 1px;
        min-height: 0;
        border: 0;
        opacity: 0;
        pointer-events: none;
      }

      .inspector-picker {
        position: relative;
        width: 100%;
        min-height: 30px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: #30445f;
        padding: 3px 18px 3px 6px;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.2;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        text-align: right;
      }

      .inspector-picker::after {
        content: "";
        position: absolute;
        top: 50%;
        right: 4px;
        width: 6px;
        height: 6px;
        border: solid #7e8da3;
        border-width: 0 1.5px 1.5px 0;
        transform: translateY(-62%) rotate(45deg);
        pointer-events: none;
      }

      .inspector-picker[aria-expanded="true"]::after {
        transform: translateY(-38%) rotate(225deg);
      }

      .inspector-picker:focus {
        outline: none;
        background: #f6f9ff;
        box-shadow: 0 0 0 3px rgba(44, 121, 234, 0.12);
      }

      .inspector-picker-text {
        display: block;
        max-width: 100%;
        overflow-wrap: anywhere;
        white-space: normal;
      }

      .inspector-picker-panel {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        z-index: 20;
        width: max-content;
        min-width: 116px;
        max-width: min(240px, calc(100vw - 28px));
        max-height: 224px;
        overflow: auto;
        padding: 4px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 14px 30px rgba(31, 42, 58, 0.18);
      }

      .inspector-picker-option {
        width: 100%;
        min-height: 34px;
        border: 0;
        border-radius: 6px;
        background: #fff;
        color: #30445f;
        padding: 7px 10px;
        text-align: left;
        font: inherit;
        font-size: 13px;
        line-height: 1.35;
        display: flex;
        align-items: center;
        cursor: pointer;
        overflow-wrap: anywhere;
        white-space: normal;
      }

      .inspector-picker-option:hover {
        background: #edf4ff;
        color: var(--accent);
      }

      .inspector-picker-option.is-selected {
        background: var(--accent);
        color: #fff;
        font-weight: 600;
      }

      .task-icon {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        background: var(--accent-soft);
        color: var(--accent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        flex: 0 0 auto;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        border-top: 1px solid var(--line);
      }

      .stat-cell {
        padding: 11px 4px;
        text-align: center;
        border-right: 1px solid var(--line);
      }

      .stat-cell:last-child {
        border-right: 0;
      }

      .stat-cell strong {
        display: block;
        font-size: 21px;
        line-height: 1.2;
      }

      .stat-cell span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .stat-cell.danger strong {
        color: var(--danger);
      }

      .stat-cell.primary strong {
        color: var(--accent);
      }

      .stat-cell.ok strong {
        color: var(--success);
      }

      .home-panel {
        border: 0;
        border-radius: 0;
        background: transparent;
        padding: 0 1px;
      }

      .home-panel-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .home-panel-head h2 {
        line-height: 1.35;
      }

      .home-panel-head .meta {
        margin-top: 3px;
      }

      .home-search {
        margin-bottom: 10px;
      }

      .home-panel .field {
        margin-top: 0;
      }

      .task-workbench {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .task-workbench .home-search {
        min-height: 40px;
        border-color: #dce5f2;
        border-radius: 8px;
        background: #f9fbfe;
      }

      .task-mode-toggle {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 2px;
        margin: 0;
        padding: 3px;
        border: 1px solid #dfe7f3;
        border-radius: 8px;
        background: #f2f6fb;
      }

      .mode-option {
        min-height: 32px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: #64748a;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
      }

      .mode-option.active {
        background: #fff;
        color: var(--accent);
        box-shadow: 0 1px 4px rgba(31, 60, 103, 0.12);
      }

      .mode-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #c8d2e1;
        flex: 0 0 auto;
      }

      .mode-option.active .mode-dot {
        border: 2px solid rgba(44, 121, 234, 0.22);
        background: var(--accent);
      }

      .task-workbench .home-search {
        margin-bottom: 0;
      }

      .task-workbench .cards {
        margin-top: 2px;
      }

      .task-workbench .empty {
        padding: 30px 12px 26px;
      }

      .temporary-toggle {
        width: 100%;
        min-height: 42px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        text-align: left;
        font-weight: 600;
      }

      .temporary-toggle.primary-card {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .temporary-toggle.primary-card span:last-child {
        color: rgba(255, 255, 255, 0.88);
      }

      .temporary-toggle span:last-child {
        color: var(--muted);
        font-size: 13px;
        font-weight: 400;
      }

      .temporary-panel {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .temporary-panel.hidden {
        display: none;
      }

      .modal-mask {
        position: fixed;
        inset: 0;
        z-index: 30;
        background: rgba(17, 28, 44, 0.36);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 14px;
      }

      .sheet {
        width: min(452px, 100%);
        border-radius: 10px;
        background: #fff;
        border: 1px solid var(--border);
        box-shadow: 0 18px 42px rgba(31, 42, 58, 0.18);
        overflow: hidden;
      }

      .sheet-head {
        padding: 13px 14px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .sheet-body {
        padding: 14px;
        display: grid;
        gap: 10px;
      }

      .sheet-foot {
        padding: 10px 14px 14px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .section-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .input,
      .select,
      .textarea {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 0 10px;
        font-size: 14px;
        background: #fff;
        color: var(--text);
      }

      .textarea {
        padding: 9px 10px;
        min-height: 78px;
        resize: vertical;
      }

      .btn {
        min-height: 38px;
        border: 1px solid #b7c4d8;
        background: #fff;
        color: #30445f;
        border-radius: 5px;
        padding: 0 12px;
        font-size: 14px;
        cursor: pointer;
      }

      .btn:disabled {
        opacity: 0.58;
        cursor: not-allowed;
      }

      .btn.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .btn.danger {
        border-color: #f0c0c0;
        background: #fff9f9;
        color: var(--danger);
      }

      .btn.link {
        border-color: transparent;
        background: transparent;
        color: var(--accent);
      }

      .icon-btn {
        width: 40px;
        min-height: 40px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: #fff;
        color: var(--accent);
        border-color: #cbd9ee;
        box-shadow: none;
      }

      .icon-btn svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .cards {
        display: grid;
        gap: 10px;
      }

      .execute-items {
        margin-left: -14px;
        margin-right: -14px;
        padding: 0 14px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        padding: 11px;
      }

      .task-card {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        padding: 12px;
      }

      .task-card.overdue {
        border-color: #f2c9c9;
        background: #fffafa;
      }

      .task-row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
      }

      .task-row.checked {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .task-main {
        min-width: 0;
      }

      .task-main h3 {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .task-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 7px;
      }

      .task-action {
        min-width: 76px;
        padding: 0 10px;
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
      }

      .meta {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        border-radius: 4px;
        padding: 0 7px;
        background: #eef3fb;
        color: #4c5d74;
        font-size: 12px;
        white-space: nowrap;
      }

      .tag.ok {
        background: #eef8f2;
        color: var(--success);
      }

      .tag.warn {
        background: #fff7e8;
        color: var(--warning);
      }

      .tag.danger {
        background: #fff1f1;
        color: var(--danger);
      }

      .execute-head {
        position: static;
        z-index: 4;
        background: var(--accent);
        color: #fff;
        border: 0;
        border-radius: 0 0 10px 10px;
        padding: 13px 14px 12px;
        margin: -14px -14px 12px;
      }

      .execute-head .meta,
      .execute-head .progress-row {
        color: rgba(255, 255, 255, 0.84);
      }

      .execute-head .tag {
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
      }

      .execute-head .btn.link {
        color: #fff;
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 255, 255, 0.22);
        min-height: 28px;
        padding: 0 9px;
        font-size: 13px;
      }

      .execute-head h2 {
        font-size: 17px;
      }

      .progress-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
      }

      .progress {
        height: 6px;
        background: rgba(255, 255, 255, 0.28);
        border-radius: 999px;
        overflow: hidden;
        margin-top: 7px;
      }

      .progress > span {
        display: block;
        height: 100%;
        width: 0%;
        background: #fff;
      }

      .result-bar {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 9px;
      }

      .result-btn {
        min-height: 40px;
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 8px;
        color: #30445f;
        font-size: 14px;
      }

      .result-btn.active.normal {
        border-color: #77bc92;
        background: #eef8f2;
        color: var(--success);
        font-weight: 600;
      }

      .result-btn.active.abnormal {
        border-color: #e09c9c;
        background: #fff1f1;
        color: var(--danger);
        font-weight: 600;
      }

      .result-btn.active.na {
        border-color: #b7c4d8;
        background: #f5f7fb;
        color: var(--muted);
        font-weight: 600;
      }

      .field {
        display: grid;
        gap: 5px;
        margin-top: 9px;
      }

      .check-card {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        padding: 11px;
      }

      .check-card.done-normal {
        border-color: #b9e2c8;
        background: #fbfffc;
      }

      .check-card.done-abnormal {
        border-color: #f0b7b7;
        background: #fffafa;
      }

      .check-card.done-na {
        border-color: #cfd7e3;
        background: #f8fafc;
      }

      .check-title-row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 9px;
        align-items: start;
      }

      .item-index {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: var(--accent-soft);
        color: var(--accent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 13px;
      }

      .item-state {
        min-width: 44px;
        justify-content: center;
      }

      .item-group-title {
        margin: 4px 2px -2px;
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
      }

      .item-content-line {
        margin-top: 8px;
        color: #526179;
        font-size: 13px;
        line-height: 1.55;
      }

      .item-standard-line {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .field label {
        font-size: 12px;
        color: #48586f;
      }

      .photo-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .photo-add-btn {
        min-height: 32px;
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 11px;
        font-size: 13px;
      }

      .photos {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 8px;
      }

      .photo-card {
        min-width: 0;
      }

      .photo-thumb {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        background: #f7faff;
        cursor: pointer;
      }

      .photo-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .photo-file {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 12px;
      }

      .photo-remove {
        position: absolute;
        right: 4px;
        top: 4px;
        width: 22px;
        height: 22px;
        border: 0;
        border-radius: 50%;
        background: rgba(16, 28, 44, 0.72);
        color: #fff;
        font-size: 17px;
        line-height: 20px;
        padding: 0;
        cursor: pointer;
      }

      .photo-name {
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .submit-extra-card {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .submit-extra-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
      }

      .extra-status {
        color: var(--muted);
        font-size: 12px;
        min-height: 18px;
      }

      .submit-photo-field {
        margin-top: 2px;
      }

      .submit-photo-field .photo-head {
        width: fit-content;
        max-width: 100%;
        justify-content: flex-start;
        align-items: center;
        gap: 12px;
        padding: 8px 10px;
        border: 1px solid #d8e3f5;
        border-radius: 10px;
        background: #fbfdff;
      }

      .submit-photo-field .photo-add-btn {
        min-width: 96px;
        height: 34px;
        min-height: 34px;
      }

      .submit-photo-field .photos:empty,
      .submit-photo-field .extra-status:empty {
        display: none;
      }

      .signature-subform {
        border: 1px solid #d8e3f5;
        border-radius: 10px;
        overflow: hidden;
        background: #fbfdff;
      }

      .signature-list {
        display: flex;
        flex-direction: column;
      }

      .signature-foot {
        display: flex;
        justify-content: flex-start;
        padding: 10px;
        border-top: 1px solid #e4ecf7;
        background: #fff;
      }

      .signature-add-btn {
        flex: 0 0 auto;
        min-width: 104px;
        height: 32px;
        min-height: 32px;
        border-radius: 7px;
        padding: 0 12px 0 10px;
        font-size: 13px;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .signature-add-btn::before {
        content: "+";
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 1px solid currentColor;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        line-height: 1;
        flex: 0 0 auto;
      }

      .signature-row {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr) 34px;
        gap: 10px;
        align-items: center;
        min-height: 72px;
        padding: 12px;
        border-top: 1px solid #e9eff8;
      }

      .signature-row:first-child {
        border-top: 0;
      }

      .signature-seq {
        color: #61738f;
        font-size: 13px;
        text-align: center;
      }

      .signature-sign-cell {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        min-width: 0;
      }

      .signature-sign-btn {
        flex: 1 1 240px;
        max-width: none;
        height: 46px;
        min-height: 46px;
        border-radius: 8px;
        padding: 0 18px;
        font-size: 15px;
        font-weight: 600;
      }

      .sign-thumb-btn {
        border: 1px solid #d7e2f2;
        border-radius: 7px;
        background: #fff;
        padding: 2px;
        width: 96px;
        height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .sign-preview-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .signature-delete {
        position: relative;
        width: 30px;
        height: 30px;
        min-height: 30px;
        border-radius: 50%;
        border: 1px solid #d2dceb;
        background: #fff;
        color: #5f718a;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        justify-self: center;
        align-self: center;
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
      }

      .signature-delete::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 10px;
        height: 2px;
        border-radius: 999px;
        background: currentColor;
        transform: translate(-50%, -50%);
      }

      .signature-delete:hover {
        border-color: #efb9b9;
        color: var(--danger);
        background: #fff8f8;
      }

      .signature-time {
        color: var(--muted);
        font-size: 12px;
      }

      .sign-state {
        font-size: 12px;
        color: #7c8ba1;
      }

      .sign-state.done {
        color: var(--success);
      }

      .sign-preview-link {
        border: 0;
        background: transparent;
        color: var(--accent);
        font-size: 12px;
        padding: 0;
        cursor: pointer;
      }

      .signature-status {
        color: var(--muted);
        font-size: 12px;
      }

      .principal-signature-panel {
        border: 1px solid #d8e3f5;
        border-radius: 10px;
        background: #fbfdff;
        padding: 10px;
      }

      .principal-signature-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 8px;
      }

      .sign-canvas-wrap {
        padding: 12px;
        background: #f7faff;
      }

      .sign-canvas {
        width: 100%;
        height: 210px;
        display: block;
        border: 1px dashed #b7c4d8;
        border-radius: 8px;
        background: #fff;
        touch-action: none;
      }

      .signature-modal-foot {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .photo-preview-body {
        width: min(452px, 100%);
      }

      .photo-preview-wrap {
        padding: 12px;
        background: #f7faff;
      }

      .photo-preview-wrap img {
        display: block;
        width: 100%;
        max-height: 72vh;
        object-fit: contain;
        border-radius: 8px;
        background: #fff;
      }

      .required {
        color: var(--danger);
        margin-right: 2px;
      }

      .bottom-bar {
        position: sticky;
        bottom: 0;
        z-index: 5;
        background: #fff;
        border-top: 1px solid var(--border);
        padding: 10px 12px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
        box-shadow: 0 -8px 18px rgba(31, 42, 58, 0.08);
      }

      .bottom-bar.hidden {
        display: none;
      }

      .empty {
        padding: 28px 12px;
        text-align: center;
        color: var(--muted);
        font-size: 13px;
      }

      .summary-hero {
        margin: 0 0 12px;
        padding: 28px 18px 24px;
        background: #fff;
        color: var(--text);
        text-align: center;
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      .summary-badge {
        display: inline-flex;
        min-width: 54px;
        min-height: 32px;
        border-radius: 8px;
        background: var(--accent-soft);
        color: var(--accent);
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
        font-weight: 700;
      }

      .summary-hero .meta {
        color: var(--muted);
      }

      .summary-section-title {
        margin: 14px 0 8px;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 74px;
        transform: translate(-50%, 8px);
        z-index: 20;
        background: rgba(23, 35, 55, 0.92);
        color: #fff;
        font-size: 13px;
        padding: 8px 11px;
        border-radius: 5px;
        opacity: 0;
        pointer-events: none;
        transition: all 0.2s ease;
        max-width: 82vw;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 560px) {
        .app {
          max-width: none;
        }

        .signature-row {
          grid-template-columns: minmax(0, 1fr) 30px;
          gap: 8px;
          min-height: 64px;
          padding: 10px;
          align-items: center;
        }

        .signature-seq,
        .signature-time,
        .signature-sign-cell .sign-state,
        .signature-sign-cell .sign-preview-link {
          display: none;
        }

        .signature-sign-cell {
          display: flex;
          flex-direction: column;
          gap: 6px;
          justify-content: center;
          align-items: stretch;
        }

        .signature-sign-cell .btn {
          width: 100%;
          max-width: none;
          height: 42px;
          min-height: 42px;
          border-radius: 7px;
          padding: 0 8px;
          font-size: 15px;
          white-space: nowrap;
        }

        .signature-sign-cell .sign-thumb-btn {
          width: 100%;
          height: 52px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <h1 id="title">安全检查</h1>
        <button id="refreshBtn" class="btn icon-btn" type="button" aria-label="刷新" title="刷新">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
            <path d="M21 3v6h-6"></path>
          </svg>
        </button>
      </header>

      <section id="homeView" class="view active">
        <div class="home-stack">
          <section class="overview-card">
            <div class="overview-main">
              <div class="overview-title">
                <div class="overview-copy">
                  <h2 id="overviewDate">今日安全检查</h2>
                  <div id="overviewMeta" class="meta">正在加载任务...</div>
                </div>
                <div class="overview-inspector">
                  <select id="inspectorInput" class="select" aria-label="检查人"></select>
                  <button id="inspectorPickerBtn" class="inspector-picker" type="button" aria-label="选择检查人" aria-haspopup="listbox" aria-expanded="false">
                    <span id="inspectorPickerText" class="inspector-picker-text">请选择</span>
                  </button>
                  <div id="inspectorPickerPanel" class="inspector-picker-panel hidden" role="listbox" aria-label="检查人选项"></div>
                </div>
              </div>
            </div>
            <div class="stat-grid">
              <div class="stat-cell danger">
                <strong id="statOverdue">0</strong>
                <span>逾期</span>
              </div>
              <div class="stat-cell primary">
                <strong id="statPending">0</strong>
                <span>未逾期</span>
              </div>
              <div class="stat-cell ok">
                <strong id="statTemplates">0</strong>
                <span>检查中</span>
              </div>
            </div>
          </section>

          <section class="home-panel task-workbench">
            <div class="task-mode-toggle" role="radiogroup" aria-label="检查任务筛选">
              <button id="taskModePendingBtn" class="mode-option active" type="button" role="radio" aria-checked="true" data-mode="pending">
                <span class="mode-dot"></span>
                <span>待检查</span>
              </button>
              <button id="taskModeCheckedBtn" class="mode-option" type="button" role="radio" aria-checked="false" data-mode="checked">
                <span class="mode-dot"></span>
                <span>当日已检查</span>
              </button>
            </div>
            <input id="keywordInput" class="input home-search" placeholder="搜索待检查任务/区域对象/责任人" />
            <div id="taskCards" class="cards"></div>
          </section>

        </div>
      </section>

      <section id="executeView" class="view">
        <div class="execute-head">
          <div class="card-head">
            <div>
              <h2 id="executeTitle">安全检查</h2>
              <div id="executeMeta" class="meta"></div>
            </div>
            <span id="abnormalCountTag" class="tag">0 异常</span>
          </div>
          <div class="progress-row" style="margin-top:7px">
            <span id="progressText">0 / 0 项</span>
            <button id="markAllNormalBtn" class="btn link" type="button">全部正常</button>
          </div>
          <div class="progress"><span id="progressBar"></span></div>
        </div>
        <div id="itemCards" class="cards execute-items"></div>
        <section class="submit-extra-card">
          <div class="submit-extra-title">现场信息</div>
          <div class="field submit-photo-field">
            <div class="photo-head">
              <label for="submitPhotoInput">现场照片</label>
              <label class="btn photo-add-btn" title="拍照或上传现场照片">
                拍照/上传
                <input id="submitPhotoInput" type="file" accept="image/*" capture="environment" multiple hidden />
              </label>
            </div>
            <div id="submitPhotoList" class="photos"></div>
            <div id="submitPhotoStatus" class="extra-status"></div>
          </div>
          <div class="field">
            <label>现场人员签名</label>
            <div class="signature-subform">
              <div id="signatureList" class="signature-list"></div>
              <div class="signature-foot">
                <button id="addSignatureBtn" class="btn signature-add-btn" type="button">新增一项</button>
              </div>
            </div>
          </div>
          <div class="field">
            <label>主要负责人签字（选填）</label>
            <div id="principalSignatureBox" class="principal-signature-panel"></div>
          </div>
        </section>
      </section>

      <section id="summaryView" class="view">
        <div class="summary-hero">
          <div id="summaryResultTag" class="summary-badge">正常</div>
          <h2>检查完成</h2>
          <div id="summaryText" class="meta"></div>
        </div>
        <h2 class="summary-section-title">异常项</h2>
        <div id="summaryAbnormalList" class="cards" style="margin-top:10px"></div>
      </section>

      <div id="bottomBar" class="bottom-bar hidden">
        <button id="backBtn" class="btn">返回</button>
        <button id="saveDraftBtn" class="btn" type="button">暂存</button>
        <button id="submitBtn" class="btn primary">提交检查</button>
      </div>
    </div>

    <div id="modalRoot"></div>
    <div id="photoPreviewModal" class="modal-mask hidden">
      <div class="sheet photo-preview-body">
        <div class="sheet-head">
          <h3>照片预览</h3>
          <button id="closePhotoPreviewBtn" class="btn link" type="button">关闭</button>
        </div>
        <div class="photo-preview-wrap">
          <img id="photoPreviewImage" alt="异常照片预览" />
        </div>
      </div>
    </div>
    <div id="signatureModal" class="modal-mask hidden">
      <div class="sheet">
        <div class="sheet-head">
          <h3 id="signatureModalTitle">手写签名</h3>
          <button id="closeSignatureBtn" class="btn link" type="button">关闭</button>
        </div>
        <div class="sign-canvas-wrap">
          <canvas id="signatureCanvas" class="sign-canvas"></canvas>
        </div>
        <div id="signatureStatus" class="sheet-body signature-status">请在签名区书写后点击保存</div>
        <div class="sheet-foot signature-modal-foot">
          <button id="clearSignatureBtn" class="btn" type="button">清空重签</button>
          <button id="saveSignatureBtn" class="btn primary" type="button">保存签名</button>
          <button id="cancelSignatureBtn" class="btn" type="button">取消</button>
        </div>
      </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
      const API_BASE = resolveApiBaseUrl();
      const DRAFT_STORAGE_PREFIX = "safety_check_mobile_draft_v1:";

      const state = {
        templates: [],
        items: [],
        tasks: [],
        submissions: [],
        users: [],
        options: {},
        taskMode: "pending",
        selectedTask: null,
        selectedTemplate: null,
        selectedItems: [],
        submitPhotos: [],
        signatures: [],
        principalSignature: null,
        activeSignatureIndex: -1,
        activeSignatureTarget: "personnel",
        signaturePad: {
          drawing: false,
          dirty: false,
          pointerId: null,
          lastX: 0,
          lastY: 0,
        },
        startTime: "",
        target: "",
        summary: null,
        currentUserId: "",
        currentUserName: "",
        currentCorpId: "",
      };

      const refs = {};

      document.addEventListener("DOMContentLoaded", () => {
        collectExternalContext();
        collectRefs();
        bindEvents();
        loadData();
      });

      function collectExternalContext() {
        const params = new URLSearchParams(window.location.search || "");
        state.currentUserId = params.get("webpage_user_id") || params.get("user_id") || "";
        state.currentUserName = params.get("webpage_user_name") || params.get("user_name") || params.get("userName") || params.get("name") || "";
        state.currentCorpId = params.get("webpage_crop_id") || params.get("crop_id") || "";
      }

      function collectRefs() {
        [
          "title", "refreshBtn", "homeView", "executeView", "summaryView", "bottomBar", "modalRoot", "photoPreviewModal", "closePhotoPreviewBtn", "photoPreviewImage", "toast",
          "overviewDate", "overviewMeta", "statOverdue", "statPending", "statTemplates",
          "inspectorInput", "inspectorPickerBtn", "inspectorPickerText", "inspectorPickerPanel", "keywordInput", "taskCards", "taskModePendingBtn", "taskModeCheckedBtn",
          "executeTitle", "executeMeta", "abnormalCountTag", "progressText", "progressBar", "markAllNormalBtn", "itemCards",
          "submitPhotoInput", "submitPhotoList", "submitPhotoStatus", "signatureList", "addSignatureBtn", "principalSignatureBox",
          "signatureModal", "signatureModalTitle", "signatureCanvas", "signatureStatus",
          "closeSignatureBtn", "clearSignatureBtn", "saveSignatureBtn", "cancelSignatureBtn",
          "backBtn", "saveDraftBtn", "submitBtn", "summaryResultTag", "summaryText", "summaryAbnormalList",
        ].forEach((id) => {
          refs[id] = document.getElementById(id);
        });
      }

      function bindEvents() {
        refs.refreshBtn.addEventListener("click", () => loadData({ goHome: true }));
        refs.keywordInput.addEventListener("input", renderHome);
        refs.taskModePendingBtn.addEventListener("click", () => setTaskMode("pending"));
        refs.taskModeCheckedBtn.addEventListener("click", () => setTaskMode("checked"));
        refs.inspectorPickerBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          toggleInspectorPicker();
        });
        refs.inspectorPickerPanel.addEventListener("click", (event) => {
          if (!(event.target instanceof HTMLElement)) return;
          const option = event.target.closest("[data-inspector-value]");
          if (!option) return;
          refs.inspectorInput.value = option.dataset.inspectorValue || "";
          refs.inspectorInput.dispatchEvent(new Event("change", { bubbles: true }));
          closeInspectorPicker();
        });
        refs.inspectorInput.addEventListener("change", () => {
          updateInspectorPicker();
          const value = refs.inspectorInput.value.trim();
          if (value) {
            localStorage.setItem("safety_check_inspector_id", value);
          } else {
            localStorage.removeItem("safety_check_inspector_id");
          }
        });
        refs.markAllNormalBtn.addEventListener("click", markAllNormal);
        refs.backBtn.addEventListener("click", () => switchView("home"));
        refs.saveDraftBtn.addEventListener("click", saveInspectionDraft);
        refs.submitBtn.addEventListener("click", submitInspection);
        refs.itemCards.addEventListener("click", (event) => {
          const removePhotoBtn = event.target.closest("[data-action='remove-photo']");
          if (removePhotoBtn) {
            event.stopPropagation();
            removeItemPhoto(Number(removePhotoBtn.dataset.index), removePhotoBtn.dataset.photoId || "");
            return;
          }

          const previewPhotoBtn = event.target.closest("[data-action='preview-photo']");
          if (previewPhotoBtn) {
            openPhotoPreview(Number(previewPhotoBtn.dataset.index), previewPhotoBtn.dataset.photoId || "");
            return;
          }

          const btn = event.target.closest("[data-result]");
          if (!btn) return;
          const index = Number(btn.dataset.index);
          const item = state.selectedItems[index];
          if (!item) return;
          item.result = btn.dataset.result;
          renderExecute();
        });
        refs.itemCards.addEventListener("input", (event) => {
          handleItemFieldInput(event);
        });
        refs.itemCards.addEventListener("change", (event) => {
          const target = event.target;
          const field = target.dataset.field;
          if (field === "photoInput" && target.files) {
            void addItemPhotos(Number(target.dataset.index), target.files, target);
            return;
          }
          handleItemFieldInput(event);
        });
        refs.submitPhotoInput.addEventListener("change", (event) => {
          const target = event.target;
          if (target.files) {
            void addSubmitPhotos(target.files, target);
          }
        });
        refs.submitPhotoList.addEventListener("click", (event) => {
          const removeBtn = event.target.closest("[data-action='remove-submit-photo']");
          if (removeBtn) {
            event.stopPropagation();
            removeSubmitPhoto(removeBtn.dataset.photoId || "");
            return;
          }
          const previewBtn = event.target.closest("[data-action='preview-submit-photo']");
          if (previewBtn) {
            openSubmitPhotoPreview(previewBtn.dataset.photoId || "");
          }
        });
        refs.addSignatureBtn.addEventListener("click", addSignatureRow);
        refs.signatureList.addEventListener("click", (event) => {
          const openBtn = event.target.closest("[data-action='open-signature']");
          if (openBtn) {
            openSignatureModal(Number(openBtn.dataset.index));
            return;
          }
          const previewBtn = event.target.closest("[data-action='preview-signature']");
          if (previewBtn) {
            previewSignature(Number(previewBtn.dataset.index));
            return;
          }
          const clearBtn = event.target.closest("[data-action='clear-signature']");
          if (clearBtn) {
            clearSavedSignature(Number(clearBtn.dataset.index));
            return;
          }
          const removeBtn = event.target.closest("[data-action='remove-signature']");
          if (removeBtn) {
            removeSignatureRow(Number(removeBtn.dataset.index));
          }
        });
        refs.principalSignatureBox.addEventListener("click", (event) => {
          const openBtn = event.target.closest("[data-action='open-principal-signature']");
          if (openBtn) {
            openPrincipalSignatureModal();
            return;
          }
          const previewBtn = event.target.closest("[data-action='preview-principal-signature']");
          if (previewBtn) {
            previewPrincipalSignature();
            return;
          }
          const clearBtn = event.target.closest("[data-action='clear-principal-signature']");
          if (clearBtn) {
            clearPrincipalSignature();
          }
        });
        refs.closeSignatureBtn.addEventListener("click", closeSignatureModal);
        refs.cancelSignatureBtn.addEventListener("click", closeSignatureModal);
        refs.clearSignatureBtn.addEventListener("click", clearSignatureCanvas);
        refs.saveSignatureBtn.addEventListener("click", saveSignature);
        refs.signatureModal.addEventListener("click", (event) => {
          if (event.target === refs.signatureModal) {
            closeSignatureModal();
          }
        });
        bindSignatureCanvas();
        refs.closePhotoPreviewBtn.addEventListener("click", closePhotoPreview);
        refs.photoPreviewModal.addEventListener("click", (event) => {
          if (event.target === refs.photoPreviewModal) {
            closePhotoPreview();
          }
        });
        document.addEventListener("click", (event) => {
          if (!(event.target instanceof HTMLElement) || event.target.closest(".overview-inspector")) return;
          closeInspectorPicker();
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            closeInspectorPicker();
          }
        });
        window.addEventListener("resize", closeInspectorPicker);
      }

      function handleItemFieldInput(event) {
          const target = event.target;
          const index = Number(target.dataset.index);
          const field = target.dataset.field;
          if (!field || !state.selectedItems[index]) return;
          if (field === "photoInput") {
            return;
          }
          state.selectedItems[index][field] = target.value;
          updateProgress();
      }

      async function loadData(options = {}) {
        showToast("正在加载...");
        try {
          const [bootstrap, userResult] = await Promise.allSettled([
            requestApi("/safety-check/bootstrap"),
            requestApi("/contacts/users"),
          ]);
          if (bootstrap.status !== "fulfilled") {
            throw bootstrap.reason;
          }
          const resp = bootstrap.value;
          const data = resp.data || {};
          state.templates = data.templates || [];
          state.items = data.items || [];
          state.tasks = (data.tasks || []).filter((item) => ["", "待检查", "检查中"].includes(item.status || ""));
          state.submissions = data.submissions || [];
          state.options = data.options || {};
          if (userResult.status === "fulfilled") {
            state.users = userResult.value.data?.users || [];
          }
          fillInspectorSelect();
          renderHome();
          if (options.goHome) {
            switchView("home");
          }
        } catch (error) {
          showToast(`加载失败：${error.message}`);
        }
      }

      function renderHome() {
        if (refs.homeView.classList.contains("active")) {
          refs.title.textContent = "安全检查";
          refs.bottomBar.classList.add("hidden");
        }
        const keyword = refs.keywordInput.value.trim().toLowerCase();
        const tasks = filterPendingTasks(keyword);
        const checkedRecords = filterTodayCheckedRecords(keyword);
        const activeRows = state.taskMode === "checked" ? checkedRecords : tasks;
        const isCheckedMode = state.taskMode === "checked";
        renderTaskModeState();
        refs.keywordInput.placeholder = isCheckedMode ? "搜索已检查记录/区域对象/检查人" : "搜索待检查任务/区域对象/责任人";

        const overdueCount = tasks.filter((task) => task.overdue === "是").length;
        const checkingCount = tasks.filter((task) => task.status === "检查中").length;
        refs.overviewDate.textContent = formatChineseDate(new Date());
        refs.overviewMeta.textContent = `${tasks.length} 项任务待处理 · 今日已检查 ${checkedRecords.length} 项`;
        refs.statOverdue.textContent = overdueCount;
        refs.statPending.textContent = Math.max(tasks.length - overdueCount, 0);
        refs.statTemplates.textContent = checkingCount;
        refs.taskCards.innerHTML = activeRows.length
          ? activeRows.map(isCheckedMode ? renderCheckedRecordCard : renderTaskCard).join("")
          : `<div class="empty">${isCheckedMode ? "暂无当日已检查记录" : "暂无待检查任务"}</div>`;
        if (!isCheckedMode) {
          refs.taskCards.querySelectorAll("[data-start-task]").forEach((btn) => {
            btn.addEventListener("click", () => startTask(btn.dataset.startTask));
          });
        }
      }

      function filterPendingTasks(keyword) {
        return state.tasks.filter((item) => {
          const text = [item.code, item.templateName, item.target, item.ownerUser, item.ownerDept].join(" ").toLowerCase();
          return !keyword || text.includes(keyword);
        });
      }

      function filterTodayCheckedRecords(keyword) {
        const todayKey = dateKeyOf(new Date());
        return state.submissions.filter((item) => {
          if (dateKeyOf(item.endTime || item.startTime) !== todayKey) {
            return false;
          }
          const text = [item.code, item.templateName, item.target, item.inspector, item.result, item.status].join(" ").toLowerCase();
          return !keyword || text.includes(keyword);
        });
      }

      function setTaskMode(mode) {
        state.taskMode = mode === "checked" ? "checked" : "pending";
        renderHome();
      }

      function renderTaskModeState() {
        const isChecked = state.taskMode === "checked";
        refs.taskModePendingBtn.classList.toggle("active", !isChecked);
        refs.taskModeCheckedBtn.classList.toggle("active", isChecked);
        refs.taskModePendingBtn.setAttribute("aria-checked", String(!isChecked));
        refs.taskModeCheckedBtn.setAttribute("aria-checked", String(isChecked));
      }

      function fillInspectorSelect() {
        const current = refs.inspectorInput.value;
        refs.inspectorInput.innerHTML = `<option value="">请选择</option>`;
        state.users.forEach((user) => {
          const userId = user.userId || user.id || user._id || user.value || "";
          const label = user.name || user.nickname || user.userName || userId;
          if (!userId && !label) return;
          const option = document.createElement("option");
          option.value = userId || label;
          option.textContent = label;
          if (user.mainDeptName) {
            option.title = `${label}（${user.mainDeptName}）`;
          }
          option.dataset.label = label;
          refs.inspectorInput.appendChild(option);
        });
        if (state.currentUserId && ![...refs.inspectorInput.options].some((option) => option.value === state.currentUserId)) {
          const option = document.createElement("option");
          const label = state.currentUserName || state.currentUserId;
          option.value = state.currentUserId;
          option.textContent = label;
          option.dataset.label = label;
          refs.inspectorInput.appendChild(option);
        }
        const preferred = state.currentUserId || current || localStorage.getItem("safety_check_inspector_id") || "";
        if (preferred && [...refs.inspectorInput.options].some((option) => option.value === preferred)) {
          refs.inspectorInput.value = preferred;
        } else if (state.currentUserName) {
          const matched = [...refs.inspectorInput.options].find((option) => option.dataset.label === state.currentUserName || option.textContent === state.currentUserName);
          if (matched) {
            refs.inspectorInput.value = matched.value;
          }
        }
        updateInspectorPicker();
      }

      function toggleInspectorPicker() {
        const willOpen = refs.inspectorPickerPanel.classList.contains("hidden");
        if (!willOpen) {
          closeInspectorPicker();
          return;
        }
        updateInspectorPicker();
        refs.inspectorPickerPanel.classList.remove("hidden");
        refs.inspectorPickerBtn.setAttribute("aria-expanded", "true");
        const selected = refs.inspectorPickerPanel.querySelector(".is-selected");
        if (selected) {
          selected.scrollIntoView({ block: "nearest" });
        }
      }

      function closeInspectorPicker() {
        refs.inspectorPickerPanel.classList.add("hidden");
        refs.inspectorPickerBtn.setAttribute("aria-expanded", "false");
      }

      function updateInspectorPicker() {
        const option = refs.inspectorInput.selectedOptions && refs.inspectorInput.selectedOptions[0];
        const label = (option?.dataset?.label || option?.textContent || "请选择").trim() || "请选择";
        refs.inspectorPickerText.textContent = label;
        refs.inspectorPickerBtn.title = label;
        renderInspectorPickerOptions();
      }

      function renderInspectorPickerOptions() {
        refs.inspectorPickerPanel.innerHTML = "";
        Array.from(refs.inspectorInput.options).forEach((option) => {
          const item = document.createElement("button");
          const label = option.dataset.label || option.textContent || "请选择";
          item.type = "button";
          item.className = `inspector-picker-option${option.value === refs.inspectorInput.value ? " is-selected" : ""}`;
          item.dataset.inspectorValue = option.value;
          item.textContent = label;
          item.title = option.title || label;
          item.setAttribute("role", "option");
          item.setAttribute("aria-selected", String(option.value === refs.inspectorInput.value));
          refs.inspectorPickerPanel.appendChild(item);
        });
      }

      function selectedInspector() {
        const option = refs.inspectorInput.selectedOptions && refs.inspectorInput.selectedOptions[0];
        return {
          id: refs.inspectorInput.value.trim(),
          label: option?.dataset?.label || option?.textContent || "",
        };
      }

      function renderTaskCard(task) {
        const overdue = task.overdue === "是";
        return `
          <article class="task-card ${overdue ? "overdue" : ""}">
            <div class="task-row">
              <span class="task-icon">检</span>
              <div class="task-main">
                <h3>${escapeHtml(task.templateName || "安全检查")}</h3>
                <div class="meta">${escapeHtml(task.target || "未填写区域/对象")} · 截止 ${escapeHtml(shortDateTime(task.deadline))}</div>
                <div class="task-chips">
                  ${renderTaskTag(task)}
                  ${task.ownerUser ? `<span class="tag">${escapeHtml(task.ownerUser)}</span>` : ""}
                </div>
              </div>
              <button class="btn primary task-action" data-start-task="${escapeHtml(task.id)}">去执行</button>
            </div>
          </article>
        `;
      }

      function renderCheckedRecordCard(record) {
        const isAbnormal = record.result === "异常";
        const finishTime = record.endTime || record.startTime;
        return `
          <article class="task-card">
            <div class="task-row checked">
              <span class="task-icon">已</span>
              <div class="task-main">
                <h3>${escapeHtml(record.templateName || "安全检查")}</h3>
                <div class="meta">${escapeHtml(record.target || "未填写区域/对象")} · 完成 ${escapeHtml(shortDateTime(finishTime))}</div>
                <div class="task-chips">
                  <span class="tag ${isAbnormal ? "danger" : "ok"}">${escapeHtml(record.result || "正常")}</span>
                  ${record.inspector ? `<span class="tag">${escapeHtml(record.inspector)}</span>` : ""}
                  <span class="tag">${Number(record.abnormalCount || 0)} 异常</span>
                </div>
              </div>
            </div>
          </article>
        `;
      }

      function startTask(taskId) {
        const task = state.tasks.find((item) => item.id === taskId);
        if (!task) {
          showToast("未找到任务");
          return;
        }
        const template = state.templates.find((item) => item.id === task.templateId);
        startInspection({ task, template, target: task.target || template?.target || "" });
      }

      function startInspection({ task, template, target }) {
        const inspector = selectedInspector();
        if (!inspector.id) {
          showToast("请选择检查人");
          return;
        }
        if (!template) {
          showToast("未找到检查模板");
          return;
        }
        localStorage.setItem("safety_check_inspector_id", inspector.id);
        const details = state.items
          .filter((item) => item.templateId === template.id && item.enabled !== "停用")
          .sort((a, b) => Number(a.seq || 0) - Number(b.seq || 0));
        if (!details.length) {
          showToast("该模板暂无检查项");
          return;
        }
        state.selectedTask = task;
        state.selectedTemplate = template;
        state.target = target;
        state.startTime = nowDateTimeText();
        state.selectedItems = details.map((item) => ({
          ...item,
          result: "",
          inputValue: "",
          abnormalDesc: "",
          handling: "",
          handlingStatus: "待处理",
          photos: [],
        }));
        state.submitPhotos = [];
        state.signatures = [createSignatureRow()];
        state.principalSignature = createSignatureRow();
        state.activeSignatureIndex = -1;
        state.activeSignatureTarget = "personnel";
        resetSignaturePadState();
        restoreInspectionDraftIfAvailable();
        renderExecute();
        switchView("execute");
      }

      function renderExecute() {
        refs.title.textContent = "执行检查";
        refs.executeTitle.textContent = state.selectedTemplate?.name || "安全检查";
        refs.executeMeta.textContent = `${state.target || "未填写区域/对象"} · ${selectedInspector().label || "检查人"}`;
        refs.itemCards.innerHTML = renderGroupedItemCards();
        renderSubmitExtras();
        updateProgress();
      }

      function renderGroupedItemCards() {
        const counts = state.selectedItems.reduce((acc, item) => {
          const category = item.category || "未分类";
          acc[category] = (acc[category] || 0) + 1;
          return acc;
        }, {});
        let lastCategory = "";
        return state.selectedItems.map((item, index) => {
          const category = item.category || "未分类";
          const heading = category !== lastCategory ? `<div class="item-group-title">${escapeHtml(category)}（${counts[category]}项）</div>` : "";
          lastCategory = category;
          return `${heading}${renderItemCard(item, index)}`;
        }).join("");
      }

      function renderItemCard(item, index) {
        const resultType = item.resultType || "正常异常";
        const hasNA = resultType === "正常异常不适用" || String(item.resultOptions || "").includes("不适用");
        const stateClass = item.result === "正常" ? "done-normal" : item.result === "异常" ? "done-abnormal" : item.result === "不适用" ? "done-na" : "pending";
        const stateText = item.result || "待检";
        return `
          <article class="check-card ${stateClass}">
            <div class="check-title-row">
              <span class="item-index">${String(item.seq || index + 1).padStart(2, "0")}</span>
              <div>
                <h3>${escapeHtml(item.item || "检查项")}</h3>
              </div>
              <span class="tag item-state ${item.result === "异常" ? "danger" : item.result === "正常" ? "ok" : ""}">${escapeHtml(stateText)}</span>
            </div>
            ${renderResultInput(item, index, hasNA)}
            ${renderAbnormalBox(item, index)}
          </article>
        `;
      }

      function renderResultInput(item, index, hasNA) {
        if (item.resultType === "数值录入") {
          return `
            <div class="field">
              <label><span class="required">*</span>检查结果</label>
              <input class="input" type="number" inputmode="decimal" data-index="${index}" data-field="inputValue" value="${escapeHtml(item.inputValue || "")}" placeholder="请输入数值" />
            </div>
            <div class="result-bar">
              <button class="result-btn ${item.result === "异常" ? "active abnormal" : ""}" data-index="${index}" data-result="异常">异常</button>
              <button class="result-btn ${item.result === "不适用" ? "active na" : ""}" data-index="${index}" data-result="不适用">不适用</button>
              <button class="result-btn ${item.result === "正常" ? "active normal" : ""}" data-index="${index}" data-result="正常">正常</button>
            </div>
          `;
        }
        if (item.resultType === "文本说明") {
          return `
            <div class="field">
              <label><span class="required">*</span>检查结果</label>
              <textarea class="textarea" data-index="${index}" data-field="inputValue" placeholder="请输入检查说明">${escapeHtml(item.inputValue || "")}</textarea>
            </div>
            <div class="result-bar">
              <button class="result-btn ${item.result === "异常" ? "active abnormal" : ""}" data-index="${index}" data-result="异常">异常</button>
              <button class="result-btn ${item.result === "不适用" ? "active na" : ""}" data-index="${index}" data-result="不适用">不适用</button>
              <button class="result-btn ${item.result === "正常" ? "active normal" : ""}" data-index="${index}" data-result="正常">正常</button>
            </div>
          `;
        }
        return `
          <div class="result-bar" style="grid-template-columns: repeat(${hasNA ? 3 : 2}, minmax(0, 1fr))">
            <button class="result-btn ${item.result === "异常" ? "active abnormal" : ""}" data-index="${index}" data-result="异常">异常</button>
            ${hasNA ? `<button class="result-btn ${item.result === "不适用" ? "active na" : ""}" data-index="${index}" data-result="不适用">不适用</button>` : ""}
            <button class="result-btn ${item.result === "正常" ? "active normal" : ""}" data-index="${index}" data-result="正常">正常</button>
          </div>
        `;
      }

      function renderAbnormalBox(item, index) {
        if (item.result !== "异常") return "";
        const photos = normalizePhotoList(item.photos);
        const photoHtml = photos.length
          ? `<div class="photos">${photos.map((photo) => `
              <div class="photo-card">
                <div class="photo-thumb" data-action="preview-photo" data-index="${index}" data-photo-id="${escapeHtml(photo.id)}">
                  ${photo.url ? `<img src="${escapeHtml(photo.url)}" alt="${escapeHtml(photo.name || "异常照片")}" />` : `<span class="photo-file">已选照片</span>`}
                  <button class="photo-remove" type="button" data-action="remove-photo" data-index="${index}" data-photo-id="${escapeHtml(photo.id)}" aria-label="删除照片">×</button>
                </div>
                <div class="photo-name">${escapeHtml(photo.name || "照片")}</div>
              </div>
            `).join("")}</div>`
          : "";
        return `
          <div class="field">
            <label>${item.abnormalDescRequired === "是" ? '<span class="required">*</span>' : ""}异常说明</label>
            <textarea class="textarea" data-index="${index}" data-field="abnormalDesc" placeholder="请填写异常现象">${escapeHtml(item.abnormalDesc || "")}</textarea>
          </div>
          <div class="field">
            <label>整改要求</label>
            <textarea class="textarea" data-index="${index}" data-field="handling" placeholder="可填写整改要求">${escapeHtml(item.handling || "")}</textarea>
          </div>
          <div class="field">
            <label><span class="required">*</span>处理情况</label>
            <select class="input" data-index="${index}" data-field="handlingStatus">
              <option value="待处理" ${(item.handlingStatus || "待处理") === "待处理" ? "selected" : ""}>待处理</option>
              <option value="已处理" ${item.handlingStatus === "已处理" ? "selected" : ""}>已处理</option>
            </select>
          </div>
          <div class="field">
            <div class="photo-head">
              <label>${item.abnormalPhotoRequired === "是" ? '<span class="required">*</span>' : ""}异常照片</label>
              <label class="btn photo-add-btn" title="添加照片">
                添加照片
                <input type="file" accept="image/*" capture="environment" multiple data-index="${index}" data-field="photoInput" hidden />
              </label>
            </div>
            ${photoHtml}
          </div>
        `;
      }

      function normalizePhotoList(value) {
        return (Array.isArray(value) ? value : [])
          .map((item, index) => {
            if (item && typeof item === "object") {
              const name = String(item.name || item.fileName || `照片${index + 1}`).trim();
              const url = String(item.url || item.previewUrl || item.dataUrl || "").trim();
              const dataUrl = String(item.dataUrl || (/^data:image\//i.test(url) ? url : "")).trim();
              return {
                id: String(item.id || `${name}-${index}`).trim(),
                name,
                url,
                dataUrl,
              };
            }
            const name = String(item || "").trim();
            if (!name) {
              return null;
            }
            return {
              id: `${name}-${index}`,
              name,
              url: "",
              dataUrl: "",
            };
          })
          .filter(Boolean);
      }

      async function addItemPhotos(index, fileList, inputEl) {
        const item = state.selectedItems[index];
        if (!item || !fileList || !fileList.length) {
          return;
        }

        const files = Array.from(fileList).filter((file) => file && /^image\//i.test(file.type || ""));
        if (!files.length) {
          showToast("请选择图片文件");
          if (inputEl) inputEl.value = "";
          return;
        }

        try {
          const nextPhotos = normalizePhotoList(item.photos);
          for (const file of files) {
            const dataUrl = await readFileAsDataUrl(file);
            const previewUrl = await compressPhotoDataUrl(dataUrl);
            nextPhotos.push({
              id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
              name: file.name || `异常照片_${nextPhotos.length + 1}.jpg`,
              url: previewUrl,
              dataUrl: previewUrl,
            });
          }
          item.photos = nextPhotos;
          renderExecute();
        } catch (error) {
          showToast(`照片处理失败：${error.message || "请重试"}`);
        } finally {
          if (inputEl) inputEl.value = "";
        }
      }

      function renderSubmitExtras() {
        const photos = normalizePhotoList(state.submitPhotos);
        refs.submitPhotoList.innerHTML = photos.length ? photos.map((photo) => `
          <div class="photo-card">
            <div class="photo-thumb" data-action="preview-submit-photo" data-photo-id="${escapeHtml(photo.id)}">
              ${photo.url ? `<img src="${escapeHtml(photo.url)}" alt="${escapeHtml(photo.name || "现场照片")}" />` : `<span class="photo-file">已选照片</span>`}
              <button class="photo-remove" type="button" data-action="remove-submit-photo" data-photo-id="${escapeHtml(photo.id)}" aria-label="删除照片">×</button>
            </div>
            <div class="photo-name">${escapeHtml(photo.name || "现场照片")}</div>
          </div>
        `).join("") : "";
        refs.submitPhotoStatus.textContent = photos.length ? `已选择 ${photos.length} 张现场照片` : "";

        if (!Array.isArray(state.signatures) || !state.signatures.length) {
          state.signatures = [createSignatureRow()];
        }
        refs.signatureList.innerHTML = state.signatures.map((signature, index) => {
          const hasSign = Boolean(signature && signature.dataUrl);
          const previewUrl = hasSign ? String(signature.previewUrl || signature.dataUrl || "").trim() : "";
          const signTimeText = signature.signTime ? String(signature.signTime).slice(0, 16) : "";
          return `
            <div class="signature-row" data-signature-index="${index}">
              <div class="signature-seq">${index + 1}</div>
              <div class="signature-sign-cell">
                ${previewUrl ? `<button type="button" class="sign-thumb-btn" data-action="preview-signature" data-index="${index}" aria-label="查看签名"><img class="sign-preview-img" src="${escapeHtml(previewUrl)}" alt="签名预览" /></button>` : ""}
                <button class="btn signature-sign-btn" type="button" data-action="open-signature" data-index="${index}">${hasSign ? "重签" : "点击签名"}</button>
                <span class="sign-state${hasSign ? " done" : ""}">${hasSign ? "已签" : "未签名"}</span>
                ${hasSign ? `<button type="button" class="sign-preview-link" data-action="preview-signature" data-index="${index}">预览</button>` : ""}
                ${hasSign ? `<button type="button" class="sign-preview-link" data-action="clear-signature" data-index="${index}">清除</button>` : ""}
                ${signTimeText ? `<span class="signature-time">${escapeHtml(signTimeText)}</span>` : ""}
              </div>
              <button type="button" class="signature-delete" data-action="remove-signature" data-index="${index}" aria-label="删除签名"></button>
            </div>
          `;
        }).join("");

        if (!state.principalSignature) {
          state.principalSignature = createSignatureRow();
        }
        refs.principalSignatureBox.innerHTML = renderPrincipalSignature();
      }

      function renderPrincipalSignature() {
        const signature = state.principalSignature || {};
        const hasSign = Boolean(signature && signature.dataUrl);
        const previewUrl = hasSign ? String(signature.previewUrl || signature.dataUrl || "").trim() : "";
        const signTimeText = signature.signTime ? String(signature.signTime).slice(0, 16) : "";
        return `
          <div class="principal-signature-row">
            <div class="signature-sign-cell">
              ${previewUrl ? `<button type="button" class="sign-thumb-btn" data-action="preview-principal-signature" aria-label="查看主要负责人签字"><img class="sign-preview-img" src="${escapeHtml(previewUrl)}" alt="主要负责人签字预览" /></button>` : ""}
              <button class="btn signature-sign-btn" type="button" data-action="open-principal-signature">${hasSign ? "重签" : "点击签字"}</button>
              <span class="sign-state${hasSign ? " done" : ""}">${hasSign ? "已签" : "未签名"}</span>
              ${hasSign ? `<button type="button" class="sign-preview-link" data-action="preview-principal-signature">预览</button>` : ""}
              ${hasSign ? `<button type="button" class="sign-preview-link" data-action="clear-principal-signature">清除</button>` : ""}
              ${signTimeText ? `<span class="signature-time">${escapeHtml(signTimeText)}</span>` : ""}
            </div>
          </div>
        `;
      }

      function createSignatureRow() {
        return {
          id: `signature_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
          name: "",
          dataUrl: "",
          previewUrl: "",
          signTime: "",
        };
      }

      function addSignatureRow() {
        state.signatures.push(createSignatureRow());
        renderSubmitExtras();
      }

      function removeSignatureRow(index) {
        if (!Number.isFinite(index) || !state.signatures[index]) {
          return;
        }
        if (state.signatures.length <= 1) {
          clearSavedSignature(index);
          return;
        }
        state.signatures.splice(index, 1);
        renderSubmitExtras();
      }

      function previewSignature(index) {
        const signature = state.signatures[index];
        if (!signature || !signature.dataUrl) {
          showToast("当前签名暂无可预览内容");
          return;
        }
        openPhotoPreviewByPhoto({
          name: `签名${index + 1}`,
          url: signature.previewUrl || signature.dataUrl,
        }, "当前签名暂无可预览内容");
      }

      function previewPrincipalSignature() {
        const signature = state.principalSignature;
        if (!signature || !signature.dataUrl) {
          showToast("主要负责人签字暂无可预览内容");
          return;
        }
        openPhotoPreviewByPhoto({
          name: "主要负责人签字",
          url: signature.previewUrl || signature.dataUrl,
        }, "主要负责人签字暂无可预览内容");
      }

      async function addSubmitPhotos(fileList, inputEl) {
        if (!fileList || !fileList.length) {
          return;
        }
        const files = Array.from(fileList).filter((file) => file && /^image\//i.test(file.type || ""));
        if (!files.length) {
          showToast("请选择图片文件");
          if (inputEl) inputEl.value = "";
          return;
        }

        try {
          const nextPhotos = normalizePhotoList(state.submitPhotos);
          for (const file of files) {
            const dataUrl = await readFileAsDataUrl(file);
            const previewUrl = await compressPhotoDataUrl(dataUrl);
            nextPhotos.push({
              id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
              name: file.name || `现场照片_${nextPhotos.length + 1}.jpg`,
              url: previewUrl,
              dataUrl: previewUrl,
            });
          }
          state.submitPhotos = nextPhotos;
          renderSubmitExtras();
        } catch (error) {
          showToast(`照片处理失败：${error.message || "请重试"}`);
        } finally {
          if (inputEl) inputEl.value = "";
        }
      }

      function removeSubmitPhoto(photoId) {
        if (!photoId) {
          return;
        }
        state.submitPhotos = normalizePhotoList(state.submitPhotos).filter((photo) => photo.id !== photoId);
        renderSubmitExtras();
      }

      function openSubmitPhotoPreview(photoId) {
        const photo = normalizePhotoList(state.submitPhotos).find((row) => row.id === photoId);
        openPhotoPreviewByPhoto(photo, "当前现场照片暂无可预览内容");
      }

      function removeItemPhoto(index, photoId) {
        const item = state.selectedItems[index];
        if (!item || !photoId) {
          return;
        }
        item.photos = normalizePhotoList(item.photos).filter((photo) => photo.id !== photoId);
        renderExecute();
      }

      function openPhotoPreview(index, photoId) {
        const item = state.selectedItems[index];
        const photo = normalizePhotoList(item && item.photos).find((row) => row.id === photoId);
        openPhotoPreviewByPhoto(photo, "当前照片暂无可预览内容");
      }

      function openPhotoPreviewByPhoto(photo, emptyMessage) {
        if (!photo || !photo.url) {
          showToast(emptyMessage || "当前照片暂无可预览内容");
          return;
        }
        refs.photoPreviewImage.src = photo.url;
        refs.photoPreviewImage.alt = photo.name || "照片预览";
        refs.photoPreviewModal.classList.remove("hidden");
      }

      function closePhotoPreview() {
        refs.photoPreviewModal.classList.add("hidden");
        refs.photoPreviewImage.removeAttribute("src");
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error("图片读取失败，请重试"));
          reader.readAsDataURL(file);
        });
      }

      async function compressPhotoDataUrl(dataUrl) {
        const image = await loadImageFromDataUrl(dataUrl);
        const width = Number(image.naturalWidth || image.width || 0);
        const height = Number(image.naturalHeight || image.height || 0);
        if (!width || !height) {
          return dataUrl;
        }

        const maxSide = 900;
        const scale = Math.min(1, maxSide / Math.max(width, height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(width * scale));
        canvas.height = Math.max(1, Math.round(height * scale));

        const ctx = canvas.getContext("2d", { alpha: false });
        if (!ctx) {
          return dataUrl;
        }

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL("image/jpeg", 0.82);
      }

      function loadImageFromDataUrl(dataUrl) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("图片加载失败"));
          image.src = dataUrl;
        });
      }

      function openSignatureModal(index, target = "personnel") {
        const isPrincipal = target === "principal";
        if (isPrincipal) {
          if (!state.principalSignature) {
            state.principalSignature = createSignatureRow();
          }
        } else if (!Number.isFinite(index) || !state.signatures[index]) {
          showToast("当前签名行不存在");
          return;
        }
        state.activeSignatureTarget = isPrincipal ? "principal" : "personnel";
        state.activeSignatureIndex = isPrincipal ? -1 : index;
        refs.signatureModalTitle.textContent = isPrincipal ? "主要负责人签字" : "现场人员签名";
        refs.signatureModal.classList.remove("hidden");
        resizeSignatureCanvas();
        clearSignatureCanvas();
        refs.signatureStatus.textContent = isPrincipal
          ? "请在签名区书写后点击保存（主要负责人签字）"
          : `请在签名区书写后点击保存（签名 ${index + 1}）`;
      }

      function openPrincipalSignatureModal() {
        openSignatureModal(-1, "principal");
      }

      function closeSignatureModal() {
        state.activeSignatureIndex = -1;
        state.activeSignatureTarget = "personnel";
        refs.signatureModal.classList.add("hidden");
        clearSignatureCanvas();
      }

      function bindSignatureCanvas() {
        const canvas = refs.signatureCanvas;
        if (!(canvas instanceof HTMLCanvasElement)) {
          return;
        }
        canvas.addEventListener("pointerdown", handleSignaturePointerDown);
        canvas.addEventListener("pointermove", handleSignaturePointerMove);
        canvas.addEventListener("pointerup", handleSignaturePointerUp);
        canvas.addEventListener("pointerleave", handleSignaturePointerUp);
        canvas.addEventListener("pointercancel", handleSignaturePointerUp);
        window.addEventListener("resize", () => {
          if (!refs.signatureModal.classList.contains("hidden")) {
            resizeSignatureCanvas();
          }
        });
      }

      function resizeSignatureCanvas() {
        const canvas = refs.signatureCanvas;
        if (!(canvas instanceof HTMLCanvasElement)) {
          return;
        }
        const rect = canvas.getBoundingClientRect();
        const ratio = Math.max(1, window.devicePixelRatio || 1);
        const width = Math.max(1, Math.round(rect.width * ratio));
        const height = Math.max(1, Math.round(rect.height * ratio));
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        if (!ctx) {
          return;
        }
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, rect.width, rect.height);
        ctx.lineWidth = 2.4;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "#111827";
        resetSignaturePadState();
      }

      function clearSignatureCanvas() {
        const canvas = refs.signatureCanvas;
        if (!(canvas instanceof HTMLCanvasElement)) {
          return;
        }
        const rect = canvas.getBoundingClientRect();
        const ctx = canvas.getContext("2d");
        if (!ctx) {
          return;
        }
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, rect.width, rect.height);
        resetSignaturePadState();
        refs.signatureStatus.textContent = "已清空，请重新签名";
      }

      function resetSignaturePadState() {
        state.signaturePad.drawing = false;
        state.signaturePad.dirty = false;
        state.signaturePad.pointerId = null;
        state.signaturePad.lastX = 0;
        state.signaturePad.lastY = 0;
      }

      function handleSignaturePointerDown(event) {
        const canvas = refs.signatureCanvas;
        if (!(canvas instanceof HTMLCanvasElement)) {
          return;
        }
        event.preventDefault();
        const point = getCanvasPoint(canvas, event);
        state.signaturePad.drawing = true;
        state.signaturePad.pointerId = event.pointerId;
        state.signaturePad.lastX = point.x;
        state.signaturePad.lastY = point.y;
        refs.signatureStatus.textContent = "正在签名...";
        if (typeof canvas.setPointerCapture === "function") {
          try {
            canvas.setPointerCapture(event.pointerId);
          } catch {
            // ignore pointer capture errors
          }
        }
      }

      function handleSignaturePointerMove(event) {
        const canvas = refs.signatureCanvas;
        if (!(canvas instanceof HTMLCanvasElement) || !state.signaturePad.drawing || state.signaturePad.pointerId !== event.pointerId) {
          return;
        }
        event.preventDefault();
        const point = getCanvasPoint(canvas, event);
        const ctx = canvas.getContext("2d");
        if (!ctx) {
          return;
        }
        ctx.beginPath();
