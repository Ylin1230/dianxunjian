<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>点检报工</title>
    <style>
      :root {
        --bg: #edf3fb;
        --panel: #ffffff;
        --line: #dce5f2;
        --text: #1c2940;
        --minor: #6d7d96;
        --primary: #2b77e7;
        --primary-deep: #1f5fc6;
        --danger: #d24a4a;
        --warn: #d27a1f;
        --ok: #1e9158;
        --soft-shadow: 0 14px 34px rgba(42, 76, 130, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(80, 142, 255, 0.12) 0%, rgba(80, 142, 255, 0) 34%),
          linear-gradient(180deg, #eef3fb 0%, #f7faff 100%);
        color: var(--text);
        font: 14px/1.45 "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      }

      .app {
        max-width: 440px;
        min-height: 100vh;
        margin: 0 auto;
        background: linear-gradient(180deg, #f7faff 0%, #eef4fd 100%);
        border-left: 1px solid #dce5f2;
        border-right: 1px solid #dce5f2;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 50;
        height: 56px;
        padding: 0 14px;
        background: rgba(255, 255, 255, 0.92);
        border-bottom: 1px solid rgba(220, 229, 242, 0.9);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      body.execute-mode .topbar {
        display: none;
      }

      .topbar-left,
      .topbar-right {
        width: 76px;
        display: flex;
        align-items: center;
      }

      .topbar-right {
        justify-content: flex-end;
      }

      .topbar-title {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .icon-btn,
      .text-btn {
        border: 0;
        background: transparent;
        color: var(--primary);
        font-size: 14px;
        cursor: pointer;
      }

      .icon-btn {
        width: 30px;
        height: 30px;
        border-radius: 15px;
        font-size: 20px;
        line-height: 1;
        color: #3d4e67;
      }

      .icon-btn:active {
        background: #edf2fa;
      }

      .view {
        padding: 10px;
      }

      #executeView {
        padding-top: 0;
      }

      .hidden {
        display: none !important;
      }

      .card {
        background: var(--panel);
        border: 1px solid rgba(220, 229, 242, 0.92);
        border-radius: 18px;
        overflow: hidden;
        margin-bottom: 14px;
        box-shadow: var(--soft-shadow);
      }

      .card-head {
        padding: 10px 12px;
        border-bottom: 1px solid #e8eef7;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .card-title {
        font-size: 15px;
        font-weight: 700;
      }

      .minor {
        color: var(--minor);
        font-size: 12px;
      }

      .overview {
        position: relative;
        padding: 16px;
        border: 0;
        background: linear-gradient(135deg, #2c72ee 0%, #194cc0 100%);
        box-shadow: 0 18px 38px rgba(31, 95, 198, 0.24);
      }

      .overview::before {
        content: "";
        position: absolute;
        right: -42px;
        top: -56px;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.26) 0%, rgba(255, 255, 255, 0) 68%);
      }

      .overview-main {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 14px;
        position: relative;
        z-index: 1;
      }

      .overview-main .date {
        font-size: 28px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1.18;
        letter-spacing: 0.01em;
      }

      .overview-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        position: relative;
        z-index: 1;
      }

      .overview-grid .metric {
        border: 1px solid rgba(255, 255, 255, 0.72);
        background: rgba(255, 255, 255, 0.94);
        padding: 10px 8px;
      }

      .overview-grid .metric .n,
      .overview-grid .metric .k {
        color: #17345d;
      }

      .overview-grid .metric .n {
        font-size: 22px;
        line-height: 1.1;
      }

      .overview-grid .metric .k {
        margin-top: 4px;
        font-size: 12px;
        font-weight: 600;
        color: #607696;
      }

      .metric {
        border: 1px solid #e2e9f5;
        border-radius: 10px;
        background: #fbfdff;
        padding: 10px;
        text-align: center;
      }

      .metric .n {
        font-size: 24px;
        font-weight: 700;
      }

      .metric .k {
        font-size: 12px;
        color: var(--minor);
        margin-top: 2px;
      }

      .metric.urgent .n {
        color: #de4f4f;
      }

      .metric.pending .n {
        color: #2f7de9;
      }

      .metric.done .n {
        color: #1f975d;
      }

      .scan-card {
        padding: 14px;
      }

      .scan-banner {
        color: #274160;
      }

      .scan-banner h3 {
        margin: 0 0 12px;
        font-size: 18px;
        color: #1f3858;
        letter-spacing: 0.01em;
      }

      .scan-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 76px 92px;
        gap: 8px;
        align-items: stretch;
      }

      .input,
      .select,
      .textarea {
        width: 100%;
        border: 1px solid #d7e0ef;
        border-radius: 12px;
        background: #fff;
        color: #21324b;
      }

      .input,
      .select {
        height: 40px;
        padding: 0 12px;
        font-size: 14px;
      }

      .textarea {
        min-height: 72px;
        padding: 8px 10px;
        font-size: 13px;
        resize: vertical;
      }

      .input:focus,
      .select:focus,
      .textarea:focus {
        outline: none;
        border-color: #89afe8;
        box-shadow: 0 0 0 3px rgba(44, 121, 234, 0.14);
      }

      .status-select {
        position: relative;
        width: 100%;
      }

      .status-select-button {
        width: 100%;
        height: 40px;
        border: 1px solid #d7e0ef;
        border-radius: 12px;
        background: #fff;
        color: #21324b;
        padding: 0 36px 0 12px;
        font-size: 14px;
        text-align: left;
        cursor: pointer;
        position: relative;
      }

      .status-select-button::after {
        content: "";
        position: absolute;
        right: 13px;
        top: 50%;
        width: 8px;
        height: 8px;
        border-right: 1.8px solid #6f819b;
        border-bottom: 1.8px solid #6f819b;
        transform: translateY(-65%) rotate(45deg);
      }

      .status-select-button.is-placeholder {
        color: #7d8da5;
      }

      .status-select.is-open .status-select-button {
        border-color: #89afe8;
        box-shadow: 0 0 0 3px rgba(44, 121, 234, 0.14);
      }

      .status-select-panel {
        position: absolute;
        z-index: 80;
        left: 0;
        right: 0;
        top: calc(100% + 6px);
        max-height: 188px;
        overflow: auto;
        border: 1px solid #cfd9ea;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 16px 34px rgba(36, 61, 99, 0.16);
        padding: 4px;
      }

      .status-select-option {
        width: 100%;
        height: 34px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: #21324b;
        text-align: left;
        padding: 0 10px;
        font-size: 14px;
      }

      .status-select-option.is-selected,
      .status-select-option:active {
        background: #eef5ff;
        color: #245fc8;
      }

      .btn {
        border: 1px solid #b8c6dc;
        background: #fff;
        color: #30445f;
        border-radius: 12px;
        height: 40px;
        font-size: 14px;
        padding: 0 12px;
        cursor: pointer;
        font-weight: 600;
      }

      .btn.primary {
        border-color: #2c73ee;
        background: linear-gradient(135deg, #2c73ee 0%, #255fdb 100%);
        color: #fff;
        box-shadow: 0 10px 20px rgba(43, 119, 231, 0.22);
      }

      .btn.soft {
        background: #f7faff;
        border-color: #c8d8f1;
        color: #2564c8;
      }

      .btn.danger {
        background: #fff5f5;
        border-color: #efc5c5;
        color: #c14646;
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .scan-row .input,
      .scan-row .btn {
        height: 44px;
      }

      .task-group {
        margin-bottom: 14px;
        background: var(--panel);
        border: 1px solid rgba(220, 229, 242, 0.9);
        border-radius: 18px;
        padding: 14px;
        box-shadow: var(--soft-shadow);
      }

      .task-group-head {
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .group-actions {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
      }

      .member-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: 0 0 12px;
        padding: 10px 12px;
        border-radius: 12px;
        background: #f7faff;
        border: 1px solid #e3ebf7;
      }

      .member-bar .minor {
        color: #5e7493;
      }

      .task-group-title {
        font-size: 18px;
        font-weight: 700;
        color: #1d3656;
      }

      .task-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .task-item {
        background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
        border: 1px solid #dbe5f2;
        border-radius: 16px;
        padding: 12px;
        box-shadow: 0 10px 22px rgba(38, 65, 109, 0.05);
      }

      .task-item.clickable {
        cursor: pointer;
      }

      .task-item.urgent {
        border-color: #f2c5c5;
        background: #fff7f7;
      }

      .task-item.done {
        background: #f8fffb;
        border-color: #ccebd8;
      }

      .task-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
      }

      .task-name {
        font-size: 16px;
        font-weight: 700;
        color: #1f3553;
      }

      .task-meta {
        margin-top: 6px;
        font-size: 12px;
        color: var(--minor);
      }

      .task-tags {
        margin-top: 8px;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        height: 24px;
        padding: 0 9px;
        border-radius: 999px;
        border: 1px solid #d6e1f2;
        background: #f5f8ff;
        color: #476080;
        font-size: 12px;
      }

      .tag.urgent {
        border-color: #f2c4c4;
        background: #fff1f1;
        color: #cb4949;
      }

      .tag.done {
        border-color: #c3e8d2;
        background: #effcf4;
        color: #1b8a53;
      }

      .task-action {
        align-self: flex-start;
        min-width: 72px;
        padding-top: 2px;
      }

      .minor-link {
        border: 0;
        background: transparent;
        color: #2564c8;
        font-size: 13px;
        padding: 0;
        cursor: pointer;
        font-weight: 600;
      }

      .group-actions .minor {
        color: #7b8ca3;
        font-size: 12px;
      }

      .empty {
        border: 1px dashed #ccd8ea;
        border-radius: 14px;
        background: #fbfdff;
        color: #8190a8;
        font-size: 12px;
        text-align: center;
        padding: 14px 12px;
      }

      .execute-hero {
        position: sticky;
        top: 0;
        z-index: 35;
        background: linear-gradient(135deg, #0b58c8 0%, #0648aa 100%);
        border: 0;
        border-bottom: 1px solid #074da9;
        border-radius: 0;
        padding: 12px 12px 10px;
        margin: 0 -10px 10px;
        color: #ffffff;
        box-shadow: 0 8px 18px rgba(6, 72, 170, 0.24);
      }

      .execute-title {
        font-size: 21px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1.25;
      }

      .execute-title-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .execute-title-main {
        min-width: 0;
      }

      .execute-sub {
        margin-top: 4px;
        font-size: 13px;
        color: #677d9b;
      }

      .execute-chips {
        margin-top: 8px;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        height: 24px;
        padding: 0 9px;
        font-size: 12px;
        border: 1px solid rgba(255, 255, 255, 0.32);
        background: rgba(255, 255, 255, 0.18);
        color: #f5f9ff;
      }

      .progress-card {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 6px 14px rgba(52, 89, 145, 0.08);
      }

      .progress-head {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #536984;
      }

      .progress {
        margin-top: 6px;
        height: 7px;
        border-radius: 999px;
        background: #e7eef9;
        overflow: hidden;
      }

      .progress > span {
        display: block;
        height: 100%;
        background: #67a7ff;
        width: 0;
      }

      .item-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .item-card {
        position: relative;
        background: #fff;
        border: 1px solid #d9e3f1;
        border-left: 4px solid #b9cbe4;
        border-radius: 10px;
        padding: 9px 9px 9px 10px;
        scroll-margin: 205px;
        box-shadow: 0 6px 14px rgba(42, 76, 130, 0.06);
      }

      .item-card.abnormal {
        border-color: #f0c0c0;
        border-left-color: #e96d6d;
        background: #fff;
        box-shadow: 0 6px 14px rgba(210, 74, 74, 0.06);
      }

      .item-card.done {
        border-color: #cdebd8;
        border-left-color: #2fb36a;
        background: #fff;
        box-shadow: 0 6px 14px rgba(47, 179, 106, 0.06);
      }

      .item-card.missing,
      .exec-card.missing,
      .exec-reporter-row.missing {
        border-color: #f0c766;
        background: #fffbea;
        box-shadow: 0 0 0 3px rgba(240, 199, 102, 0.22);
      }

      .item-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .item-title-row {
        display: flex;
        align-items: center;
        min-width: 0;
        gap: 8px;
      }

      .item-no {
        display: inline-flex;
        flex: 0 0 auto;
        width: 26px;
        height: 26px;
        border-radius: 8px;
        align-items: center;
        justify-content: center;
        background: #eef3fb;
        color: #3b5578;
        font-weight: 700;
        font-size: 12px;
      }

      .item-name {
        min-width: 0;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.35;
        color: #223a59;
        overflow-wrap: anywhere;
      }

      .item-mode-tag {
        display: inline-flex;
        align-items: center;
        flex: 0 0 auto;
        height: 24px;
        padding: 0 9px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid #d8e3f2;
        background: #f7faff;
        color: #4a6287;
      }

      .item-status {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        height: 24px;
        padding: 0 8px;
        font-size: 12px;
      }

      .item-status.pending {
        background: #eef3fb;
        color: #556a88;
      }

      .item-status.normal {
        background: #ebf9f1;
        color: #1a8b52;
      }

      .item-status.abnormal {
        background: #fff0f0;
        color: #c14545;
      }

      .result-bar {
        margin-top: 8px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .result-btn {
        border: 1px solid #cdd8ea;
        border-radius: 10px;
        background: #fff;
        color: #355074;
        height: 32px;
        font-size: 13px;
        cursor: pointer;
      }

      .result-btn.active.normal {
        border-color: #1e9b5f;
        background: #fff;
        color: #1b8c54;
      }

      .result-btn.active.abnormal {
        border-color: #edb6b6;
        background: #fff1f1;
        color: #c74646;
      }

      .field {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field label {
        font-size: 12px;
        color: #4a5f7e;
      }

      .field-hint {
        font-size: 12px;
        color: #7a8aa2;
      }

      .input-action-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .input-action-row .input,
      .input-action-row .select {
        flex: 1;
        min-width: 0;
      }

      .input-action-row .btn {
        flex: 0 0 auto;
        min-width: 96px;
      }

      .reporter-select {
        height: 32px;
        border-radius: 999px;
        padding: 0 26px 0 10px;
        font-size: 13px;
        background-color: rgba(255, 255, 255, 0.86);
      }

      .exec-reporter-row {
        flex: 0 0 116px;
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
      }

      .exec-reporter-label {
        font-size: 12px;
        color: #4a5f7e;
        font-weight: 700;
      }

      .judge-hint {
        margin-top: 8px;
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 12px;
        line-height: 1.5;
        border: 1px solid #dce7f6;
        background: #f8fbff;
        color: #567092;
      }

      .judge-hint strong {
        font-size: 13px;
        margin-left: 4px;
      }

      .judge-hint em {
        display: block;
        margin-top: 2px;
        font-style: normal;
        color: #73849c;
      }

      .judge-hint.normal {
        border-color: #c6e8d2;
        background: #f5fff9;
        color: #1c7d4f;
      }

      .judge-hint.abnormal {
        border-color: #efc8c8;
        background: #fff7f7;
        color: #c14545;
      }

      .judge-hint.pending {
        border-style: dashed;
      }

      .required {
        color: #dc4f4f;
        margin-right: 2px;
      }

      .abnormal-box {
        margin-top: 8px;
        border: 1px solid #efc8c8;
        border-radius: 10px;
        background: #fff8f8;
        padding: 8px;
      }

      .photos {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .photo-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .photo-add-btn {
        display: inline-flex;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        align-items: center;
        justify-content: center;
        border: 1px solid #cbd8eb;
        background: #fff;
        color: #667994;
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
      }

      .photo-add-btn:active {
        background: #f1f6fd;
      }

      .photo-thumb {
        position: relative;
        width: 64px;
        height: 64px;
        border: 1px solid #d9e3f1;
        border-radius: 10px;
        background: #fff;
        overflow: visible;
        padding: 0;
        cursor: pointer;
      }

      .photo-thumb img {
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 9px;
        object-fit: cover;
      }

      .photo-file {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6px;
        border-radius: 9px;
        background: #f4f7fc;
        color: #7a8aa2;
        font-size: 11px;
        text-align: center;
      }

      .photo-remove {
        position: absolute;
        top: -7px;
        right: -7px;
        width: 18px;
        height: 18px;
        border: 0;
        border-radius: 50%;
        background: rgba(97, 111, 132, 0.92);
        color: #fff;
        font-size: 14px;
        line-height: 18px;
        padding: 0;
        cursor: pointer;
      }

      .photo-name {
        max-width: 64px;
        margin-top: 4px;
        color: #7a8aa2;
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .photo-preview-body {
        width: min(440px, calc(100vw - 24px));
        max-height: min(82vh, calc(100vh - 32px - env(safe-area-inset-bottom)));
      }

      .photo-preview-wrap {
        padding: 10px;
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        background: #f7faff;
      }

      .photo-preview-wrap img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 12px;
        border: 1px solid #d8e3f2;
        background: #fff;
      }

      .exec-card {
        margin-bottom: 12px;
        border: 1px solid #d9e4f2;

      .exec-card-title {
        margin-bottom: 8px;
        color: #223a59;

      }

      .exec-remark-card {
        margin-top: 12px;
      }

      .exec-foot {
        margin-top: 10px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
      }

      .exec-foot-row {
        display: flex;
        gap: 8px;
      }

      .exec-foot-row .btn {
        flex: 1;
      }

      .summary-hero {
        border-radius: 12px;
        padding: 16px;
        color: #fff;
        background: linear-gradient(135deg, #2c72ee 0%, #194cc0 100%);

      .summary-hero h2 {
        margin: 6px 0 0;
        font-size: 30px;
      }

      .summary-hero p {
        margin: 8px 0 0;
        font-size: 14px;

      .summary-grid {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));

      }

      .summary-grid .metric {
        margin: 0;

      .abnormal-list {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .abnormal-item {
        border: 1px solid #edc5c5;
        background: #fff7f7;
        border-radius: 10px;
        padding: 10px;
      }

      .abnormal-item h4 {
        margin: 0;
        font-size: 15px;
      }

      .abnormal-item p {
        margin: 6px 0 0;
        font-size: 13px;
        color: #7b5a5a;
      }

      .summary-actions {
        margin-top: 12px;
        display: flex;
        gap: 8px;
      }

      .summary-actions .btn {
        flex: 1;
      }

      .statusbar {
        margin-top: 8px;
        border: 1px dashed #ccd8ea;
        border-radius: 14px;
        background: #fbfdff;
        color: #73849d;
        font-size: 12px;
        padding: 10px 12px;
      }

      .statusbar:empty {
        display: none;
      }

      .statusbar.error {
        color: #b44343;
        border-color: #efc3c3;
        background: #fff8f8;
      }

      .toast {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 120;
        background: rgba(28, 41, 62, 0.93);
        color: #fff;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition: all 0.2s ease;

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 110;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px 12px calc(16px + env(safe-area-inset-bottom));

      .modal-body {
        width: min(440px, calc(100vw - 24px));
        max-height: min(78vh, calc(100vh - 32px - env(safe-area-inset-bottom)));
        background: #fff;
        border-radius: 16px;
        border: 1px solid #d7e0ee;
        box-shadow: 0 18px 40px rgba(19, 41, 74, 0.18);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        overscroll-behavior: contain;
      }

      .modal-head {
        padding: 10px 12px;
        border-bottom: 1px solid #e7edf7;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-list {
        padding: 10px;
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .detail-head {
        padding: 10px 12px;
        border-bottom: 1px solid #e7edf7;
        background: #fbfdff;
      }

      .detail-head h3 {
        margin: 0;
        font-size: 16px;
        color: #223a59;
      }

      .detail-head p {
        margin: 6px 0 0;
        font-size: 12px;
        color: #6b7f99;
      }

      .detail-list {
        padding: 10px;
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .detail-row {
        border: 1px solid #dbe5f3;
        border-radius: 12px;
        padding: 10px;
        background: #fff;
      }

      .detail-row.abnormal {
        border-color: #efc8c8;
        background: #fff7f7;
      }

      .detail-row-top {
        display: flex;

        gap: 10px;

      }

      .detail-row-title {

      .detail-row-meta {

      .detail-row-body {
        margin-top: 8px;

        flex-direction: column;

      .bind-panel {
        padding: 10px;
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }

      .bind-select {
        width: 100%;

      }

      .bind-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;

      .bind-current {
        border: 1px dashed #d5e2f3;
        background: #fbfdff;
        border-radius: 10px;
        padding: 10px;
        font-size: 13px;
        color: #5f748f;
      }

      .bind-foot .btn {
        min-width: 108px;
      }

      .scan-live-body {
        width: min(440px, calc(100vw - 24px));
      }

      .scan-live-panel {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .scan-live-frame {
        position: relative;
        overflow: hidden;
        border-radius: 16px;
        border: 1px solid #d6e2f3;
        background: radial-gradient(circle at top, #243950 0%, #162536 58%, #0f1b29 100%);
        aspect-ratio: 1 / 1;
        min-height: 268px;
      }

      .scan-live-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .scan-live-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .scan-live-box {
        position: absolute;
        inset: 15% 14%;
        border-radius: 20px;
        border: 2px solid rgba(255, 255, 255, 0.92);
        box-shadow: 0 0 0 999px rgba(11, 21, 33, 0.38);
      }

      .scan-live-box::before,
      .scan-live-box::after {
        content: "";
        position: absolute;
        left: 12%;
        right: 12%;
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(65, 157, 255, 0) 0%, rgba(82, 176, 255, 0.94) 18%, rgba(82, 176, 255, 0.94) 82%, rgba(65, 157, 255, 0) 100%);
      }

      .scan-live-box::before {
        top: 0;
      }

      .scan-live-box::after {
        bottom: 0;
      }

      .scan-live-tip {
        position: absolute;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        max-width: calc(100% - 28px);
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(13, 24, 39, 0.58);
        color: #f6f9ff;
        font-size: 12px;
        white-space: nowrap;
      }

      .scan-live-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .scan-live-status {
        margin: 0;
        border: 1px dashed #d5e1f2;
        border-radius: 10px;
        background: #fbfdff;
        color: #6c809b;
        font-size: 12px;
        line-height: 1.5;
        padding: 9px 10px;
      }

      @media (min-width: 920px) {
        body {
          padding: 10px 0;
        }

        .app {
          min-height: calc(100vh - 20px);
          border-radius: 16px;
          overflow: hidden;
          box-shadow: 0 16px 42px rgba(38, 60, 98, 0.16);
        }
      }

      @media (max-width: 420px) {
        .modal {
          padding: 14px 10px calc(14px + env(safe-area-inset-bottom));
        }

        .modal-body {
          width: calc(100vw - 20px);
          max-height: min(72vh, calc(100vh - 28px - env(safe-area-inset-bottom)));
          border-radius: 14px;
        }

        .modal-head {
          padding: 10px 11px;
        }

        .bind-panel {
          padding: 10px 11px 12px;
        }

        .scan-live-panel {
          padding: 11px;
        }

        .scan-live-frame {
          min-height: 248px;
          border-radius: 14px;
        }

        .scan-row {
          grid-template-columns: 1fr 1fr;
        }

        .scan-row .input {
          grid-column: 1 / -1;
        }

        .task-group-head {
          align-items: flex-start;
        }

      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar-left">
          <button id="navBackBtn" class="icon-btn hidden" title="返回">‹</button>
        </div>
        <div id="headerTitle" class="topbar-title">今日点检任务</div>
        <div class="topbar-right">
          <button id="headerActionBtn" class="text-btn">刷新</button>
        </div>
      </header>

      <section id="dashboardView" class="view">
        <div class="card overview">
          <div class="overview-main">
            <div id="dashboardDate" class="date">--</div>
          </div>
          <div class="overview-grid">
            <div class="metric">
              <div id="todayReportCount" class="n">0</div>
              <div class="k">当日报工量</div>
            </div>
            <div class="metric">
              <div id="monthReportCount" class="n">0</div>
              <div class="k">月度报工量</div>
            </div>
          </div>
        </div>

        <div class="card scan-card">
          <div class="scan-banner">
            <h3>扫码快速开始</h3>
            <div class="scan-row">
              <input id="scanInput" class="input" type="search" placeholder="扫码码值/设备编号/库房编码" />
              <button id="scanBtn" class="btn soft">查询</button>
              <button id="cameraScanBtn" class="btn primary">扫一扫</button>
            </div>
            <input id="scanImageInput" type="file" accept="image/*" capture="environment" hidden />
          </div>
        </div>

        <div class="task-group">
          <div class="task-group-head">
            <div class="task-group-title">我的最近报工</div>
            <div class="group-actions">
              <button id="memberBindBtn" class="minor-link" type="button">绑定执行人</button>
              <div id="memberRecentTotalText" class="minor">0 条</div>
            </div>
          </div>
          <div class="member-bar">
            <div id="memberNameHint" class="minor">当前成员：识别中...</div>
          </div>
          <div id="memberRecentList" class="task-list"></div>
        </div>

        <div id="dashboardStatus" class="statusbar">准备就绪</div>
      </section>

      <section id="executeView" class="view hidden">
        <div class="execute-hero">
          <div class="execute-title-row">
            <div class="execute-title-main">
              <div id="executeTitle" class="execute-title">设备名称</div>
              <div id="executeChips" class="execute-chips"></div>
            </div>
            <div id="executeReporterCard" class="exec-reporter-row hidden">
              <select id="reporterSelect" class="select reporter-select" aria-label="执行人">
                <option value="">请选择执行人</option>
              </select>
              <input id="reporterInput" class="input hidden" type="text" placeholder="自动带出当前登录人" />
            </div>
          </div>
          <div class="progress-card">
            <div class="progress-head">
              <span>检查进度</span>
              <span id="progressText">0 / 0 项</span>
            </div>
            <div class="progress"><span id="progressBar"></span></div>
          </div>
        </div>

        <div id="executeEmpty" class="empty">正在加载点检明细...</div>
        <div id="executeItemList" class="item-list"></div>

        <div id="executeRemarkCard" class="exec-card exec-remark-card hidden">
          <div class="field">
            <label for="reportRemarkInput">备注</label>
            <input id="reportRemarkInput" class="input" type="text" placeholder="可填写本次点检补充说明" />
          </div>
        </div>

        <div id="executeFoot" class="exec-foot hidden">
          <div class="exec-foot-row">
            <button id="nextPendingBtn" class="btn">下一项</button>
            <button id="submitTaskBtn" class="btn primary">提交汇总</button>
          </div>
        </div>

        <div id="executeStatus" class="statusbar">准备执行</div>
      </section>

      <section id="summaryView" class="view hidden">
        <div class="summary-hero">
          <div style="font-size:54px;line-height:1">✔</div>
          <h2>点检完成</h2>
          <p id="summaryMainText">任务已提交</p>
        </div>

        <div class="card" style="padding:12px">
          <div class="card-title" style="margin-bottom:8px">本次结果汇总</div>
          <div class="summary-grid">
            <div class="metric done">
              <div id="summaryNormalCount" class="n">0</div>
              <div class="k">正常</div>
            </div>
            <div class="metric urgent">
              <div id="summaryAbnormalCount" class="n">0</div>
              <div class="k">异常</div>
            </div>
            <div class="metric pending">
              <div id="summaryTotalCount" class="n">0</div>
              <div class="k">总项</div>
            </div>
          </div>

          <div id="summaryAbnormalWrap" class="abnormal-list"></div>

          <div class="summary-actions">
            <button id="summaryBackBtn" class="btn">返回任务首页</button>
            <button id="summaryNextBtn" class="btn primary">执行下一任务</button>
          </div>
        </div>

        <div id="summaryStatus" class="statusbar">提交完成</div>
      </section>
    </div>

    <div id="taskPickerModal" class="modal hidden">
      <div class="modal-body">
        <div class="modal-head">
          <div class="card-title">选择要执行的任务</div>
          <button id="closeTaskPickerBtn" class="text-btn">关闭</button>
        </div>
        <div id="taskPickerList" class="modal-list"></div>
      </div>
    </div>

    <div id="reportDetailModal" class="modal hidden">
      <div class="modal-body">
        <div class="modal-head">
          <div class="card-title">报工详情</div>
          <button id="closeReportDetailBtn" class="text-btn">关闭</button>
        </div>
        <div id="reportDetailHead" class="detail-head hidden"></div>
        <div id="reportDetailList" class="detail-list"></div>
      </div>
    </div>

    <div id="memberBindModal" class="modal hidden">
      <div class="modal-body">
        <div class="modal-head">
          <div class="card-title">绑定执行人</div>
          <button id="closeMemberBindBtn" class="text-btn">关闭</button>
        </div>
        <div class="bind-panel">
          <div id="memberBindCurrent" class="bind-current">当前未绑定执行人</div>
          <select id="memberBindSelect" class="select bind-select">
            <option value="">请选择执行人</option>
          </select>
          <div class="bind-foot">
            <button id="clearMemberBindBtn" class="minor-link" type="button">清除绑定</button>
            <button id="confirmMemberBindBtn" class="btn primary" type="button">确认绑定</button>
          </div>
        </div>
      </div>
    </div>

    <div id="liveScanModal" class="modal hidden">
      <div class="modal-body scan-live-body">
        <div class="modal-head">
          <div class="card-title">实时扫码</div>
          <button id="closeLiveScanBtn" class="text-btn">关闭</button>
        </div>
        <div class="scan-live-panel">
          <div class="scan-live-frame">
            <video id="liveScanVideo" class="scan-live-video" playsinline webkit-playsinline muted></video>
            <div class="scan-live-overlay">
              <div class="scan-live-box"></div>
              <div class="scan-live-tip">请将二维码放入框内，识别后自动进入填写</div>
            </div>
          </div>
          <p id="liveScanStatus" class="scan-live-status">正在准备摄像头...</p>
        </div>
      </div>
    </div>

    <div id="photoPreviewModal" class="modal hidden">
      <div class="modal-body photo-preview-body">
        <div class="modal-head">
          <div class="card-title">照片预览</div>
          <button id="closePhotoPreviewBtn" class="text-btn">关闭</button>
        </div>
        <div class="photo-preview-wrap">
          <img id="photoPreviewImage" alt="异常照片预览" />
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
      const API_BASE = resolveApiBaseUrl();
      const DINGTALK_JSAPI_URL = "https://g.alicdn.com/dingding/dingtalk-jsapi/3.0.25/dingtalk.open.js";
      const TASK_DRAFT_PREFIX = "inspection_report_task_draft_v2:";
      const MEMBER_BIND_KEY = "inspection_bound_member_v1";
      let dingTalkJsapiPromise = null;
      let liveScanFrameCanvas = null;

      const state = {
        loading: false,
        today: "",
        currentMember: null,
        dashboardSummary: {
          date: "",
          totalCount: 0,
          pendingCount: 0,
          doneCount: 0,
        },
        dashboardTasks: [],
        memberName: "",
        boundMember: null,
        currentMemberSource: "",
        memberRecentReports: [],
        memberReportStats: {
          dailyCount: 0,
          monthlyCount: 0,
        },
        memberBindCandidates: [],
        reporterSelectCandidates: [],
        selectedTask: null,
        selectedItems: [],
        reportStartAt: "",
        scanValue: "",
        scanDevice: null,
        scanTaskCandidates: [],
        liveScanActive: false,
        liveScanMode: "",
        liveScanSessionId: 0,
        liveScanStream: null,
        liveScanFrameBusy: false,
        liveScanFrameTimer: 0,
        liveScanRafId: 0,
        liveScanDetector: null,
        lastSummary: null,
        selectedRecentReport: null,
      };

      function resolveApiBaseUrl() {
        if (window.location.protocol === "http:" || window.location.protocol === "https:") {
          return `${window.location.origin}/api`;
        }
        return "http://localhost:3001/api";
      }

      const refs = {
        navBackBtn: document.getElementById("navBackBtn"),
        headerTitle: document.getElementById("headerTitle"),
        headerActionBtn: document.getElementById("headerActionBtn"),
        dashboardView: document.getElementById("dashboardView"),
        executeView: document.getElementById("executeView"),
        summaryView: document.getElementById("summaryView"),
        dashboardDate: document.getElementById("dashboardDate"),
        todayReportCount: document.getElementById("todayReportCount"),
        monthReportCount: document.getElementById("monthReportCount"),
        memberRecentTotalText: document.getElementById("memberRecentTotalText"),
        memberBindBtn: document.getElementById("memberBindBtn"),
        memberNameHint: document.getElementById("memberNameHint"),
        memberRecentList: document.getElementById("memberRecentList"),
        dashboardStatus: document.getElementById("dashboardStatus"),
        scanInput: document.getElementById("scanInput"),
        scanBtn: document.getElementById("scanBtn"),
        cameraScanBtn: document.getElementById("cameraScanBtn"),
        scanImageInput: document.getElementById("scanImageInput"),
        executeTitle: document.getElementById("executeTitle"),
        executeChips: document.getElementById("executeChips"),
        progressText: document.getElementById("progressText"),
        progressBar: document.getElementById("progressBar"),
        executeReporterCard: document.getElementById("executeReporterCard"),
        executeEmpty: document.getElementById("executeEmpty"),
        executeItemList: document.getElementById("executeItemList"),
        executeRemarkCard: document.getElementById("executeRemarkCard"),
        executeFoot: document.getElementById("executeFoot"),
        reportRemarkInput: document.getElementById("reportRemarkInput"),
        reporterInput: document.getElementById("reporterInput"),
        reporterSelect: document.getElementById("reporterSelect"),
        chooseReporterBtn: document.getElementById("chooseReporterBtn"),
        reporterHint: document.getElementById("reporterHint"),
        nextPendingBtn: document.getElementById("nextPendingBtn"),
        submitTaskBtn: document.getElementById("submitTaskBtn"),
        executeStatus: document.getElementById("executeStatus"),
        summaryMainText: document.getElementById("summaryMainText"),
        summaryNormalCount: document.getElementById("summaryNormalCount"),
        summaryAbnormalCount: document.getElementById("summaryAbnormalCount"),
        summaryTotalCount: document.getElementById("summaryTotalCount"),
        summaryAbnormalWrap: document.getElementById("summaryAbnormalWrap"),
        summaryBackBtn: document.getElementById("summaryBackBtn"),
        summaryNextBtn: document.getElementById("summaryNextBtn"),
        summaryStatus: document.getElementById("summaryStatus"),
        taskPickerModal: document.getElementById("taskPickerModal"),
        closeTaskPickerBtn: document.getElementById("closeTaskPickerBtn"),
        taskPickerList: document.getElementById("taskPickerList"),
        reportDetailModal: document.getElementById("reportDetailModal"),
        closeReportDetailBtn: document.getElementById("closeReportDetailBtn"),
        reportDetailHead: document.getElementById("reportDetailHead"),
        reportDetailList: document.getElementById("reportDetailList"),
        memberBindModal: document.getElementById("memberBindModal"),
        closeMemberBindBtn: document.getElementById("closeMemberBindBtn"),
        memberBindCurrent: document.getElementById("memberBindCurrent"),
        memberBindSelect: document.getElementById("memberBindSelect"),
        clearMemberBindBtn: document.getElementById("clearMemberBindBtn"),
        confirmMemberBindBtn: document.getElementById("confirmMemberBindBtn"),
        liveScanModal: document.getElementById("liveScanModal"),
        closeLiveScanBtn: document.getElementById("closeLiveScanBtn"),
        liveScanVideo: document.getElementById("liveScanVideo"),
        liveScanStatus: document.getElementById("liveScanStatus"),
        photoPreviewModal: document.getElementById("photoPreviewModal"),
        closePhotoPreviewBtn: document.getElementById("closePhotoPreviewBtn"),
        photoPreviewImage: document.getElementById("photoPreviewImage"),
        toast: document.getElementById("toast"),
      };

      init();

      async function init() {
        bindEvents();
        restoreBoundMemberFromStorage();
        state.memberName = String(localStorage.getItem("inspection_member_name") || localStorage.getItem("inspection_report_reporter") || "").trim();
        switchView("dashboard");
        await loadBootstrap();
        await loadCurrentMember();
        await loadDashboard();
        applyScanFromUrl();
      }

      function bindEvents() {
        refs.navBackBtn.addEventListener("click", () => {
          handleBack();
        });

        refs.headerActionBtn.addEventListener("click", () => {
          if (state.loading) {
            return;
          }
          if (isCurrentView("dashboard")) {
            void loadDashboard();
          }
        });

        refs.scanBtn.addEventListener("click", () => {
          void quickScanAndStart();
        });

        refs.cameraScanBtn.addEventListener("click", () => {
          void triggerCameraScan();
        });

        refs.scanImageInput.addEventListener("change", () => {
          void handleScanImage();
        });

        refs.reportRemarkInput.addEventListener("input", () => {
          saveCurrentTaskDraft();
        });

        refs.reporterInput.addEventListener("input", () => {
          saveCurrentTaskDraft();
        });

        refs.reporterSelect.addEventListener("change", () => {
          handleReporterSelectChange();
        });

        if (refs.chooseReporterBtn) {
          refs.chooseReporterBtn.addEventListener("click", () => {
            void openMemberBindModal();
          });
        }

          if (event.key === "Enter") {
            event.preventDefault();
            void quickScanAndStart();
          }
        });

        refs.taskPickerList.addEventListener("click", (event) => {

          if (!btn) {
            return;
          }
          const taskId = btn.getAttribute("data-task-id") || "";
          if (!taskId) {
            return;
          }
          closeTaskPicker();
          void startTaskById(taskId);

        refs.executeItemList.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof HTMLElement)) {
            return;
          }

          const actionBtn = target.closest("[data-action='set-result']");
          if (actionBtn) {
            const index = Number(actionBtn.getAttribute("data-index"));
            const result = actionBtn.getAttribute("data-result") || "";
            if (Number.isFinite(index)) {
              setItemResult(index, result);
            }
            return;
          }

          const statusToggle = target.closest("[data-action='toggle-status-select']");
          if (statusToggle) {
            event.stopPropagation();
            const index = Number(statusToggle.getAttribute("data-index"));
            if (Number.isFinite(index)) {
              toggleStatusSelect(index);
            }
            return;
          }

          const statusOption = target.closest("[data-action='choose-status-option']");
          if (statusOption) {
            event.stopPropagation();
            const index = Number(statusOption.getAttribute("data-index"));
            const value = statusOption.getAttribute("data-status-value") || "";
            if (Number.isFinite(index)) {
              chooseStatusOption(index, value);
            }
            return;
          }

          const removePhotoBtn = target.closest("[data-action='remove-photo']");
          if (removePhotoBtn) {
            const index = Number(removePhotoBtn.getAttribute("data-index"));
            const photoId = removePhotoBtn.getAttribute("data-photo-id") || "";
            if (Number.isFinite(index) && photoId) {
              removeItemPhoto(index, photoId);
            }
            return;
          }

          const previewPhotoBtn = target.closest("[data-action='preview-photo']");
          if (previewPhotoBtn) {
            const index = Number(previewPhotoBtn.getAttribute("data-index"));
            const photoId = previewPhotoBtn.getAttribute("data-photo-id") || "";
            if (Number.isFinite(index) && photoId) {
              openPhotoPreview(index, photoId);
            }
            return;
          }
        });

        const itemValueUpdate = (event) => {
          const target = event.target;
          if (!(target instanceof HTMLElement)) {
            return;
          }
          const index = Number(target.getAttribute("data-index"));
          if (!Number.isFinite(index) || !state.selectedItems[index]) {
            return;
          }
          const field = target.getAttribute("data-field") || "";
          if (!field) {
            return;
          }
          if (target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement || target instanceof HTMLSelectElement) {
            const previousStatus = state.selectedItems[index].resultState;
            if (field === "photoInput" && target instanceof HTMLInputElement && target.files) {
              void addItemPhotos(index, target.files, target);
              return;
            } else {
              state.selectedItems[index][field] = target.value;
            }
            normalizeItemStateByValue(index, field);
            saveCurrentTaskDraft();

            if (shouldRerenderOnFieldChange(field, event.type, previousStatus, state.selectedItems[index].resultState)) {
              renderExecute();
              return;
            }

            updateSingleItemCard(index);
            updateProgress();
          }
        };

        refs.executeItemList.addEventListener("input", itemValueUpdate);
        refs.executeItemList.addEventListener("change", itemValueUpdate);
        document.addEventListener("click", (event) => {
          if (event.target instanceof HTMLElement && event.target.closest(".status-select")) {
            return;
          }
          closeStatusSelects();
        });

        });

        refs.submitTaskBtn.addEventListener("click", () => {
          void submitCurrentTask();
        });

        refs.summaryBackBtn.addEventListener("click", () => {
          switchView("dashboard");
          void loadDashboard();
        });

        refs.summaryNextBtn.addEventListener("click", () => {

          if (!nextTask) {
            switchView("dashboard");
            void loadDashboard();
            return;
          }
          void startTaskById(nextTask.id);
        });

        window.addEventListener("pagehide", () => {
          stopLiveScanSession();
          saveCurrentTaskDraft();
        });

        document.addEventListener("visibilitychange", () => {
          if (document.hidden) {
            stopLiveScanSession();
            saveCurrentTaskDraft();
          }
        });
      }

      function isCurrentView(name) {
        return !refs[`${name}View`].classList.contains("hidden");
      }

      function switchView(name) {
        document.body.classList.toggle("execute-mode", name === "execute");
        refs.dashboardView.classList.toggle("hidden", name !== "dashboard");
        refs.executeView.classList.toggle("hidden", name !== "execute");
        refs.summaryView.classList.toggle("hidden", name !== "summary");

        if (name === "dashboard") {
          refs.navBackBtn.classList.add("hidden");
          refs.headerTitle.textContent = "今日点检任务";
          refs.headerActionBtn.textContent = "刷新";
          refs.headerActionBtn.classList.remove("hidden");
        } else if (name === "execute") {
          refs.navBackBtn.classList.add("hidden");
          refs.headerTitle.textContent = "";
          refs.headerActionBtn.textContent = "";
          refs.headerActionBtn.classList.add("hidden");
        } else {
          refs.navBackBtn.classList.remove("hidden");
          refs.headerTitle.textContent = "检查完成 · 汇总";
          refs.headerActionBtn.textContent = "";
          refs.headerActionBtn.classList.add("hidden");
        }
      }

      function handleBack() {
        if (isCurrentView("summary")) {
          switchView("execute");
          return;
        }
        if (isCurrentView("execute")) {
          switchView("dashboard");
          return;
        }
      }

      async function loadBootstrap() {
        setStatus("dashboard", "初始化中...");
        try {
          const resp = await requestApi("/inspection-report/bootstrap");
          state.today = (resp?.data?.today || "").trim();
          setStatus("dashboard", "初始化完成");
        } catch (error) {
          setStatus("dashboard", `初始化失败：${error.message}`, true);
          showToast(`初始化失败：${error.message}`);
        }
      }

      async function loadCurrentMember() {
        const urlParams = new URLSearchParams(window.location.search || "");
        const passParams = new URLSearchParams();
        ["user_id", "userId", "user_name", "userName", "uniqueid", "uniqueId", "mobile", "email", "name", "account", "webpage_user_id", "webpage_user_name", "webpage_phone", "webpage_email", "webpage_account", "webpage_corp_user_id"].forEach((key) => {
          const value = String(urlParams.get(key) || "").trim();
          if (value) {
            passParams.set(key, value);
          }
        });
        const query = passParams.toString();
        if (!query) {
          if (!restoreBoundMemberAsCurrent()) {
            if (state.memberName) {
              state.currentMember = {
                userName: state.memberName,
              };
              state.currentMemberSource = "cached";
            }
          }
          return;
        }

        const path = `/inspection-report/current-member?${query}`;
        const result = await requestApiSafe(path);
        if (result.ok) {
          const member = result.payload?.data?.member || null;
          if (member && (member.userName || member.userId || member.uniqueId)) {
            applyBoundMember(member, "auto");
            return;
          }
        } else {
          setStatus("dashboard", `当前成员识别失败：${result.error || "请求失败"}`, true);
        }

        const urlMemberName = String(
          urlParams.get("webpage_user_name") ||
            urlParams.get("user_name") ||
            urlParams.get("userName") ||
            urlParams.get("name") ||
            ""
        ).trim();
        const urlMemberId = String(urlParams.get("webpage_user_id") || urlParams.get("user_id") || urlParams.get("userId") || "").trim();
        if (urlMemberName || urlMemberId) {
          applyBoundMember({
            userId: urlMemberId,
            userName: urlMemberName || urlMemberId,
            uniqueId: String(urlParams.get("webpage_corp_user_id") || urlParams.get("uniqueid") || urlParams.get("uniqueId") || "").trim(),
            mobile: String(urlParams.get("webpage_phone") || urlParams.get("mobile") || "").trim(),
            email: String(urlParams.get("webpage_email") || urlParams.get("email") || "").trim(),
            account: String(urlParams.get("webpage_account") || urlParams.get("account") || "").trim(),
          }, "auto");
          return;
        }

        if (!restoreBoundMemberAsCurrent() && state.memberName) {
          state.currentMember = {
            userName: state.memberName,
          };
          state.currentMemberSource = "cached";
        }
      }

      async function loadDashboard() {
        setLoading(true);
        setStatus("dashboard", "正在加载今日任务...");
        try {
          const query = new URLSearchParams();
          if (state.today) {
            query.set("date", state.today);
          }
          query.set("limit", "200");
          const resp = await requestApi(`/inspection-report/dashboard?${query.toString()}`);
          const data = resp?.data || {};
          state.dashboardSummary = data.summary || state.dashboardSummary;
          state.dashboardTasks = Array.isArray(data.list) ? data.list : [];
          await loadMemberRecentReports({ silent: true });
          renderDashboard();
          setStatus("dashboard", `任务加载完成，共 ${state.dashboardTasks.length} 项`);
        } catch (error) {
          setStatus("dashboard", `加载失败：${error.message}`, true);
          showToast(`加载失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      function renderDashboard() {
        const summary = state.dashboardSummary || {};
        const dateText = summary.date || state.today || formatDate(new Date());
        const reportStats = state.memberReportStats || {};
        refs.dashboardDate.textContent = formatDisplayDate(dateText);
        refs.todayReportCount.textContent = String(reportStats.dailyCount || 0);
        refs.monthReportCount.textContent = String(reportStats.monthlyCount || 0);
        refs.memberRecentTotalText.textContent = `${state.memberRecentReports.length || 0} 条`;
        refs.memberBindBtn.textContent = state.memberName ? "切换执行人" : "绑定执行人";
        refs.memberNameHint.textContent = `当前成员：${formatMemberIdentityLabel()}`;
        renderMemberRecentList();
      }

      function formatMemberIdentityLabel() {
        if (!state.memberName) {
          return "未识别";
        }
        if (state.currentMemberSource === "auto") {
          return `${state.memberName}（自动识别）`;
        }
        if (state.currentMemberSource === "bound") {
          return `${state.memberName}（已绑定）`;
        }
        return state.memberName;
      }

      function restoreBoundMemberFromStorage() {
        try {
          const raw = localStorage.getItem(MEMBER_BIND_KEY);
          if (!raw) {
            state.boundMember = null;
            return null;
          }
          const member = safeJsonParse(raw);
          if (!member || typeof member !== "object") {
            state.boundMember = null;
            return null;
          }
          state.boundMember = member;
          return member;
        } catch (error) {
          state.boundMember = null;
          return null;
        }
      }

      function restoreBoundMemberAsCurrent() {
        const member = state.boundMember || restoreBoundMemberFromStorage();
        if (!member) {
          return false;
        }
        state.currentMember = member;
        state.memberName = String(member.userName || member.user || member.account || "").trim();
        state.currentMemberSource = "bound";
        if (state.memberName) {
          localStorage.setItem("inspection_member_name", state.memberName);
        }
        return Boolean(state.memberName);
      }

      function applyBoundMember(member, source = "manual") {
        const nextMember = member && typeof member === "object" ? {
          id: member.id || "",
          user: member.user || member.account || "",
          userId: member.userId || "",
          userName: member.userName || member.name || member.user || "",
          uniqueId: member.uniqueId || "",
          mobile: member.mobile || "",
          email: member.email || "",
        } : null;
        if (!nextMember) {
          return;
        }
        state.boundMember = nextMember;
        state.currentMember = nextMember;
        state.memberName = String(nextMember.userName || nextMember.user || "").trim();
        state.currentMemberSource = source === "auto" ? "auto" : "bound";
        localStorage.setItem(MEMBER_BIND_KEY, JSON.stringify(nextMember));
        if (state.memberName) {
          localStorage.setItem("inspection_member_name", state.memberName);
          if (isCurrentView("execute")) {
            syncReporterField();
            saveCurrentTaskDraft();
          }
        }
        void loadMemberRecentReports({ silent: true }).then(() => {
          if (isCurrentView("dashboard")) {
            renderDashboard();
          }
        });
      }

      function clearBoundMember() {
        const currentReporter = refs.reporterInput ? String(refs.reporterInput.value || "").trim() : "";
        state.boundMember = null;
        localStorage.removeItem(MEMBER_BIND_KEY);
        localStorage.removeItem("inspection_member_name");
        localStorage.removeItem("inspection_report_reporter");
        if (state.currentMemberSource === "bound") {
          state.currentMember = null;
          state.currentMemberSource = "";
          state.memberName = "";
        } else if (state.currentMemberSource !== "auto") {
          state.memberName = "";
        }
        if (isCurrentView("execute")) {
          refs.reporterInput.readOnly = false;
          refs.reporterInput.value = currentReporter;
          syncReporterField();
          saveCurrentTaskDraft();
        }
        state.memberRecentReports = [];
        state.memberReportStats = {
          dailyCount: 0,
          monthlyCount: 0,
        };
      }

      async function loadMemberRecentReports(options = {}) {
        const silent = Boolean(options.silent);
        if (!state.memberName) {
          state.memberRecentReports = [];
          state.memberReportStats = {
            dailyCount: 0,
            monthlyCount: 0,
          };
          if (!silent) {
            setStatus("dashboard", "未识别当前成员，无法加载“我的最近报工”");
          }
          return;
        }
        try {
          const query = new URLSearchParams();
          query.set("limit", "30");
          query.set("reporter", state.memberName);
          if (state.today) {
            query.set("date", state.today);
          }
          const resp = await requestApi(`/inspection-report/recent?${query.toString()}`);
          const list = Array.isArray(resp?.data?.list) ? resp.data.list : [];
          state.memberRecentReports = list;
          state.memberReportStats = {
            dailyCount: Number(resp?.data?.summary?.dailyCount || 0),
            monthlyCount: Number(resp?.data?.summary?.monthlyCount || 0),
          };
        } catch (error) {
          state.memberRecentReports = [];
          state.memberReportStats = {
            dailyCount: 0,
            monthlyCount: 0,
          };
          if (!silent) {
            setStatus("dashboard", `最近报工加载失败：${error.message}`, true);
            showToast(`最近报工加载失败：${error.message}`);
          }
        }
      }

      function renderMemberRecentList() {
        refs.memberRecentList.innerHTML = "";
        if (!state.memberName) {
          refs.memberRecentList.innerHTML = '<div class="empty">当前未识别成员，可先点击“绑定执行人”，后续扫码会自动带出</div>';
          return;
        }
        if (!state.memberRecentReports.length) {
          refs.memberRecentList.innerHTML = '<div class="empty">该成员暂无最近报工记录</div>';
          return;
        }
        state.memberRecentReports.forEach((row) => {
          const div = document.createElement("div");
          div.className = "task-item clickable";
          const result = String(row.result || row.currentStatus || "-");
          const resultTagClass = result.includes("异常") ? "urgent" : "done";
          div.innerHTML = `
            <div class="task-top">
              <div style="min-width:0">
                <div class="task-name">${escapeHtml(row.deviceName || row.deviceCode || "设备")} — ${escapeHtml(row.standardName || "-")}</div>
                <div class="task-meta">${escapeHtml(row.reportDateText || "-")} · 执行人 ${escapeHtml(row.reporter || "-")}</div>
                <div class="task-tags">
                  <span class="tag">${escapeHtml(row.reportNo || "报工记录")}</span>
                  <span class="tag ${resultTagClass}">${escapeHtml(result)}</span>
                </div>
              </div>
              <div class="task-action">
                <button class="minor-link" type="button" data-action="view-report-detail" data-report-id="${escapeHtml(row.id || "")}">查看详情</button>
              </div>
            </div>
          `;
          refs.memberRecentList.appendChild(div);
        });
      }

      async function openMemberBindModal() {
        refs.memberBindModal.classList.remove("hidden");
        renderMemberBindCurrent();
        renderMemberBindOptions([], { loading: true });
        await loadMemberBindingCandidates();
      }

      function closeMemberBindModal() {
        refs.memberBindModal.classList.add("hidden");
      }

      function renderMemberBindCurrent() {
        if (!state.boundMember && !state.memberName) {
          refs.memberBindCurrent.textContent = "当前未绑定执行人";
          return;
        }
        const label = formatMemberIdentityLabel();
        refs.memberBindCurrent.textContent = `当前默认执行人：${label}`;
      }

      async function loadMemberBindingCandidates() {
        try {
          const list = await fetchMemberCandidates();
          renderMemberBindOptions(list);
          if (isCurrentView("execute")) {
            renderReporterSelectOptions(list);
          }
        } catch (error) {
          renderMemberBindOptions([], {
            placeholder: `通讯录加载失败：${error.message || "请求失败"}`,
            disabled: true,
          });
        }
      }

      async function fetchMemberCandidates(limit = 100) {
        const query = new URLSearchParams();
        query.set("limit", String(limit));
        const resp = await requestApi(`/inspection-report/member-search?${query.toString()}`);
        return Array.isArray(resp?.data?.list) ? resp.data.list : [];
      }

      function renderMemberBindOptions(list, options = {}) {
        const loading = Boolean(options.loading);
        const disabled = Boolean(options.disabled);
        const placeholder = options.placeholder || (loading ? "正在加载通讯录成员..." : "请选择执行人");
        const members = Array.isArray(list) ? list : [];
        state.memberBindCandidates = members;

        const currentKey = resolveCurrentBindCandidateKey();
        const html = [`<option value="">${escapeHtml(placeholder)}</option>`];

        members.forEach((member, index) => {
          html.push(`<option value="${index}">${escapeHtml(formatMemberOptionLabel(member))}</option>`);
        });

        refs.memberBindSelect.innerHTML = html.join("");
        refs.memberBindSelect.disabled = loading || disabled || !members.length;
        refs.confirmMemberBindBtn.disabled = loading || disabled || !members.length;

        if (!members.length) {
          refs.memberBindSelect.value = "";
          return;
        }

        const matchedIndex = members.findIndex((member) => buildMemberCandidateKey(member) === currentKey);
        if (matchedIndex >= 0) {
          refs.memberBindSelect.value = String(matchedIndex);
        } else {
          refs.memberBindSelect.value = "";
        }
      }

      async function loadReporterSelectCandidates() {
        if (!refs.reporterSelect) {
          return;
        }
        if (state.memberBindCandidates.length) {
          renderReporterSelectOptions(state.memberBindCandidates);
        } else {
          renderReporterSelectOptions([], { loading: true });
        }
        try {
          const list = await fetchMemberCandidates();
          renderReporterSelectOptions(list);
        } catch (error) {
          renderReporterSelectOptions([], {
            placeholder: "通讯录加载失败，请刷新重试",
            disabled: true,
          });
        }
      }

      function renderReporterSelectOptions(list, options = {}) {
        if (!refs.reporterSelect) {
          return;
        }
        const loading = Boolean(options.loading);
        const disabled = Boolean(options.disabled);
        const placeholder = options.placeholder || (loading ? "正在加载执行人..." : "请选择执行人");
        const members = Array.isArray(list) ? list : [];
        state.reporterSelectCandidates = members;

        const currentValue = String(refs.reporterInput?.value || state.memberName || "").trim();
        const html = [`<option value="">${escapeHtml(placeholder)}</option>`];
        let matchedIndex = -1;
        const currentKey = resolveCurrentBindCandidateKey();

        members.forEach((member, index) => {
          const label = formatMemberOptionLabel(member);
          const selectedByKey = currentKey && buildMemberCandidateKey(member) === currentKey;
          const selectedByName = currentValue && label === currentValue;
          if (matchedIndex < 0 && (selectedByKey || selectedByName)) {
            matchedIndex = index;
          }
          html.push(`<option value="${index}">${escapeHtml(label)}</option>`);
        });

        if (matchedIndex < 0 && currentValue && !loading) {
          html.push(`<option value="__current">${escapeHtml(currentValue)}</option>`);
        }

        refs.reporterSelect.innerHTML = html.join("");
        refs.reporterSelect.disabled = loading || disabled || (!members.length && !currentValue);

        if (matchedIndex >= 0) {
          refs.reporterSelect.value = String(matchedIndex);
        } else if (currentValue && !loading) {
          refs.reporterSelect.value = "__current";
        } else {
          refs.reporterSelect.value = "";
        }
      }

      function syncReporterSelectValue() {
        if (!refs.reporterSelect) {
          return;
        }
        renderReporterSelectOptions(state.reporterSelectCandidates || []);
      }

      function handleReporterSelectChange() {
        const value = String(refs.reporterSelect.value || "").trim();
        if (!value) {
          refs.reporterInput.value = "";
          state.memberName = "";
          saveCurrentTaskDraft();
          syncReporterField();
          return;
        }
        if (value === "__current") {
          return;
        }
        const index = Number(value);
        const member = Number.isFinite(index) ? state.reporterSelectCandidates[index] : null;
        if (!member) {
          showToast("未找到对应执行人，请重新选择");
          return;
        }
        applyBoundMember(member, "manual");
        syncReporterField();
        saveCurrentTaskDraft();
      }

      function formatMemberOptionLabel(member) {
        return String(member?.userName || member?.user || member?.account || "成员").trim() || "成员";
      }

      function buildMemberCandidateKey(member) {
        if (!member || typeof member !== "object") {
          return "";
        }
        return [
          member.userId || "",
          member.uniqueId || "",
          member.mobile || "",
          member.userName || member.user || "",
        ]
          .map((item) => String(item || "").trim())
          .filter(Boolean)
          .join("|");
      }

      function resolveCurrentBindCandidateKey() {
        const current = state.boundMember || state.currentMember || null;
        return buildMemberCandidateKey(current);
      }

      function confirmMemberBindSelection() {
        const value = String(refs.memberBindSelect.value || "").trim();
        if (value === "") {
          showToast("请先选择执行人");
          return;
        }
        const index = Number(value);
        const member = Number.isFinite(index) ? state.memberBindCandidates[index] : null;
        if (!member) {
          showToast("未找到对应成员，请重新选择");
          return;
        }
        applyBoundMember(member, "manual");
        closeMemberBindModal();
        renderDashboard();
        if (isCurrentView("execute")) {
          syncReporterField();
        }
        showToast(`已绑定执行人：${member.userName || member.user || "成员"}`);
      }

      function syncReporterField() {
        const locked = state.currentMemberSource === "auto" || state.currentMemberSource === "bound";
        const currentValue = String(refs.reporterInput.value || "").trim();
        const defaultValue = resolveReporterDefaultName("");
        if (locked) {
          refs.reporterInput.value = defaultValue;
        } else if (!currentValue && defaultValue) {
          refs.reporterInput.value = defaultValue;
        }
        refs.reporterInput.readOnly = locked;
        refs.reporterInput.placeholder = locked ? "已自动带出执行人" : "请输入或选择执行人";
        syncReporterSelectValue();
        if (refs.chooseReporterBtn) {
          refs.chooseReporterBtn.textContent = locked || state.boundMember ? "切换执行人" : "选择执行人";
        }
        if (refs.reporterHint) {
          if (locked) {
            refs.reporterHint.textContent = `当前已带出：${formatMemberIdentityLabel()}`;
            return;
          }
          refs.reporterHint.textContent = refs.reporterInput.value.trim() ? "已选择执行人" : "请选择执行人";
        }
      }

      function applyScanFromUrl() {
        try {
          const params = new URLSearchParams(window.location.search || "");
          const scan = (params.get("scan") || "").trim();
          if (!scan) {
            return;
          }
          refs.scanInput.value = normalizeScanValue(scan);
          void quickScanAndStart();
        } catch (error) {
          console.warn("apply scan from url failed:", error);
        }
      }

      async function triggerCameraScan() {
        if (state.loading) {
          return;
        }

        if (isDingTalkEnv()) {
          try {
            const decoded = await scanWithDingTalkNative();
            refs.scanInput.value = decoded;
            await quickScanAndStart();
            return;
          } catch (error) {
            console.warn("dingtalk native scan failed:", error);
            if (isUserCancelError(error)) {
              setStatus("dashboard", "已取消扫码");
              return;
            }
            const message = buildDingTalkScanErrorMessage(error);
            setStatus("dashboard", message, true);
            showToast(message);
            return;
          }
        }

        await openLiveScanModal();
      }

      async function handleScanImage() {
        const file = refs.scanImageInput.files && refs.scanImageInput.files[0];
        refs.scanImageInput.value = "";
        if (!file) {
          return;
        }
        try {
          const decoded = normalizeScanValue(await decodeQrFromFile(file));
