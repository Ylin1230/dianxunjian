      async function startTask(task) {
        if (!task || !task.id) {
          return;
        }

        state.selectedTask = task;
        state.selectedItems = [];
        state.reportStartAt = nowDateTimeText();
        refs.reportRemarkInput.value = "";
        const cachedReporter = localStorage.getItem("inspection_report_reporter") || "";
        const defaultReporter = resolveReporterDefaultName(cachedReporter);
        refs.reporterInput.value = defaultReporter;
        syncReporterField();
        refs.executeItemList.innerHTML = "";
        refs.executeEmpty.textContent = "正在加载点检明细...";
        refs.executeEmpty.classList.remove("hidden");
        refs.executeFoot.classList.add("hidden");
        switchView("execute");
        renderExecuteHeader();

        setLoading(true);
        setStatus("execute", "正在加载点检明细...");
        try {
          const resp = await requestApi("/inspection-report/task-items", "POST", { taskId: task.id });
          const items = Array.isArray(resp?.data?.items) ? resp.data.items : [];
          const stats = resp?.data?.stats || {};
          state.selectedItems = items.map((item) => buildTaskItemState(item));
          const restoredDraft = restoreTaskDraft(task);
          renderExecute();

          if (!state.selectedItems.length) {
            const sampleText = Array.isArray(stats.sampleDetailRefs) && stats.sampleDetailRefs.length
              ? `；样例：${stats.sampleDetailRefs.slice(0, 3).map((row) => `[${row.standardId || "-"}|${row.standardName || "-"}]`).join(" ")}`
              : "";
            setStatus(
              "execute",
              `当前任务未匹配到明细。任务标准[ID:${stats.taskStandardId || "-"}/编号:${stats.taskStandardCode || "-"}/名称:${stats.taskStandardName || "-"}]，明细总数${stats.totalDetailCount || 0}，启用${stats.enabledDetailCount || 0}，匹配${stats.matchedDetailCount || 0}${sampleText}`,
              true
            );
          } else {
            setStatus("execute", restoredDraft ? `已恢复暂存内容，共 ${state.selectedItems.length} 项` : `明细加载完成，共 ${state.selectedItems.length} 项`);
            if (restoredDraft) {
              showToast("已恢复上次未提交内容");
            } else if (!String(refs.reporterInput.value || "").trim()) {
              showToast("可点“选择执行人”从通讯录选择报工人");
            }
          }
        } catch (error) {
          state.selectedItems = [];
          renderExecute();
          setStatus("execute", `明细加载失败：${error.message}`, true);
          showToast(`明细加载失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      function renderExecuteHeader() {
        const task = state.selectedTask;
        if (!task) {
          return;
        }

        refs.executeTitle.textContent = task.deviceName || task.deviceCode || "设备";
        const chips = [
          task.category || inferCategory(task.ruleName, task.standardName, task.standardCode),
          task.taskDateText || "",
        ].filter(Boolean);
        refs.executeChips.innerHTML = chips.map((chip) => `<span class="chip">${escapeHtml(chip)}</span>`).join("");
      }

      function renderExecute() {
        renderExecuteHeader();
        refs.executeItemList.innerHTML = "";

        if (!state.selectedItems.length) {
          refs.executeEmpty.classList.remove("hidden");
          refs.executeEmpty.textContent = "当前任务暂无可录入明细。";
          refs.executeFoot.classList.add("hidden");
          updateProgress();
          return;
        }

        refs.executeEmpty.classList.add("hidden");
        refs.executeFoot.classList.remove("hidden");

        state.selectedItems.forEach((item, index) => {
          const filled = isItemFilled(item);
          const status = resolveItemResultState(item, filled);
          const itemClass = status === "abnormal" ? "abnormal" : filled ? "done" : "";
          const executeMode = getItemExecuteMode(item);

          const div = document.createElement("div");
          div.className = `item-card ${itemClass}`;
          div.setAttribute("data-item-index", String(index));
          div.innerHTML = `
            <div class="item-head">
              <div style="display:flex;gap:8px;min-width:0">
                <span class="item-no">${escapeHtml(item.seq || index + 1)}</span>
                <div style="min-width:0">
                  <div class="item-name">${escapeHtml(item.pointPart || "-")} · ${escapeHtml(item.pointItem || "-")}</div>
                  <div class="item-desc">标准：${escapeHtml(item.judgeStandard || "-")} ${item.unit ? ` | 单位：${escapeHtml(item.unit)}` : ""}</div>
                  <div class="item-meta">
                    <span class="meta-chip">${escapeHtml(getExecuteModeLabel(executeMode))}</span>
                    ${item.checkMethod ? `<span class="meta-chip">执行方式：${escapeHtml(item.checkMethod)}</span>` : ""}
                  </div>
                </div>
              </div>
              <span class="item-status ${escapeHtml(status)}">${escapeHtml(itemStatusText(status))}</span>
            </div>

            ${renderResultBar(index, item)}
            ${renderItemInput(index, item)}
            ${renderAbnormalBox(index, item)}
          `;
          refs.executeItemList.appendChild(div);
        });

        updateProgress();
      }

      function renderItemInput(index, item) {
        const executeMode = getItemExecuteMode(item);

        if (executeMode === "meter") {
          const judge = evaluateMeterValue(item);
          return `
            <div class="field">
              <label><span class="required">*</span>抄表数值</label>
              <input class="input" type="number" inputmode="decimal" data-index="${index}" data-field="numericValue" value="${escapeHtml(item.numericValue || "")}" placeholder="请输入数值" />
            </div>
            ${renderJudgeHint(judge)}
          `;
        }

        if (executeMode === "status") {
          const options = Array.isArray(item.options) ? item.options : [];
          const optionHtml = ['<option value="">请选择</option>']
            .concat(options.map((opt) => `<option value="${escapeHtml(opt)}" ${item.optionValue === opt ? "selected" : ""}>${escapeHtml(opt)}</option>`))
            .join("");
          return `
            <div class="field">
              <label><span class="required">*</span>状态选择</label>
              <select class="select" data-index="${index}" data-field="optionValue">${optionHtml}</select>
            </div>
          `;
        }

        if (executeMode === "normal_abnormal") {
          return "";
        }

        return `
          <div class="field">
            <label><span class="required">*</span>录入结果</label>
            <input class="input" type="text" data-index="${index}" data-field="inputValue" value="${escapeHtml(item.inputValue || "")}" placeholder="请输入结果" />
          </div>
        `;
      }

      function renderResultBar(index, item) {
        if (getItemExecuteMode(item) !== "normal_abnormal") {
          return "";
        }

        return `
          <div class="result-bar">
            <button class="result-btn ${item.resultState === "normal" ? "active normal" : ""}" data-action="set-result" data-index="${index}" data-result="normal">正常</button>
            <button class="result-btn ${item.resultState === "abnormal" ? "active abnormal" : ""}" data-action="set-result" data-index="${index}" data-result="abnormal">异常</button>
          </div>
        `;
      }

      function renderJudgeHint(judge) {
        if (!judge) {
          return "";
        }
        return `
          <div class="judge-hint ${escapeHtml(judge.status || "pending")}" data-role="meter-judge">
            <span>自动判定</span><strong>${escapeHtml(judge.label || "待填")}</strong>
            ${judge.detail ? `<em>${escapeHtml(judge.detail)}</em>` : ""}
          </div>
        `;
      }

      function renderAbnormalBox(index, item) {
        if (item.resultState !== "abnormal") {
          return "";
        }

        const photos = Array.isArray(item.photos) ? item.photos : [];
        const photoHtml = photos.length
          ? `<div class="photos">${photos.map((name) => `<span class="photo-chip">${escapeHtml(name)}</span>`).join("")}</div>`
          : "";

        return `
          <div class="abnormal-box">
            <div class="field">
              <label>${item.requireDescOnAbnormal ? '<span class="required">*</span>' : ""}异常描述</label>
              <textarea class="textarea" data-index="${index}" data-field="abnormalDesc" placeholder="请填写异常现象">${escapeHtml(item.abnormalDesc || "")}</textarea>
            </div>
            <div class="field">
              <label>处理措施</label>
              <textarea class="textarea" data-index="${index}" data-field="handling" placeholder="可填写处理措施">${escapeHtml(item.handling || "")}</textarea>
            </div>
            <div class="field">
              <label>${item.requirePhotoOnAbnormal ? '<span class="required">*</span>' : ""}异常照片</label>
              <input class="input" type="file" accept="image/*" capture="environment" multiple data-index="${index}" data-field="photoInput" />
              ${photoHtml}
            </div>
          </div>
        `;
      }

      function setItemResult(index, result) {
        const item = state.selectedItems[index];
        if (!item || getItemExecuteMode(item) !== "normal_abnormal") {
          return;
        }

        if (result === "normal") {
          item.resultState = "normal";
        } else if (result === "abnormal") {
          item.resultState = "abnormal";
        } else {
          return;
        }

        saveCurrentTaskDraft();
        renderExecute();
      }

      function normalizeItemStateByValue(index, field) {
        const item = state.selectedItems[index];
        if (!item) {
          return;
        }

        const executeMode = getItemExecuteMode(item);

        if (field === "optionValue") {
          const value = String(item.optionValue || "").trim();
          if (executeMode === "status") {
            item.resultState = inferStatusResultState(item, value);
            return;
          }
          item.resultState = value ? "normal" : "pending";
          return;
        }

        if (field === "numericValue") {
          const judge = evaluateMeterValue(item);
          item.resultState = judge.status;
          return;
        }

        if (field === "inputValue") {
          const value = String(item.inputValue || "").trim();
          item.resultState = value ? "normal" : "pending";
        }
      }

      function updateProgress() {
        const total = state.selectedItems.length;
        const filled = state.selectedItems.filter((item) => isItemFilled(item)).length;
        refs.progressText.textContent = `${filled} / ${total} 项`;
        const pct = total ? Math.min(100, Math.round((filled / total) * 100)) : 0;
        refs.progressBar.style.width = `${pct}%`;
      }

      function scrollToNextPendingItem() {
        if (!state.selectedItems.length) {
          return;
        }
        const index = state.selectedItems.findIndex((item) => !isItemFilled(item));
        if (index < 0) {
          showToast("全部项目已填写，可直接提交");
          return;
        }
        const element = refs.executeItemList.querySelector(`[data-item-index='${index}']`);
        if (element) {
          element.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      }

      async function submitCurrentTask() {
        if (!state.selectedTask) {
          showToast("未选择任务");
          return;
        }
        if (!state.selectedItems.length) {
          showToast("当前任务没有可提交明细");
          return;
        }

        const reporter = refs.reporterInput.value.trim();
        if (!reporter) {
          showToast("请填写报工人");
          return;
        }
        localStorage.setItem("inspection_report_reporter", reporter);
        state.memberName = reporter;
        localStorage.setItem("inspection_member_name", reporter);

        const validationError = validateBeforeSubmit(state.selectedItems);
        if (validationError) {
          showToast(validationError);
          return;
        }

        const payload = {
          taskId: state.selectedTask.id,
          scanValue: state.scanValue || refs.scanInput.value.trim(),
          reporter,
          remark: refs.reportRemarkInput.value.trim(),
          startedAt: state.reportStartAt || nowDateTimeText(),
          endedAt: nowDateTimeText(),
          items: state.selectedItems.map((item) => {
            const isAbnormal = item.resultState === "abnormal";
            const inputValue = item.inputValue || "";
            const optionValue = item.optionValue || "";
            const numericValue = item.numericValue;
            return {
              standardDetailId: item.standardDetailId,
              seq: item.seq,
              pointPart: item.pointPart,
              pointItem: item.pointItem,
              checkMethod: item.checkMethod || "",
              executeMode: getItemExecuteMode(item),
              judgeStandard: item.judgeStandard,
              unit: item.unit,
              inputValue,
              optionValue,
              numericValue: numericValue === "" || numericValue === null || numericValue === undefined ? "" : Number(numericValue),
              isAbnormal,
              abnormalDesc: item.abnormalDesc || "",
              handling: item.handling || "",
              photos: Array.isArray(item.photos) ? item.photos : [],
            };
          }),
        };

        setLoading(true);
        setStatus("execute", "正在提交报工...");
        try {
          const resp = await requestApi("/inspection-report/submit", "POST", payload);
          const data = resp?.data || {};
          setStatus("execute", `提交成功，报工ID：${data.reportId || "-"}`);
          clearTaskDraft(state.selectedTask && state.selectedTask.id);
          buildSummary(data);
          renderSummary();
          switchView("summary");
          await loadDashboard();
        } catch (error) {
          setStatus("execute", `提交失败：${error.message}`, true);
          showToast(`提交失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      function validateBeforeSubmit(items) {
        for (let i = 0; i < items.length; i += 1) {
          const item = items[i];
          if (!isItemFilled(item)) {
            return `第 ${item.seq || i + 1} 项尚未填写`;
          }
          if (item.resultState === "abnormal" && item.requireDescOnAbnormal && !String(item.abnormalDesc || "").trim()) {
            return `第 ${item.seq || i + 1} 项异常描述必填`;
          }
          if (item.resultState === "abnormal" && item.requirePhotoOnAbnormal && !(item.photos && item.photos.length)) {
            return `第 ${item.seq || i + 1} 项异常照片必填`;
          }
        }
        return "";
      }

      function isItemFilled(item) {
        if (!item) {
          return false;
        }
        const executeMode = getItemExecuteMode(item);
        if (executeMode === "normal_abnormal") {
          return item.resultState === "normal" || item.resultState === "abnormal";
        }
        if (executeMode === "meter") {
          return item.numericValue !== "" && item.numericValue !== null && item.numericValue !== undefined && !Number.isNaN(Number(item.numericValue));
        }
        if (executeMode === "status") {
          return Boolean(String(item.optionValue || "").trim());
        }
        return Boolean(String(item.inputValue || "").trim());
      }

      function buildSummary(submitData) {
        const abnormalItems = state.selectedItems
          .filter((item) => item.resultState === "abnormal")
          .map((item, index) => ({
            index: item.seq || index + 1,
            title: `${item.pointPart || "-"} · ${item.pointItem || "-"}`,
            desc: item.abnormalDesc || "未填写异常描述",
          }));

        const normalCount = state.selectedItems.filter((item) => item.resultState === "normal").length;
        const abnormalCount = state.selectedItems.filter((item) => item.resultState === "abnormal").length;

        state.lastSummary = {
          reportId: submitData.reportId || "",
          task: state.selectedTask,
          total: state.selectedItems.length,
          normalCount,
          abnormalCount,
          abnormalItems,
          reporter: refs.reporterInput.value.trim(),
          durationMinutes: estimateMinutes(state.reportStartAt, nowDateTimeText()),
          submitTime: nowDateTimeText(),
        };
      }

      function renderSummary() {
        const summary = state.lastSummary;
        if (!summary || !summary.task) {
          refs.summaryMainText.textContent = "任务已提交";
          refs.summaryNormalCount.textContent = "0";
          refs.summaryAbnormalCount.textContent = "0";
          refs.summaryTotalCount.textContent = "0";
          refs.summaryAbnormalWrap.innerHTML = "";
          setStatus("summary", "提交完成");
          return;
        }

        refs.summaryMainText.textContent = `${summary.task.deviceName || summary.task.deviceCode || "设备"} · ${summary.task.standardName || "点检"} · 用时 ${summary.durationMinutes} 分钟`;
        refs.summaryNormalCount.textContent = String(summary.normalCount);
        refs.summaryAbnormalCount.textContent = String(summary.abnormalCount);
        refs.summaryTotalCount.textContent = String(summary.total);

        refs.summaryAbnormalWrap.innerHTML = "";
        if (!summary.abnormalItems.length) {
          refs.summaryAbnormalWrap.innerHTML = '<div class="empty">本次未发现异常</div>';
        } else {
          summary.abnormalItems.forEach((item) => {
            const div = document.createElement("div");
            div.className = "abnormal-item";
            div.innerHTML = `
              <h4>项 ${escapeHtml(item.index)} · ${escapeHtml(item.title)}</h4>
              <p>${escapeHtml(item.desc)}</p>
            `;
            refs.summaryAbnormalWrap.appendChild(div);
          });
        }

        const nextTask = findNextPendingTask();
        refs.summaryNextBtn.disabled = !nextTask;
        refs.summaryNextBtn.textContent = nextTask ? "执行下一任务" : "无下一任务";

        setStatus("summary", `报工已提交：${summary.reportId || "-"}`);
      }

      function findNextPendingTask() {
        if (!state.selectedTask) {
          return null;
        }
        return (
          state.dashboardTasks.find(
            (task) =>
              String(task.deviceCode || "") === String(state.selectedTask.deviceCode || "") &&
              String(task.id || "") !== String(state.selectedTask.id || "") &&
              !isDoneStatus(task.taskStatus || task.statusText || "")
          ) || null
        );
      }

      function resolveReporterDefaultName(fallbackValue = "") {
        return String(
          state.memberName ||
            (state.currentMember && (state.currentMember.userName || state.currentMember.user || state.currentMember.account)) ||
            fallbackValue ||
            ""
        ).trim();
      }

      function buildTaskItemState(item) {
        const executeMode = getItemExecuteMode(item);
        const carryNumericValue =
          executeMode === "meter" && item && item.inputValue !== undefined && item.inputValue !== null && String(item.inputValue).trim()
            ? String(item.inputValue).trim()
            : "";
        return {
          ...item,
          executeMode,
          resultState: "pending",
          inputValue: "",
          optionValue: "",
          numericValue: carryNumericValue,
          abnormalDesc: "",
          handling: "",
          photos: [],
        };
      }

      function getTaskDraftKey(taskId) {
        return `${TASK_DRAFT_PREFIX}${String(taskId || "").trim()}`;
      }

      function getDraftItemKey(item) {
        const detailId = String(item && item.standardDetailId ? item.standardDetailId : "").trim();
        if (detailId) {
          return `id:${detailId}`;
        }
        return `seq:${String(item && item.seq ? item.seq : "").trim()}|${String(item && item.pointPart ? item.pointPart : "").trim()}|${String(item && item.pointItem ? item.pointItem : "").trim()}`;
      }

      function saveCurrentTaskDraft() {
        if (!state.selectedTask || !state.selectedTask.id || !state.selectedItems.length) {
          return;
        }

        try {
          const payload = {
            version: 2,
            taskId: state.selectedTask.id,
            updatedAt: nowDateTimeText(),
            reportStartAt: state.reportStartAt || nowDateTimeText(),
            reporter: refs.reporterInput.value.trim(),
            remark: refs.reportRemarkInput.value.trim(),
            items: state.selectedItems.map((item) => ({
              standardDetailId: item.standardDetailId || "",
              seq: item.seq || "",
              pointPart: item.pointPart || "",
              pointItem: item.pointItem || "",
              resultState: item.resultState || "pending",
              inputValue: item.inputValue || "",
              optionValue: item.optionValue || "",
              numericValue: item.numericValue === undefined || item.numericValue === null ? "" : item.numericValue,
              abnormalDesc: item.abnormalDesc || "",
              handling: item.handling || "",
              photos: Array.isArray(item.photos) ? item.photos : [],
            })),
          };
          localStorage.setItem(getTaskDraftKey(state.selectedTask.id), JSON.stringify(payload));
        } catch (error) {
          console.warn("save draft failed:", error);
        }
      }

      function restoreTaskDraft(task) {
        if (!task || !task.id || !state.selectedItems.length) {
          return false;
        }

        try {
          const raw = localStorage.getItem(getTaskDraftKey(task.id));
          if (!raw) {
            return false;
          }
          const draft = safeJsonParse(raw);
          if (!draft || !Array.isArray(draft.items) || !draft.items.length) {
            return false;
          }

          const draftMap = new Map();
          draft.items.forEach((item) => {
            draftMap.set(getDraftItemKey(item), item);
          });

          state.selectedItems = state.selectedItems.map((item) => {
            const matched = draftMap.get(getDraftItemKey(item));
            if (!matched) {
              return item;
            }
            const merged = {
              ...item,
              resultState: normalizeResultState(matched.resultState),
              inputValue: String(matched.inputValue || ""),
              optionValue: String(matched.optionValue || ""),
              numericValue: matched.numericValue === undefined || matched.numericValue === null ? "" : String(matched.numericValue),
              abnormalDesc: String(matched.abnormalDesc || ""),
              handling: String(matched.handling || ""),
              photos: Array.isArray(matched.photos) ? matched.photos : [],
            };
            if (getItemExecuteMode(merged) === "meter" && !String(merged.numericValue || "").trim() && String(merged.inputValue || "").trim()) {
              merged.numericValue = String(merged.inputValue || "").trim();
              merged.inputValue = "";
            }
            normalizeDraftItemState(merged);
            return merged;
          });

          if (!state.memberName) {
            refs.reporterInput.value = String(draft.reporter || refs.reporterInput.value || "").trim();
          }
          syncReporterField();
          refs.reportRemarkInput.value = String(draft.remark || "").trim();
          state.reportStartAt = String(draft.reportStartAt || state.reportStartAt || nowDateTimeText()).trim();
          return true;
        } catch (error) {
          console.warn("restore draft failed:", error);
          return false;
        }
      }

      function clearTaskDraft(taskId) {
        const key = getTaskDraftKey(taskId);
        if (!taskId) {
          return;
        }
        try {
          localStorage.removeItem(key);
        } catch (error) {
          console.warn("clear draft failed:", error);
        }
      }

      function normalizeDraftItemState(item) {
        const mode = getItemExecuteMode(item);
        if (mode === "status") {
          item.resultState = inferStatusResultState(item, item.optionValue);
          return;
        }
        if (mode === "meter") {
          item.resultState = evaluateMeterValue(item).status;
          return;
        }
        if (mode === "text") {
          item.resultState = String(item.inputValue || "").trim() ? "normal" : "pending";
          return;
        }
        item.resultState = normalizeResultState(item.resultState);
      }

      function shouldRerenderOnFieldChange(field, eventType, previousStatus, nextStatus) {
        if (field === "photoInput" || field === "optionValue") {
          return true;
        }
        if (field === "numericValue") {
          return eventType === "change";
        }
        if (field === "inputValue" && (previousStatus !== nextStatus || eventType === "change")) {
          return false;
        }
        return false;
      }

      function updateSingleItemCard(index) {
        const item = state.selectedItems[index];
        if (!item) {
          return;
        }

        const card = refs.executeItemList.querySelector(`[data-item-index='${index}']`);
        if (!(card instanceof HTMLElement)) {
          return;
        }

        const filled = isItemFilled(item);
        const status = resolveItemResultState(item, filled);
        card.classList.toggle("abnormal", status === "abnormal");
        card.classList.toggle("done", status !== "abnormal" && filled);

        const statusEl = card.querySelector(".item-status");
        if (statusEl instanceof HTMLElement) {
          statusEl.className = `item-status ${status}`;
          statusEl.textContent = itemStatusText(status);
        }

        const judgeEl = card.querySelector("[data-role='meter-judge']");
        if (judgeEl instanceof HTMLElement) {
          const judge = evaluateMeterValue(item);
          judgeEl.className = `judge-hint ${judge.status || "pending"}`;
          judgeEl.innerHTML = `<span>自动判定</span><strong>${escapeHtml(judge.label || "待填")}</strong>${judge.detail ? `<em>${escapeHtml(judge.detail)}</em>` : ""}`;
        }
      }

      function setLoading(flag) {
        state.loading = flag;
        refs.scanBtn.disabled = flag;
        refs.cameraScanBtn.disabled = flag;
        refs.submitTaskBtn.disabled = flag;
        refs.nextPendingBtn.disabled = flag;
        refs.headerActionBtn.disabled = flag;
      }

      function setStatus(scope, message, error = false) {
        const target = scope === "execute" ? refs.executeStatus : scope === "summary" ? refs.summaryStatus : refs.dashboardStatus;
        target.textContent = message;
        target.classList.toggle("error", Boolean(error));
      }

      function showToast(message) {
        refs.toast.textContent = message;
        refs.toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => {
          refs.toast.classList.remove("show");
        }, 2200);
      }

      function inferCategory(ruleName, standardName, standardCode) {
        const text = `${String(ruleName || "")} ${String(standardName || "")} ${String(standardCode || "")}`;
        if (text.includes("周")) return "周检";
        if (text.includes("月")) return "月检";
        if (text.includes("定期")) return "定期点检";
        return "日检";
      }

      function isDoneStatus(text) {
        const value = String(text || "").trim();
        return ["已完成", "完成", "异常", "已报工", "已关闭", "作废", "失效"].includes(value);
      }

      function isBinaryNormalAbnormalSelect(item) {
        if (!item || item.inputType !== "select") {
          return false;
        }
        const options = Array.isArray(item.options) ? item.options.map((opt) => String(opt || "").trim()).filter(Boolean) : [];
        if (!options.length || options.length > 2) {
          return false;
        }
        return options.every((opt) => opt === "正常" || opt === "异常");
      }

      function getItemExecuteMode(item) {
        if (!item) {
          return "normal_abnormal";
        }
        const existing = String(item.executeMode || "").trim();
        const hasNumericJudgeRange = Boolean(parseJudgeRange(item.judgeStandard));
        if (existing) {
          if (hasNumericJudgeRange && existing !== "status" && existing !== "meter") {
            return "meter";
          }
          return existing;
        }

        const method = String(item.checkMethod || "").trim();
        if (method.includes("抄表") || item.inputType === "number" || hasNumericJudgeRange) {
          return "meter";
        }
        if (method.includes("状态")) {
          return "status";
        }
        if (method.includes("普通")) {
          return "normal_abnormal";
        }
        if (isBinaryNormalAbnormalSelect(item)) {
          return "normal_abnormal";
        }
        if (item.inputType === "select") {
          return "status";
        }
        if (item.inputType === "text") {
          return "text";
        }
        return "normal_abnormal";
      }

      function getExecuteModeLabel(mode) {
        if (mode === "meter") return "抄表录入";
        if (mode === "status") return "状态选择";
        if (mode === "text") return "文本录入";
        return "普通判定";
      }

      function normalizeResultState(value) {
        return value === "abnormal" || value === "normal" ? value : "pending";
      }

      function resolveItemResultState(item, fallbackFilled = isItemFilled(item)) {
        const status = normalizeResultState(item && item.resultState);
        if (status !== "pending") {
          return status;
        }
        return fallbackFilled ? "normal" : "pending";
      }

      function inferStatusResultState(item, value) {
        const text = String(value || "").trim();
        if (!text) {
          return "pending";
        }
        if (isBinaryNormalAbnormalSelect(item)) {
          return text === "异常" ? "abnormal" : "normal";
        }
        if (/(异常|故障|报警|停机|停用|维修|损坏|泄漏)/.test(text)) {
          return "abnormal";
        }
        return "normal";
      }

      function evaluateMeterValue(item) {
        const rawValue = String(item && item.numericValue !== undefined && item.numericValue !== null ? item.numericValue : "").trim();
        if (!rawValue) {
          return {
            status: "pending",
            label: "待填",
            detail: "请输入抄表数值",
          };
        }

        const numericValue = Number(rawValue);
        if (!Number.isFinite(numericValue)) {
          return {
            status: "pending",
            label: "待填",
            detail: "请输入有效数值",
          };
        }

        const rangeRule = parseJudgeRange(item && item.judgeStandard);
        if (!rangeRule) {
          return {
            status: "normal",
            label: "已录入",
            detail: "未识别标准范围，默认按已填写处理",
          };
        }

        const matched = isNumberInRange(numericValue, rangeRule);
        return {
          status: matched ? "normal" : "abnormal",
          label: matched ? "正常" : "异常",
          detail: `标准范围：${rangeRule.label}`,
        };
      }

      function parseJudgeRange(source) {
        const text = String(source || "").trim();
        if (!text) {
          return null;
        }

        const normalized = text.replace(/，/g, ",").replace(/\s+/g, "");
        const betweenMatch = normalized.match(/(-?\d+(?:\.\d+)?)\s*(?:~|～|—|–|-|至|到)\s*(-?\d+(?:\.\d+)?)/);
        if (betweenMatch) {
          const min = Number(betweenMatch[1]);
          const max = Number(betweenMatch[2]);
          if (Number.isFinite(min) && Number.isFinite(max)) {
            return {
              min: Math.min(min, max),
              max: Math.max(min, max),
              includeMin: true,
              includeMax: true,
              label: `${Math.min(min, max)}-${Math.max(min, max)}`,
            };
          }
        }

        let min = null;
        let max = null;
        let includeMin = true;
        let includeMax = true;
        const comparatorPattern = /(>=|<=|>|<|≥|≤)\s*(-?\d+(?:\.\d+)?)/g;
        for (const match of normalized.matchAll(comparatorPattern)) {
          const operator = match[1];
          const value = Number(match[2]);
          if (!Number.isFinite(value)) {
            continue;
          }
          if (operator === ">" || operator === ">=" || operator === "≥") {
            min = value;
            includeMin = operator !== ">";
          } else if (operator === "<" || operator === "<=" || operator === "≤") {
            max = value;
            includeMax = operator !== "<";
          }
        }

        if (min !== null || max !== null) {
          return {
            min,
            max,
            includeMin,
            includeMax,
            label: buildRangeLabel(min, max, includeMin, includeMax),
          };
        }

        if (/^-?\d+(?:\.\d+)?$/.test(normalized)) {
          const exact = Number(normalized);
          return {
            min: exact,
            max: exact,
            includeMin: true,
            includeMax: true,
            label: String(exact),
          };
        }

        return null;
      }

      function buildRangeLabel(min, max, includeMin, includeMax) {
        const parts = [];
        if (min !== null) {
          parts.push(`${includeMin ? ">=" : ">"}${min}`);
        }
        if (max !== null) {
          parts.push(`${includeMax ? "<=" : "<"}${max}`);
        }
        return parts.join(" 且 ");
      }

      function isNumberInRange(value, rangeRule) {
        if (!rangeRule || !Number.isFinite(value)) {
          return false;
        }
        if (rangeRule.min !== null) {
          if (rangeRule.includeMin ? value < rangeRule.min : value <= rangeRule.min) {
            return false;
          }
        }
        if (rangeRule.max !== null) {
          if (rangeRule.includeMax ? value > rangeRule.max : value >= rangeRule.max) {
            return false;
          }
        }
        return true;
      }

      function itemStatusText(status) {
        if (status === "normal") return "正常";
        if (status === "abnormal") return "异常";
        return "待填";
      }

      function formatDisplayDate(value) {
        const text = String(value || "").trim();
        if (!text) {
          return "今日";
        }
        const date = new Date(text.replace(/-/g, "/"));
        if (!Number.isFinite(date.getTime())) {
          return text;
        }
        const weekNames = ["日", "一", "二", "三", "四", "五", "六"];
        const m = date.getMonth() + 1;
        const d = date.getDate();
        const week = weekNames[date.getDay()];
        return `${date.getFullYear()}年${m}月${d}日 · 周${week}`;
      }

      function estimateMinutes(startText, endText) {
        const start = parseDateTime(startText);
        const end = parseDateTime(endText);
        if (!start || !end) {
          return 0;
        }
        const diff = Math.max(0, end.getTime() - start.getTime());
        return Math.max(1, Math.round(diff / 60000));
      }

      function parseDateTime(text) {
        const value = String(text || "").trim();
        if (!value) {
          return null;
        }
        const date = new Date(value.replace(/-/g, "/"));
        if (!Number.isFinite(date.getTime())) {
          return null;
        }
        return date;
      }

      async function requestApi(path, method = "GET", body) {
        const url = `${API_BASE}${path}`;
        const options = {
          method,
          headers: {
            "Content-Type": "application/json",
          },
        };
        if (method !== "GET" && method !== "HEAD") {
          options.body = JSON.stringify(body || {});
        }
        const resp = await fetch(url, options);
        const text = await resp.text();
        const json = safeJsonParse(text);
        if (!resp.ok) {
          throw new Error(extractErrorMessage(json) || text || `HTTP ${resp.status}`);
        }
        if (json && json.ok === false) {
          throw new Error(extractErrorMessage(json) || "请求失败");
        }
        return json;
      }

      async function requestApiSafe(path, method = "GET", body) {
        try {
          const payload = await requestApi(path, method, body);
          return {
            ok: true,
            payload,
          };
        } catch (error) {
          return {
            ok: false,
            error: error && error.message ? error.message : "request failed",
          };
        }
      }

      function extractErrorMessage(payload) {
        if (!payload || typeof payload !== "object") {
          return "";
        }
        const fields = [payload.message, payload.msg, payload.error, payload.detail];
        for (const value of fields) {
          if (typeof value === "string" && value.trim()) {
            return value.trim();
          }
        }
        return "";
      }

      function safeJsonParse(text) {
        if (!text) {
          return null;
        }
        try {
          return JSON.parse(text);
        } catch {
          return null;
        }
      }

      function nowDateTimeText() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        const ss = String(d.getSeconds()).padStart(2, "0");
        return `${y}-${m}-${day} ${hh}:${mm}:${ss}`;
      }

      function formatDate(date) {
        const d = date instanceof Date ? date : new Date(date);
        if (!Number.isFinite(d.getTime())) {
          return "";
        }
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
    </script>
  </body>
</html>
