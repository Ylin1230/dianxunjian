<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>危化品台账</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --panel: #ffffff;
        --border: #d7deea;
        --line-soft: #e5ebf4;
        --text: #1f2a3a;
        --muted: #6f7d93;
        --accent: #2c79ea;
        --accent-soft: #edf4ff;
        --danger: #d24b4b;
        --warning: #c07a1a;
        --success: #1e8750;
        --shadow: none;
      }

      * {
        box-sizing: border-box;
      }

      html {
        width: 100%;
        min-height: 100%;
        overflow: auto;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: auto;
        font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .ledger-layout {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 12px;
        padding: 12px;
        min-height: 100vh;
        min-height: 100dvh;
        width: 100%;
        max-width: 100%;
        overflow: auto;
      }

      .panel {
        min-width: 0;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        box-shadow: var(--shadow);
      }

      .left-panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      .location-tree {
        padding: 6px 8px;
        overflow: auto;
      }

      .tree-group {
        margin: 2px 0 6px;
      }

      .tree-children {
        margin-top: 2px;
      }

      .tree-node {
        width: 100%;
        min-height: 26px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: inherit;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 1px 8px 1px 4px;
        text-align: left;
        cursor: pointer;
        font-size: 13px;
        line-height: 1.35;
      }

      .tree-node:hover {
        background: #f6f8fc;
      }

      .tree-node.active {
        background: var(--accent-soft);
        color: var(--text);
      }

      .tree-node.root,
      .tree-node.area {
        font-weight: 600;
      }

      .tree-node.root::before,
      .tree-node.area::before {
        content: "▾";
        width: 20px;
        flex: 0 0 20px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }

      .tree-node.area {
        padding-left: 20px;
      }

      .tree-node.site {
        padding-left: 48px;
        font-weight: 400;
      }

      .tree-node > span:first-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tree-count {
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
        flex: 0 0 auto;
      }

      .tree-row {
        min-height: 26px;
        display: flex;
        align-items: center;
        gap: 4px;
        border-radius: 6px;
        padding: 1px 8px 1px 4px;
        position: relative;
      }

      .tree-row.is-selected {
        background: var(--accent-soft);
      }

      .tree-row:hover {
        background: #f9fbfe;
      }

      .tree-row.is-selected:hover {
        background: var(--accent-soft);
      }

      .tree-toggle {
        width: 18px;
        height: 18px;
        border: 0;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
        color: var(--muted);
        font-size: 12px;
        padding: 0;
        flex: 0 0 18px;
      }

      .tree-toggle:hover:not(:disabled) {
        background: #eef3fb;
        color: var(--accent);
      }

      .tree-toggle:disabled {
        cursor: default;
        opacity: 0;
      }

      .tree-label {
        min-width: 0;
        flex: 1;
        border: 0;
        background: transparent;
        color: inherit;
        display: flex;
        align-items: baseline;
        gap: 8px;
        font-size: 13px;
        font-weight: 400;
        line-height: 1.35;
        padding: 0;
        cursor: pointer;
        text-align: left;
      }

      .tree-label span:first-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tree-label.is-strong {
        font-weight: 400;
      }

      .section-head {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .section-head h2,
      .main-head h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0;
      }

      .section-subtitle {
        margin-top: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      .detail-wrap {
        padding: 10px;
        overflow: auto;
      }

      .detail-grid {
        display: grid;
        gap: 8px;
      }

      .kv {
        border: 1px solid var(--line-soft);
        border-radius: 6px;
        background: #fafcff;
        padding: 8px;
      }

      .kv span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 4px;
      }

      .kv strong {
        font-size: 13px;
        font-weight: 400;
        white-space: pre-wrap;
      }

      .main-panel {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) auto auto;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }

      .main-head {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
      }

      .head-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-start;
      }

      .btn {
        border: 1px solid #b7c4d8;
        background: #fff;
        color: #30445f;
        min-height: 32px;
        padding: 0 12px;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
      }

      .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .btn.primary:hover {
        background: #236cce;
        color: #fff;
      }

      .btn.danger {
        border-color: #efc4c4;
        color: var(--danger);
      }

      .btn.danger:hover {
        background: #fff4f4;
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .filters {
        display: flex;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: #fbfcff;
        align-items: center;
      }

      .filters #keywordInput {
        flex: 0 1 280px;
        width: 280px;
        max-width: 32vw;
        margin-left: auto;
      }

      .filters #statusFilter,
      .filters > .select-proxy {
        flex: 0 0 160px;
        width: 160px;
      }

      .filter-actions {
        display: flex;
        flex: 0 0 auto;
        gap: 8px;
      }

      .input,
      .select,
      .textarea,
      .control {
        width: 100%;
        border: 1px solid #c9d3e2;
        border-radius: 4px;
        background: #fff;
        color: var(--text);
        min-height: 32px;
        padding: 0 10px;
        outline: none;
        font-size: 13px;
      }

      .textarea {
        min-height: 76px;
        padding: 8px 10px;
        resize: vertical;
      }

      .input:focus,
      .select:focus,
      .textarea:focus,
      .control:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(44, 121, 234, 0.12);
      }

      .native-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .combo {
        position: relative;
      }

      .combo-button {
        width: 100%;
        min-height: 32px;
        border: 1px solid #c9d3e2;
        border-radius: 4px;
        background: #fff;
        color: var(--text);
        padding: 0 32px 0 10px;
        font: inherit;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        position: relative;
      }

      .combo.has-value .combo-button {
        padding-right: 42px;
      }

      .combo-button::after {
        content: "";
        position: absolute;
        right: 11px;
        top: 50%;
        width: 7px;
        height: 7px;
        border-right: 1px solid #6f7d93;
        border-bottom: 1px solid #6f7d93;
        transform: translateY(-65%) rotate(45deg);
      }

      .combo.has-value .combo-button::after {
        display: none;
      }

      .combo-clear {
        position: absolute;
        right: 9px;
        top: 16px;
        z-index: 3;
        width: 18px;
        height: 18px;
        min-height: 18px;
        border: 0;
        border-radius: 999px;
        background: #cbd4e2;
        color: #fff;
        padding: 0;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transform: translateY(-50%);
      }

      .combo-clear::before,
      .combo-clear::after {
        content: "";
        position: absolute;
        width: 9px;
        height: 1.5px;
        border-radius: 999px;
        background: currentColor;
      }

      .combo-clear::before {
        transform: rotate(45deg);
      }

      .combo-clear::after {
        transform: rotate(-45deg);
      }

      .combo.has-value .combo-clear {
        display: inline-flex;
      }

      .combo-clear:hover {
        background: #b9c3d3;
      }

      .combo-button.is-placeholder {
        color: #7f8ca2;
      }

      .combo-button span {
        display: block;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .combo-button:focus,
      .combo.is-open .combo-button {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(44, 121, 234, 0.12);
      }

      .combo-panel {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(100% + 4px);
        z-index: 40;
        border: 1px solid #9fb2cb;
        border-radius: 6px;
        background: #fff;
        box-shadow: 0 10px 24px rgba(27, 48, 78, 0.16);
        overflow: hidden;
      }

      .combo-panel.hidden {
        display: none;
      }

      .combo-search-wrap {
        padding: 8px;
        border-bottom: 1px solid #e5edf8;
        background: #f8fbff;
      }

      .combo-search {
        min-height: 32px;
      }

      .combo-list {
        max-height: 240px;
        overflow: auto;
        padding: 4px;
      }

      .combo-option {
        width: 100%;
        min-height: 32px;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: var(--text);
        display: block;
        padding: 7px 8px 7px 24px;
        text-align: left;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        line-height: 1.4;
        position: relative;
      }

      .combo-option:hover,
      .combo-option.is-selected {
        background: var(--accent-soft);
        color: #195bb5;
      }

      .combo-empty {
        padding: 12px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }

      .combo-option.is-selected::before {
        content: "✓";
        position: absolute;
        left: 8px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--accent);
        font-weight: 700;
      }

      .native-select-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .select-proxy {
        position: relative;
      }

      .select-proxy-button {
        width: 100%;
        min-height: 32px;
        border: 1px solid #c9d3e2;
        border-radius: 4px;
        background: #fff;
        color: var(--text);
        padding: 0 30px 0 10px;
        font: inherit;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        position: relative;
      }

      .select-proxy.has-value .select-proxy-button {
        padding-right: 42px;
      }

      .select-proxy-button::after {
        content: "";
        position: absolute;
        right: 10px;
        top: 50%;
        width: 7px;
        height: 7px;
        border-right: 1px solid #65758c;
        border-bottom: 1px solid #65758c;
        transform: translateY(-65%) rotate(45deg);
      }

      .select-proxy.has-value .select-proxy-button::after {
        display: none;
      }

      .select-proxy-clear {
        position: absolute;
        right: 9px;
        top: 50%;
        z-index: 3;
        width: 18px;
        height: 18px;
        min-height: 18px;
        border: 0;
        border-radius: 999px;
        background: #cbd4e2;
        color: #fff;
        padding: 0;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transform: translateY(-50%);
      }

      .select-proxy-clear::before,
      .select-proxy-clear::after {
        content: "";
        position: absolute;
        width: 9px;
        height: 1.5px;
        border-radius: 999px;
        background: currentColor;
      }

      .select-proxy-clear::before {
        transform: rotate(45deg);
      }

      .select-proxy-clear::after {
        transform: rotate(-45deg);
      }

      .select-proxy.has-value .select-proxy-clear {
        display: inline-flex;
      }

      .select-proxy-clear:hover {
        background: #b9c3d3;
      }

      .select-proxy-button span {
        display: block;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .select-proxy-button:focus,
      .select-proxy.is-open .select-proxy-button {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(44, 121, 234, 0.12);
      }

      .select-proxy-panel {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(100% + 4px);
        z-index: 90;
        max-height: 260px;
        overflow: auto;
        padding: 4px;
        border: 1px solid #9fb2cb;
        border-radius: 6px;
        background: #fff;
        box-shadow: 0 10px 24px rgba(27, 48, 78, 0.16);
      }

      .select-proxy-panel.hidden {
        display: none;
      }

      .select-proxy-option {
        width: 100%;
        min-height: 28px;
        border: 0;
        border-radius: 3px;
        background: transparent;
        color: var(--text);
        display: block;
        padding: 5px 8px 5px 24px;
        text-align: left;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        line-height: 1.4;
        position: relative;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .select-proxy-option:hover,
      .select-proxy-option.is-selected {
        background: var(--accent-soft);
        color: #195bb5;
      }

      .select-proxy-group {
        padding: 7px 8px 3px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        line-height: 1.3;
      }

      .select-proxy-option.is-grouped {
        padding-left: 32px;
      }

      .select-proxy-option.is-grouped.is-selected::before {
        left: 16px;
      }

      .select-proxy-option.is-selected::before {
        content: "✓";
        position: absolute;
        left: 8px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--accent);
        font-weight: 700;
      }

      .readonly {
        background: #f5f7fb;
        color: var(--muted);
      }

      .table-wrap {
        min-height: 0;
        overflow: auto;
      }

      .pagination-bar {
        min-height: 42px;
        padding: 7px 12px 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border-top: 1px solid var(--line-soft);
        background: #fff;
      }

      .pagination-info {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .pagination-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .pagination-page-btn {
        min-width: 30px;
        height: 28px;
        min-height: 28px;
        padding: 0 8px;
        border-radius: 4px;
      }

      .pagination-page-btn.is-current {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .pagination-size {
        width: 92px;
        min-height: 28px;
        font-size: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1180px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line-soft);
        padding: 9px 10px;
        text-align: left;
        vertical-align: middle;
        font-size: 13px;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #f4f7fb;
        color: #50627a;
        font-weight: 700;
      }

      tbody tr {
        cursor: pointer;
      }

      tbody tr:hover td {
        background: #f8fbff;
      }

      tbody tr.active td {
        background: var(--accent-soft);
      }

      .row-actions {
        display: flex;
        gap: 8px;
        white-space: nowrap;
      }

      .text-btn {
        border: 0;
        background: transparent;
        padding: 0;
        font-size: 12px;
        line-height: 1.5;
        cursor: pointer;
        color: var(--accent);
      }

      .text-btn:hover {
        color: #236cce;
      }

      .text-btn.danger {
        color: var(--danger);
      }

      .text-btn.danger:hover {
        color: #bc3030;
      }

      .table-foot {
        min-height: 38px;
        padding: 9px 12px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--muted);
        font-size: 13px;
        background: #fff;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        background: #eef2f7;
        color: #50627a;
        white-space: nowrap;
      }

      .tag.ok {
        background: #e9f7ef;
        color: var(--success);
      }

      .tag.stop {
        background: #fff0f0;
        color: var(--danger);
      }

      .tag.warn {
        background: #fff7e6;
        color: var(--warning);
      }

      .empty {
        color: var(--muted);
        text-align: center;
        padding: 24px;
      }

      .status-bar {
        margin: 8px 10px 10px;
        border-top: 1px solid var(--line-soft);
        padding-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .status-bar.error {
        color: var(--danger);
      }

      .modal-mask {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        background: rgba(31, 42, 58, 0.35);
        padding: 20px;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }

      .modal-mask.hidden {
        display: none;
      }

      .modal {
        width: min(1040px, calc(100vw - 40px));
        max-height: calc(100vh - 40px);
        max-height: calc(100dvh - 40px);
        min-height: 0;
        overflow: hidden;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 6px;
        box-shadow: 0 16px 48px rgba(31, 42, 58, 0.22);
        display: flex;
        flex-direction: column;
      }

      .modal.detail-modal {
        width: min(820px, calc(100vw - 40px));
      }

      .modal > form {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .modal-head,
      .modal-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
      }

      .modal-foot {
        border-top: 1px solid var(--border);
        border-bottom: 0;
        background: #fff;
        justify-content: flex-end;
        position: sticky;
        bottom: 0;
        z-index: 2;
      }

      .modal-head h3 {
        margin: 0;
        font-size: 17px;
      }

      .modal-body {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        padding: 12px;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }

      .section-card {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 12px;
        background: #fff;
      }

      .section-card h4 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .field label {
        display: block;
        color: #50627a;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 600;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .detail-modal-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .detail-modal-grid .qr-card {
        display: none;
      }

      .qr-card {
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fbfcff;
        padding: 12px;
      }

      .qr-preview {
        display: grid;
        place-items: center;
        min-height: 230px;
        border: 1px dashed #c9d3e2;
        border-radius: 6px;
        background: #fff;
        margin-bottom: 10px;
      }

      .qr-preview img {
        width: 200px;

      function bindSelectProxyShell() {
        if (window.__selectProxyShellBound) return;
        window.__selectProxyShellBound = true;
        document.addEventListener("click", (event) => {
          if (!(event.target instanceof HTMLElement) || !event.target.closest(".select-proxy")) {
            closeSelectProxies();
          }
        });
        new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            mutation.addedNodes.forEach((node) => {
              if (node instanceof HTMLElement) {
                enhanceSelectProxies(node);
              }
            });
          });
        }).observe(document.body, { childList: true, subtree: true });
      }

      function enhanceSelectProxies(scope = document) {
        if (!scope) return;
        const selector = "select.control:not(.native-hidden)";
        if (scope instanceof HTMLSelectElement && scope.matches(selector)) {
          enhanceSelectProxy(scope);
        }
        scope.querySelectorAll?.(selector).forEach((select) => enhanceSelectProxy(select));
      }

      function enhanceSelectProxy(select) {
        if (select.classList.contains("native-select-hidden")) {
          refreshSelectProxy(select);
          return;
        }
        const next = select.nextElementSibling;
        if (next && next.classList.contains("select-proxy")) {
          next.remove();
        }
        select.classList.add("native-select-hidden");

        const proxy = document.createElement("div");
        proxy.className = "select-proxy";
        const button = document.createElement("button");
        button.type = "button";
        button.className = "select-proxy-button";
        const text = document.createElement("span");
        button.appendChild(text);
        const clear = document.createElement("button");
        clear.type = "button";
        clear.className = "select-proxy-clear";
        clear.setAttribute("aria-label", "清空选择");
        const panel = document.createElement("div");
        panel.className = "select-proxy-panel hidden";
        const list = document.createElement("div");
        panel.appendChild(list);
        proxy.appendChild(button);
        proxy.appendChild(clear);
        proxy.appendChild(panel);
        select.insertAdjacentElement("afterend", proxy);

        const render = () => renderSelectProxy(select, proxy, text, list);
        clear.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          if (select.disabled) return;
          const hasEmptyOption = Array.from(select.options).some((option) => option.value === "");
          if (!hasEmptyOption) return;
          select.value = "";
          select.dispatchEvent(new Event("change", { bubbles: true }));
          closeSelectProxies();
        });
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const willOpen = panel.classList.contains("hidden");
          closeSelectProxies();
          render();
          if (willOpen) {
            proxy.classList.add("is-open");
            panel.classList.remove("hidden");
          }
        });
        select.addEventListener("change", render);
        new MutationObserver(render).observe(select, { childList: true, subtree: true });
        render();
      }

      function renderSelectProxy(select, proxy, text, list) {
        const selected = select.selectedOptions && select.selectedOptions[0];
        text.textContent = selected?.textContent || "请选择";
        const hasEmptyOption = Array.from(select.options).some((option) => option.value === "");
        proxy.classList.toggle("has-value", Boolean(select.value) && hasEmptyOption && !select.disabled);
        list.innerHTML = "";
        const appendOption = (option, grouped = false) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = `select-proxy-option${grouped ? " is-grouped" : ""}${option.value === select.value ? " is-selected" : ""}`;
          item.textContent = option.textContent || "请选择";
          item.disabled = option.disabled;
          item.addEventListener("click", () => {
            select.value = option.value;
            select.dispatchEvent(new Event("change", { bubbles: true }));
            closeSelectProxies();
          });
          list.appendChild(item);
        };
        Array.from(select.children).forEach((child) => {
          if (child instanceof HTMLOptGroupElement) {
            const group = document.createElement("div");
            group.className = "select-proxy-group";
            group.textContent = child.label || "";
            list.appendChild(group);
            Array.from(child.children).forEach((option) => {
              if (option instanceof HTMLOptionElement) {
                appendOption(option, true);
              }
            });
            return;
          }
          if (child instanceof HTMLOptionElement) {
            appendOption(child, false);
          }
        });
        proxy.classList.toggle("is-disabled", select.disabled);
      }

      function refreshSelectProxy(select) {
        const proxy = select?.nextElementSibling;
        if (!proxy || !proxy.classList.contains("select-proxy")) return;
        const text = proxy.querySelector(".select-proxy-button span");
        const list = proxy.querySelector(".select-proxy-panel > div");
        if (text && list) {
          renderSelectProxy(select, proxy, text, list);
        }
      }

      function refreshSelectProxies(scope = document) {
        if (!scope) return;
        scope.querySelectorAll("select.native-select-hidden").forEach(refreshSelectProxy);
      }

      function closeSelectProxies() {
        document.querySelectorAll(".select-proxy.is-open").forEach((proxy) => proxy.classList.remove("is-open"));
        document.querySelectorAll(".select-proxy-panel:not(.hidden)").forEach((panel) => panel.classList.add("hidden"));
      }

      async function refreshAll({ preserveSelection = false } = {}) {
        const previousId = preserveSelection ? state.selectedId : "";
        setLoading(true);
        setStatus("正在同步危化品台账...");
        try {
          const [records, standards, sites, users, accidentTypes, packageForms] = await Promise.all([
            fetchEntryRecords(API_CONFIG.chemicalEntryId),
            fetchEntryRecords(API_CONFIG.standardEntryId),
            fetchEntryRecords(API_CONFIG.siteEntryId),
            fetchContactsUsers().catch(() => []),
            fetchEntryRecords(API_CONFIG.accidentTypeEntryId).catch(() => []),
            fetchEntryRecords(API_CONFIG.packageFormEntryId).catch(() => []),
          ]);
          state.records = records.map(mapChemicalRecord).filter((item) => item.id && (item.code || item.name));
          state.standards = recordsToStandards(standards);
          state.sites = recordsToSites(sites);
          state.users = users;
          state.accidentTypes = recordsToSimpleOptions(accidentTypes);
          state.packageForms = recordsToSimpleOptions(packageForms);
          renderStandardOptions();
          renderOwnerOptions();
          renderAccidentOptions();
          renderPackageOptions();
          renderStorageLocationOptions();
          const validIds = new Set(state.records.map((item) => item.id));
          state.selectedId = previousId && validIds.has(previousId) ? previousId : state.records[0]?.id || "";
          ensureSelectedLocationExists();
          renderAll();
          setStatus(`同步完成，共 ${state.records.length} 条，危化品地点 ${getChemicalLocationItems().length} 个`);
        } catch (error) {
          renderAll();
          setStatus(`同步失败：${error.message}`, true);
          showToast(`同步失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      function recordsToStandards(records) {
        return records
          .map((record) => ({
            id: extractRecordId(record),
            code: toDisplayText(getAliasRawValue(record, STANDARD_FIELD.code)),
            name: toDisplayText(getAliasRawValue(record, STANDARD_FIELD.name)),
            category: toDisplayText(getAliasRawValue(record, STANDARD_FIELD.category)),
            status: normalizeStatus(toDisplayText(getAliasRawValue(record, STANDARD_FIELD.status))),
            applicableDeviceType: normalizeApplicableDeviceType(toDisplayText(getAliasRawValue(record, STANDARD_FIELD.applicableDeviceType))),
            linkedDeviceRange: toDisplayText(getAliasRawValue(record, STANDARD_FIELD.linkedDeviceRange)),
          }))
          .filter((item) => item.id && item.name)
          .sort((a, b) => String(a.name).localeCompare(String(b.name), "zh-Hans-CN"));
      }

      function recordsToSites(records) {
        return records
          .map((record) => {
            const name = toDisplayText(getAliasRawValue(record, SITE_FIELD.name));
            return {
              id: extractRecordId(record) || name,
              code: toDisplayText(getAliasRawValue(record, SITE_FIELD.code)),
              area: toDisplayText(getAliasRawValue(record, SITE_FIELD.area)) || "未配置区域",
              name,
              owner: toDisplayText(getAliasRawValue(record, SITE_FIELD.owner)),
            };
          })
          .filter((item) => item.name)
          .sort((a, b) => {
            const areaSort = String(a.area || "").localeCompare(String(b.area || ""), "zh-Hans-CN");
            return areaSort || String(a.name || "").localeCompare(String(b.name || ""), "zh-Hans-CN");
          });
      }

      function recordsToSimpleOptions(records) {
        const seen = new Set();
        return records
          .map((record) => {
            const name = toDisplayText(getAliasRawValue(record, SIMPLE_OPTION_FIELD.name));
            const code = toDisplayText(getAliasRawValue(record, SIMPLE_OPTION_FIELD.code));
            return {
              id: extractRecordId(record) || code || name,
              code,
              name,
            };
          })
          .filter((item) => item.name)
          .filter((item) => {
            const key = normalizeCompareText(item.name);
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          })
          .sort((a, b) => String(a.name || "").localeCompare(String(b.name || ""), "zh-Hans-CN"));
      }

      function getChemicalStandardOptions(keyword = "") {
        const text = normalizeCompareText(keyword);
        return state.standards
          .filter((item) => item.applicableDeviceType === "危化品" || item.name.includes("危化"))
          .filter((item) => {
            if (!text) return true;
            return [item.name, item.code, item.category].map(normalizeCompareText).join("|").includes(text);
          });
      }

      function getPackageOptions(keyword = "") {

      function renderPackageOptions({ selectedValue = String(refs.packageFormInput.value || "").trim(), keepKeyword = false } = {}) {

      function getAccidentOptions(keyword = "") {

      function renderAccidentOptions({ selectedValues = getSelectedOptionValues(refs.accidentTypeInput), keepKeyword = false } = {}) {
        const selected = normalizeMultiValue(selectedValues);
        const options = getAccidentOptions().map((item) => `<option value="${escapeHtml(item.name)}">${escapeHtml(item.name)}</option>`);
        selected.forEach((value) => {
          if (value && !getAccidentOptions().some((item) => item.name === value)) {
            options.push(`<option value="${escapeHtml(value)}">${escapeHtml(value)}（历史值）</option>`);
          }
        });
        refs.accidentTypeInput.innerHTML = options.join("");
        setSelectedOptionValues(refs.accidentTypeInput, selected);
        if (!keepKeyword) {
          refs.accidentKeywordInput.value = "";

        renderAccidentOptionList();
        updateComboDisplay("accident");
      }

      function renderAccidentOptionList() {
        const rows = getAccidentOptions(refs.accidentKeywordInput.value);
        const selected = new Set(getSelectedOptionValues(refs.accidentTypeInput));
        if (!rows.length) {
          refs.accidentOptionList.innerHTML = '<div class="combo-empty">未找到匹配事故类型</div>';
          return;
        }
        refs.accidentOptionList.innerHTML = rows
          .map((item) => `<button type="button" class="combo-option${selected.has(item.name) ? " is-selected" : ""}" data-combo-value="${escapeHtml(item.name)}">${escapeHtml(item.name)}</button>`)
          .join("");
      }

      function renderComboOptionList(type) {
        if (type === "owner") {
          renderOwnerOptionList();
          return;
        }
        if (type === "standard") {
          renderStandardOptionList();
          return;
        }
        if (type === "package") {
          renderPackageOptionList();
          return;
        }
        renderAccidentOptionList();
      }

      function refreshComboOptions(type, options = {}) {
        if (type === "owner") {
          renderOwnerOptions({ selectedId: getComboRefs(type).select.value, ...options });
          return;
        }
        if (type === "standard") {
          renderStandardOptions({ selectedId: getComboRefs(type).select.value, ...options });
          return;
        }
        if (type === "package") {
          renderPackageOptions({ selectedValue: getComboRefs(type).select.value, ...options });
          return;
        }
        renderAccidentOptions({ selectedValues: getSelectedOptionValues(getComboRefs(type).select), ...options });
      }

      function getComboRefs(type) {
        if (type === "owner") {
          return {
              root: refs.ownerCombo,
              button: refs.ownerComboButton,
              text: refs.ownerComboText,
              clear: refs.ownerComboClear,
              panel: refs.ownerComboPanel,
              keyword: refs.ownerKeywordInput,
              list: refs.ownerOptionList,
              select: refs.ownerInput,
              placeholder: "请选择责任人",
              multiple: false,
            };
        }
        if (type === "package") {
          return {
            root: refs.packageCombo,
            button: refs.packageComboButton,
            text: refs.packageComboText,
            clear: refs.packageComboClear,
            panel: refs.packageComboPanel,
            keyword: refs.packageKeywordInput,
            list: refs.packageOptionList,
            select: refs.packageFormInput,
            placeholder: "请选择包装形式",
            multiple: false,
          };
        }
        if (type === "accident") {
          return {
            root: refs.accidentCombo,
            button: refs.accidentComboButton,
            text: refs.accidentComboText,
            clear: refs.accidentComboClear,
            panel: refs.accidentComboPanel,
            keyword: refs.accidentKeywordInput,
            list: refs.accidentOptionList,
            select: refs.accidentTypeInput,
            placeholder: "请选择事故类型",
            multiple: true,
          };
        }
        return {
              root: refs.standardCombo,
              button: refs.standardComboButton,
              text: refs.standardComboText,
              clear: refs.standardComboClear,
              panel: refs.standardComboPanel,
              keyword: refs.standardKeywordInput,
              list: refs.standardOptionList,
              select: refs.standardInput,
              placeholder: "请选择点检标准",
              multiple: false,
            };
      }

      function bindComboEvents(type) {
        const combo = getComboRefs(type);
        combo.button.addEventListener("click", () => toggleCombo(type));
        combo.clear.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          clearComboValue(type);
        });
        combo.keyword.addEventListener("input", () => {
          refreshComboOptions(type, { keepKeyword: true });
        });
        combo.keyword.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            closeCombo();
            combo.button.focus();
            return;
          }
          if (event.key !== "Enter") return;
          event.preventDefault();
          const first = combo.list.querySelector("[data-combo-value]");
          if (first) selectComboValue(type, first.dataset.comboValue || "", { close: !combo.multiple });
        });
        combo.list.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          const option = event.target instanceof HTMLElement ? event.target.closest("[data-combo-value]") : null;
          if (!option) return;
          selectComboValue(type, option.dataset.comboValue || "", { close: !combo.multiple });
        });
      }

      function clearComboValue(type) {
        const combo = getComboRefs(type);
        if (combo.multiple) {
          setSelectedOptionValues(combo.select, []);
          combo.keyword.value = "";
          renderAccidentOptions({ selectedValues: [], keepKeyword: false });
        } else {
          combo.select.value = "";
          combo.keyword.value = "";
          if (type === "owner") {
            renderOwnerOptions({ selectedId: "" });
          } else if (type === "standard") {
            renderStandardOptions({ selectedId: "" });
          } else if (type === "package") {
            renderPackageOptions({ selectedValue: "" });
          }
        }
        updateComboDisplay(type);
        closeCombo();
        combo.button.focus();
      }

      function updateComboDisplay(type) {
        const combo = getComboRefs(type);
        let label = "";
        if (combo.multiple) {
          const values = getSelectedOptionValues(combo.select);
          label = values.join("、");
        } else if (type === "owner") {
          const value = String(combo.select.value || "").trim();
          const user = state.users.find((item) => item.userId === value);
          label = user?.name || "";
        } else if (type === "package") {
          label = String(combo.select.value || "").trim();
        } else {
          const value = String(combo.select.value || "").trim();
          label = value ? getStandardLabel(value) : "";
        }
        combo.text.textContent = label || combo.placeholder;
        combo.button.classList.toggle("is-placeholder", !label);
        combo.root.classList.toggle("has-value", Boolean(label));
      }

      function openCombo(type) {
        closeCombo(type);
        const combo = getComboRefs(type);
        state.openCombo = type;
        combo.root.classList.add("is-open");
        combo.panel.classList.remove("hidden");
        renderComboOptionList(type);
        window.setTimeout(() => {
          combo.keyword.focus();
          combo.keyword.select();
        }, 0);
      }

      function closeCombo(exceptType = "") {
        ["standard", "owner", "accident", "package"].forEach((type) => {
          if (type === exceptType) return;
          const combo = getComboRefs(type);
          combo.root.classList.remove("is-open");
          combo.panel.classList.add("hidden");
          if (type === "owner") {
            const user = state.users.find((item) => item.userId === String(combo.select.value || "").trim());
            combo.keyword.value = user?.name || "";
          } else if (type === "standard") {
            combo.keyword.value = getStandardLabel(combo.select.value);
          } else if (type === "package") {
            combo.keyword.value = String(combo.select.value || "").trim();
          } else {
            combo.keyword.value = "";
          }
          renderComboOptionList(type);
          updateComboDisplay(type);
        });
        state.openCombo = exceptType || "";
      }

      function toggleCombo(type) {
        if (state.openCombo === type) {
          closeCombo();
        } else {
          openCombo(type);
        }
      }

      function selectComboValue(type, value, { close = false } = {}) {
        const combo = getComboRefs(type);
        const nextValue = String(value || "").trim();
        if (combo.multiple) {
          toggleSelectedOptionValue(combo.select, nextValue);
          combo.keyword.value = "";
          renderAccidentOptions({ selectedValues: getSelectedOptionValues(combo.select), keepKeyword: true });
        } else {
          combo.select.value = nextValue;
        }
        if (type === "owner") {
          const user = state.users.find((item) => item.userId === combo.select.value);
          combo.keyword.value = user?.name || "";
          renderOwnerOptions({ selectedId: combo.select.value });
        } else if (type === "standard") {
          combo.keyword.value = getStandardLabel(combo.select.value);
          renderStandardOptions({ selectedId: combo.select.value });
        } else if (type === "package") {
          combo.keyword.value = combo.select.value || "";
          renderPackageOptions({ selectedValue: combo.select.value });
        }
        updateComboDisplay(type);
        if (close) {
          closeCombo();
          combo.button.focus();
        }
      }

      function renderStorageLocationOptions(selectedValue = refs.storageLocationInput.value) {
        const selected = normalizeStorageLocationValue(selectedValue);
        const grouped = new Map();
        state.sites.forEach((site) => {
          const area = site.area || "未配置区域";
          if (!grouped.has(area)) {
            grouped.set(area, []);
          }
          grouped.get(area).push(site);
        });

        const options = ['<option value="">请选择存放位置</option>'];
        Array.from(grouped.keys()).sort((a, b) => String(a).localeCompare(String(b), "zh-Hans-CN")).forEach((area) => {
          options.push(`<option value="${escapeHtml(area)}" data-level="1">${escapeHtml(area)}</option>`);
          grouped
            .get(area)
            .filter((site) => String(site.name || "").trim() !== area)
            .sort((a, b) => String(a.name || "").localeCompare(String(b.name || ""), "zh-Hans-CN"))
            .forEach((site) => {
              const label = getSiteDisplayName(site);
              options.push(`<option value="${escapeHtml(label)}" data-level="2">${escapeHtml(label)}</option>`);
            });
        });

        if (selected && !isKnownLocationArea(selected) && !state.sites.some((site) => isSameStorageLocationValue(selected, site))) {
          options.push(`<option value="${escapeHtml(selected)}">${escapeHtml(selected)}（历史值）</option>`);
        }
        refs.storageLocationInput.innerHTML = options.join("");
        refs.storageLocationInput.value = selected || "";
      }

      function mapChemicalRecord(record) {

        const accidentTypeRaw = getAliasRawValue(record, FIELD.accidentType);
        return {
          id: extractRecordId(record),
          code: toDisplayText(getAliasRawValue(record, FIELD.code)),
          name: toDisplayText(getAliasRawValue(record, FIELD.name)),
          status: normalizeStatus(toDisplayText(getAliasRawValue(record, FIELD.status))),
          included: normalizeYesNo(toDisplayText(getAliasRawValue(record, FIELD.included))),
          usageLocation: toDisplayText(getAliasRawValue(record, FIELD.usageLocation)),
          storageLocation: toDisplayText(getAliasRawValue(record, FIELD.storageLocation)),
          maxStorage: toDisplayText(getAliasRawValue(record, FIELD.maxStorage)),
          usageAmount: toDisplayText(getAliasRawValue(record, FIELD.usageAmount)),
          packageForm: toDisplayText(getAliasRawValue(record, FIELD.packageForm)),
          accidentType: toDisplayText(accidentTypeRaw),
          accidentTypeValues: normalizeMultiValue(accidentTypeRaw),
          owner: toDisplayText(ownerRaw),
          ownerId: extractComplexId(ownerRaw),
          standardId: toDisplayText(getAliasRawValue(record, FIELD.standardId)),
          qrCode: toDisplayText(getAliasRawValue(record, FIELD.qrCode)),
          hazardAnalysis: toDisplayText(getAliasRawValue(record, FIELD.hazardAnalysis)),
          remark: toDisplayText(getAliasRawValue(record, FIELD.remark)),
        };

      function renderAll() {
        renderLocationTree();
        renderTable();
        renderActionDisabled();
      }

      function renderLocationTree() {
        const selectedKey = state.selectedLocationKey || "__all__";
        const total = state.records.length;
        const grouped = buildLocationTreeGroups();
        const rootExpanded = isLocationNodeExpanded("__all__");
        const parts = [
          `<div class="tree-root">
          ${renderLocationTreeRow({
            key: "__all__",
            label: "全部地点",
            count: total,
            depth: 0,
            selected: selectedKey === "__all__",
            hasChildren: grouped.length > 0,
            expanded: rootExpanded,
            strong: true,
          })}
          <div class="tree-children">`,
        ];

        if (rootExpanded) {
          grouped.forEach((group) => {
            const groupExpanded = isLocationNodeExpanded(group.areaKey);
            parts.push(
              `<div class="tree-group">
                ${renderLocationTreeRow({
                  key: group.areaKey,
                  label: group.area,
                  count: group.count,
                  depth: 1,
                  selected: selectedKey === group.areaKey,
                  hasChildren: group.sites.length > 0,
                  expanded: groupExpanded,
                  strong: true,
                })}`
            );
            if (groupExpanded) {
              group.sites.forEach((site) => {
                parts.push(
                  renderLocationTreeRow({
                    key: site.key,
                    label: site.name,
                    count: site.count,
                    depth: 2,
                    selected: selectedKey === site.key,
                    hasChildren: false,
                    expanded: false,
                    title: site.name,
                  })
                );
              });
            }
            parts.push("</div>");
          });
        }

        parts.push("</div></div>");
        refs.locationTree.innerHTML = parts.join("");
      }

      function renderLocationTreeRow({ key, label, count, depth, selected, hasChildren, expanded, strong = false, title = "" }) {
        const left = depth * 16 + 4;
        const toggleText = hasChildren ? (expanded ? "▼" : "▶") : "";
        const toggleAttr = hasChildren ? `data-tree-toggle="${escapeHtml(key)}"` : "disabled";
        return `
          <div class="tree-row${selected ? " is-selected" : ""}" style="padding-left:${left}px">
            <button type="button" class="tree-toggle" ${toggleAttr} aria-label="${hasChildren ? "展开或收起" : ""}">${toggleText}</button>
            <button type="button" class="tree-label${strong ? " is-strong" : ""}" data-location-key="${escapeHtml(key)}" title="${escapeHtml(title || label)}">
              <span>${escapeHtml(label)}</span><span class="tree-count">${count}</span>
            </button>
          </div>`;
      }

      function isLocationNodeExpanded(key) {
        return !state.collapsedLocationKeys.has(key);
      }

      function toggleLocationNode(key) {
        if (state.collapsedLocationKeys.has(key)) {
          state.collapsedLocationKeys.delete(key);
        } else {
          state.collapsedLocationKeys.add(key);
        }
        renderLocationTree();
      }

      function buildLocationTreeGroups() {
        const grouped = new Map();
        state.records.forEach((row) => {
          const meta = resolveStorageLocationMeta(row.storageLocation);
          const area = meta.area;
          if (!grouped.has(area)) {
            grouped.set(area, new Map());
          }
          const areaSites = grouped.get(area);
          if (!areaSites.has(meta.key)) {
            areaSites.set(meta.key, meta);
          }
          areaSites.get(meta.key).count += 1;
        });

        return Array.from(grouped.entries()).map(([area, siteMap]) => {
          const areaKey = getAreaKey(area);
          const sortedSites = Array.from(siteMap.values()).sort((a, b) => String(a.name || "").localeCompare(String(b.name || ""), "zh-Hans-CN"));
          const count = sortedSites.reduce((sum, site) => sum + site.count, 0);
          return { area, areaKey, sites: sortedSites, count };
        }).sort((a, b) => {
          if (a.area === b.area) return 0;
          if (a.area === "未归档地点") return 1;
          if (b.area === "未归档地点") return -1;
          return String(a.area || "").localeCompare(String(b.area || ""), "zh-Hans-CN");
        });
      }

      function countRecordsByLocation() {
        const map = new Map();
        state.records.forEach((row) => {
          const key = resolveStorageLocationMeta(row.storageLocation).key;
          map.set(key, (map.get(key) || 0) + 1);
        });
        return map;
      }

      function getChemicalLocationItems() {
        return buildLocationTreeGroups().flatMap((group) =>
          group.sites.map((site) => ({
            ...site,
            area: group.area,
            areaKey: group.areaKey,
          }))
        );
      }

      function ensureSelectedLocationExists() {
        const selectedKey = state.selectedLocationKey || "__all__";
        if (selectedKey === "__all__") return;
        const validKeys = new Set(["__all__"]);
        buildLocationTreeGroups().forEach((group) => {
          validKeys.add(group.areaKey);
          group.sites.forEach((site) => validKeys.add(site.key));
        });
        if (!validKeys.has(selectedKey)) {
          state.selectedLocationKey = "__all__";
        }
      }

      function getPaginationState(filtered) {
        const total = Array.isArray(filtered) ? filtered.length : 0;
        const pageSize = Math.max(1, Number(state.tablePageSize) || 20);
        const pageCount = Math.max(1, Math.ceil(total / pageSize));
        const page = Math.min(Math.max(1, Number(state.tablePage) || 1), pageCount);
        if (state.tablePage !== page) {
          state.tablePage = page;
        }
        const startIndex = total ? (page - 1) * pageSize : 0;
        const endIndex = total ? Math.min(total, startIndex + pageSize) : 0;
        const rows = total ? filtered.slice(startIndex, endIndex) : [];
        return {
          total,
          pageSize,
          pageCount,
          page,
          startIndex,
          endIndex,
          rows,
        };
      }

      function resetTablePage() {
        state.tablePage = 1;
      }

      function renderPagination(pageState) {
        const info = pageState.total
          ? `第 ${pageState.page} / ${pageState.pageCount} 页，显示 ${pageState.startIndex + 1}-${pageState.endIndex} 条`
          : "暂无危化品数据";
        refs.paginationInfo.textContent = info;
        refs.prevPageBtn.disabled = pageState.page <= 1;
        refs.nextPageBtn.disabled = pageState.page >= pageState.pageCount;
        refs.pageSizeSelect.value = String(pageState.pageSize);

        const maxButtons = 7;
        let start = Math.max(1, pageState.page - Math.floor(maxButtons / 2));
        let end = Math.min(pageState.pageCount, start + maxButtons - 1);
        start = Math.max(1, end - maxButtons + 1);

        const buttons = [];
        for (let page = start; page <= end; page += 1) {
          buttons.push(`
            <button
              class="btn pagination-page-btn${page === pageState.page ? " is-current" : ""}"
              type="button"
              data-page="${page}"
              aria-current="${page === pageState.page ? "page" : "false"}"
            >${page}</button>
          `);
        }
        refs.pageButtons.innerHTML = buttons.join("");
      }

      function renderTable() {
        const rows = filterRecords();

        const pageRows = pageState.rows;
        refs.tableBody.innerHTML = "";
        if (!pageRows.length) {
          refs.tableBody.innerHTML = '<tr><td colspan="10" class="empty">暂无危化品数据</td></tr>';
        } else {
          pageRows.forEach((row) => {
            const tr = document.createElement("tr");

              <td>${escapeHtml(row.maxStorage || "-")}</td>
              <td>${escapeHtml(row.packageForm || "-")}</td>

      function renderDetailReadonlyField(label, value) {

      function filterRecords() {
        const keyword = state.keyword.trim().toLowerCase();
        const locationKey = state.selectedLocationKey || "__all__";
        return state.records.filter((row) => {
          if (state.status && normalizeStatus(row.status) !== state.status) return false;
          if (locationKey !== "__all__") {
            const locationMeta = resolveStorageLocationMeta(row.storageLocation);
            if (locationKey.startsWith("area:")) {
              if (locationMeta.areaKey !== locationKey) return false;
            } else if (locationMeta.key !== locationKey) {
              return false;
            }
          }
          if (!keyword) return true;
          const text = [
            row.code,
            row.name,
            row.usageLocation,
            row.storageLocation,
            row.maxStorage,
            row.usageAmount,
            row.packageForm,
            row.accidentType,
            row.owner,
            row.hazardAnalysis,
            row.remark,
          ]
            .join(" ")
            .toLowerCase();
          return text.includes(keyword);
        });

      async function saveForm() {
        const current = getSelectedRecord();
        const payload = collectFormPayload();
        const previousStorageLocation = current?.storageLocation || "";
        if (!payload[FIELD.name]) {
          showToast("请填写危化品名称");
          return;
        }
        setLoading(true);
        setStatus("正在保存危化品...");
        try {
          if (state.formMode === "edit") {
            if (!current) throw new Error("缺少记录ID");
            await updateRecord(API_CONFIG.chemicalEntryId, current.id, payload);
            await syncStandardsForStorageLocations([previousStorageLocation, payload[FIELD.storageLocation]], payload[FIELD.standardId]);
            closeForm();
            await refreshAll({ preserveSelection: true });
            showToast("已更新");
          } else {
            const result = await requestEntry(API_CONFIG.chemicalEntryId, "data_create", { data: payload }, "POST");
            const createdId = extractRecordId(result?.data || result);
            if (createdId && !payload[FIELD.qrCode]) {
              await updateRecord(API_CONFIG.chemicalEntryId, createdId, {
                [FIELD.qrCode]: createdId,
              });
              state.selectedId = createdId;
            }
            await syncStandardsForStorageLocations([payload[FIELD.storageLocation]], payload[FIELD.standardId]);
            closeForm();
            await refreshAll({ preserveSelection: true });
            showToast("已新增");
          }
        } catch (error) {
          setStatus(`保存失败：${error.message}`, true);
          showToast(`保存失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

          [FIELD.status]: refs.statusInput.value.trim() || "启用",
          [FIELD.included]: refs.includedInput.value.trim() || "否",
          [FIELD.standardId]: refs.standardInput.value.trim(),
          [FIELD.qrCode]: refs.qrInput.value.trim(),
          [FIELD.usageLocation]: refs.usageLocationInput.value.trim(),
          [FIELD.storageLocation]: normalizeStorageLocationValue(refs.storageLocationInput.value),
          [FIELD.maxStorage]: sanitizeNonNegativeText(refs.maxStorageInput.value).trim(),
          [FIELD.usageAmount]: sanitizeNonNegativeText(refs.usageAmountInput.value).trim(),
          [FIELD.packageForm]: refs.packageFormInput.value.trim(),
          [FIELD.accidentType]: getSelectedOptionValues(refs.accidentTypeInput),

        } finally {
          setLoading(false);
        }

        return getRecordById(state.selectedId);
      }

      function getRecordById(recordId) {
        return state.records.find((item) => item.id === recordId) || null;
      }

      function getStandardLabel(standardId) {
        const id = String(standardId || "").trim();
        if (!id) return "";
        const standard = state.standards.find((item) => item.id === id);
        return standard ? standard.name : id;
      }

      async function syncStandardsForStorageLocations(locations, explicitStandardId = "") {
        const ids = new Set();
        const explicit = String(explicitStandardId || "").trim();
        if (explicit) {
          ids.add(explicit);
        }
        (Array.isArray(locations) ? locations : [locations]).forEach((location) => {
          findStandardsByStorageLocation(location).forEach((standard) => ids.add(standard.id));
        });

        if (!ids.size) {
          return 0;
        }

        let synced = 0;
        for (const standardId of ids) {
          try {
            await requestApi(
              "/rule-config/sync-standard-tasks",
              {},
              {
                method: "POST",
                body: { standardId },
              }
            );
            synced += 1;
          } catch (error) {
            console.warn("sync chemical standard tasks failed:", standardId, error && error.message ? error.message : error);
          }
        }
        return synced;
      }

      function findStandardsByStorageLocation(storageLocation) {
        const location = normalizeCompareText(storageLocation);
        if (!location) {
          return [];
        }
        return state.standards.filter((standard) => {
          if (normalizeApplicableDeviceType(standard.applicableDeviceType) !== "危化品") {
            return false;
          }
          if (normalizeStatus(standard.status) !== "启用") {
            return false;
          }
          return splitLinkedRangeTexts(standard.linkedDeviceRange).some((item) => {
            const target = normalizeCompareText(item);
            return target && (target === location || target.includes(location) || location.includes(target));
          });
        });
      }

      function splitLinkedRangeTexts(value) {
        return toDisplayText(value)
          .split(/[、,，;；\n\r]+/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function normalizeMultiValue(value) {
        if (Array.isArray(value)) {
          return value.map((item) => toDisplayText(item).trim()).filter(Boolean);
        }
        return toDisplayText(value)
          .split(/[、,，;；\n\r]+/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function getSelectedOptionValues(select) {
        return Array.from(select?.selectedOptions || [])
          .map((option) => String(option.value || "").trim())
          .filter(Boolean);
      }

      function setSelectedOptionValues(select, values) {
        const selected = new Set(normalizeMultiValue(values));
        Array.from(select?.options || []).forEach((option) => {
          option.selected = selected.has(option.value);
        });
      }

      function toggleSelectedOptionValue(select, value) {
        if (!select || !value) return;
        const values = new Set(getSelectedOptionValues(select));
        if (values.has(value)) {
          values.delete(value);
        } else {
          values.add(value);
        }
        setSelectedOptionValues(select, Array.from(values));
      }

      function ensureChemicalQr(row) {
        const site = getSiteByStorageLocation(row?.storageLocation);
        const qrCode = buildLocationScanValue(site || {
          code: row?.qrCode,
          name: row?.storageLocation || row?.code || row?.id,
        });
        return {
          qrCode,
          reportLink: buildReportLink(qrCode),
        };
      }

      function buildLocationScanValue(site) {
        const code = toDisplayText(site?.code);
        const name = toDisplayText(site?.name);
        return code || name;
      }

      function buildQrImageUrl(content, size = 320) {
        const text = toDisplayText(content);
        if (!text) return "";
        return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}`;
      }

      function buildReportLink(scanValue) {
        const text = toDisplayText(scanValue);
        const relative = text ? `inspection-report.html?scan=${encodeURIComponent(text)}` : "inspection-report.html";
        const publicBase = getReportBaseUrl();
        if (publicBase) {
          try {
            return new URL(relative, publicBase).toString();
          } catch {
            // Fall through to current-page resolution.
          }
        }
        if (window.location.protocol === "http:" || window.location.protocol === "https:") {
          return toAbsoluteUrl(relative);
        }
        return relative;
      }

      function getReportBaseUrl() {
        const publicBase = String(state.publicBaseUrl || "").trim();
        if (publicBase) {
          return publicBase.endsWith("/") ? publicBase : `${publicBase}/`;
        }
        if (window.location.protocol === "http:" || window.location.protocol === "https:") {
          return `${window.location.origin}/`;
        }
        try {
          const apiUrl = new URL(API_CONFIG.baseUrl || resolveApiBaseUrl());
          apiUrl.pathname = apiUrl.pathname.replace(/\/api(?:\/.*)?$/, "/") || "/";
          apiUrl.search = "";
          apiUrl.hash = "";
          return apiUrl.toString();
        } catch {
          return "";
        }
      }

      function toAbsoluteUrl(url) {
        try {
          return new URL(url, window.location.href).toString();
        } catch {
          return url;
        }
      }

      function formatPrintDateTime(date) {
        const pad = (value) => String(value).padStart(2, "0");
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
      }

      function exportCsv() {
        const rows = filterRecords();
        const headers = [
          "危化品编号",
          "危化品名称",
          "状态",
          "是否纳入点检",
          "使用地点",
          "存放位置",
          "最大存放量",
          "使用量",
          "包装形式",
          "事故类型",
          "责任人",
          "点检标准ID",
          "二维码",
          "主要危险有害性辨识分析",
          "备注",
        ];
        const body = rows.map((row) => [
          row.code,
          row.name,
          row.status,
          row.included,
          row.usageLocation,
          row.storageLocation,
          row.maxStorage,
          row.usageAmount,
          row.packageForm,
          row.accidentType,
          row.owner,
          row.standardId,
          ensureChemicalQr(row).qrCode,
          row.hazardAnalysis,
          row.remark,
        ]);
        const csv = [headers, ...body].map((line) => line.map(escapeCsvCell).join(",")).join("\n");
        const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        const dateTag = new Date().toISOString().slice(0, 10).replace(/-/g, "");
        link.href = url;
        link.download = `危化品台账_${dateTag}.csv`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function escapeCsvCell(value) {
        const text = String(value ?? "");
        if (/[",\n\r]/.test(text)) {
          return `"${text.replace(/"/g, '""')}"`;
        }
        return text;
      }

      async function importCsvFile(file) {
        if (!file) return;
        setLoading(true);
        setStatus("正在导入危化品 CSV...");
        try {
          const text = await file.text();
          const rows = parseCsv(text);
          if (rows.length < 2) {
            throw new Error("CSV 内容为空");
          }
          const headers = rows[0].map((item) => item.trim());
          let created = 0;
          for (const row of rows.slice(1)) {
            const source = {};
            headers.forEach((header, index) => {
              source[header] = row[index] || "";
            });
            if (!String(source["危化品名称"] || "").trim()) {
              continue;
            }
            await requestEntry(API_CONFIG.chemicalEntryId, "data_create", {
              data: buildImportPayload(source),
            }, "POST");
            created += 1;
          }
          await refreshAll({ preserveSelection: true });
          showToast(`导入完成：${created} 条`);
        } catch (error) {
          setStatus(`导入失败：${error.message}`, true);
          showToast(`导入失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      function buildImportPayload(source) {
        return {
          [FIELD.name]: source["危化品名称"] || "",
          [FIELD.status]: normalizeStatus(source["状态"] || "启用"),
          [FIELD.included]: normalizeYesNo(source["是否纳入点检"] || "是"),
          [FIELD.usageLocation]: source["使用地点"] || "",
          [FIELD.storageLocation]: source["存放位置"] || "",
          [FIELD.maxStorage]: source["最大存放量"] || "",
          [FIELD.usageAmount]: source["使用量"] || "",
          [FIELD.packageForm]: source["包装形式"] || "",
          [FIELD.accidentType]: normalizeMultiValue(source["事故类型"] || ""),
          [FIELD.owner]: null,
          [FIELD.standardId]: resolveStandardId(source["点检标准ID"] || source["点检标准"] || ""),
          [FIELD.qrCode]: source["二维码"] || "",
          [FIELD.hazardAnalysis]: source["主要危险有害性辨识分析"] || "",
          [FIELD.remark]: source["备注"] || "",
        };
      }

      function resolveStandardId(value) {
        const text = String(value || "").trim();
        if (!text) return "";
        const matched = state.standards.find((item) => item.id === text || item.code === text || item.name === text || `${item.name}（${item.code}）` === text);
        return matched ? matched.id : text;
      }

      function parseCsv(text) {
        const rows = [];
        let row = [];
        let cell = "";
        let inQuotes = false;
        const source = String(text || "").replace(/^\ufeff/, "");
        for (let i = 0; i < source.length; i += 1) {
          const char = source[i];
          const next = source[i + 1];
          if (inQuotes) {
            if (char === '"' && next === '"') {
              cell += '"';
              i += 1;
            } else if (char === '"') {
              inQuotes = false;
            } else {
              cell += char;
            }
            continue;
          }
          if (char === '"') {
            inQuotes = true;
            continue;
          }
          if (char === ",") {
            row.push(cell);
            cell = "";
            continue;
          }
          if (char === "\n") {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
            continue;
          }
          if (char === "\r") {
            continue;
          }
          cell += char;
        }
        row.push(cell);
        if (row.some((item) => String(item || "").trim())) rows.push(row);
        return rows;
      }

      function renderActionDisabled() {
        refs.addBtn.disabled = state.loading;
        refs.printCurrentLocationQrBtn.disabled = state.loading;
        refs.importBtn.disabled = state.loading;

      function setStatus(message, isError = false) {

        refs.statusBar.classList.toggle("error", Boolean(isError));

      function showToast(message) {
