      function normalizeExecuteMode(value) {
        const text = toDisplayText(value);
        if (!text) {
          return "普通";
        }
        if (text.includes("抄") || text.includes("步")) {
          return "抄表";
        }
        if (text.includes("状态")) {
          return "状态";
        }
        return "普通";
      }

      function defaultStandardByMode(mode) {
        const normalized = normalizeExecuteMode(mode);
        if (normalized === "抄表") {
          return "数值录入";
        }
        if (normalized === "状态") {
          return "";
        }
        return "正常,异常";
      }

      function defaultJudgeByMode(mode) {
        const normalized = normalizeExecuteMode(mode);
        if (normalized === "普通") {
          return "正常,异常";
        }
        return "";
      }

      function splitStateOptions(text) {
        const source = String(text || "")
          .replace(/，/g, ",")
          .trim();
        if (!source) {
          return [];
        }
        const output = [];
        const seen = new Set();
        source
          .split(",")
          .map((item) => item.trim())
          .filter(Boolean)
          .forEach((item) => {
            if (!seen.has(item)) {
              seen.add(item);
              output.push(item);
            }
          });
        return output;
      }

      function parseNumericRange(text) {
        const source = normalizeNumericJudgeExpression(text);
        if (!source) {
          return null;
        }

        const betweenMatch = source.match(/^(-?\d+(?:\.\d+)?)\s*(?:-|至|到)\s*(-?\d+(?:\.\d+)?)$/);
        if (betweenMatch) {
          let min = Number(betweenMatch[1]);
          let max = Number(betweenMatch[2]);
          if (!Number.isFinite(min) || !Number.isFinite(max)) {
            return null;
          }
          if (min > max) {
            const temp = min;
            min = max;
            max = temp;
          }
          return {
            min,
            max,
            includeMin: true,
            includeMax: true,
            text: `${formatNumeric(min)}-${formatNumeric(max)}`,
          };
        }

        const comparatorMatch = source.match(/^(>=|<=|>|<|=)\s*(-?\d+(?:\.\d+)?)$/);
        if (comparatorMatch) {
          const operator = comparatorMatch[1];
          const value = Number(comparatorMatch[2]);
          if (!Number.isFinite(value)) {
            return null;
          }
          if (operator === ">=" || operator === ">") {
            return {
              min: value,
              max: null,
              includeMin: operator === ">=",
              includeMax: true,
              text: `${operator}${formatNumeric(value)}`,
            };
          }
          if (operator === "<=" || operator === "<") {
            return {
              min: null,
              max: value,
              includeMin: true,
              includeMax: operator === "<=",
              text: `${operator}${formatNumeric(value)}`,
            };
          }
          return {
            min: value,
            max: value,
            includeMin: true,
            includeMax: true,
            text: formatNumeric(value),
          };
        }

        if (/^-?\d+(?:\.\d+)?$/.test(source)) {
          const exact = Number(source);
          if (!Number.isFinite(exact)) {
            return null;
          }
          return {
            min: exact,
            max: exact,
            includeMin: true,
            includeMax: true,
            text: formatNumeric(exact),
          };
        }

        return null;
      }

      function normalizeNumericJudgeExpression(text) {
        let source = String(text || "")
          .replace(/[＞]/g, ">")
          .replace(/[＜]/g, "<")
          .replace(/[＝]/g, "=")
          .replace(/≥/g, ">=")
          .replace(/≤/g, "<=")
          .replace(/[～~—–]/g, "-")
          .replace(/，/g, ",")
          .replace(/\s+/g, "")
          .trim();

        if (!source) {
          return "";
        }

        const suffixMin = source.match(/^(-?\d+(?:\.\d+)?)(?:及以上|以上)$/);
        if (suffixMin) {
          return `>=${suffixMin[1]}`;
        }
        const suffixMax = source.match(/^(-?\d+(?:\.\d+)?)(?:及以下|以下)$/);
        if (suffixMax) {
          return `<=${suffixMax[1]}`;
        }

        return source
          .replace(/大于等于|不小于|不少于|不低于/g, ">=")
          .replace(/小于等于|不大于|不超过|不高于/g, "<=")
          .replace(/大于|高于|超过/g, ">")
          .replace(/小于|低于/g, "<")
          .replace(/等于/g, "=");
      }

      function formatNumeric(value) {
        if (Number.isInteger(value)) {
          return String(value);
        }
        return String(value).replace(/0+$/, "").replace(/\.$/, "");
      }

      function deriveDetailByMode(detail) {
        const mode = normalizeExecuteMode(detail.executeMode || detail.method || "普通");
        const normalized = {
          ...detail,
          executeMode: mode,
          inspectType: String(detail.inspectType || "日常点检").trim() || "日常点检",
          part: String(detail.part || "").trim(),
          item: String(detail.item || "").trim(),
          unit: String(detail.unit || "").trim(),
          standard: String(detail.standard || detail.content || "").trim(),
          standardText: String(detail.standardText || detail.judge || "").trim(),
          remark: String(detail.remark || "").trim(),
          no: toIntOrDefault(detail.no, 1),
          sortNo: toIntOrDefault(detail.sortNo || detail.no, toIntOrDefault(detail.no, 1)),
          enabledStatus: "启用",
        };

        if (mode === "普通") {
          normalized.standard = "正常,异常";
          normalized.standardText = "正常,异常";
          if (!normalized.unit) {
            normalized.unit = "-";
          }
          return normalized;
        }

        if (mode === "状态") {
          const options = splitStateOptions(normalized.standard || normalized.standardText);
          const joined = options.join(",");
          normalized.standard = joined;
          normalized.standardText = joined;
          if (!normalized.unit) {
            normalized.unit = "-";
          }
          return normalized;
        }

        normalized.standard = "数值录入";
        const range = parseNumericRange(normalized.standardText);
        if (range) {
          normalized.standardText = range.text;
          normalized.lower = range.min !== null ? range.min : "";
          normalized.upper = range.max !== null ? range.max : "";
        } else {
          normalized.lower = "";
          normalized.upper = "";
        }
        return normalized;
      }

      function normalizeInlineDraftByMode(draft, { trigger = "" } = {}) {
        const mode = normalizeExecuteMode(draft.executeMode || "普通");
        const next = {
          ...draft,
          executeMode: mode,
          inspectType: draft.inspectType || "日常点检",
          no: toIntOrDefault(draft.no, 1),
          enabledStatus: "启用",
        };
        next.sortNo = toIntOrDefault(next.sortNo || next.no, next.no);

        if (trigger === "executeMode") {
          if (mode === "状态" && ["正常,异常", "数值录入"].includes(String(next.standard || "").trim())) {
            next.standard = "";
            next.standardText = "";
          }
          if (mode === "抄表") {
            next.standard = "数值录入";
            if (String(next.standardText || "").trim() === "正常,异常") {
              next.standardText = "";
            }
            if (String(next.unit || "").trim() === "-") {
              next.unit = "";
            }
          }
        }

        if (mode === "普通") {
          next.standard = "正常,异常";
          next.standardText = "正常,异常";
          if (!String(next.unit || "").trim()) {
            next.unit = "-";
          }
          return next;
        }

        if (mode === "状态") {
          const source = trigger === "standardText" ? next.standardText : next.standard || next.standardText;
          const options = splitStateOptions(source);
          if (options.length) {
            const joined = options.join(",");
            next.standard = joined;
            next.standardText = joined;
          }
          if (!String(next.unit || "").trim()) {
            next.unit = "-";
          }
          return next;
        }

        next.standard = "数值录入";
        const range = parseNumericRange(next.standardText);
        if (range) {
          next.standardText = range.text;
        }
        return next;
      }

      function setStatus(message, isError = false) {

      async function fetchEntryRecords(entryId) {
        const actionCandidates = ["data", "data_search", "data_list"];
        const payloadCandidates = [
          { page: 1, limit: 1000 },
          { page_no: 1, page_size: 1000 },
          { limit: 1000 },
          {},
        ];

        const errors = [];

        for (const action of actionCandidates) {
          for (const payload of payloadCandidates) {
            try {
              const response = await requestEntry(entryId, action, payload, "POST");
              const records = extractRecordArray(response);
              if (Array.isArray(records)) {
                return records;
              }
            } catch (error) {
              errors.push(`${action}(${JSON.stringify(payload)}): ${error.message}`);
            }
          }
        }

        throw new Error(errors[errors.length - 1] || "未能获取列表数据");
      }

      async function updateRecord(entryId, dataId, data) {
        if (!dataId) {
          throw new Error("缺少 data_id");
        }
        await requestEntry(entryId, "data_update", { data_id: dataId, data }, "POST");
      }

      async function requestApi(path, query = {}, options = {}) {
        const url = new URL(`${API_CONFIG.baseUrl}${path}`);
        Object.entries(query || {}).forEach(([key, value]) => {
          if (value === undefined || value === null || value === "") {
            return;
          }
          url.searchParams.set(key, String(value));
        });

        let response;
        const method = String(options.method || "GET").toUpperCase();
        try {
          response = await fetch(url.toString(), {
            method,
            headers: {
              "Content-Type": "application/json",
            },
            ...(method === "GET" || method === "HEAD"
              ? {}
              : {
                  body: JSON.stringify(options.body || {}),
                }),
          });
        } catch (error) {
          throw new Error(`网络请求失败：${error.message}`);
        }

        const text = await response.text();
        const result = safeJsonParse(text);

        if (!response.ok) {
          const detail = extractApiMessage(result) || text || `HTTP ${response.status}`;
          throw new Error(detail);
        }

        if (!isApiSuccess(result)) {
          const detail = extractApiMessage(result) || "接口返回失败";
          throw new Error(detail);
        }

        return result;
      }

      async function requestEntry(entryId, action, body = {}, method = "POST") {
        const url = `${API_CONFIG.baseUrl}/app/${API_CONFIG.appId}/entry/${entryId}/${action}`;

        const headers = {
          "Content-Type": "application/json",
        };

        const options = {
          method,
          headers,
        };

        if (method !== "GET") {
          options.body = JSON.stringify(body || {});
        }

        let response;
        try {
          response = await fetch(url, options);
        } catch (error) {
          throw new Error(`网络请求失败：${error.message}`);
        }

        const text = await response.text();
        const result = safeJsonParse(text);

        if (!response.ok) {
          const detail = extractApiMessage(result) || text || `HTTP ${response.status}`;
          throw new Error(detail);
        }

        if (!isApiSuccess(result)) {
          const detail = extractApiMessage(result) || "接口返回失败";
          throw new Error(detail);
        }

        return result;
      }

      function extractRecordArray(result) {
        const queue = [result];
        const visited = new Set();

        while (queue.length) {
          const current = queue.shift();
          if (!current || typeof current !== "object") {
            continue;
          }
          if (visited.has(current)) {
            continue;
          }
          visited.add(current);

          if (Array.isArray(current)) {
            if (!current.length || typeof current[0] === "object") {
              return current;
            }
            continue;
          }

          const keys = ["data_list", "data", "list", "rows", "items", "result", "records", "entry_data_list"];
          for (const key of keys) {
            const value = current[key];
            if (Array.isArray(value) && (!value.length || typeof value[0] === "object")) {
              return value;
            }
            const fromObjectValues = objectValuesAsObjectArray(value);
            if (fromObjectValues) {
              return fromObjectValues;
            }
          }

          const topFromValues = objectValuesAsObjectArray(current);
          if (topFromValues && topFromValues.length) {
            return topFromValues;
          }

          Object.values(current).forEach((value) => {
            if (value && typeof value === "object") {
              queue.push(value);
            }
          });
        }

        return [];
      }

      function objectValuesAsObjectArray(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          return null;
        }
        const values = Object.values(value);
        if (!values.length) {
          return [];
        }
        return values.every((item) => item && typeof item === "object") ? values : null;
      }

      function extractRecordId(record) {
        if (!record || typeof record !== "object") {
          return "";
        }

        const candidates = [
          record.data_id,
          record.id,
          record._id,
          record.entry_data_id,
          record.record_id,
          record.row_id,
          record.data && record.data._id,
          record.data && record.data.id,
          record.data && record.data.data_id,
        ];

        for (const value of candidates) {
          if (value !== undefined && value !== null && String(value).trim() !== "") {
            return String(value);
          }
        }

        return "";
      }

      function getAliasRawValue(record, alias) {
        if (!record || !alias) {
          return "";
        }

        const containers = [record, record.data, record.entry_data, record.widget_data, record.form_data];
        for (const container of containers) {
          if (container && typeof container === "object" && Object.prototype.hasOwnProperty.call(container, alias)) {
            return container[alias];
          }
        }

        const fromWidgets = findAliasInArray(record.widgets, alias);
        if (fromWidgets !== undefined) {
          return fromWidgets;
        }

        const fromDataArray = findAliasInArray(record.data, alias);
        if (fromDataArray !== undefined) {
          return fromDataArray;
        }

        return "";
      }

      function findAliasInArray(list, alias) {
        if (!Array.isArray(list)) {
          return undefined;
        }
        for (const item of list) {
          if (!item || typeof item !== "object") {
            continue;
          }
          const key = item.alias || item.widget_alias || item.name || item.key || item.widget_key;
          if (key === alias) {
            return item.value ?? item.widget_value ?? item.data ?? item;
          }
        }
        return undefined;
      }

      function toDisplayText(value) {
        if (value === null || value === undefined) {
          return "";
        }

        if (typeof value === "string" || typeof value === "number" || typeof value === "boolean") {
          return String(value).trim();
        }

        if (Array.isArray(value)) {
          return value
            .map((item) => toDisplayText(item))
            .filter(Boolean)
            .join("、");
        }

        if (typeof value === "object") {
          if (typeof value.display_name === "string") {
            return value.display_name.trim();
          }
          if (typeof value.name === "string") {
            return value.name.trim();
          }
          if (typeof value.label === "string") {
            return value.label.trim();
          }
          if (typeof value.title === "string") {
            return value.title.trim();
          }
          if (typeof value.value === "string" || typeof value.value === "number") {
            return String(value.value).trim();
          }
          return Object.values(value)
            .map((item) => toDisplayText(item))
            .filter(Boolean)
            .join("、");
        }

        return "";
      }

      function normalizeDateInput(value) {
        const text = toDisplayText(value);
        if (!text) {
          return "";
        }
        const match = text.match(/(\d{4})\s*[-/.年]\s*(\d{1,2})\s*[-/.月]\s*(\d{1,2})\s*日?/);
        if (!match) {
          return "";
        }
        const year = match[1];
        const month = match[2].padStart(2, "0");
        const day = match[3].padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function formatDateTimeForApi(dateText) {
        const normalized = normalizeDateInput(dateText);
        if (!normalized) {
          return "";
        }
        return `${normalized} 00:00:00`;
      }

      function normalizeStatus(value) {
        const text = toDisplayText(value);
        if (!text) {
          return "启用";
        }
        if (text.includes("停") || text.toLowerCase() === "disabled" || text === "0") {
          return "停用";
        }
        return "启用";
      }

      function normalizeYesNo(value) {
        const text = toDisplayText(value);
        if (!text) {
          return "否";
        }
        if (text === "是" || text === "1" || text.toLowerCase() === "yes" || text.toLowerCase() === "true") {
          return "是";
        }
        return "否";
      }

      function normalizeCompareText(value) {
        return toDisplayText(value).replace(/\s+/g, "").toLowerCase();
      }

      function safeJsonParse(text) {
        if (!text) {
          return null;
        }
        try {
          return JSON.parse(text);
        } catch {
          return null;
        }
      }

      function isApiSuccess(result) {
        if (!result || typeof result !== "object") {
          return true;
        }

        const code = result.code ?? result.status ?? result.errcode ?? result.error_code;
        if (code !== undefined && code !== null && code !== "") {
          const numeric = Number(code);
          if ([0, 1, 200].includes(numeric)) {
            return true;
          }
          const text = String(code).trim().toLowerCase();
          if (["ok", "success", "true"].includes(text)) {
            return true;
          }
          return false;
        }

        if (result.success === false || result.ok === false) {
          return false;
        }

        return true;
      }

      function extractApiMessage(result) {
        if (!result || typeof result !== "object") {
          return "";
        }
        const candidates = [
          result.msg,
          result.message,
          result.error,
          result.error_msg,
          result.errmsg,
          result.detail,
          result.data && (result.data.msg || result.data.message || result.data.error || result.data.error_msg),
        ];

        for (const item of candidates) {
          if (typeof item === "string" && item.trim()) {
            return item.trim();
          }
        }

        return "";
      }

      function cleanupSelection(selectionSet, validIds) {
        const valid = new Set(validIds);
        Array.from(selectionSet).forEach((id) => {
          if (!valid.has(id)) {
            selectionSet.delete(id);
          }
        });
      }

      function syncCheckAll(checkAllInput, rows, selectedSet) {
        if (!rows.length) {
          checkAllInput.checked = false;
          checkAllInput.indeterminate = false;
          return;
        }

        const selectedCount = rows.filter((row) => selectedSet.has(row.id)).length;
        checkAllInput.checked = selectedCount === rows.length;
        checkAllInput.indeterminate = selectedCount > 0 && selectedCount < rows.length;
      }

      function unique(values) {
        const output = [];
        const seen = new Set();
        values.forEach((value) => {
          const text = toDisplayText(value);
          if (!text || seen.has(text)) {
            return;
          }
          seen.add(text);
          output.push(text);
        });
        return output;
      }

      function deepClone(value) {
        try {
          return JSON.parse(JSON.stringify(value));
        } catch {
          return value;
        }
      }

      function toIntOrDefault(value, fallback) {
        const num = Number(value);
        if (Number.isFinite(num)) {
          return Math.max(0, Math.trunc(num));
        }
        return fallback;
      }

      function formatTime(date) {
        const d = date instanceof Date ? date : new Date();
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        const ss = String(d.getSeconds()).padStart(2, "0");
        return `${hh}:${mm}:${ss}`;
      }

      function uid(prefix) {
        return `${prefix}_${Math.random().toString(36).slice(2, 10)}`;
      }

      function escapeHtml(value) {
        const text = String(value ?? "");
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
    </script>
  </body>
</html>
