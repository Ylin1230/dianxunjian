<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>相关方入场培训</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --panel: #ffffff;
        --line: #d7deea;
        --line-soft: #e5ebf4;
        --text: #1f2a3a;
        --minor: #6f7d93;
        --primary: #2c79ea;
        --danger: #d24b4b;
        --success: #1e8750;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.45 "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      }

      .page {
        max-width: 1600px;
        margin: 0 auto;
        padding: 12px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 12px;
        min-height: calc(100vh - 24px);
      }

      .panel {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 6px;
        overflow: hidden;
      }

      .left-panel {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
      }

      .right-panel {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
      }

      .panel-head {
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1,
      h2,
      h3 {
        margin: 0;
      }

      h1 {
        font-size: 18px;
      }

      .minor {
        color: var(--minor);
        font-size: 12px;
      }

      .toolbar {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line-soft);
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 8px;
        align-items: center;
      }

      .toolbar.right-tools {
        grid-template-columns: minmax(0, 1fr) auto auto auto;
      }

      .record-toolbar {
        grid-template-columns: auto minmax(280px, 1fr);
        gap: 12px;
      }

      .panel-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .record-toolbar .panel-actions {
        justify-content: flex-start;
      }

      .record-filter-group {
        width: min(820px, 100%);
        justify-self: end;
        display: grid;
        grid-template-columns: minmax(280px, 1fr) auto auto;
        gap: 8px;
        align-items: center;
      }

      .btn {
        height: 32px;
        padding: 0 12px;
        border: 1px solid #b7c4d8;
        background: #fff;
        color: #30445f;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
      }

      .btn:hover:not(:disabled) {
        border-color: #97aacc;
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn.primary {
        border-color: var(--primary);
        background: var(--primary);
        color: #fff;
      }

      .btn.danger {
        color: var(--danger);
        border-color: #efb9b9;
        background: #fff8f8;
      }

      .input,
      .select,
      .textarea {
        width: 100%;
        border: 1px solid #cad3e1;
        border-radius: 4px;
        background: #fff;
        color: var(--text);
        font-size: 13px;
      }

      .input,
      .select {
        height: 32px;
        padding: 0 8px;
      }

      .date-field {
        position: relative;
      }

      .date-display-input {
        padding-right: 36px;
        cursor: pointer;
        font-variant-numeric: tabular-nums;
      }

      .date-field-icon {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: #6f7d93;
        pointer-events: none;
      }

      .date-field:focus-within .date-field-icon,
      .date-field:hover .date-field-icon {
        color: #2c79ea;
      }

      .date-field-icon svg {
        width: 16px;
        height: 16px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .date-native-input {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        pointer-events: none;
      }

      .textarea {
        min-height: 76px;
        padding: 8px;
        resize: vertical;
      }

      .input:focus,
      .select:focus,
      .textarea:focus {
        outline: none;
        border-color: #89afe8;
        box-shadow: 0 0 0 3px rgba(44, 121, 234, 0.14);
      }

      .native-select-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .select-proxy {
        position: relative;
      }

      .select-proxy-button {
        width: 100%;
        min-height: 32px;
        border: 1px solid #cad3e1;
        border-radius: 4px;
        background: #fff;
        color: var(--text);
        padding: 0 30px 0 8px;
        font: inherit;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        position: relative;
      }

      .select-proxy.has-value .select-proxy-button {
        padding-right: 42px;
      }

      .select-proxy-button::after {
        content: "";
        position: absolute;
        right: 10px;
        top: 50%;
        width: 7px;
        height: 7px;
        border-right: 1px solid #65758c;
        border-bottom: 1px solid #65758c;
        transform: translateY(-65%) rotate(45deg);
      }

      .select-proxy.has-value .select-proxy-button::after {
        display: none;
      }

      .select-proxy-clear {
        position: absolute;
        right: 9px;
        top: 50%;
        z-index: 3;
        width: 18px;
        height: 18px;
        min-height: 18px;
        border: 0;
        border-radius: 999px;
        background: #cbd4e2;
        color: #fff;
        padding: 0;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transform: translateY(-50%);
      }

      .select-proxy-clear::before,
      .select-proxy-clear::after {
        content: "";
        position: absolute;
        width: 9px;
        height: 1.5px;
        border-radius: 999px;
        background: currentColor;
      }

      .select-proxy-clear::before {
        transform: rotate(45deg);
      }

      .select-proxy-clear::after {
        transform: rotate(-45deg);
      }

      .select-proxy.has-value .select-proxy-clear {
        display: inline-flex;
      }

      .select-proxy-clear:hover {
        background: #b9c3d3;
      }

      .select-proxy-button span {
        display: block;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .select-proxy-button:focus,
      .select-proxy.is-open .select-proxy-button {
        outline: none;
        border-color: #89afe8;
        box-shadow: 0 0 0 3px rgba(44, 121, 234, 0.14);
      }

      .select-proxy-panel {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(100% + 4px);
        z-index: 90;
        max-height: 260px;
        overflow: auto;
        padding: 4px;
        border: 1px solid #9fb2cb;
        border-radius: 6px;
        background: #fff;
        box-shadow: 0 10px 24px rgba(27, 48, 78, 0.16);
      }

      .select-proxy-panel.hidden {
        display: none;
      }

      .select-proxy-option {
        width: 100%;
        min-height: 28px;
        border: 0;
        border-radius: 3px;
        background: transparent;
        color: var(--text);
        display: block;
        padding: 5px 8px 5px 24px;
        text-align: left;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        line-height: 1.4;
        position: relative;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .select-proxy-option:hover,
      .select-proxy-option.is-selected {
        background: #edf4ff;
        color: #195bb5;
      }

      .select-proxy-option.is-selected::before {
        content: "✓";
        position: absolute;
        left: 8px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--primary);
        font-weight: 700;
      }

      .list-wrap {
        overflow: auto;
        padding: 6px;
      }

      .record-item {
        width: 100%;
        border: 1px solid transparent;
        border-bottom: 1px solid var(--line-soft);
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        text-align: left;
        padding: 8px;
      }

      .record-item:hover {
        background: #f8fbff;
      }

      .record-item.active {
        border-color: #9abdf1;
        background: #edf4ff;
      }

      .record-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
      }

      .record-name {
        font-size: 14px;
        font-weight: 600;
      }

      .record-code {
        color: #5d6f8a;
        font-size: 12px;
      }

      .record-sub {
        margin-top: 4px;
        color: #6f7d93;
        font-size: 12px;
      }

      .empty {
        margin: 8px;
        padding: 16px 10px;
        text-align: center;
        border: 1px dashed #cdd8e8;
        background: #fafcff;
        color: #7b8799;
        font-size: 12px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .field label {
        font-size: 12px;
        color: #4f6078;
      }

      .table-wrap {
        overflow: auto;
        padding: 0 10px 10px;
      }

      .records-table-wrap {
        padding-top: 10px;
        padding-bottom: 0;
      }

      table {
        width: 100%;
        min-width: 820px;
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid var(--line-soft);
        padding: 7px 8px;
        font-size: 12px;
        text-align: left;
        background: #fff;
        vertical-align: middle;
      }

      th {
        background: #f2f5fa;
        color: #3f4d61;
        font-weight: 600;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      tr:hover td {
        background: #f9fbfe;
      }

      tr.selected td {
        background: #edf4ff;
      }

      .select-col {
        width: 42px;
        text-align: center;
      }

      .record-check {
        width: 14px;
        height: 14px;
        margin: 0;
        vertical-align: middle;
      }

      .record-pagination-bar {
        min-height: 44px;
        padding: 8px 12px;
        border-top: 1px solid var(--line-soft);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: #fff;
      }

      .record-pagination-info {
        color: var(--minor);
        font-size: 12px;
      }

      .record-pagination-actions,
      .record-page-buttons {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .record-pagination-size {
        width: 104px;
      }

      .record-page-btn {
        min-width: 30px;
        padding: 0 8px;
      }

      .record-page-btn.is-current {
        border-color: var(--primary);
        background: var(--primary);
        color: #fff;
      }

      .record-page-ellipsis {
        color: var(--minor);
        font-size: 12px;
        padding: 0 2px;
      }

      .cell-actions {
        display: flex;
        gap: 8px;
        justify-content: center;
        white-space: nowrap;
      }

      .text-btn {
        border: 0;
        padding: 0;
        background: transparent;
        color: var(--primary);
        cursor: pointer;
        font-size: 12px;
      }

      .text-btn.danger {
        color: var(--danger);
      }

      .kv-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0;
      }

      .kv-item {
        border-right: 1px solid var(--line-soft);
        border-bottom: 1px solid var(--line-soft);
        padding: 8px 10px;
      }

      .kv-item:nth-child(3n) {
        border-right: 0;
      }

      .kv-item.full {
        grid-column: 1 / -1;
        border-right: 0;
      }

      .kv-k {
        font-size: 12px;
        color: #5e708b;
      }

      .kv-v {
        margin-top: 4px;
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .foot,
      .status {
        border-top: 1px solid var(--line-soft);
        padding: 8px 10px;
        font-size: 12px;
        color: var(--minor);
      }

      .status.error {
        color: #b24040;
      }

      .modal-mask {
        position: fixed;
        inset: 0;
        background: rgba(18, 35, 66, 0.42);
        display: grid;
        place-items: center;
        padding: 16px;
        z-index: 50;
      }

      .modal-mask.hidden {
        display: none;
      }

      .modal {
        width: min(1040px, 100%);
        max-height: calc(100vh - 32px);
        background: #fff;
        border-radius: 10px;
        border: 1px solid var(--line);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        overflow: hidden;
      }

      .modal-head,
      .modal-foot {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line-soft);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .modal-foot {
        border-bottom: 0;
        border-top: 1px solid var(--line-soft);
        justify-content: flex-end;
      }

      .modal-body {
        overflow: auto;
        padding: 10px 12px;
      }

      .detail-modal .modal {
        width: min(1180px, 100%);
      }

      .detail-modal .modal-body {
        padding: 0;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .form-grid .field.full {
        grid-column: 1 / -1;
      }

      .field-tip {
        font-size: 12px;
        color: #7a879b;
      }

      .participant-panel {
        border: 1px solid #d8e3f5;
        border-radius: 10px;
        overflow: hidden;
        background: #fbfdff;
      }

      .participant-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid #e4ecf7;
        background: #f7faff;
      }

      .participant-toolbar strong {
        font-size: 13px;
        color: #30445f;
      }

      .participant-list {
        display: flex;
        flex-direction: column;
      }

      .participant-row {
        display: grid;
        grid-template-columns: 56px minmax(0, 1fr) 120px 156px 68px;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border-top: 1px solid #e9eff8;
      }

      .participant-row:first-child {
        border-top: 0;
      }

      .participant-seq {
        color: #61738f;
        font-size: 13px;
        text-align: center;
      }

      .participant-sign-cell {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .sign-state {
        font-size: 12px;
        color: #7c8ba1;
      }

      .sign-state.done {
        color: var(--success);
      }

      .sign-preview-link {
        border: 0;
        background: transparent;
        color: var(--primary);
        font-size: 12px;
        padding: 0;
        cursor: pointer;
      }

      .participant-empty {
        padding: 16px 12px;
        color: #7d8ca4;
        font-size: 12px;
        text-align: center;
      }

      .sign-modal {
        width: min(720px, 100%);
        max-height: calc(100vh - 40px);
        background: #fff;
        border-radius: 12px;
        border: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 18px 36px rgba(23, 42, 74, 0.18);
      }

      .sign-modal-head,
      .sign-modal-foot {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line-soft);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .sign-modal-foot {
        border-bottom: 0;
        border-top: 1px solid var(--line-soft);
        justify-content: flex-end;
      }

      .sign-modal-body {
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .sign-canvas-wrap {
        border: 1px dashed #bfd0ea;
        border-radius: 12px;
        background:
          linear-gradient(180deg, rgba(248, 251, 255, 0.96), rgba(243, 248, 255, 0.96)),
          repeating-linear-gradient(0deg, transparent, transparent 35px, rgba(196, 210, 231, 0.38) 35px, rgba(196, 210, 231, 0.38) 36px);
        padding: 10px;
      }

      .sign-canvas {
        width: 100%;
        height: 240px;
        display: block;
        border-radius: 10px;
        background: transparent;
        touch-action: none;
        cursor: crosshair;
      }

      .detail-subtable {
        width: 100%;
        min-width: 0;
      }

      .detail-subtable th,
      .detail-subtable td {
        position: static;
      }

      .readonly {
        background: #f6f8fb;
        color: #5f708a;
      }

      .toast {
        position: fixed;
        bottom: 18px;
        right: 18px;
        min-width: 220px;
        max-width: 360px;
        background: rgba(17, 25, 40, 0.92);
        color: #fff;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        opacity: 0;
        pointer-events: none;
        transform: translateY(8px);
        transition: opacity 0.18s ease, transform 0.18s ease;
        z-index: 100;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 1180px) {
        .layout {
          grid-template-columns: 1fr;
          min-height: auto;
        }

        .left-panel {
          min-height: 360px;
        }

        .kv-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .kv-item:nth-child(3n) {
          border-right: 1px solid var(--line-soft);
        }

        .kv-item:nth-child(2n) {
          border-right: 0;
        }

        .form-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 820px) {
        .toolbar,
        .toolbar.right-tools {
          grid-template-columns: 1fr 1fr;
        }

        .record-toolbar {
          grid-template-columns: 1fr;
        }

        .record-filter-group {
          width: 100%;
          justify-self: stretch;
          grid-template-columns: 1fr 1fr;
        }

        .record-filter-group .input {
          grid-column: 1 / -1;
        }

        .record-pagination-bar {
          align-items: stretch;
          flex-direction: column;
        }

        .record-pagination-actions {
          justify-content: flex-start;
        }

        .field-grid,
        .form-grid,
        .kv-grid {
          grid-template-columns: 1fr;
        }

        .participant-row {
          grid-template-columns: 46px minmax(0, 1fr);
        }

        .participant-sign-cell,
        .participant-row .participant-time,
        .participant-row .participant-delete {
          grid-column: 2;
        }

        .kv-item {
          border-right: 0 !important;
        }
      }
    </style>
    <link rel="stylesheet" href="compact-date-picker.css" />
  </head>
  <body>
    <div class="page">
      <div class="layout">
        <main class="panel right-panel">
          <div class="panel-head">
            <div>
              <h1>相关方培训记录</h1>
            </div>
          </div>

          <div class="toolbar record-toolbar">
            <div class="panel-actions">
              <a href="/h5/partner-training-qr" class="btn" target="_blank" rel="noopener noreferrer">二维码下载</a>
              <button id="printBtn" type="button" class="btn">打印</button>
              <button id="deleteBtn" type="button" class="btn danger">删除</button>
            </div>
            <div class="record-filter-group">
              <input id="recordKeywordInput" class="input" type="text" placeholder="培训日期/施工单位/授课人" />
              <button id="recordSearchBtn" type="button" class="btn">搜索</button>
              <button id="recordResetBtn" type="button" class="btn">重置</button>
            </div>
          </div>

          <div class="table-wrap records-table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="select-col">
                    <input id="recordSelectAllCurrentPage" class="record-check" type="checkbox" aria-label="选择当前页记录" />
                  </th>
                  <th style="width:150px;">培训日期</th>
                  <th style="width:180px;">施工单位</th>
                  <th style="width:86px;">培训人数</th>
                  <th style="width:130px;">授课人</th>
                  <th style="width:86px;">是否抽取</th>
                  <th style="width:100px;">操作</th>
                </tr>
              </thead>
              <tbody id="recordTableBody"></tbody>
            </table>
          </div>

          <div class="record-pagination-bar">
            <div id="recordPaginationInfo" class="record-pagination-info">共 0 条</div>
            <div class="record-pagination-actions">
              <select id="recordPageSizeSelect" class="select record-pagination-size" aria-label="每页记录数量">
                <option value="10">10 条/页</option>
                <option value="20">20 条/页</option>
                <option value="50">50 条/页</option>
              </select>
              <button id="recordPrevPageBtn" class="btn" type="button">上一页</button>
              <div id="recordPageButtons" class="record-page-buttons" aria-label="培训记录分页"></div>
              <button id="recordNextPageBtn" class="btn" type="button">下一页</button>
            </div>
          </div>

      function bindEvents() {
        refs.recordSearchBtn.addEventListener("click", () => {
          state.keyword = refs.recordKeywordInput.value.trim();
          state.recordPage = 1;
          state.selectedRecordIds.clear();
          renderRecordList();
          renderRecordTable();
          renderActionDisabled();
        });

        refs.recordResetBtn.addEventListener("click", () => {
          state.keyword = "";
          state.recordPage = 1;
          state.selectedRecordIds.clear();
          refs.recordKeywordInput.value = "";
          renderRecordList();
          renderRecordTable();
          renderActionDisabled();
        });

        refs.recordKeywordInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            refs.recordSearchBtn.click();
          }
        });

        if (refs.refreshBtn) refs.refreshBtn.addEventListener("click", () => {
          void refreshAll({ preserveSelection: true });
        });

        if (refs.addBtn) refs.addBtn.addEventListener("click", () => {
          openFormModal("add");
        });

        if (refs.editBtn) refs.editBtn.addEventListener("click", () => {
          openFormModal("edit");
        });

        refs.deleteBtn.addEventListener("click", () => {
          void deleteCheckedRecords();
        });

        refs.printBtn.addEventListener("click", () => {
          printCheckedRecords();
        });

        if (refs.recordList) refs.recordList.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof HTMLElement)) {
            return;
          }
          const card = target.closest(".record-item");
          if (!card) {
            return;
          }
          const id = card.dataset.id;
          if (!id) {
            return;
          }
          state.selectedRecordId = id;
          renderRecordList();
          renderRecordTable();
          renderActionDisabled();
        });

        refs.recordTableBody.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof HTMLElement)) {
            return;
          }
          if (target.closest(".record-check")) {
            return;
          }
          const actionBtn = target.closest("[data-action]");
          if (actionBtn) {
            const action = actionBtn.dataset.action;
            const id = actionBtn.dataset.id;
            if (!action || !id) {
              return;
            }
            state.selectedRecordId = id;
            renderRecordTable();
            renderActionDisabled();
            if (action === "detail") {
              openDetailModal(getSelectedRecord());
              return;
            }
            return;
          }

          const row = target.closest("tr[data-id]");
          if (!row) {
            return;
          }
          const id = row.dataset.id;
          if (!id) {
            return;
          }
          state.selectedRecordId = id;
          renderRecordTable();
          renderActionDisabled();
        });

        refs.recordTableBody.addEventListener("change", (event) => {
          const target = event.target;
          if (!(target instanceof HTMLInputElement) || !target.classList.contains("record-check")) {
            return;
          }
          const id = target.dataset.id;
          if (!id) {
            return;
          }
          if (target.checked) {
            state.selectedRecordIds.add(id);
            state.selectedRecordId = id;
          } else {
            state.selectedRecordIds.delete(id);
          }
          renderRecordTable();
          renderActionDisabled();
        });

        bindQrPanelEvents();

        refs.recordPageSizeSelect.addEventListener("change", () => {
          state.recordPageSize = Number(refs.recordPageSizeSelect.value) || 10;
          state.recordPage = 1;
          renderRecordTable();
          renderActionDisabled();
        });

        refs.recordSelectAllCurrentPage.addEventListener("change", () => {
          const checked = refs.recordSelectAllCurrentPage.checked;
          getCurrentRecordPageRows().forEach((row) => {
            if (checked) {
              state.selectedRecordIds.add(row.id);
            } else {
              state.selectedRecordIds.delete(row.id);
            }
          });
          renderRecordTable();
          renderActionDisabled();
        });

        refs.closeDetailBtn.addEventListener("click", closeDetailModal);
        refs.detailCloseFootBtn.addEventListener("click", closeDetailModal);
        refs.detailPrintBtn.addEventListener("click", () => {

          if (!record) {
            showToast("请先选择一条培训记录");
            return;
          }
          printTrainingNotice(record);
        });

        refs.formModal.addEventListener("click", (event) => {
          if (event.target === refs.formModal) {
            closeFormModal();
          }
        });

        refs.recordForm.addEventListener("submit", (event) => {
          void saveForm(event);
        });

        refs.formCompanyKeywordInput.addEventListener("input", () => {
          const rows = filterPartnerUnits(refs.formCompanyKeywordInput.value);
          const selectedId = rows.some((item) => item.id === refs.formCompanySelect.value)
            ? String(refs.formCompanySelect.value || "").trim()
            : "";
          renderFormCompanyOptions({ selectedId });
        });

        refs.formCompanyKeywordInput.addEventListener("change", () => {
          applyFormCompanyKeywordSelection();
        });

        refs.formCompanyKeywordInput.addEventListener("keydown", (event) => {
          if (event.key !== "Enter") {
            return;
          }
          event.preventDefault();
          applyFormCompanyKeywordSelection({ preferFirst: true });
        });

        refs.formCompanySelect.addEventListener("change", () => {
          syncFormCompanyKeywordFromSelection();
        });

        refs.formAddParticipantBtn.addEventListener("click", () => {
          addDraftParticipantRow();
        });

        refs.formParticipantList.addEventListener("input", (event) => {
          const target = event.target;
          if (!(target instanceof HTMLElement)) {
            return;
          }
          const row = target.closest("[data-participant-index]");
          if (!row) {
            return;
          }
          const index = Number(row.dataset.participantIndex);
          const participants = ensureDraftParticipants(state.formDraft);
          if (!Number.isInteger(index) || index < 0 || index >= participants.length) {
            return;
          }

          if (target.matches("[data-role='participant-name']")) {
            participants[index].name = normalizeParticipantName(target.value);
            syncDraftParticipantCount();
          }
        });

        refs.formParticipantList.addEventListener("click", (event) => {
          if (!(event.target instanceof HTMLElement)) {
            return;
          }
          const actionButton = event.target.closest("[data-action]");
          if (!actionButton) {
            return;
          }
          const row = actionButton.closest("[data-participant-index]");
          if (!row) {
            return;
          }

          const index = Number(row.dataset.participantIndex);
          const participants = ensureDraftParticipants(state.formDraft);
          if (!Number.isInteger(index) || index < 0 || index >= participants.length) {
            return;
          }

          const action = String(actionButton.dataset.action || "").trim();
          if (action === "sign") {
            openDraftParticipantSignatureModal(index);
            return;
          }
          if (action === "preview") {
            previewDraftParticipantSignature(index);
            return;
          }
          if (action === "delete-sign") {
            clearDraftParticipantSignature(index);
            return;
          }
          if (action === "delete-row") {
            removeDraftParticipantRow(index);
          }
        });

        refs.closeParticipantSignatureBtn.addEventListener("click", closeDraftParticipantSignatureModal);
        refs.clearParticipantSignatureBtn.addEventListener("click", clearDraftSignatureCanvas);
        refs.saveParticipantSignatureBtn.addEventListener("click", () => {
          void saveDraftParticipantSignature();
        });

        refs.participantSignatureModal.addEventListener("click", (event) => {
          if (event.target === refs.participantSignatureModal) {
            closeDraftParticipantSignatureModal();
          }
        });
      }

      function bindSelectProxyShell() {
        if (window.__selectProxyShellBound) return;
        window.__selectProxyShellBound = true;
        document.addEventListener("click", (event) => {
          if (!(event.target instanceof HTMLElement) || !event.target.closest(".select-proxy")) {
            closeSelectProxies();
          }
        });
        new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            mutation.addedNodes.forEach((node) => {
              if (node instanceof HTMLElement) {
                enhanceSelectProxies(node);
              }
            });
          });
        }).observe(document.body, { childList: true, subtree: true });
      }

      function enhanceSelectProxies(scope = document) {
        if (!scope) return;
        const selector = "select.select:not(.native-hidden)";
        if (scope instanceof HTMLSelectElement && scope.matches(selector)) {
          enhanceSelectProxy(scope);
        }
        scope.querySelectorAll?.(selector).forEach((select) => enhanceSelectProxy(select));
      }

      function enhanceSelectProxy(select) {
        if (select.classList.contains("native-select-hidden")) {
          refreshSelectProxy(select);
          return;
        }
        const next = select.nextElementSibling;
        if (next && next.classList.contains("select-proxy")) {
          next.remove();
        }
        select.classList.add("native-select-hidden");

        const proxy = document.createElement("div");
        proxy.className = "select-proxy";
        const button = document.createElement("button");
        button.type = "button";
        button.className = "select-proxy-button";
        const text = document.createElement("span");
        button.appendChild(text);
        const clear = document.createElement("button");
        clear.type = "button";
        clear.className = "select-proxy-clear";
        clear.setAttribute("aria-label", "清空选择");
        const panel = document.createElement("div");
        panel.className = "select-proxy-panel hidden";
        const list = document.createElement("div");
        panel.appendChild(list);
        proxy.appendChild(button);
        proxy.appendChild(clear);
        proxy.appendChild(panel);
        select.insertAdjacentElement("afterend", proxy);

        const render = () => renderSelectProxy(select, proxy, text, list);
        clear.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          if (select.disabled) return;
          const hasEmptyOption = Array.from(select.options).some((option) => option.value === "");
          if (!hasEmptyOption) return;
          select.value = "";
          select.dispatchEvent(new Event("change", { bubbles: true }));
          closeSelectProxies();
        });
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const willOpen = panel.classList.contains("hidden");
          closeSelectProxies();
          render();
          if (willOpen) {
            proxy.classList.add("is-open");
            panel.classList.remove("hidden");
          }
        });
        select.addEventListener("change", render);
        new MutationObserver(render).observe(select, { childList: true, subtree: true });
        render();
      }

      function renderSelectProxy(select, proxy, text, list) {
        const selected = select.selectedOptions && select.selectedOptions[0];
        text.textContent = selected?.textContent || "请选择";
        const hasEmptyOption = Array.from(select.options).some((option) => option.value === "");
        proxy.classList.toggle("has-value", Boolean(select.value) && hasEmptyOption && !select.disabled);
        list.innerHTML = "";
        Array.from(select.options).forEach((option) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = `select-proxy-option${option.value === select.value ? " is-selected" : ""}`;
          item.textContent = option.textContent || "请选择";
          item.addEventListener("click", () => {
            select.value = option.value;
            select.dispatchEvent(new Event("change", { bubbles: true }));
            closeSelectProxies();
          });
          list.appendChild(item);
        });
        proxy.classList.toggle("is-disabled", select.disabled);
      }

      function refreshSelectProxy(select) {
        const proxy = select?.nextElementSibling;
        if (!proxy || !proxy.classList.contains("select-proxy")) return;
        const text = proxy.querySelector(".select-proxy-button span");
        const list = proxy.querySelector(".select-proxy-panel > div");
        if (text && list) {
          renderSelectProxy(select, proxy, text, list);
        }
      }

      function refreshSelectProxies(scope = document) {
        if (!scope) return;
        scope.querySelectorAll("select.native-select-hidden").forEach(refreshSelectProxy);
      }

      function closeSelectProxies() {
        document.querySelectorAll(".select-proxy.is-open").forEach((proxy) => proxy.classList.remove("is-open"));
        document.querySelectorAll(".select-proxy-panel:not(.hidden)").forEach((panel) => panel.classList.add("hidden"));
      }

      function parseScanContext() {
        try {
          const params = new URLSearchParams(window.location.search || "");
          return {
            fromQr: params.get("from") === "qr",
            autoNew: params.get("new") === "1",
            unitId: String(params.get("unit_id") || "").trim(),
            unitName: decodeURIComponentSafe(params.get("unit_name") || ""),
          };
        } catch {
          return {
            fromQr: false,
            autoNew: false,
            unitId: "",
            unitName: "",
          };
        }
      }

      function decodeURIComponentSafe(value) {
        const text = String(value || "");
        try {
          return decodeURIComponent(text);
        } catch {
          return text;
        }
      }

      function hasQrPanel() {
        return Boolean(
          refs.qrModeSelect &&
          refs.qrUnitKeywordInput &&
          refs.qrUnitSelect &&
          refs.qrUrlInput &&
          refs.entryQrImage &&
          refs.copyQrUrlBtn &&
          refs.openQrImageBtn &&
          refs.openEntryUrlBtn
        );
      }

      function bindQrPanelEvents() {
        if (!hasQrPanel()) {
          return;
        }

        refs.qrModeSelect.addEventListener("change", () => {
          state.qrMode = refs.qrModeSelect.value === "prefill" ? "prefill" : "static";
          renderQrPanel();

        refs.qrUnitKeywordInput.addEventListener("input", () => {
          const rows = filterPartnerUnits(refs.qrUnitKeywordInput.value);
          state.qrUnitId = rows.some((item) => item.id === state.qrUnitId) ? state.qrUnitId : "";
          renderQrUnitOptions({ selectedId: state.qrUnitId });

        });

        refs.qrUnitKeywordInput.addEventListener("change", () => {
          applyQrUnitKeywordSelection();
        });

        refs.qrUnitKeywordInput.addEventListener("keydown", (event) => {
          if (event.key !== "Enter") {

          }
          event.preventDefault();
          applyQrUnitKeywordSelection({ preferFirst: true });

        refs.qrUnitSelect.addEventListener("change", () => {
          state.qrUnitId = String(refs.qrUnitSelect.value || "").trim();
          syncQrUnitKeywordFromSelection();
          renderQrPanel();
        });

        refs.copyQrUrlBtn.addEventListener("click", async () => {

      function buildEntryUrl({ unitId = "", unitName = "" } = {}) {
        const current = new URL(resolvePublicFormUrl(), window.location.href);
        current.search = "";
        current.hash = "";
        const params = new URLSearchParams();
        params.set("from", "qr");
        params.set("new", "1");
        params.set("source", "wechat");
        if (unitId) {
          params.set("unit_id", unitId);
        }
        if (unitName) {
          params.set("unit_name", unitName);
        }
        current.search = params.toString();
        return current.toString();
      }

      function resolvePublicFormUrl() {
        if (window.location.protocol === "http:" || window.location.protocol === "https:") {
          return `${window.location.origin}/h5/partner-training`;
        }
        return "partner-entry-training-form.html";
      }

      function buildQrImageUrl(entryUrl) {
        const text = String(entryUrl || "").trim();
        if (!text) {
          return "";
        }
        return `https://quickchart.io/qr?size=280&text=${encodeURIComponent(text)}`;
      }

      function getSelectedQrUnit() {

        if (!id) {

      function findUnitIdByName(name) {
        const text = normalizeCompareText(name);
        if (!text) {
          return "";
        }
        const matched = state.units.find((item) => normalizeCompareText(item.name) === text);
        return matched ? matched.id : "";
      }

      async function refreshAll({ preserveSelection = false } = {}) {
        setLoading(true);
        setStatus("正在加载相关方培训数据...");

        const previousSelectedId = preserveSelection ? state.selectedRecordId : "";

        try {
          const [unitRows, userRows, recordRows] = await Promise.all([
            fetchPartnerUnits(),
            fetchContactsUsers(),
            fetchTrainingRecords(),
          ]);

          state.units = unitRows;
          state.users = userRows;
          state.records = recordRows;

          if (hasQrPanel()) {
            if (state.scanContext.unitId && !state.qrUnitId) {
              state.qrUnitId = state.scanContext.unitId;
            }
            renderQrUnitOptions();
            syncQrUnitKeywordFromSelection();
            renderQrPanel();
          }

          const validIds = new Set(state.records.map((item) => item.id));
          state.selectedRecordIds.forEach((id) => {
            if (!validIds.has(id)) {
              state.selectedRecordIds.delete(id);
            }
          });
          if (previousSelectedId && validIds.has(previousSelectedId)) {
            state.selectedRecordId = previousSelectedId;
          } else if (!validIds.has(state.selectedRecordId)) {
            state.selectedRecordId = state.records[0]?.id || "";
          }

          renderRecordList();
          renderRecordTable();
          refreshOpenDetailModal();
          renderActionDisabled();
          setStatus(`加载完成：培训记录 ${state.records.length} 条，相关方单位 ${state.units.length} 条`);
        } catch (error) {
          setStatus(`加载失败：${error.message}`, true);
          showToast(`加载失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      function renderActionDisabled() {
        const checkedCount = getCheckedRecords().length;
        if (refs.editBtn) refs.editBtn.disabled = state.loading || !getSelectedRecord();
        refs.printBtn.disabled = state.loading;
        refs.deleteBtn.disabled = state.loading;
        refs.printBtn.textContent = "打印";
        refs.deleteBtn.textContent = "删除";
        if (refs.recordSelectAllCurrentPage) syncRecordSelectAllState();
        if (refs.refreshBtn) refs.refreshBtn.disabled = state.loading;
        if (refs.addBtn) refs.addBtn.disabled = state.loading;
      }

      function getFilteredRecords() {
        const keyword = normalizeCompareText(state.keyword);
        if (!keyword) {
          return state.records;
        }
        return state.records.filter((item) => {
          const haystack = [item.trainingDateText, item.company, item.lecturerName]
            .map((part) => normalizeCompareText(part))
            .join("|");
          return haystack.includes(keyword);
        });
      }

      function renderRecordList() {
        if (!refs.recordList || !refs.recordListFoot) {
          return;
        }
        const rows = getFilteredRecords();
        refs.recordList.innerHTML = "";

        if (!rows.length) {
          refs.recordList.innerHTML = '<div class="empty">暂无培训记录</div>';
          refs.recordListFoot.textContent = "记录 0 条";

        rows.forEach((item) => {
          const button = document.createElement("button");

          button.className = `record-item${item.id === state.selectedRecordId ? " active" : ""}`;
          button.dataset.id = item.id;
          button.innerHTML = `
            <div class="record-row">
              <span class="record-name">${escapeHtml(item.title || "未命名培训")}</span>
              <span class="record-code">${escapeHtml(item.code || "-")}</span>

          refs.recordList.appendChild(button);

      function renderRecordTable() {
        const rows = getFilteredRecords();
        const pageState = getRecordPageState(rows);
        const pageRows = rows.slice(pageState.startIndex, pageState.endIndex);
        refs.recordTableBody.innerHTML = "";
        if (state.selectedRecordId && !rows.some((item) => item.id === state.selectedRecordId)) {
          state.selectedRecordId = pageRows[0]?.id || "";
        } else if (pageRows.length && !pageRows.some((item) => item.id === state.selectedRecordId)) {
          state.selectedRecordId = pageRows[0].id;
        }

        if (!rows.length) {
          refs.recordTableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#7e8a9b;padding:20px">暂无记录</td></tr>';
          renderRecordPagination(pageState);
          syncRecordSelectAllState(pageRows);
          return;
        }

        pageRows.forEach((row) => {
          const tr = document.createElement("tr");
          tr.dataset.id = row.id;
          tr.className = row.id === state.selectedRecordId ? "selected" : "";
          tr.innerHTML = `
            <td class="select-col">
              <input class="record-check" type="checkbox" data-id="${escapeHtml(row.id)}" aria-label="选择培训记录" ${state.selectedRecordIds.has(row.id) ? "checked" : ""} />
            </td>
            <td>${escapeHtml(row.trainingDateText || "-")}</td>
            <td>${escapeHtml(row.company || "-")}</td>
            <td>${escapeHtml(row.attendeeCountText || "-")}</td>
            <td>${escapeHtml(row.lecturerName || "-")}</td>
            <td>${escapeHtml(row.sampled || "否")}</td>
            <td>
              <div class="cell-actions">
                <button class="text-btn" data-action="detail" data-id="${escapeHtml(row.id)}">详情</button>
              </div>
            </td>
          `;
          refs.recordTableBody.appendChild(tr);
        });
        renderRecordPagination(pageState);
        syncRecordSelectAllState(pageRows);
      }

      function getCurrentRecordPageRows() {
        const rows = getFilteredRecords();
        const pageState = getRecordPageState(rows);
        return rows.slice(pageState.startIndex, pageState.endIndex);
      }

      function syncRecordSelectAllState(pageRows = getCurrentRecordPageRows()) {
        const selectableIds = pageRows.map((row) => row.id).filter(Boolean);
        const checkedCount = selectableIds.filter((id) => state.selectedRecordIds.has(id)).length;
        refs.recordSelectAllCurrentPage.checked = Boolean(selectableIds.length && checkedCount === selectableIds.length);
        refs.recordSelectAllCurrentPage.indeterminate = Boolean(checkedCount && checkedCount < selectableIds.length);
        refs.recordSelectAllCurrentPage.disabled = state.loading || !selectableIds.length;
      }

      function getRecordPageState(rows) {
        const total = rows.length;
        const pageSize = Math.max(1, Number(state.recordPageSize) || 10);
        const pageCount = Math.max(1, Math.ceil(total / pageSize));
        const page = Math.min(Math.max(1, Number(state.recordPage) || 1), pageCount);
        state.recordPage = page;
        const startIndex = total ? (page - 1) * pageSize : 0;
        const endIndex = total ? Math.min(total, startIndex + pageSize) : 0;
        return { total, pageSize, pageCount, page, startIndex, endIndex };
      }

      function renderRecordPagination(pageState) {
        const info = pageState.total
          ? `共 ${pageState.total} 条，显示 ${pageState.startIndex + 1}-${pageState.endIndex} 条，第 ${pageState.page} / ${pageState.pageCount} 页`
          : "共 0 条";
        refs.recordPaginationInfo.textContent = info;
        refs.recordPageSizeSelect.value = String(pageState.pageSize);

        refs.recordPrevPageBtn.disabled = pageState.page <= 1;
        refs.recordPrevPageBtn.onclick = () => {
          state.recordPage = Math.max(1, pageState.page - 1);
          renderRecordTable();
          renderActionDisabled();
        };

        refs.recordNextPageBtn.disabled = pageState.page >= pageState.pageCount;
        refs.recordNextPageBtn.onclick = () => {
          state.recordPage = Math.min(pageState.pageCount, pageState.page + 1);
          renderRecordTable();
          renderActionDisabled();
        };

        refs.recordPageButtons.innerHTML = buildRecordPageNumbers(pageState).map((page) => (
          page === "..."
            ? `<span class="record-page-ellipsis">...</span>`
            : `<button class="btn record-page-btn ${page === pageState.page ? "is-current" : ""}" type="button" data-record-page="${page}">${page}</button>`
        )).join("");
        refs.recordPageButtons.querySelectorAll("[data-record-page]").forEach((button) => {
          button.addEventListener("click", () => {
            state.recordPage = Number(button.dataset.recordPage) || 1;
            renderRecordTable();
            renderActionDisabled();
          });
        });
      }

      function buildRecordPageNumbers(pageState) {
        const total = pageState.pageCount;
        const current = pageState.page;
        if (total <= 7) {
          return Array.from({ length: total }, (_, index) => index + 1);
        }
        const pages = new Set([1, total, current, current - 1, current + 1]);
        const sorted = [...pages].filter((page) => page >= 1 && page <= total).sort((a, b) => a - b);
        const result = [];
        sorted.forEach((page, index) => {
          if (index > 0 && page - sorted[index - 1] > 1) {
            result.push("...");
          }
          result.push(page);
        });
        return result;
      }

      function printTrainingNotice(recordOrRecords) {
        const records = Array.isArray(recordOrRecords) ? recordOrRecords.filter(Boolean) : [recordOrRecords].filter(Boolean);
        if (!records.length) {
          showToast("请先选择需要打印的培训记录");
          return;
        }
        const printWindow = window.open("", "_blank");
        if (!printWindow) {
          showToast("浏览器阻止了打印窗口，请允许弹窗后重试");
          return;

        printWindow.document.open();
        printWindow.document.write(buildTrainingNoticePrintHtml(records));
        printWindow.document.close();
        printWindow.focus();

          .map((item) => `<p class="notice-item">${escapeHtml(item)}</p>`)
          .join("");
        const pages = list.map((record) => buildTrainingNoticePrintPage(record, items)).join("");
        return `
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="UTF-8" />
              <title>相关方入厂安全告知书</title>
              <style>
                body {
                  margin: 0;
                  color: #000;
                  background: #fff;
                  font-family: "SimSun", "Songti SC", "Microsoft YaHei", sans-serif;
                }

                .print-actions {
                  width: 186mm;
                  margin: 8mm auto 0;
                  display: flex;
                  justify-content: flex-end;
                  gap: 8px;
                  font-family: "Microsoft YaHei", sans-serif;
                }

                .print-actions button {
                  min-height: 30px;
                  padding: 0 12px;
                  border: 1px solid #888;
                  background: #fff;
                  cursor: pointer;
                }

                .notice-page {
                  width: 186mm;
                  margin: 0 auto;
                  padding: 9mm 8mm 12mm;
                  font-size: 12pt;
                  line-height: 1.55;
                }

                .notice-page + .notice-page {
                  break-before: page;
                  page-break-before: always;
                }

                h1 {
                  margin: 0 0 6mm;
                  text-align: center;
                  font-size: 20pt;
                  line-height: 1.2;
                  font-weight: 700;
                }

                .notice-body {
                  margin: 0;
                }

                .notice-item {
                  margin: 0 0 2.5mm;
                  text-align: left;
                  word-break: break-word;
                }

                .notice-confirm {
                  margin: 5mm 0 0;
                  text-indent: 2em;
                }

                .notice-sign-area {
                  margin-top: 9mm;
                  font-size: 12pt;
                }

                .sign-row {
                  display: grid;
                  grid-template-columns: 36mm minmax(0, 1fr);
                  gap: 4mm;
                  align-items: end;
                  margin-top: 6mm;
                  min-height: 13mm;
                }

                .sign-row.signatures {
                  min-height: 28mm;
                  align-items: start;
                }

                .sign-label {
                  white-space: nowrap;
                }

                .sign-line {
                  min-height: 11mm;
                  border-bottom: 1px solid #000;
                  display: flex;
                  align-items: flex-end;
                  gap: 7mm;
                  flex-wrap: wrap;
                  padding: 0 0 1.5mm;
                  overflow: hidden;
                }

                .signatures .sign-line {
                  min-height: 26mm;
                  align-items: flex-end;
                  overflow: visible;
                }

                .partner-sign-item {
                  min-width: 28mm;
                  display: inline-flex;
                  align-items: center;
                  justify-content: flex-end;
                }

                .partner-sign-img {
                  max-width: 38mm;
                  max-height: 13mm;
                  object-fit: contain;
                  display: block;
                }

                @page {
                  size: A4 portrait;
                  margin: 10mm;
                }

                @media print {
                  .print-actions {
                    display: none;
                  }

                  .notice-page {
                    width: auto;
                    margin: 0;
                    padding: 0;
                  }
                }
              </style>
            </head>
            <body>
              <div class="print-actions">
                <button type="button" onclick="window.print()">打印</button>
                <button type="button" onclick="window.close()">关闭</button>
              </div>
              ${pages}
              <script>window.addEventListener("load", function () { setTimeout(function () { window.print(); }, 300); });<\/script>
            </body>
          </html>
        `;
      }

      function buildTrainingNoticePrintPage(record, items) {
        const company = record.company || "";
        const date = record.trainingDateText || "";
        return `
          <article class="notice-page">
            <h1>相关方入厂安全告知书</h1>
            <section class="notice-body">${items}</section>
            <p class="notice-confirm">以上安全告知，请认真阅读，贯彻执行。对违反相关管理要求、本公司将按相关管理规定和合同约定给予处罚。</p>
            <section class="notice-sign-area">
              <div class="sign-row signatures">
                <div class="sign-label">相关方人员签名：</div>
                <div class="sign-line">${renderParticipantPrintSignatures(record)}</div>
              </div>
              <div class="sign-row">
                <div class="sign-label">施工单位名称：</div>
                <div class="sign-line">${escapeHtml(company)}</div>
              </div>
              <div class="sign-row">
                <div class="sign-label">日期：</div>
                <div class="sign-line">${escapeHtml(date)}</div>
              </div>
            </section>
          </article>
        `;
      }

      function renderParticipantPrintSignatures(record) {
        const participants = Array.isArray(record?.participantDetails) ? record.participantDetails : [];
        const signed = participants
          .map((item) => item?.signPreviewUrl || resolveFileUrl(item?.signFiles?.[0]))
          .filter(Boolean);
        if (!signed.length) {
          return "";
        }
        return signed.map((url) => `
          <span class="partner-sign-item">
            <img class="partner-sign-img" src="${escapeHtml(url)}" alt="签名" />
          </span>
        `).join("");
      }

      function getSelectedRecord() {
        return state.records.find((item) => item.id === state.selectedRecordId) || null;
      }

      function getCheckedRecords() {
        const selectedIds = state.selectedRecordIds || new Set();
        return state.records.filter((item) => selectedIds.has(item.id));
      }

      function openFormModal(mode) {
        if (mode === "edit" && !getSelectedRecord()) {
          showToast("请先选择记录");
          return;
        }

        state.formMode = mode;
        if (mode === "edit") {
          const current = getSelectedRecord();
          state.formRecordId = current.id;
          state.formDraft = createDraftFromRecord(current);
          refs.formModalTitle.textContent = "编辑培训记录";
        } else {
          state.formRecordId = "";
          state.formDraft = createEmptyDraft();
          applyScanPrefillToDraft(state.formDraft);
          refs.formModalTitle.textContent = "新建培训记录";
        }

        refs.formCompanyKeywordInput.value = state.formDraft.company || "";
        renderFormOptions();
        fillFormFromDraft();
        refreshSelectProxies(refs.recordForm);
        refs.formModal.classList.remove("hidden");
      }

      function openFromScanContextIfNeeded() {
        if (!state.scanContext.autoNew) {
          return;
        }
        openFormModal("add");
      }

      function applyScanPrefillToDraft(draft) {
        if (!draft || !state.scanContext.fromQr) {
          return;
        }

        const unitId = String(state.scanContext.unitId || "").trim();
        if (unitId) {
          const matched = state.units.find((item) => item.id === unitId);
          if (matched) {
            draft.companyId = matched.id;
            draft.company = matched.name;
            return;
          }
        }

        const unitName = String(state.scanContext.unitName || "").trim();
        if (unitName) {
          draft.company = unitName;
          draft.companyId = findUnitIdByName(unitName);
        }
      }

      function closeFormModal() {
        refs.formModal.classList.add("hidden");
        closeDraftParticipantSignatureModal();
      }

      function renderFormOptions() {
        const draft = state.formDraft || createEmptyDraft();
        renderFormCompanyOptions({
          selectedId: draft.companyId || (!draft.companyId && draft.company ? "__CUSTOM__" : ""),
        });

        const lecturerOptions = ['<option value="">请选择授课人（可选）</option>'];
        state.users.forEach((item) => {
          lecturerOptions.push(`<option value="${escapeHtml(item.userId)}">${escapeHtml(item.name)}</option>`);
        });
        if (!draft.lecturerId && draft.lecturerName) {
          lecturerOptions.push(`<option value="__LECTURER_CUSTOM__">${escapeHtml(draft.lecturerName)}</option>`);
        }
        refs.formLecturerSelect.innerHTML = lecturerOptions.join("");
      }

      function fillFormFromDraft() {
        const draft = state.formDraft || createEmptyDraft();

        refs.formCodeInput.value = draft.code || "自动生成";
        refs.formTitleInput.value = draft.title || "";
        refs.formTrainingDateInput.value = draft.trainingDateLocal || "";
        formTrainingDatePicker?.sync();
        refs.formCompanyKeywordInput.value = draft.company || "";

        if (draft.companyId) {
          refs.formCompanySelect.value = draft.companyId;
        } else if (draft.company) {
          refs.formCompanySelect.value = "__CUSTOM__";
        } else {
          refs.formCompanySelect.value = "";
        }

        refs.formCountInput.value = draft.attendeeCount || "";
        refs.formProjectInput.value = draft.project || "";

        if (draft.lecturerId) {
          refs.formLecturerSelect.value = draft.lecturerId;
        } else if (draft.lecturerName) {
          refs.formLecturerSelect.value = "__LECTURER_CUSTOM__";
        } else {
          refs.formLecturerSelect.value = "";
        }

        refs.formSampledSelect.value = draft.sampled || "否";
        refs.formExtractTimeInput.value = draft.lastExtractTimeLocal || "";
        refs.formContentInput.value = draft.content || "";
        refs.formEffectInput.value = draft.effect || "";
        renderFormParticipantList();
        syncDraftParticipantCount();
      }

      function applyFormToDraft() {
        const draft = state.formDraft || createEmptyDraft();

        draft.title = refs.formTitleInput.value.trim();
        draft.trainingDateLocal = refs.formTrainingDateInput.value.trim();
        formTrainingDatePicker?.sync();

        const companySelectValue = String(refs.formCompanySelect.value || "").trim();
        if (companySelectValue && companySelectValue !== "__CUSTOM__") {
          const unit = state.units.find((item) => item.id === companySelectValue);
          draft.companyId = companySelectValue;
          draft.company = unit?.name || "";
        } else {
          draft.companyId = "";
          draft.company = draft.company || "";
        }

        draft.attendeeCount = refs.formCountInput.value.trim();
        draft.project = refs.formProjectInput.value.trim();

        const lecturerSelectValue = String(refs.formLecturerSelect.value || "").trim();
        if (lecturerSelectValue && lecturerSelectValue !== "__LECTURER_CUSTOM__") {
          const user = state.users.find((item) => item.userId === lecturerSelectValue);
          draft.lecturerId = lecturerSelectValue;
          draft.lecturerName = user?.name || "";
        } else {
          draft.lecturerId = "";
          draft.lecturerName = draft.lecturerName || "";
        }

        draft.sampled = refs.formSampledSelect.value === "是" ? "是" : "否";
        draft.lastExtractTimeLocal = refs.formExtractTimeInput.value.trim();
        draft.content = refs.formContentInput.value.trim();
        draft.effect = refs.formEffectInput.value.trim();
        draft.participants = ensureDraftParticipants(draft).map((item) => normalizeParticipantRow(item));
        syncDraftParticipantCount();

        state.formDraft = draft;
      }

      async function saveForm(event) {
        event.preventDefault();
        applyFormToDraft();

        const draft = state.formDraft;
        if (!draft) {
          return;
        }

        let participants = [];

        try {
          participants = collectValidDraftParticipants();
        } catch (error) {
          showToast(error.message);
          return;
        }

        const finalCount = participants.length;

        if (!draft.title) {
          showToast("请填写标题");
          return;
        }

        if (!draft.trainingDateLocal) {
          showToast("请填写培训日期");
          return;
        }

        if (!draft.company && !draft.companyId) {
          showToast("请选择施工单位");
          return;
        }

        if (!finalCount) {
          showToast("请至少录入 1 位参训人员");
          return;
        }

        if (!draft.project) {
          showToast("请填写施工项目");
          return;
        }

        const payload = {
          [TRAINING_FIELD.title]: draft.title,
          [TRAINING_FIELD.trainingDate]: formatDateTimeForApi(draft.trainingDateLocal),
          [TRAINING_FIELD.company]: draft.company || resolveUnitNameById(draft.companyId) || "",
          [TRAINING_FIELD.attendeeCount]: finalCount,
          [TRAINING_FIELD.project]: draft.project,
          [TRAINING_FIELD.content]: draft.content || "",
          [TRAINING_FIELD.effect]: draft.effect || "",
          [TRAINING_FIELD.sampled]: draft.sampled || "否",
          [TRAINING_FIELD.lastExtractTime]: draft.lastExtractTimeLocal ? formatDateTimeForApi(draft.lastExtractTimeLocal) : "",
          [TRAINING_FIELD.participantSubform]: buildParticipantSubformRows(participants),
        };

        payload[TRAINING_FIELD.lecturer] = draft.lecturerId || null;

        setLoading(true);
        setStatus("正在保存培训记录...");

        try {
          let savedId = "";
          if (state.formMode === "edit" && draft.cloudId) {
            await requestEntry(API_CONFIG.trainingEntryId, "data_update", {
              data_id: draft.cloudId,
              data: payload,
            });
            savedId = draft.cloudId;
          } else {
            const result = await requestEntry(API_CONFIG.trainingEntryId, "data_create", { data: payload });
            savedId = extractRecordId(result?.data || result);
          }

          closeFormModal();
          await refreshAll({ preserveSelection: true });
          if (savedId) {
            state.selectedRecordId = savedId;
            renderRecordList();
            renderRecordTable();
            refreshOpenDetailModal();
            renderActionDisabled();
          }
          showToast("培训记录已保存");
        } catch (error) {
          setStatus(`保存失败：${error.message}`, true);
          showToast(`保存失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      async function deleteSelectedRecord() {
        const current = getSelectedRecord();
        if (!current) {
          showToast("请先选择记录");
          return;
        }

        const confirmed = window.confirm(`确认删除培训记录「${current.title || current.code || current.id}」吗？`);
        if (!confirmed) {
          return;
        }

        setLoading(true);
        setStatus("正在删除培训记录...");

        try {
          await requestEntry(API_CONFIG.trainingEntryId, "data_delete", {
            data_id: current.cloudId,
          });
          await refreshAll({ preserveSelection: false });
          showToast("培训记录已删除");
        } catch (error) {
          setStatus(`删除失败：${error.message}`, true);
          showToast(`删除失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      async function deleteCheckedRecords() {
        const records = getCheckedRecords();
        if (!records.length) {
          showToast("请先勾选需要删除的培训记录");
          return;
        }

        const confirmed = window.confirm(`确认删除已勾选的 ${records.length} 条培训记录吗？`);
        if (!confirmed) {
          return;
        }

        setLoading(true);
        setStatus(`正在删除 ${records.length} 条培训记录...`);

        try {
          for (const record of records) {
            if (!record.cloudId) {
              continue;
            }
            await requestEntry(API_CONFIG.trainingEntryId, "data_delete", {
              data_id: record.cloudId,
            });
          }
          state.selectedRecordIds.clear();
          await refreshAll({ preserveSelection: false });
          showToast("培训记录已删除");
        } catch (error) {
          setStatus(`删除失败：${error.message}`, true);
          showToast(`删除失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      function createEmptyParticipant() {
        return {
          name: "",
          signFiles: [],
          signPreviewUrl: "",
          signTime: "",
        };
      }

      function normalizeParticipantName(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function normalizeParticipantRow(row) {
        const source = row && typeof row === "object" ? row : {};
        return {
          name: normalizeParticipantName(source.name),
          signFiles: normalizeFileArray(source.signFiles),
          signPreviewUrl: String(source.signPreviewUrl || "").trim(),
          signTime: normalizeDateTimeLocal(source.signTime),
        };
      }

      function normalizeFileArray(value) {
        if (Array.isArray(value)) {
          return value.filter((item) => item && typeof item === "object");
        }
        if (value && typeof value === "object") {
          const extracted = extractObjectArray(value, ["data", "list", "rows"]);
          if (Array.isArray(extracted)) {
            return extracted.filter((item) => item && typeof item === "object");
          }
        }
        return [];
      }

      function resolveFileUrl(file) {
        if (!file || typeof file !== "object") {
          return "";
        }
        const keys = ["url", "download_url", "downloadUrl", "link", "href", "preview_url", "previewUrl"];
        for (const key of keys) {
          if (!Object.prototype.hasOwnProperty.call(file, key)) {
            continue;
          }
          const text = String(file[key] || "").trim();
          if (text) {
            return text;
          }
        }
        return "";
      }

      function ensureDraftParticipants(draft) {
        const target = draft && typeof draft === "object" ? draft : createEmptyDraft();
        if (!Array.isArray(target.participants) || !target.participants.length) {
          target.participants = [createEmptyParticipant()];
        } else {
          target.participants = target.participants.map((item) => normalizeParticipantRow(item));
        }
        if (state.formDraft !== target) {
          state.formDraft = target;
        }
        return target.participants;
      }

      function syncDraftParticipantCount() {
        const participants = ensureDraftParticipants(state.formDraft);
        const count = participants.filter((item) => Boolean(normalizeParticipantName(item.name))).length;
        refs.formCountInput.value = count ? String(count) : "";
        if (state.formDraft) {
          state.formDraft.attendeeCount = count ? String(count) : "";
        }
      }

      function renderFormParticipantList() {
        const participants = ensureDraftParticipants(state.formDraft);
        refs.formParticipantList.innerHTML = participants
          .map((item, index) => {
            const hasSign = item.signFiles.length > 0;
            const previewUrl = item.signPreviewUrl || resolveFileUrl(item.signFiles[0]);
            const signTimeText = item.signTime ? item.signTime.replace("T", " ") : "";
            return `
              <div class="participant-row" data-participant-index="${index}">
                <div class="participant-seq">${index + 1}</div>
                <input
                  class="input"
                  type="text"
                  data-role="participant-name"
                  value="${escapeHtml(item.name)}"
                  placeholder="请输入姓名"
                />
                <div class="participant-sign-cell">
                  <button type="button" class="btn" data-action="sign">${hasSign ? "重签" : "点击签字"}</button>
                  <span class="sign-state${hasSign ? " done" : ""}">${hasSign ? "已签" : "未签"}</span>
                  ${previewUrl ? '<button type="button" class="sign-preview-link" data-action="preview">预览</button>' : ""}
                  ${hasSign ? '<button type="button" class="sign-preview-link" data-action="delete-sign">清除</button>' : ""}
                </div>
                <input
                  class="input participant-time"
                  type="text"
                  value="${escapeHtml(signTimeText)}"
                  placeholder="签字后自动记录"
                  readonly
                />
                <button type="button" class="btn participant-delete" data-action="delete-row">删除</button>
              </div>
            `;
          })
          .join("");

        if (!participants.length) {
          refs.formParticipantList.innerHTML = '<div class="participant-empty">暂无参训人员，请点击“新增人员”开始录入。</div>';
        }
      }

      function addDraftParticipantRow() {
        const participants = ensureDraftParticipants(state.formDraft);
        participants.push(createEmptyParticipant());
        renderFormParticipantList();
        syncDraftParticipantCount();

        const index = participants.length - 1;
        const input = refs.formParticipantList.querySelector(`[data-participant-index="${index}"] [data-role="participant-name"]`);
        if (input instanceof HTMLInputElement) {
          input.focus();
        }
      }

      function removeDraftParticipantRow(index) {
        const participants = ensureDraftParticipants(state.formDraft);
        participants.splice(index, 1);

        if (state.formSignatureIndex === index) {
          closeDraftParticipantSignatureModal();
        } else if (state.formSignatureIndex > index) {
          state.formSignatureIndex -= 1;
        }

        if (!participants.length) {
          participants.push(createEmptyParticipant());
        }

        renderFormParticipantList();
        syncDraftParticipantCount();
      }

      function clearDraftParticipantSignature(index) {
        const participants = ensureDraftParticipants(state.formDraft);
        const row = participants[index];
        if (!row) {
          return;
        }

        row.signFiles = [];
        row.signPreviewUrl = "";
        row.signTime = "";
        renderFormParticipantList();
        showToast(`已清除第 ${index + 1} 行签字`);
      }

      function previewDraftParticipantSignature(index) {
        const participants = ensureDraftParticipants(state.formDraft);
        const row = participants[index];
        const previewUrl = String((row && (row.signPreviewUrl || resolveFileUrl(row.signFiles[0]))) || "").trim();
        if (!previewUrl) {
          showToast("当前签字暂无可预览图片");
          return;
        }
        window.open(previewUrl, "_blank", "noopener,noreferrer");
      }

      function collectValidDraftParticipants() {
        const participants = ensureDraftParticipants(state.formDraft);
        const output = [];
        const seen = new Set();

        participants.forEach((item, index) => {
          const row = normalizeParticipantRow(item);
          const hasName = Boolean(row.name);
          const hasSign = row.signFiles.length > 0;
          const hasOtherValue = Boolean(row.signPreviewUrl || row.signTime || hasSign);

          if (!hasName && !hasOtherValue) {
            return;
          }
          if (!hasName) {
            throw new Error(`第 ${index + 1} 行请先填写参训人员姓名`);
          }
          if (seen.has(row.name)) {
            throw new Error(`参训人员“${row.name}”重复录入，请检查`);
          }

          seen.add(row.name);
          if (!hasSign) {
            row.signFiles = [];
            row.signPreviewUrl = "";
            row.signTime = "";
          } else if (!row.signTime) {
            row.signTime = toDateTimeLocalValue(new Date());
          }
          output.push(row);
        });

        return output;
      }

      function renderParticipantDetailTable(rows) {
        const list = Array.isArray(rows) ? rows.filter((item) => item && typeof item === "object") : [];
        if (!list.length) {
          return "-";
        }
        const body = list
          .map((item, index) => {
            const previewUrl = item.signPreviewUrl || resolveFileUrl(item.signFiles[0]);
            return `
              <tr>
                <td>${index + 1}</td>
                <td>${escapeHtml(item.name || "-")}</td>
                <td>${item.signFiles.length ? "已签" : "未签"}</td>
                <td>${escapeHtml((item.signTime || "").replace("T", " ") || "-")}</td>
                <td>${previewUrl ? `<a class="text-btn" href="${escapeHtml(previewUrl)}" target="_blank" rel="noopener noreferrer">查看签字</a>` : "-"}</td>
              </tr>
            `;
          })
          .join("");

        return `
          <table class="detail-subtable">
            <thead>
              <tr>
                <th style="width:60px;">序号</th>
                <th style="width:140px;">姓名</th>
                <th style="width:90px;">签字状态</th>
                <th style="width:170px;">签字时间</th>
                <th style="width:100px;">签字图片</th>
              </tr>
            </thead>
            <tbody>${body}</tbody>
          </table>
        `;
      }

      function buildParticipantSubformRows(participants) {
        return (Array.isArray(participants) ? participants : []).map((item) => ({
          [PARTICIPANT_FIELD.name]: item.name,
          [PARTICIPANT_FIELD.sign]: item.signFiles.length ? item.signFiles : null,
          [PARTICIPANT_FIELD.signTime]: item.signTime ? formatDateTimeForApi(item.signTime) : "",
        }));
      }

      function openDraftParticipantSignatureModal(index) {
        const participants = ensureDraftParticipants(state.formDraft);
        const row = participants[index];
        if (!row) {
          return;
        }

        const name = normalizeParticipantName(row.name);
        if (!name) {
          showToast(`请先填写第 ${index + 1} 行参训人员姓名`);
          const input = refs.formParticipantList.querySelector(`[data-participant-index="${index}"] [data-role="participant-name"]`);
          if (input instanceof HTMLInputElement) {
            input.focus();
          }
          return;
        }

        state.formSignatureIndex = index;
        refs.participantSignatureTitle.textContent = `参训人员手写签字 - ${name}`;
        refs.participantSignatureModal.classList.remove("hidden");
        resizeDraftSignatureCanvas();
        clearDraftSignatureCanvas();
        refs.participantSignatureStatus.textContent = "请在签字板上书写后点击保存";
      }

      function closeDraftParticipantSignatureModal() {
        state.formSignatureIndex = -1;
