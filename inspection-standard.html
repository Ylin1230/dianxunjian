<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>点检标准</title>
    <style>
      :root {
        --bg: #f3f5f8;
        --panel: #ffffff;
        --line: #d9dee7;
        --line-soft: #e8edf4;
        --text: #1f2736;
        --muted: #6f7d93;
        --blue: #2c79ea;
        --blue-soft: #eef4ff;
        --danger: #e34a4a;
        --success: #2faa66;
      }

      * {
        box-sizing: border-box;
      }

      html {
        width: 100%;
        min-height: 100%;
        overflow: auto;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: auto;
        font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .app-layout {
        min-height: 100vh;
        min-height: 100dvh;
        width: 100%;
        max-width: 100%;
        overflow: auto;
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 10px;
        padding: 10px;
      }

      .panel {
        min-width: 0;
        background: var(--panel);
        border: 1px solid var(--line);
      }

      .side-panel {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        min-height: 0;
      }

      .main-panel {
        display: grid;
        grid-template-rows: auto auto auto minmax(0, 1fr) auto;
        min-height: 0;
        min-width: 0;
        overflow: hidden;
      }

      .main-switch-row {
        display: flex;
        flex-direction: row;
        justify-content: flex-start;
        align-items: flex-start;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--line);
      }

      .panel-head {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .panel-head h1,
      .panel-head h2,
      .panel-head h3 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }

      .minor {
        color: var(--muted);
        font-size: 12px;
      }

      .top-meta {
        margin-top: 4px;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .switch-actions {
        display: grid;
        grid-template-columns: repeat(3, 56px);
        gap: 6px;
        justify-content: start;
      }

      .switch-actions .btn {
        width: 56px;
        padding: 0;
      }

      .standard-summary {
        padding: 12px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfe;
      }

      .standard-summary-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .standard-summary-head h2 {
        margin: 0;
        color: var(--text);
        font-size: 16px;
        line-height: 1.4;
        font-weight: 600;
      }

      .standard-summary-grid {
        margin-top: 8px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px 14px;
      }

      .standard-summary-item {
        min-width: 0;
      }

      .standard-summary-item span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .standard-summary-item strong {
        display: block;
        margin-top: 3px;
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .standard-summary-item.full {
        grid-column: 1 / -1;
      }

      .standard-tab-row {
        padding: 0 10px;
        border-bottom: 1px solid var(--line);
      }

      .toolbar {
        padding: 8px 10px;
        border-bottom: 1px solid var(--line);
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 6px;
        align-items: center;
      }

      .toolbar.row {
        grid-template-columns: minmax(180px, 1fr) 56px 56px;
      }

      .btn {
        height: 32px;
        border: 1px solid #cfd7e3;
        background: #fff;
        color: #2b3444;
        padding: 0 12px;
        font-size: 13px;
        cursor: pointer;
        border-radius: 4px;
      }

      .btn:hover:not(:disabled) {
        border-color: #a9b7cc;
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn.primary {
        border-color: #2c79ea;
        background: #2c79ea;
        color: #fff;
      }

      .btn.primary:hover:not(:disabled) {
        filter: brightness(1.02);
      }

      .input-group {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 6px;
        align-items: center;
      }

      .field-tip {
        margin-top: 4px;
        font-size: 12px;
        color: #7c8aa1;
      }

      .btn.danger {
        color: var(--danger);
        border-color: #efb9b9;
        background: #fff8f8;
      }

      .input,
      .select,
      textarea.input {
        width: 100%;
        border: 1px solid #cad3e1;
        border-radius: 4px;
        background: #fff;
        color: var(--text);
        font-size: 13px;
      }

      .input,
      .select {
        height: 32px;
        padding: 0 8px;
      }

      .select.is-placeholder {
        color: #8a97ad;
      }

      .select option {
        color: var(--text);
      }

      .date-field {
        position: relative;
      }

      .date-display-input {
        padding-right: 36px;
        cursor: pointer;
        font-variant-numeric: tabular-nums;
      }

      .date-field-icon {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: #6f7d93;
        pointer-events: none;
      }

      .date-field:focus-within .date-field-icon,
      .date-field:hover .date-field-icon {
        color: #2c79ea;
      }

      .date-field-icon svg {
        width: 16px;
        height: 16px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .date-native-input {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        pointer-events: auto;
        cursor: pointer;
        z-index: 2;
      }

      textarea.input {
        min-height: 70px;
        padding: 8px;
        resize: vertical;
      }

      .input:focus,
      .select:focus,
      textarea.input:focus {
        outline: none;
        border-color: #89afe8;
        box-shadow: 0 0 0 3px rgba(44, 121, 234, 0.14);
      }

      .native-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .combo {
        position: relative;
      }

      .combo-button {
        width: 100%;
        height: 32px;
        border: 1px solid #cad3e1;
        border-radius: 4px;
        background: #fff;
        color: var(--text);
        padding: 0 32px 0 8px;
        font: inherit;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        position: relative;
      }

      .combo.has-value .combo-button {
        padding-right: 42px;
      }

      .combo-button::after {
        content: "";
        position: absolute;
        right: 11px;
        top: 50%;
        width: 7px;
        height: 7px;
        border-right: 1px solid #6f7d93;
        border-bottom: 1px solid #6f7d93;
        transform: translateY(-65%) rotate(45deg);
      }

      .combo.has-value .combo-button::after {
        display: none;
      }

      .combo-clear {
        position: absolute;
        right: 9px;
        top: 16px;
        z-index: 3;
        width: 18px;
        height: 18px;
        min-height: 18px;
        border: 0;
        border-radius: 999px;
        background: #cbd4e2;
        color: #fff;
        padding: 0;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transform: translateY(-50%);
      }

      .combo-clear::before,
      .combo-clear::after {
        content: "";
        position: absolute;
        width: 9px;
        height: 1.5px;
        border-radius: 999px;
        background: currentColor;
      }

      .combo-clear::before {
        transform: rotate(45deg);
      }

      .combo-clear::after {
        transform: rotate(-45deg);
      }

      .combo.has-value .combo-clear {
        display: inline-flex;
      }

      .combo-clear:hover {
        background: #b9c3d3;
      }

      .combo-button span {
        display: block;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .combo-button.is-placeholder {
        color: #8a97ad;
      }

      .combo-button:focus,
      .combo.is-open .combo-button {
        outline: none;
        border-color: #89afe8;
        box-shadow: 0 0 0 3px rgba(44, 121, 234, 0.14);
      }

      .combo-panel {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        z-index: 50;
        border: 1px solid #aab8cc;
        border-radius: 6px;
        background: #fff;
        box-shadow: 0 10px 24px rgba(27, 48, 78, 0.16);
        overflow: hidden;
      }

      .combo-panel.hidden {
        display: none;
      }

      .combo-search-wrap {
        padding: 8px;
        border-bottom: 1px solid #e5edf8;
        background: #f8fbff;
      }

      .combo-search {
        height: 32px;
      }

      .combo-list {
        max-height: 240px;
        overflow: auto;
        padding: 4px;
      }

      .combo-option {
        width: 100%;
        min-height: 32px;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: var(--text);
        display: block;
        padding: 7px 8px;
        text-align: left;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
      }

      .combo-option:hover,
      .combo-option.is-selected {
        background: var(--blue-soft);
        color: #195bb5;
      }

      .combo-empty {
        padding: 12px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }

      .combo-panel {
        border-color: #aab8cc;
        background: #fff;
        box-shadow: 0 10px 24px rgba(27, 48, 78, 0.16);
      }

      .combo-search-wrap {
        border-bottom-color: #e5edf8;
        background: #f8fbff;
      }

      .combo-search {
        border-color: #c9d3e2;
        background: #fff;
        color: var(--text);
      }

      .combo-option {
        min-height: 28px;
        border-radius: 3px;
        color: var(--text);
        padding: 5px 8px 5px 24px;
        line-height: 1.4;
        position: relative;
      }

      .combo-option:hover,
      .combo-option.is-selected {
        background: var(--blue-soft);
        color: #195bb5;
      }

      .combo-option.is-selected::before {
        content: "✓";
        position: absolute;
        left: 8px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--blue);
        font-weight: 700;
      }

      .combo-empty {
        color: var(--muted);
      }

      .native-select-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .select-proxy {
        position: relative;
      }

      .select-proxy-button {
        width: 100%;
        min-height: 32px;
        border: 1px solid #c9d3e2;
        border-radius: 4px;
        background: #fff;
        color: var(--text);
        padding: 0 30px 0 10px;
        font: inherit;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        position: relative;
      }

      .select-proxy.has-value .select-proxy-button {
        padding-right: 42px;
      }

      .select-proxy-button::after {
        content: "";
        position: absolute;
        right: 10px;
        top: 50%;
        width: 7px;
        height: 7px;
        border-right: 1px solid #65758c;
        border-bottom: 1px solid #65758c;
        transform: translateY(-65%) rotate(45deg);
      }

      .select-proxy.has-value .select-proxy-button::after {
        display: none;
      }

      .select-proxy-clear {
        position: absolute;
        right: 9px;
        top: 50%;
        z-index: 3;
        width: 18px;
        height: 18px;
        min-height: 18px;
        border: 0;
        border-radius: 999px;
        background: #cbd4e2;
        color: #fff;
        padding: 0;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transform: translateY(-50%);
      }

      .select-proxy-clear::before,
      .select-proxy-clear::after {
        content: "";
        position: absolute;
        width: 9px;
        height: 1.5px;
        border-radius: 999px;
        background: currentColor;
      }

      .select-proxy-clear::before {
        transform: rotate(45deg);
      }

      .select-proxy-clear::after {
        transform: rotate(-45deg);
      }

      .select-proxy.has-value .select-proxy-clear {
        display: inline-flex;
      }

      .select-proxy-clear:hover {
        background: #b9c3d3;
      }

      .select-proxy-button span {
        display: block;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .select-proxy-button:focus,
      .select-proxy.is-open .select-proxy-button {
        outline: none;
        border-color: #89afe8;
        box-shadow: 0 0 0 3px rgba(44, 121, 234, 0.14);
      }

      .select-proxy-panel {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(100% + 4px);
        z-index: 90;
        max-height: 260px;
        overflow: auto;
        padding: 4px;
        border: 1px solid #9fb2cb;
        border-radius: 6px;
        background: #fff;
        box-shadow: 0 10px 24px rgba(27, 48, 78, 0.16);
      }

      .select-proxy-panel.hidden {
        display: none;
      }

      .select-proxy-option {
        width: 100%;
        min-height: 28px;
        border: 0;
        border-radius: 3px;
        background: transparent;
        color: var(--text);
        display: block;
        padding: 5px 8px 5px 24px;
        text-align: left;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        line-height: 1.4;
        position: relative;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .select-proxy-option:hover,
      .select-proxy-option.is-selected {
        background: var(--blue-soft);
        color: #195bb5;
      }

      .select-proxy-group {
        padding: 7px 8px 3px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        line-height: 1.3;
      }

      .select-proxy-option.is-grouped {
        padding-left: 32px;
      }

      .select-proxy-option.is-grouped.is-selected::before {
        left: 16px;
      }

      .select-proxy-option.is-selected::before {
        content: "✓";
        position: absolute;
        left: 8px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--blue);
        font-weight: 700;
      }

      .readonly {
        background: #f6f8fb;
        color: #6d7c93;
      }

      .tabs {
        display: flex;
        gap: 2px;
        padding: 0;
        background: transparent;
      }

      .tab-btn {
        height: 36px;
        padding: 0 14px;
        border: 0;
        border-bottom: 2px solid transparent;
        border-radius: 0;
        background: transparent;
        color: #4f6078;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: color 0.16s ease, border-color 0.16s ease, background-color 0.16s ease;
      }

      .tab-btn:hover {
        background: #f7faff;
        color: #2f528d;
      }

      .tab-btn.active {
        background: transparent;
        border-bottom-color: #2c79ea;
        color: #1e65cf;
        font-weight: 600;
      }

      .tab-panel {
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 8px 10px 10px;
        background: #fff;
      }

      .tab-panel.hidden {
        display: none;
      }

      .list-wrap {
        overflow: auto;
        padding: 6px;
      }

      .std-item {
        width: 100%;
        border: 1px solid transparent;
        border-radius: 4px;
        text-align: left;
        padding: 8px;
        cursor: pointer;
        background: #fff;
        border-bottom: 1px solid var(--line-soft);
      }

      .std-item:hover {
        background: #f7faff;
      }

      .std-item.active {
        border-color: #97bbee;
        background: var(--blue-soft);
      }

      .std-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: baseline;
      }

      .std-name {
        font-size: 14px;
        font-weight: 600;
      }

      .std-code {
        font-size: 12px;
        color: #5d6f8a;
      }

      .std-sub {
        margin-top: 5px;
        font-size: 12px;
        color: #70809a;
      }

      .empty {
        margin: 8px;
        padding: 16px 10px;
        text-align: center;
        border: 1px dashed #cdd8e8;
        background: #fafcff;
        color: #7b8799;
        font-size: 12px;
      }

      .table-wrap {
        min-height: 0;
        overflow: auto;
        background: #fff;
        padding: 0 8px 8px;
      }

      .tab-panel > .toolbar {
        border: 0;
        border-radius: 0;
        border-bottom: 0;
        background: transparent;
        padding: 0;
      }

      .toolbar.row > .btn {
        width: 56px;
        padding: 0;
      }

      .tab-panel > .table-wrap {
        border: 0;
        border-radius: 0;
        padding: 0 0 8px;
        background: transparent;
      }

      .tab-panel > .table-wrap th,
      .tab-panel > .table-wrap td {
        border-color: #e7edf7;
      }

      .tab-panel > .table-wrap th {
        border-top: 0;
      }

      table {
        width: 100%;
        min-width: 980px;
        border-collapse: collapse;
      }

      .table-wrap.compact table {
        min-width: 860px;
      }

      .detail-list-table {
        min-width: 1120px;
        table-layout: fixed;
      }

      .detail-list-table tbody tr {
        height: 42px;
      }

      .detail-list-table td {
        height: 42px;
        line-height: 20px;
      }

      .detail-list-table .text-ellipsis {
        max-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .modal-detail-table-wrap {
        max-height: none;
        overflow: visible;
        padding-bottom: 10px;
      }

      .modal-detail-table-wrap table {
        min-width: 1120px;
      }

      .modal-detail-table-wrap td {
        overflow: visible;
      }

      .modal-detail-table-wrap .select-proxy.is-open {
        z-index: 180;
      }

      .modal-object-table-wrap {
        min-height: 180px;
        max-height: clamp(180px, 34vh, 380px);
        overflow: auto;
      }

      .picker-table-wrap {
        max-height: clamp(260px, 62vh, 620px);
        overflow: auto;
      }

      th,
      td {
        border: 1px solid #e4eaf3;
        font-size: 12px;
        padding: 7px 8px;
        text-align: left;
        vertical-align: middle;
        background: #fff;
      }

      th {
        background: #f3f6fb;
        color: #3f4d61;
        font-weight: 600;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      tr:hover td {
        background: #f9fbfe;
      }

      tr.row-editor td {
        background: #f7fbff;
      }

      .row-editor .input,
      .row-editor .select {
        height: 30px;
        font-size: 12px;
      }

      .range-input {
        display: block;
        margin: 0 auto;
        width: 100%;
        max-width: 128px;
        height: 30px;
        min-width: 0;
        overflow: hidden;
        border: 1px solid #c7d5e8;
        border-radius: 5px;
        background: #fff;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .range-input:focus-within {
        border-color: #2f7cf0;
        box-shadow: 0 0 0 2px rgba(47, 124, 240, 0.12);
      }

      .range-input .input {
        width: 100%;
        height: 28px;
        min-width: 0;
        padding: 0 8px;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        text-align: left;
      }

      .range-input .input:focus {
        outline: none;
        border-color: transparent;
        box-shadow: none;
      }

      .range-separator {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #d94a4a;
        font-size: 11px;
        font-weight: 600;
      }

      .cell-actions {
        display: flex;
        gap: 8px;
      }

      .text-btn {
        border: 0;
        background: transparent;
        color: #2c79ea;
        padding: 0;
        font-size: 12px;
        cursor: pointer;
      }

      .text-btn.danger {
        color: var(--danger);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        height: 20px;
        padding: 0 8px;
        border-radius: 999px;
        font-size: 12px;
      }

      .tag.ok {
        background: #ebf8f0;
        color: #1d8650;
      }

      .tag.stop {
        background: #fff2f2;
        color: #bf3b3b;
      }

      .foot {
        border-top: 1px solid var(--line);
        padding: 7px 10px;
        font-size: 12px;
        color: #6f7d93;
      }

      .tab-panel > .foot {
        border: 0;
        border-top: 0;
        border-radius: 0;
        background: transparent;
        padding: 2px 2px 0;
      }

      .status-bar {

        align-items: flex-start;
        justify-content: center;
        padding: 14px;
        overflow: auto;

      }

      .grid.cols-3 {

      function ensureSelectOption(selectElement, value) {
        const text = String(value || "").trim();
        if (!text || !(selectElement instanceof HTMLSelectElement)) {
          return;
        }
        const exists = Array.from(selectElement.options).some((option) => String(option.value) === text);
        if (exists) {
          return;
        }
        const option = document.createElement("option");
        option.value = text;
        option.textContent = text;
        selectElement.appendChild(option);
      }

        refs.stdCategoryInput.innerHTML = options.join("");

        refs.stdCategoryInput.value = selectedValue || "";

      function renderWorkshopSelectOptions(selectedValue = String(refs.stdWorkshopInput?.value || "").trim()) {
        const selected = String(selectedValue || "").trim();
        const grouped = new Map();
        state.sitePool.forEach((site) => {
          const area = site.area || "未配置区域";
          if (!grouped.has(area)) {
            grouped.set(area, []);
          }
          grouped.get(area).push(site);
        });

        const options = ['<option value="">请选择所属车间</option>'];
        Array.from(grouped.keys())
          .sort((a, b) => String(a).localeCompare(String(b), "zh-Hans-CN"))
          .forEach((area) => {
            options.push(`<optgroup label="${escapeHtml(area)}">`);
            grouped
              .get(area)
              .sort((a, b) => String(a.name || "").localeCompare(String(b.name || ""), "zh-Hans-CN"))
              .forEach((site) => {
                const label = site.code ? `${site.name}（${site.code}）` : site.name;
                options.push(`<option value="${escapeHtml(site.name)}">${escapeHtml(label)}</option>`);
              });
            options.push("</optgroup>");

          options.push(`<option value="${escapeHtml(selected)}">${escapeHtml(selected)}</option>`);

      function setSelectOptions(selectElement, { placeholder, options, selectedValue = "", fallbackOption = null }) {
        if (!(selectElement instanceof HTMLSelectElement)) {
          return;
        }

        const currentValue = String(selectedValue || "").trim();
        const fragment = document.createDocumentFragment();
        const placeholderOption = document.createElement("option");
        placeholderOption.value = "";
        placeholderOption.textContent = placeholder || "请选择";
        fragment.appendChild(placeholderOption);

        const values = new Set();
        (Array.isArray(options) ? options : []).forEach((item) => {
          if (!item) {
            return;
          }
          const value = String(item.value || "").trim();
          const label = String(item.label || "").trim();
          if (!value || !label || values.has(value)) {
            return;
          }
          values.add(value);

          const option = document.createElement("option");
          option.value = value;
          option.textContent = label;

          const meta = item.meta && typeof item.meta === "object" ? item.meta : {};
          Object.entries(meta).forEach(([key, val]) => {
            if (val === undefined || val === null) {
              return;
            }
            option.dataset[key] = String(val);
          });

          fragment.appendChild(option);
        });

        if (currentValue && !values.has(currentValue) && fallbackOption) {
          const option = document.createElement("option");
          option.value = String(fallbackOption.value || "").trim();
          option.textContent = String(fallbackOption.label || "").trim() || option.value;
          const meta = fallbackOption.meta && typeof fallbackOption.meta === "object" ? fallbackOption.meta : {};
          Object.entries(meta).forEach(([key, val]) => {
            if (val === undefined || val === null) {
              return;
            }
            option.dataset[key] = String(val);
          });
          fragment.appendChild(option);
        }

        selectElement.innerHTML = "";
        selectElement.appendChild(fragment);

        if (currentValue) {
          selectElement.value = currentValue;
        }
        if (selectElement.value !== currentValue) {
          selectElement.value = "";
        }
      }

      function normalizeDepartmentContactList(list) {
        const output = [];
        const seen = new Set();

        (Array.isArray(list) ? list : []).forEach((item) => {
          if (!item || typeof item !== "object") {
            return;
          }
          const deptId = readFirstObjectText(item, ["deptId", "dept_id", "id", "_id", "value", "key"]);
          const name = readFirstObjectText(item, ["name", "dept_name", "label", "title"]);
          if (!deptId && !name) {
            return;
          }
          const key = deptId || name;
          if (seen.has(key)) {
            return;
          }
          seen.add(key);
          output.push({
            deptId,
            name,
            parentId: readFirstObjectText(item, ["parentId", "parent_id", "parent_dept_id"]),
            parentNo: readFirstObjectText(item, ["parentNo", "parent_no"]),
            deptNo: readFirstObjectText(item, ["deptNo", "dept_no"]),
          });
        });

        return sortDepartmentsByHierarchy(output);
      }

      function normalizeUserContactList(list) {
        const output = [];
        const seen = new Set();

        (Array.isArray(list) ? list : []).forEach((item) => {
          if (!item || typeof item !== "object") {
            return;
          }

          const category = readFirstObjectText(item, ["category", "status"]);
          if (category === "-2") {
            return;
          }

          const userId = readFirstObjectText(item, ["userId", "user_id", "id", "_id", "uniqueid", "uniqueId"]);
          const name = readFirstObjectText(item, ["name", "userName", "user_name", "nickname", "label", "title"]);
          if (!userId && !name) {
            return;
          }

          const key = userId || name;
          if (seen.has(key)) {
            return;
          }
          seen.add(key);

          const departments = normalizeDepartmentContactList(Array.isArray(item.departments) ? item.departments : []);
          const mainDeptId =
            readFirstObjectText(item, ["mainDeptId", "main_department_id", "mainDepartmentId", "dept_id"]) ||
            (departments[0] ? departments[0].deptId : "");
          const mainDeptName =
            readFirstObjectText(item, ["mainDeptName", "main_department_name", "mainDepartmentName", "dept_name"]) ||
            (departments[0] ? departments[0].name : "");

          output.push({
            userId,
            name,
            account: readFirstObjectText(item, ["account", "username", "loginName", "login_name"]),
            mobile: readFirstObjectText(item, ["mobile", "phone", "tel"]),
            email: readFirstObjectText(item, ["email", "mail"]),
            mainDeptId,
            mainDeptName,
            departments,
          });
        });

        output.sort((a, b) => (a.name || a.userId).localeCompare(b.name || b.userId, "zh-Hans-CN"));
        return output;
      }

      function readFirstObjectText(source, keys) {
        for (const key of keys) {
          if (!Object.prototype.hasOwnProperty.call(source, key)) {
            continue;
          }
          const text = String(source[key] || "").trim();
          if (text) {
            return text;
          }
        }
        return "";
      }

      function sortDepartmentsByHierarchy(list) {
        const rows = Array.isArray(list) ? list.filter((item) => item && typeof item === "object") : [];
        if (!rows.length) {
          return [];
        }

        const compareDept = (a, b) => {
          const aNo = Number(a?.deptNo);
          const bNo = Number(b?.deptNo);
          const hasANo = Number.isFinite(aNo);
          const hasBNo = Number.isFinite(bNo);
          if (hasANo && hasBNo && aNo !== bNo) {
            return aNo - bNo;
          }
          if (hasANo !== hasBNo) {
            return hasANo ? -1 : 1;
          }
          return String(a?.name || a?.deptId || "").localeCompare(String(b?.name || b?.deptId || ""), "zh-Hans-CN");
        };

        const idSet = new Set(rows.map((item) => String(item.deptId || "").trim()).filter(Boolean));
        const childrenMap = new Map();
        const keyOf = (item) => String(item.deptId || item.name || "").trim();
        const normalizeParentId = (item) => {
          const parentId = String(item.parentId || "").trim();
          if (!parentId) {
            return "";
          }
          return idSet.has(parentId) ? parentId : "";
        };

        rows.forEach((item) => {
          const parentId = normalizeParentId(item);
          if (!childrenMap.has(parentId)) {
            childrenMap.set(parentId, []);
          }
          childrenMap.get(parentId).push(item);
        });
        childrenMap.forEach((items) => items.sort(compareDept));

        const ordered = [];
        const visited = new Set();
        const walk = (parentId) => {
          const children = childrenMap.get(parentId) || [];
          children.forEach((item) => {
            const key = keyOf(item);
            if (!key || visited.has(key)) {
              return;
            }
            visited.add(key);
            ordered.push(item);
            const id = String(item.deptId || "").trim();
            if (id) {
              walk(id);
            }
          });
        };

        walk("");

        rows
          .filter((item) => {
            const key = keyOf(item);
            return key && !visited.has(key);
          })
          .sort(compareDept)
          .forEach((item) => ordered.push(item));

        return ordered;
      }

            return [user.name, user.userId, user.account, user.mobile, user.email, user.mainDeptName].map(normalizeSearchText).join("|").includes(text);
          });

        return state.contacts.departments.filter((dept) => {

      function upsertContactDepartment(deptId, deptName) {
        const id = String(deptId || "").trim();
        const name = String(deptName || "").trim();
        if (!id && !name) {
          return;
        }
        const exists = state.contacts.departments.some((item) => {
          if (!item || typeof item !== "object") {
            return false;
          }
          if (id && String(item.deptId || "").trim() === id) {
            return true;
          }
          return !id && name && String(item.name || "").trim() === name;
        });
        if (!exists) {
          state.contacts.departments.push({
            deptId: id,
            name: name || id,
            parentId: "",
            parentNo: "",
            deptNo: "",
          });
          state.contacts.departments.sort((a, b) => (a.name || a.deptId).localeCompare(b.name || b.deptId, "zh-Hans-CN"));
        }
      }

      function upsertContactUser(userId, userName, deptId, deptName) {
        const id = String(userId || "").trim();
        const name = String(userName || "").trim();
        if (!id && !name) {
          return;
        }

        const targetKey = id || name;
        let current = state.contacts.users.find((item) => (item.userId || item.name) === targetKey);
        if (!current) {
          current = {
            userId: id,
            name: name || id,
            account: "",
            mobile: "",
            email: "",
            mainDeptId: String(deptId || "").trim(),
            mainDeptName: String(deptName || "").trim(),
            departments: [],
          };
          state.contacts.users.push(current);
        }

        const resolvedDeptId = String(deptId || current.mainDeptId || "").trim();
        const resolvedDeptName = String(deptName || current.mainDeptName || "").trim();
        if (resolvedDeptId || resolvedDeptName) {
          current.mainDeptId = resolvedDeptId;
          current.mainDeptName = resolvedDeptName;
          const hasDept = current.departments.some((item) => String(item.deptId || "").trim() === resolvedDeptId);
          if (!hasDept) {
            current.departments.push({
              deptId: resolvedDeptId,
              name: resolvedDeptName,
            });
          }
        }

        state.contacts.users.sort((a, b) => (a.name || a.userId).localeCompare(b.name || b.userId, "zh-Hans-CN"));
      }

      function findCurrentContactUser() {
        const ctx = state.externalContext || {};
        const candidates = [ctx.userId, ctx.uniqueId, ctx.userName, ctx.account, ctx.mobile, ctx.email]
          .map((item) => String(item || "").trim())
          .filter(Boolean);
        if (!candidates.length) {
          return null;
        }
        return (Array.isArray(state.contacts.users) ? state.contacts.users : []).find((user) => {
          const values = [user.userId, user.name, user.account, user.mobile, user.email]
            .map((item) => String(item || "").trim())
            .filter(Boolean);
          return values.some((value) => candidates.includes(value));
        }) || null;
      }

      function applyCurrentUserToStandardDraft(member, { silent = false } = {}) {
        const draft = state.modal.standard.draft;
        if (!draft || !member) {
          return false;
        }

        const ownerName = toDisplayText(member.userName || member.name || member.user || member.account);
        const ownerId = extractComplexId(member.userId || member.id || member.uniqueId);
        const deptName = toDisplayText(member.mainDepartmentName || member.mainDeptName || member.departmentsName);
        const deptId = extractComplexId(member.mainDepartmentId || member.mainDeptId || member.departmentsId);

        if (!ownerId && !ownerName) {
          return false;
        }

        draft.defaultOwner = ownerName || ownerId;
        draft.defaultOwnerId = ownerId;
        draft.defaultOwnerRaw = ownerId || ownerName || null;
        draft.responsibilityDept = deptName;
        draft.responsibilityDeptId = deptId;
        draft.responsibilityDeptRaw = deptId || deptName || null;
        upsertContactDepartment(deptId, deptName);
        upsertContactUser(ownerId, ownerName || ownerId, deptId, deptName);
        populateStandardFormByDraft();

        if (!silent) {
          showToast(`已带入当前成员：${draft.defaultOwner}`);
        }
        return true;
      }

      async function ensureContactsLoaded({ force = false, silent = false } = {}) {
        if (!force && state.contacts.loaded) {
          return;
        }

        if (state.contacts.loading && state.contacts.loadPromise) {
          await state.contacts.loadPromise;
          return;
        }

        state.contacts.loading = true;
        renderDepartmentSelectOptions();
        renderOwnerSelectOptions();

        const loadTask = (async () => {
          const [deptResult, userResult] = await Promise.allSettled([
            requestApi("/contacts/departments"),
            requestApi("/contacts/users"),
          ]);

          const messages = [];

          if (deptResult.status === "fulfilled") {
            const rows = deptResult.value?.data?.departments || [];
            state.contacts.departments = normalizeDepartmentContactList(rows);
          } else {
            messages.push(`部门：${deptResult.reason?.message || "获取失败"}`);
            state.contacts.departments = [];
          }

          if (userResult.status === "fulfilled") {
            const rows = userResult.value?.data?.users || [];
            state.contacts.users = normalizeUserContactList(rows);
          } else {
            messages.push(`成员：${userResult.reason?.message || "获取失败"}`);
            state.contacts.users = [];
          }

          if (deptResult.status !== "fulfilled" && userResult.status !== "fulfilled") {
            throw new Error(messages.join("；") || "通讯录加载失败");
          }

          state.contacts.loaded = deptResult.status === "fulfilled" && userResult.status === "fulfilled";

          if (messages.length && !silent) {
            showToast(`通讯录部分加载失败：${messages.join("；")}`);
          }
        })();

        state.contacts.loadPromise = loadTask;
        try {
          await loadTask;
        } finally {
          state.contacts.loading = false;
          state.contacts.loadPromise = null;

          const draft = state.modal.standard.draft;
          renderDepartmentSelectOptions({
            selectedDeptId: draft?.responsibilityDeptId || "",
            selectedDeptName: draft?.responsibilityDept || "",
          });
          renderOwnerSelectOptions({
            selectedOwnerId: draft?.defaultOwnerId || "",
            selectedOwnerName: draft?.defaultOwner || "",
          });
          syncModalSelectPlaceholderState();
          refreshSelectProxies(refs.standardForm);
        }
      }

      function bindSelectProxyShell() {
        if (window.__selectProxyShellBound) return;
        window.__selectProxyShellBound = true;
        document.addEventListener("click", (event) => {
          if (!(event.target instanceof HTMLElement) || !event.target.closest(".select-proxy")) {
            closeSelectProxies();
          }
        });
        new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            mutation.addedNodes.forEach((node) => {
              if (node instanceof HTMLElement) {
                enhanceSelectProxies(node);
              }
            });
          });
        }).observe(document.body, { childList: true, subtree: true });
      }

      function enhanceSelectProxies(scope = document) {
        if (!scope) return;
        const selector = "select.select:not(.native-hidden)";
        if (scope instanceof HTMLSelectElement && scope.matches(selector)) {
          enhanceSelectProxy(scope);
        }
        scope.querySelectorAll?.(selector).forEach((select) => enhanceSelectProxy(select));
      }

      function enhanceSelectProxy(select) {
        if (select.classList.contains("native-select-hidden")) {
          refreshSelectProxy(select);
          return;
        }
        const next = select.nextElementSibling;
        if (next && next.classList.contains("select-proxy")) {
          next.remove();
        }
        select.classList.add("native-select-hidden");

        const proxy = document.createElement("div");
        proxy.className = "select-proxy";
        const button = document.createElement("button");
        button.type = "button";
        button.className = "select-proxy-button";
        const text = document.createElement("span");
        button.appendChild(text);
        const clear = document.createElement("button");
        clear.type = "button";
        clear.className = "select-proxy-clear";
        clear.setAttribute("aria-label", "清空选择");
        const panel = document.createElement("div");
        panel.className = "select-proxy-panel hidden";
        const list = document.createElement("div");
        panel.appendChild(list);
        proxy.appendChild(button);
        proxy.appendChild(clear);
        proxy.appendChild(panel);
        select.insertAdjacentElement("afterend", proxy);

        const render = () => renderSelectProxy(select, proxy, text, list);
        clear.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          if (select.disabled) return;
          const hasEmptyOption = Array.from(select.options).some((option) => option.value === "");
          if (!hasEmptyOption) return;
          select.value = "";
          select.dispatchEvent(new Event("change", { bubbles: true }));
          closeSelectProxies();
        });
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const willOpen = panel.classList.contains("hidden");
          closeSelectProxies();
          render();
          if (willOpen) {
            proxy.classList.add("is-open");
            panel.classList.remove("hidden");
          }
        });
        select.addEventListener("change", render);
        new MutationObserver(render).observe(select, { childList: true, subtree: true });
        render();
      }

      function renderSelectProxy(select, proxy, text, list) {
        const selected = select.selectedOptions && select.selectedOptions[0];
        text.textContent = selected?.textContent || "请选择";
        const hasEmptyOption = Array.from(select.options).some((option) => option.value === "");
        proxy.classList.toggle("has-value", Boolean(select.value) && hasEmptyOption && !select.disabled);
        list.innerHTML = "";
        const appendOption = (option, grouped = false) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = `select-proxy-option${grouped ? " is-grouped" : ""}${option.value === select.value ? " is-selected" : ""}`;
          item.textContent = option.textContent || "请选择";
          item.disabled = option.disabled;
          item.addEventListener("click", () => {
            select.value = option.value;
            select.dispatchEvent(new Event("change", { bubbles: true }));
            closeSelectProxies();
          });
          list.appendChild(item);
        };
        Array.from(select.children).forEach((child) => {
          if (child instanceof HTMLOptGroupElement) {
            const group = document.createElement("div");
            group.className = "select-proxy-group";
            group.textContent = child.label || "";
            list.appendChild(group);
            Array.from(child.children).forEach((option) => {
              if (option instanceof HTMLOptionElement) {
                appendOption(option, true);
              }
            });
            return;
          }
          if (child instanceof HTMLOptionElement) {
            appendOption(child, false);
          }
        });
        proxy.classList.toggle("is-disabled", select.disabled);
      }

      function refreshSelectProxy(select) {
        const proxy = select?.nextElementSibling;
        if (!proxy || !proxy.classList.contains("select-proxy")) return;
        const text = proxy.querySelector(".select-proxy-button span");
        const list = proxy.querySelector(".select-proxy-panel > div");
        if (text && list) {
          renderSelectProxy(select, proxy, text, list);
        }
      }

      function refreshSelectProxies(scope = document) {
        if (!scope) return;
        scope.querySelectorAll("select.native-select-hidden").forEach(refreshSelectProxy);
      }

      function closeSelectProxies() {
        document.querySelectorAll(".select-proxy.is-open").forEach((proxy) => proxy.classList.remove("is-open"));
        document.querySelectorAll(".select-proxy-panel:not(.hidden)").forEach((panel) => panel.classList.add("hidden"));
      }

      async function refreshAll({ preserveSelectedId = "" } = {}) {
        const previousId = preserveSelectedId || state.selectedStandardId;
        clearInlineDetailState("active");
        setLoading(true);
        setStatus("正在同步数据...");
        try {
          await Promise.all([syncRuleOptions(), syncDevicePool(), syncRelationPool(), syncStandards(previousId)]);
          renderRuleSelectOptions();
          const current = getSelectedStandard();
          if (current) {
            await ensureStandardDetailsLoaded(current, { force: true });
          }
          renderAll();
          setStatus(`同步完成 ${formatTime(new Date())}`);
        } catch (error) {
          renderAll();
          setStatus(`同步失败：${error.message}`, true);
          showToast(`同步失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      async function syncDevicePool() {
        const [deviceRecords, chemicalRecords, siteRecords] = await Promise.all([
          fetchEntryRecords(API_CONFIG.deviceEntryId),
          fetchEntryRecords(API_CONFIG.chemicalEntryId),
          fetchEntryRecords(API_CONFIG.siteEntryId),
        ]);
        state.devicePool = deviceRecords
          .map((record) => mapDeviceRecord(record))
          .filter((item) => item.cloudId && (item.code || item.name));
        state.chemicalPool = chemicalRecords
          .map((record) => mapChemicalRecord(record))
          .filter((item) => item.cloudId && (item.code || item.name));
        state.sitePool = siteRecords
          .map((record) => mapSiteRecord(record))
          .filter((item) => item.id && item.name)
          .map((site) => ({
            ...site,
            chemicalCount: state.chemicalPool.filter((chemical) => isChemicalInStore(chemical, site)).length,
          }));
        renderWorkshopSelectOptions();
        renderAreaSelectOptions();
      }

      async function syncRuleOptions() {
        const result = await requestApi("/rule-config/bootstrap");
        const rows = Array.isArray(result?.data?.rules) ? result.data.rules : [];
        state.rules = rows
          .map((item) => ({
            id: String(item.id || "").trim(),
            code: String(item.code || "").trim(),
            name: String(item.name || "").trim(),
            category: String(item.category || "").trim(),
            generationType: String(item.generationType || "").trim(),
            status: normalizeStatus(item.status || "启用"),
          }))
          .filter((item) => item.id && item.name)
          .sort((a, b) => {
            const enabledSort = Number(b.status === "启用") - Number(a.status === "启用");
            if (enabledSort) {
              return enabledSort;
            }
            return String(a.name).localeCompare(String(b.name), "zh-CN");
          });
      }

      async function syncRelationPool() {
        const relationRecords = await fetchEntryRecords(API_CONFIG.relationEntryId);
        state.relationPool = relationRecords
          .map((record) => mapRelationRecord(record))
          .filter((item) => item.cloudId && item.standardId && item.objectId)
          .sort((a, b) => String(a.standardCode || "").localeCompare(String(b.standardCode || ""), "zh-CN"));
      }

      async function syncStandards(preferredId = "") {
        const records = await fetchEntryRecords(API_CONFIG.masterEntryId);
        state.standards = records
          .map((record) => mapStandardRecord(record))
          .filter((item) => item.cloudId && (item.code || item.name))
          .sort((a, b) => String(b.code || "").localeCompare(String(a.code || ""), "zh-CN"));

        const validIds = new Set(state.standards.map((item) => item.id));
        let selected = preferredId || state.selectedStandardId;
        if (!selected || !validIds.has(selected)) {
          selected = state.standards[0]?.id || "";
        }

        state.selectedStandardId = selected;
        state.selected.detailIds.clear();
        state.selected.deviceIds.clear();
      }

      async function ensureStandardDetailsLoaded(standard, { force = false } = {}) {
        if (!standard || !standard.cloudId) {
          return;
        }
        if (standard.detailsLoaded && !force) {
          return;
        }

        const records = await fetchEntryRecords(API_CONFIG.detailEntryId);
        const filtered = records.filter((record) => isDetailBelongsToStandard(record, standard));
        standard.details = filtered
          .map((record) => mapDetailRecord(record))
          .sort((a, b) => Number(a.sortNo || a.no || 0) - Number(b.sortNo || b.no || 0));
        standard.detailsLoaded = true;
      }

      function isDetailBelongsToStandard(record, standard) {
        const stdId = toDisplayText(getAliasRawValue(record, DETAIL_FIELD.standardId));
        const stdName = toDisplayText(getAliasRawValue(record, DETAIL_FIELD.standardName));
        if (standard.cloudId && stdId) {
          return stdId === standard.cloudId;
        }
        if (standard.cloudId && !stdId) {
          return stdName && stdName === standard.name;
        }
        return stdName && stdName === standard.name;
      }

          <div class="standard-summary-item ${full ? "full" : ""}">

      function renderActionDisabled() {
        const hasStandard = Boolean(getSelectedStandard());

        refs.editStandardBtn.disabled = state.loading || !hasStandard;
        refs.deleteStandardBtn.disabled = state.loading || !hasStandard;

        refs.addStandardTopBtn.disabled = state.loading;
      }

      async function openStandardModal(mode) {
        clearInlineDetailState("draft");
        if (mode === "edit") {
          const current = getSelectedStandard();
          if (!current) {
            showToast("请先选择标准");
            return;
          }
          try {
            await ensureStandardDetailsLoaded(current);
          } catch (error) {
            showToast(`加载明细失败：${error.message}`);
            return;
          }
        }

        state.modal.standard.mode = mode;
        state.modal.standard.selectedDetailIds.clear();
        state.modal.standard.selectedDeviceIds.clear();

        if (mode === "edit") {
          const current = getSelectedStandard();
          const draft = deepClone(current);
          draft.devices = getCurrentLinkedDevices();
          state.modal.standard.draft = draft;
          state.modal.standard.originDeviceIds = new Set(draft.devices.map((item) => item.deviceId));
          state.modal.standard.originDeviceType = normalizeApplicableDeviceType(draft.applicableDeviceType);
          refs.standardModalTitle.textContent = "编辑点检标准";
        } else {
          const draft = createEmptyStandardDraft();
          state.modal.standard.draft = draft;
          state.modal.standard.originDeviceIds = new Set();
          state.modal.standard.originDeviceType = normalizeApplicableDeviceType(draft.applicableDeviceType);
          refs.standardModalTitle.textContent = "新建点检标准";
        }

        try {
          await ensureContactsLoaded({ silent: true });
        } catch (error) {
          showToast(`通讯录加载失败：${error.message}`);
        }

        populateStandardFormByDraft();
        renderDraftDetailTable();
        renderDraftDeviceTable();
        refs.standardModal.classList.remove("hidden");

        if (mode === "add" && !state.modal.standard.draft.defaultOwnerId) {
          void fillCurrentOwnerFromApi({ silent: true });
        }
      }

      function closeStandardModal() {
        if (state.modal.standard.saving) {
          showToast("正在保存，请稍候");
          return;
        }
        closeStandardModalForce();
      }

      function closeStandardModalForce() {
        clearInlineDetailState("draft");
        refs.standardModal.classList.add("hidden");
        setStandardSaveState(false);
      }

      function setStandardSaveState(isSaving) {
        state.modal.standard.saving = Boolean(isSaving);
        if (!refs.saveStandardBtn) {
          return;
        }
        refs.saveStandardBtn.disabled = Boolean(isSaving);
        refs.saveStandardBtn.textContent = isSaving ? "保存中..." : "保存";
      }

        return {

          name: "",
          category: "",
          workshop: "",
          area: "",
          responsibilityPost: "",
          responsibilityDept: "",
          responsibilityDeptId: "",
          responsibilityDeptRaw: null,
          defaultOwner: "",
          defaultOwnerId: "",
          defaultOwnerRaw: null,

          version: "",
          applicableDeviceType: "设备",

          expiryDate: "",
          scanRequired: "是",

          activeRuleId: "",

      function populateStandardFormByDraft() {
        const draft = state.modal.standard.draft;
        if (!draft) {
          return;
        }

        refs.stdCodeInput.value = draft.code || "自动生成";
        refs.stdNameInput.value = draft.name || "";
        renderRuleSelectOptions(draft.category);
        ensureSelectOption(refs.stdCategoryInput, draft.category);
        refs.stdCategoryInput.value = draft.category || "";
        refs.stdApplicableDeviceTypeInput.value = normalizeApplicableDeviceType(draft.applicableDeviceType);
        refs.stdVersionInput.value = draft.version || "";
        renderWorkshopSelectOptions(draft.workshop || "");
        const matchedSite = getSiteByWorkshop(draft.workshop || "");
        renderAreaSelectOptions(draft.area || matchedSite?.area || "");
        refs.stdPostInput.value = draft.responsibilityPost || "";
        refs.stdStatusInput.value = draft.status || "启用";
        renderDepartmentSelectOptions({
          selectedDeptId: draft.responsibilityDeptId || "",
          selectedDeptName: draft.responsibilityDept || "",
        });
        renderOwnerSelectOptions({
          selectedOwnerId: draft.defaultOwnerId || "",
          selectedOwnerName: draft.defaultOwner || "",
        });
        refs.stdStartInput.value = draft.effectiveDate || "";
        refs.stdEndInput.value = draft.expiryDate || "";
        syncStandardDateFields();
        validateAndRenderStandardDateRange({ focus: false });
        refs.stdRemarkInput.value = draft.remark || "";
        syncModalSelectPlaceholderState();
        refreshSelectProxies(refs.standardForm);
