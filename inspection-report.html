        }
      }

      async function openLiveScanModal() {
        refs.liveScanModal.classList.remove("hidden");
        refs.liveScanStatus.textContent = "正在打开摄像头...";
        try {
          await startLiveScanSession();
        } catch (error) {
          closeLiveScanModal({ silent: true });
          const message = buildLiveScanErrorMessage(error);
          setStatus("dashboard", message, true);
          showToast(message);
        }
      }

      function closeLiveScanModal(options = {}) {
        refs.liveScanModal.classList.add("hidden");
        if (!options.silent) {
          setStatus("dashboard", "准备就绪");
        }
        stopLiveScanSession();
      }

      async function startLiveScanSession() {
        if (!isSecureCameraContext()) {
          throw new Error("当前页面不是安全环境，无法直接调用摄像头扫码");
        }
        if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== "function") {
          throw new Error("当前浏览器不支持直接调用摄像头扫码");
        }

        stopLiveScanSession();
        state.liveScanSessionId += 1;
        const sessionId = state.liveScanSessionId;

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 },
          },
        });

        state.liveScanActive = true;
        state.liveScanStream = stream;
        state.liveScanFrameBusy = false;
        state.liveScanMode = "detector";
        state.liveScanDetector = null;

        refs.liveScanVideo.srcObject = stream;
        refs.liveScanVideo.setAttribute("playsinline", "true");
        refs.liveScanVideo.setAttribute("webkit-playsinline", "true");
        refs.liveScanVideo.muted = true;

        try {
          await refs.liveScanVideo.play();
        } catch (error) {
          console.warn("live scan video autoplay failed:", error);
        }

        refs.liveScanStatus.textContent = "请将二维码放入取景框内，识别后会自动进入报工";

        if ("BarcodeDetector" in window) {
          state.liveScanMode = "detector";
          void runLiveDetectorScan(sessionId);
        } else {
          state.liveScanMode = "server";
          refs.liveScanStatus.textContent = "正在使用兼容模式识别二维码，请保持画面稳定";
          scheduleLiveServerScan(sessionId, 180);
        }
      }

      function stopLiveScanSession() {
        state.liveScanActive = false;
        state.liveScanSessionId += 1;
        state.liveScanMode = "";
        state.liveScanFrameBusy = false;
        state.liveScanDetector = null;
        if (state.liveScanFrameTimer) {
          window.clearTimeout(state.liveScanFrameTimer);
          state.liveScanFrameTimer = 0;
        }
        if (state.liveScanRafId) {
          window.cancelAnimationFrame(state.liveScanRafId);
          state.liveScanRafId = 0;
        }
        if (state.liveScanStream) {
          try {
            state.liveScanStream.getTracks().forEach((track) => track.stop());
          } catch (error) {
            console.warn("stop live scan stream failed:", error);
          }
          state.liveScanStream = null;
        }
        if (refs.liveScanVideo) {
          try {
            refs.liveScanVideo.pause();
          } catch (error) {
            console.warn("pause live scan video failed:", error);
          }
          refs.liveScanVideo.srcObject = null;
        }
      }

      async function runLiveDetectorScan(sessionId) {
        if (!state.liveScanActive || sessionId !== state.liveScanSessionId || refs.liveScanModal.classList.contains("hidden")) {
          return;
        }

        try {
          if (!state.liveScanDetector) {
            state.liveScanDetector = new BarcodeDetector({ formats: ["qr_code"] });
          }
          if (refs.liveScanVideo.readyState >= 2) {
            const results = await state.liveScanDetector.detect(refs.liveScanVideo);
            const first = Array.isArray(results) ? results.find((item) => item && item.rawValue) : null;
            const decoded = normalizeScanValue(first && first.rawValue ? first.rawValue : "");
            if (decoded) {
              await finalizeLiveScanResult(decoded, sessionId);
              return;
            }
          }
        } catch (error) {
          console.warn("live barcode detect failed:", error);
          state.liveScanMode = "server";
          refs.liveScanStatus.textContent = "当前环境不支持原生扫码识别，已切换兼容模式";
          scheduleLiveServerScan(sessionId, 120);
          return;
        }

        state.liveScanRafId = window.requestAnimationFrame(() => {
          void runLiveDetectorScan(sessionId);
        });
      }

      function scheduleLiveServerScan(sessionId, delay = 650) {
        if (!state.liveScanActive || sessionId !== state.liveScanSessionId) {
          return;
        }
        if (state.liveScanFrameTimer) {
          window.clearTimeout(state.liveScanFrameTimer);
        }
        state.liveScanFrameTimer = window.setTimeout(() => {
          void scanLiveFrameViaServer(sessionId);
        }, delay);
      }

      async function scanLiveFrameViaServer(sessionId) {
        if (!state.liveScanActive || sessionId !== state.liveScanSessionId || refs.liveScanModal.classList.contains("hidden")) {
          return;
        }
        if (state.liveScanFrameBusy) {
          scheduleLiveServerScan(sessionId, 220);
          return;
        }
        if (!refs.liveScanVideo || refs.liveScanVideo.readyState < 2) {
          scheduleLiveServerScan(sessionId, 180);
          return;
        }

        state.liveScanFrameBusy = true;
        try {
          const imageBase64 = captureLiveVideoFrame();
          if (!imageBase64) {
            scheduleLiveServerScan(sessionId, 180);
            return;
          }
          const resp = await requestApi("/qr/decode", "POST", { imageBase64 });
          const decoded = normalizeScanValue(resp?.data?.scanValue || resp?.data?.rawValue || "");
          if (decoded) {
            await finalizeLiveScanResult(decoded, sessionId);
            return;
          }
        } catch (error) {
          const text = String(error && error.message ? error.message : error || "");
          if (!/未识别到二维码|重新拍照|图片格式不正确|图片数据为空/.test(text)) {
            console.warn("live scan via server failed:", error);
            refs.liveScanStatus.textContent = `识别中：${text}`;
          }
        } finally {
          state.liveScanFrameBusy = false;
        }

        scheduleLiveServerScan(sessionId, 700);
      }

      function captureLiveVideoFrame() {
        const video = refs.liveScanVideo;
        if (!video) {
          return "";
        }

        const width = Number(video.videoWidth || 0);
        const height = Number(video.videoHeight || 0);
        if (!width || !height) {
          return "";
        }

        const maxEdge = 960;
        const scale = Math.min(1, maxEdge / Math.max(width, height));
        const canvas = liveScanFrameCanvas || document.createElement("canvas");
        liveScanFrameCanvas = canvas;
        canvas.width = Math.max(1, Math.round(width * scale));
        canvas.height = Math.max(1, Math.round(height * scale));

        const ctx = canvas.getContext("2d", { alpha: false });
        if (!ctx) {
          return "";
        }

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL("image/jpeg", 0.86);
      }

      async function finalizeLiveScanResult(decoded, sessionId) {
        if (!decoded || sessionId !== state.liveScanSessionId) {
          return;
        }
        refs.scanInput.value = decoded;
        refs.liveScanStatus.textContent = "识别成功，正在匹配任务...";
        closeLiveScanModal({ silent: true });
        await quickScanAndStart();
      }

      function isSecureCameraContext() {
        if (window.isSecureContext) {
          return true;
        }
        const host = String(window.location.hostname || "").trim();
        return host === "localhost" || host === "127.0.0.1";
      }

      function buildLiveScanErrorMessage(error) {
        const text = String(error && error.message ? error.message : error || "").trim();
        const name = String(error && error.name ? error.name : "").trim();
        if (/安全环境|secure/i.test(text)) {
          return "当前页面不是 HTTPS 安全环境，无法直接调用摄像头扫码";
        }
        if (/notallowederror/i.test(name) || /permission|权限|denied/i.test(text)) {
          return "未获取摄像头权限，请在系统设置中允许钉钉访问相机后重试";
        }
        if (/notfounderror/i.test(name) || /未找到|摄像头/i.test(text)) {
          return "未找到可用摄像头，请检查设备后重试";
        }
        if (/不支持/.test(text)) {
          return text;
        }
        return text || "当前环境暂不支持直接扫码，请使用系统扫一扫";
      }

      async function decodeQrFromFile(file) {
        const errors = [];

        try {
          return await decodeQrWithBarcodeDetector(file);
        } catch (error) {
          if (error && error.message) {
            errors.push(error.message);
          }
          console.warn("barcode detector decode failed:", error);
        }

        try {
          return await decodeQrViaServer(file);
        } catch (error) {
          if (error && error.message) {
            errors.push(error.message);
          }
          console.warn("server qr decode failed:", error);
        }

        throw new Error(errors.pop() || "未识别到二维码，请重试或手动输入");
      }

      async function decodeQrWithBarcodeDetector(file) {
        if (!("BarcodeDetector" in window)) {
          throw new Error("当前环境不支持本地识别");
        }
        const detector = new BarcodeDetector({ formats: ["qr_code"] });
        let bitmap = null;
        try {
          bitmap = await createImageBitmap(file);
          const results = await detector.detect(bitmap);
          const first = Array.isArray(results) ? results.find((item) => item && item.rawValue) : null;
          if (!first || !String(first.rawValue || "").trim()) {
            throw new Error("未识别到二维码，请重新拍照");
          }
          return String(first.rawValue || "").trim();
        } finally {
          if (bitmap && typeof bitmap.close === "function") {
            bitmap.close();
          }
        }
      }

      async function decodeQrViaServer(file) {
        const imageBase64 = await buildQrDecodePayload(file);
        const resp = await requestApi("/qr/decode", "POST", { imageBase64 });
        const value = normalizeScanValue(resp?.data?.scanValue || resp?.data?.rawValue || "");
        if (!value) {
          throw new Error("未识别到二维码，请重新拍照");
        }
        return value;
      }

      async function buildQrDecodePayload(file) {
        const dataUrl = await readFileAsDataUrl(file);
        if (!/^data:image\//i.test(dataUrl)) {
          throw new Error("请选择二维码图片后再重试");
        }
        try {
          return await compressImageDataUrl(dataUrl);
        } catch (error) {
          console.warn("compress image failed:", error);
          if (/^data:image\/(png|jpeg|jpg)/i.test(dataUrl)) {
            return dataUrl;
          }
          throw new Error("图片处理失败，请重新拍摄二维码");
        }
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error("图片读取失败，请重试"));
          reader.readAsDataURL(file);
        });
      }

      async function compressImageDataUrl(dataUrl) {
        const image = await loadImageFromDataUrl(dataUrl);
        const width = Number(image.naturalWidth || image.width || 0);
        const height = Number(image.naturalHeight || image.height || 0);
        if (!width || !height) {
          return dataUrl;
        }

        const maxSide = 1600;
        const scale = Math.min(1, maxSide / Math.max(width, height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(width * scale));
        canvas.height = Math.max(1, Math.round(height * scale));

        const ctx = canvas.getContext("2d", { alpha: false });
        if (!ctx) {
          return dataUrl;
        }

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL("image/jpeg", 0.88);
      }

      async function compressPhotoDataUrl(dataUrl) {
        const image = await loadImageFromDataUrl(dataUrl);
        const width = Number(image.naturalWidth || image.width || 0);
        const height = Number(image.naturalHeight || image.height || 0);
        if (!width || !height) {
          return dataUrl;
        }

        const maxSide = 900;
        const scale = Math.min(1, maxSide / Math.max(width, height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(width * scale));
        canvas.height = Math.max(1, Math.round(height * scale));

        const ctx = canvas.getContext("2d", { alpha: false });
        if (!ctx) {
          return dataUrl;
        }

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL("image/jpeg", 0.82);
      }

      function loadImageFromDataUrl(dataUrl) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("图片加载失败"));
          image.src = dataUrl;
        });
      }

      function isUserCancelError(error) {
        const text = String(error && error.message ? error.message : error || "").toLowerCase();
        return text.includes("cancel") || text.includes("canceled") || text.includes("取消");
      }

      function isDingTalkEnv() {
        return /DingTalk/i.test(String(navigator.userAgent || ""));
      }

      function buildDingTalkScanErrorMessage(error) {
        const text = String(error && error.message ? error.message : error || "").trim();
        if (/timeout|超时/i.test(text)) {
          return "钉钉扫码未完成，请重新点击扫一扫";
        }
        if (/未提供|加载失败|初始化失败|JSAPI/i.test(text)) {
          return "钉钉扫码能力暂不可用，请重新打开页面后重试";
        }
        return text || "钉钉扫码失败，请重新点击扫一扫";
      }

      function isWeChatEnv() {
        return /MicroMessenger/i.test(String(navigator.userAgent || ""));
      }

      function normalizeScanValue(raw) {
        const text = String(raw || "").trim();
        if (!text) {
          return "";
        }
        try {
          const url = new URL(text, window.location.href);
          const scan =
            String(
              url.searchParams.get("scan") ||
                url.searchParams.get("scanValue") ||
                url.searchParams.get("deviceCode") ||
                url.searchParams.get("code") ||
                ""
            ).trim();
          if (scan) {
            return scan;
          }
        } catch (error) {
          console.warn("normalize scan url failed:", error);
        }
        return text;
      }

      function extractDingTalkScanText(payload) {
        const queue = [payload];
        const visited = new Set();
        const candidateKeys = ["text", "rawValue", "value", "code", "result", "data", "content"];

        while (queue.length) {
          const current = queue.shift();
          if (current == null) {
            continue;
          }
          if (typeof current === "string" || typeof current === "number") {
            const normalized = normalizeScanValue(current);
            if (normalized) {
              return normalized;
            }
            continue;
          }
          if (typeof current !== "object") {
            continue;
          }
          if (visited.has(current)) {
            continue;
          }
          visited.add(current);

          candidateKeys.forEach((key) => {
            if (Object.prototype.hasOwnProperty.call(current, key)) {
              queue.push(current[key]);
            }
          });
        }

        return "";
      }

      function extractDingTalkErrorMessage(payload) {
        if (!payload) {
          return "钉钉扫码失败";
        }
        if (typeof payload === "string") {
          return payload;
        }
        const fields = [payload.errorMessage, payload.message, payload.msg, payload.error, payload.errorMsg];
        for (const item of fields) {
          if (typeof item === "string" && item.trim()) {
            return item.trim();
          }
        }
        return "钉钉扫码失败";
      }

      async function ensureDingTalkJsapi() {
        if (window.dd && window.dd.biz && window.dd.biz.util) {
          return window.dd;
        }
        if (!isDingTalkEnv()) {
          throw new Error("当前不是钉钉环境");
        }
        if (dingTalkJsapiPromise) {
          return dingTalkJsapiPromise;
        }

        dingTalkJsapiPromise = new Promise((resolve, reject) => {
          const existing = document.querySelector("script[data-sdk='dingtalk-jsapi']");
          if (existing) {
            existing.addEventListener("load", () => {
              if (window.dd) {
                resolve(window.dd);
                return;
              }
              reject(new Error("钉钉 JSAPI 加载失败"));
            });
            existing.addEventListener("error", () => reject(new Error("钉钉 JSAPI 加载失败")));
            return;
          }

          const script = document.createElement("script");
          script.src = DINGTALK_JSAPI_URL;
          script.async = true;
          script.dataset.sdk = "dingtalk-jsapi";
          script.onload = () => {
            if (window.dd) {
              resolve(window.dd);
              return;
            }
            reject(new Error("钉钉 JSAPI 初始化失败"));
          };
          script.onerror = () => reject(new Error("钉钉 JSAPI 加载失败"));
          document.head.appendChild(script);
        });

        return dingTalkJsapiPromise;
      }

      async function scanWithDingTalkNative() {
        const dd = await ensureDingTalkJsapi();
        if (!dd || !dd.biz || !dd.biz.util || typeof dd.biz.util.scan !== "function") {
          throw new Error("当前钉钉环境未提供原生扫码能力");
        }

        return new Promise((resolve, reject) => {
          let settled = false;
          const timeoutId = window.setTimeout(() => {
            finishReject(new Error("钉钉扫码初始化超时，请稍后重试"));
          }, 4000);

          const finishResolve = (value) => {
            if (settled) {
              return;
            }
            settled = true;
            window.clearTimeout(timeoutId);
            resolve(value);
          };

          const finishReject = (error) => {
            if (settled) {
              return;
            }
            settled = true;
            window.clearTimeout(timeoutId);
            reject(error instanceof Error ? error : new Error(String(error || "钉钉扫码失败")));
          };

          const invokeScan = () => {
            try {
              dd.biz.util.scan({
                type: "all",
                onSuccess(result) {
                  const text = extractDingTalkScanText(result);
                  if (!text) {
                    finishReject(new Error("未识别到有效二维码"));
                    return;
                  }
                  finishResolve(text);
                },
                onFail(error) {
                  finishReject(new Error(extractDingTalkErrorMessage(error)));
                },
              });
            } catch (error) {
              finishReject(error);
            }
          };

          if (typeof dd.ready === "function") {
            try {
              dd.ready(invokeScan);
              if (typeof dd.error === "function") {
                dd.error((error) => {
                  finishReject(new Error(extractDingTalkErrorMessage(error)));
                });
              }
            } catch (error) {
              finishReject(error);
            }
            return;
          }

          invokeScan();
        });
      }

      async function quickScanAndStart() {
        const scanValue = normalizeScanValue(refs.scanInput.value);
        if (!scanValue) {
          showToast("请输入扫码码值、设备编号或库房编码");
          return;
        }
        refs.scanInput.value = scanValue;

        setLoading(true);
        setStatus("dashboard", "正在扫码匹配任务...");
        try {
          const resp = await requestApi("/inspection-report/scan", "POST", { scanValue });
          const data = resp?.data || {};
          const tasks = Array.isArray(data.tasks) ? data.tasks : [];
          state.scanValue = scanValue;
          state.scanDevice = data.device || null;
          state.scanTaskCandidates = tasks
            .map((task) => mergeTaskWithDevice(task, state.scanDevice))
            .filter((task) => isTodayTask(task));

          if (!state.scanTaskCandidates.length) {
            showToast("该检查对象今日暂无任务");
            setStatus("dashboard", "检查对象已识别，但今日暂无任务", true);
            return;
          }

          if (state.scanTaskCandidates.length === 1 && !isDoneStatus(state.scanTaskCandidates[0].taskStatus || state.scanTaskCandidates[0].statusText || "")) {
            await startTask(state.scanTaskCandidates[0]);
            const matchedDeviceText = `${state.scanDevice?.code || "-"} ${state.scanDevice?.name || "-"}`.trim();
            setStatus("dashboard", `已匹配检查对象：${matchedDeviceText}`);
            return;
          }

          openTaskPicker(state.scanTaskCandidates);
          setStatus("dashboard", `已识别 ${state.scanTaskCandidates.length} 项任务，请选择一项`);
        } catch (error) {
          setStatus("dashboard", `扫码失败：${error.message}`, true);
          showToast(`扫码失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      function mergeTaskWithDevice(task, device) {
        const existing = state.dashboardTasks.find((row) => String(row.id || "") === String(task.id || ""));
        if (existing) {
          return existing;
        }

        const merged = {
          ...task,
          category: inferCategory(task.ruleName, task.standardName, task.standardCode),
          statusText: task.taskStatus || "待执行",
          urgent: false,
          pending: !isDoneStatus(task.taskStatus || ""),
          done: isDoneStatus(task.taskStatus || ""),
          workshop: device ? device.workshop || "" : "",
          department: device ? device.department || "" : "",
          deviceType: device ? device.type || "" : "",
          deviceStatus: device ? device.status || "" : "",
          deviceName: task.deviceName || (device ? device.name || "" : ""),
          deviceCode: task.deviceCode || (device ? device.code || "" : ""),
        };
        return merged;
      }

      function openTaskPicker(tasks) {
        refs.taskPickerList.innerHTML = "";
        const list = (Array.isArray(tasks) ? tasks : [])
          .filter((task) => isTodayTask(task))
          .sort((a, b) => {
            const doneA = isDoneStatus(a.taskStatus || a.statusText || "") ? 1 : 0;
            const doneB = isDoneStatus(b.taskStatus || b.statusText || "") ? 1 : 0;
            return doneA - doneB || String(a.standardName || "").localeCompare(String(b.standardName || ""), "zh-Hans-CN");
          });

        if (!list.length) {
          refs.taskPickerList.innerHTML = '<div class="empty">今日暂无可选择任务</div>';
          refs.taskPickerModal.classList.remove("hidden");
          return;
        }

        list.forEach((task) => {
          const done = isDoneStatus(task.taskStatus || task.statusText || "");
          const actionText = done ? "已执行" : "执行";
          const div = document.createElement("div");
          div.className = `task-item ${done ? "done" : ""}`;
          div.innerHTML = `
            <div class="task-top">
              <div style="min-width:0">
                <div class="task-name">${escapeHtml(task.deviceName || task.deviceCode || "设备")} — ${escapeHtml(task.standardName || task.standardCode || "点检")}</div>
                <div class="task-meta">${escapeHtml(task.taskDateText || "-")} · ${escapeHtml(task.category || "点检")}</div>
                <div class="task-tags">
                  <span class="tag ${done ? "done" : ""}">${escapeHtml(done ? "已执行" : "待执行")}</span>
                </div>
              </div>
              <div class="task-action">
                <button class="btn ${done ? "" : "primary"}" data-action="pick-task" data-task-id="${escapeHtml(task.id || "")}" ${done ? "disabled" : ""}>${actionText}</button>
              </div>
            </div>
          `;
          refs.taskPickerList.appendChild(div);
        });
        refs.taskPickerModal.classList.remove("hidden");
      }

      function closeTaskPicker() {
        refs.taskPickerModal.classList.add("hidden");
      }

      async function openReportDetail(reportId) {
        if (!reportId) {
          return;
        }
        state.selectedRecentReport = null;
        refs.reportDetailHead.classList.add("hidden");
        refs.reportDetailHead.innerHTML = "";
        refs.reportDetailList.innerHTML = '<div class="empty">正在加载报工详情...</div>';
        refs.reportDetailModal.classList.remove("hidden");
        try {
          const query = new URLSearchParams();
          query.set("reportId", reportId);
          query.set("limit", "100");
          const resp = await requestApi(`/inspection-report/recent-details?${query.toString()}`);
          const report = resp?.data?.report || null;
          const list = Array.isArray(resp?.data?.list) ? resp.data.list : [];
          state.selectedRecentReport = report;
          renderReportDetail(report, list);
        } catch (error) {
          refs.reportDetailHead.classList.add("hidden");
          refs.reportDetailHead.innerHTML = "";
          refs.reportDetailList.innerHTML = `<div class="empty">详情加载失败：${escapeHtml(error.message || "请求失败")}</div>`;
        }
      }

      function closeReportDetail() {
        refs.reportDetailModal.classList.add("hidden");
      }

      function renderReportDetail(report, list) {
        if (report) {
          const result = String(report.result || report.currentStatus || "-");
          refs.reportDetailHead.classList.remove("hidden");
          refs.reportDetailHead.innerHTML = `
            <h3>${escapeHtml(report.deviceName || report.deviceCode || "设备")} — ${escapeHtml(report.standardName || "点检")}</h3>
            <p>${escapeHtml(report.reportDateText || "-")} · 执行人 ${escapeHtml(report.reporter || "-")} · 结果 ${escapeHtml(result)}</p>
          `;
        } else {
          refs.reportDetailHead.classList.add("hidden");
          refs.reportDetailHead.innerHTML = "";
        }

        refs.reportDetailList.innerHTML = "";
        if (!Array.isArray(list) || !list.length) {
          refs.reportDetailList.innerHTML = '<div class="empty">当前报工暂无明细记录</div>';
          return;
        }

        list.forEach((row, index) => {
          const abnormal = String(row.abnormal || "").trim() === "是";
          const div = document.createElement("div");
          div.className = `detail-row ${abnormal ? "abnormal" : ""}`;
          div.innerHTML = `
            <div class="detail-row-top">
              <div style="min-width:0">
                <div class="detail-row-title">${escapeHtml(row.pointPart || "-")} · ${escapeHtml(row.pointItem || `明细${index + 1}`)}</div>
                <div class="detail-row-meta">序号 ${escapeHtml(row.seq || index + 1)} ${row.submitTime ? `· ${escapeHtml(row.submitTime)}` : ""}</div>
              </div>
              <span class="tag ${abnormal ? "urgent" : "done"}">${abnormal ? "异常" : "正常"}</span>
            </div>
            <div class="detail-row-body">
              <div>录入结果：${escapeHtml(row.resultValue || "-")}</div>
              ${abnormal ? `<div>异常说明：${escapeHtml(row.abnormalDesc || "未填写")}</div>` : ""}
            </div>
          `;
          refs.reportDetailList.appendChild(div);
        });
      }

      async function startTaskById(taskId) {
        if (!taskId) {
          return;
        }
        const task =
          state.dashboardTasks.find((item) => String(item.id || "") === String(taskId)) ||
          state.scanTaskCandidates.find((item) => String(item.id || "") === String(taskId));
        if (!task) {
          showToast("未找到任务，请刷新后重试");
          return;
        }
        if (isDoneStatus(task.taskStatus || task.statusText || "")) {
          showToast("该任务已执行");
          return;
        }
        await startTask(task);
      }

      async function startTask(task) {
        if (!task || !task.id) {
          return;
        }

        state.selectedTask = task;
        state.selectedItems = [];
        state.reportStartAt = nowDateTimeText();
        refs.reportRemarkInput.value = "";
        const cachedReporter = localStorage.getItem("inspection_report_reporter") || "";
        const defaultReporter = resolveReporterDefaultName(cachedReporter);
        refs.reporterInput.value = defaultReporter;
        syncReporterField();
        refs.executeItemList.innerHTML = "";
        refs.executeEmpty.textContent = "正在加载点检明细...";
        refs.executeEmpty.classList.remove("hidden");
        refs.executeReporterCard.classList.add("hidden");
        refs.executeRemarkCard.classList.add("hidden");
        refs.executeFoot.classList.add("hidden");
        switchView("execute");
        void loadReporterSelectCandidates();
        renderExecuteHeader();

        setLoading(true);
        setStatus("execute", "正在加载点检明细...");
        try {
          const resp = await requestApi("/inspection-report/task-items", "POST", { taskId: task.id });
          const items = Array.isArray(resp?.data?.items) ? resp.data.items : [];
          const stats = resp?.data?.stats || {};
          state.selectedItems = items.map((item) => buildTaskItemState(item));
          const restoredDraft = restoreTaskDraft(task);
          renderExecute();

          if (!state.selectedItems.length) {
            setStatus("execute", "当前任务暂无可填写项，可返回任务首页查看其他任务。");
          } else {
            setStatus("execute", "");
            if (!restoredDraft && !String(refs.reporterInput.value || "").trim()) {
              showToast("请从执行人下拉选择执行人");
            }
          }
        } catch (error) {
          state.selectedItems = [];
          renderExecute();
          setStatus("execute", `明细加载失败：${error.message}`, true);
          showToast(`明细加载失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      function renderExecuteHeader() {
        const task = state.selectedTask;
        if (!task) {
          return;
        }

        refs.executeTitle.textContent = task.deviceName || task.deviceCode || "设备";
        const chips = [
          task.category || inferCategory(task.ruleName, task.standardName, task.standardCode),
          task.taskDateText || "",
        ].filter(Boolean);
        refs.executeChips.innerHTML = chips.map((chip) => `<span class="chip">${escapeHtml(chip)}</span>`).join("");
      }

      function renderExecute() {
        renderExecuteHeader();
        refs.executeItemList.innerHTML = "";

        if (!state.selectedItems.length) {
          refs.executeEmpty.classList.remove("hidden");
          refs.executeEmpty.textContent = "当前任务暂无可填写项。";
          refs.executeReporterCard.classList.add("hidden");
          refs.executeRemarkCard.classList.add("hidden");
          refs.executeFoot.classList.add("hidden");
          updateProgress();
          return;
        }

        refs.executeEmpty.classList.add("hidden");
        refs.executeReporterCard.classList.remove("hidden");
        refs.executeRemarkCard.classList.remove("hidden");
        refs.executeFoot.classList.remove("hidden");

        state.selectedItems.forEach((item, index) => {
          const filled = isItemFilled(item);
          const status = resolveItemResultState(item, filled);
          const itemClass = status === "abnormal" ? "abnormal" : filled ? "done" : "";
          const executeMode = getItemExecuteMode(item);
          const displaySeq = index + 1;
          const itemTitle = item.pointItem || item.pointPart || "-";

          const div = document.createElement("div");
          div.className = `item-card ${itemClass}`;
          div.setAttribute("data-item-index", String(index));
          div.innerHTML = `
            <div class="item-head">
              <div class="item-title-row">
                <span class="item-no">${displaySeq}</span>
                <div class="item-name">${escapeHtml(itemTitle)}</div>
              </div>
              <span class="item-mode-tag">${escapeHtml(getExecuteModeLabel(executeMode))}</span>
            </div>

            ${renderResultBar(index, item)}
            ${renderItemInput(index, item)}
            ${renderAbnormalBox(index, item)}
          `;
          refs.executeItemList.appendChild(div);
        });

        updateProgress();
      }

      function renderItemInput(index, item) {
        const executeMode = getItemExecuteMode(item);

        if (executeMode === "meter") {
          const judge = evaluateMeterValue(item);
          return `
            <div class="field">
              <label><span class="required">*</span>抄表数值</label>
              <input class="input" type="number" inputmode="decimal" data-index="${index}" data-field="numericValue" value="${escapeHtml(item.numericValue || "")}" placeholder="请输入数值" />
            </div>
            ${renderJudgeHint(judge)}
          `;
        }

        if (executeMode === "status") {
          const options = Array.isArray(item.options) ? item.options : [];
          return `
            <div class="field">
              <label><span class="required">*</span>状态选择</label>
              ${renderStatusSelect(index, item, options)}
            </div>
          `;
        }

        if (executeMode === "normal_abnormal") {
          return "";
        }

        return `
          <div class="field">
            <label><span class="required">*</span>录入结果</label>
            <input class="input" type="text" data-index="${index}" data-field="inputValue" value="${escapeHtml(item.inputValue || "")}" placeholder="请输入结果" />
          </div>
        `;
      }

      function renderStatusSelect(index, item, options) {
        const current = String(item.optionValue || "").trim();
        const rows = Array.from(new Set((Array.isArray(options) ? options : []).map((opt) => String(opt || "").trim()).filter(Boolean)));
        const allOptions = ["", ...rows];
        const label = current || "请选择";
        return `
          <div class="status-select" data-status-select="${index}">
            <button class="status-select-button${current ? "" : " is-placeholder"}" type="button" data-action="toggle-status-select" data-index="${index}" data-field="optionValue">
              ${escapeHtml(label)}
            </button>
            <div class="status-select-panel hidden">
              ${allOptions
                .map((opt) => {
                  const optionLabel = opt || "请选择";
                  return `<button class="status-select-option${opt === current ? " is-selected" : ""}" type="button" data-action="choose-status-option" data-index="${index}" data-status-value="${escapeHtml(opt)}">${escapeHtml(optionLabel)}</button>`;
                })
                .join("")}
            </div>
          </div>
        `;
      }

      function toggleStatusSelect(index) {
        const root = refs.executeItemList.querySelector(`[data-status-select='${index}']`);
        if (!(root instanceof HTMLElement)) {
          return;
        }
        const panel = root.querySelector(".status-select-panel");
        const willOpen = panel instanceof HTMLElement && panel.classList.contains("hidden");
        closeStatusSelects(root);
        root.classList.toggle("is-open", willOpen);
        if (panel instanceof HTMLElement) {
          panel.classList.toggle("hidden", !willOpen);
        }
      }

      function closeStatusSelects(exceptRoot = null) {
        refs.executeItemList.querySelectorAll(".status-select").forEach((root) => {
          if (exceptRoot && root === exceptRoot) {
            return;
          }
          root.classList.remove("is-open");
          const panel = root.querySelector(".status-select-panel");
          if (panel instanceof HTMLElement) {
            panel.classList.add("hidden");
          }
        });
      }

      function chooseStatusOption(index, value) {
        const item = state.selectedItems[index];
        if (!item) {
          return;
        }
        item.optionValue = String(value || "").trim();
        normalizeItemStateByValue(index, "optionValue");
        saveCurrentTaskDraft();
        renderExecute();
      }

      function renderResultBar(index, item) {
        if (getItemExecuteMode(item) !== "normal_abnormal") {
          return "";
        }

        return `
          <div class="result-bar">
            <button class="result-btn ${item.resultState === "abnormal" ? "active abnormal" : ""}" data-action="set-result" data-index="${index}" data-result="abnormal">异常</button>
            <button class="result-btn ${item.resultState === "normal" ? "active normal" : ""}" data-action="set-result" data-index="${index}" data-result="normal">正常</button>
          </div>
        `;
      }

      function renderJudgeHint(judge) {
        if (!judge) {
          return "";
        }
        return `
          <div class="judge-hint ${escapeHtml(judge.status || "pending")}" data-role="meter-judge">
            <span>自动判定</span><strong>${escapeHtml(judge.label || "待填")}</strong>
            ${judge.detail ? `<em>${escapeHtml(judge.detail)}</em>` : ""}
          </div>
        `;
      }

      function renderAbnormalBox(index, item) {
        if (item.resultState !== "abnormal") {
          return "";
        }

        const photos = normalizePhotoList(item.photos);
        const photoHtml = photos.length
          ? `<div class="photos">${photos.map((photo) => `
              <div>
                <div class="photo-thumb" data-action="preview-photo" data-index="${index}" data-photo-id="${escapeHtml(photo.id)}">
                  ${photo.url ? `<img src="${escapeHtml(photo.url)}" alt="${escapeHtml(photo.name || "异常照片")}" />` : `<span class="photo-file">已选照片</span>`}
                  <button class="photo-remove" type="button" data-action="remove-photo" data-index="${index}" data-photo-id="${escapeHtml(photo.id)}" aria-label="删除照片">×</button>
                </div>
                <div class="photo-name">${escapeHtml(photo.name || "照片")}</div>
              </div>
            `).join("")}</div>`
          : "";

        return `
          <div class="abnormal-box">
            <div class="field">
              <label>${item.requireDescOnAbnormal ? '<span class="required">*</span>' : ""}异常描述</label>
              <textarea class="textarea" data-index="${index}" data-field="abnormalDesc" placeholder="请填写异常现象">${escapeHtml(item.abnormalDesc || "")}</textarea>
            </div>
            <div class="field">
              <label>处理措施</label>
              <textarea class="textarea" data-index="${index}" data-field="handling" placeholder="可填写处理措施">${escapeHtml(item.handling || "")}</textarea>
            </div>
            <div class="field">
              <div class="photo-head">
                <label>${item.requirePhotoOnAbnormal ? '<span class="required">*</span>' : ""}异常照片</label>
                <label class="photo-add-btn" title="添加照片">
                  +
                  <input type="file" accept="image/*" capture="environment" multiple data-index="${index}" data-field="photoInput" hidden />
                </label>
              </div>
              ${photoHtml}
            </div>
          </div>
        `;
      }

      function normalizePhotoList(value) {
        return (Array.isArray(value) ? value : [])
          .map((item, index) => {
            if (item && typeof item === "object") {
              const name = String(item.name || item.fileName || `照片${index + 1}`).trim();
              const url = String(item.url || item.previewUrl || item.dataUrl || "").trim();
              return {
                id: String(item.id || `${name}-${index}`).trim(),
                name,
                url,
              };
            }
            const name = String(item || "").trim();
            if (!name) {
              return null;
            }
            return {
              id: `${name}-${index}`,
              name,
              url: "",
            };
          })
          .filter(Boolean);
      }

      async function addItemPhotos(index, fileList, inputEl) {
        const item = state.selectedItems[index];
        if (!item || !fileList || !fileList.length) {
          return;
        }

        const files = Array.from(fileList).filter((file) => file && /^image\//i.test(file.type || ""));
        if (!files.length) {
          showToast("请选择图片文件");
          if (inputEl) {
            inputEl.value = "";
          }
          return;
        }

        setLoading(true);
        try {
          const nextPhotos = normalizePhotoList(item.photos);
          for (const file of files) {
            const dataUrl = await readFileAsDataUrl(file);
            const previewUrl = await compressPhotoDataUrl(dataUrl);
            nextPhotos.push({
              id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
              name: file.name || `异常照片_${nextPhotos.length + 1}.jpg`,
              url: previewUrl,
            });
          }
          item.photos = nextPhotos;
          saveCurrentTaskDraft();
          renderExecute();
        } catch (error) {
          showToast(`照片处理失败：${error.message || "请重试"}`);
        } finally {
          if (inputEl) {
            inputEl.value = "";
          }
          setLoading(false);
        }
      }

      function removeItemPhoto(index, photoId) {
        const item = state.selectedItems[index];
        if (!item) {
          return;
        }
        item.photos = normalizePhotoList(item.photos).filter((photo) => photo.id !== photoId);
        saveCurrentTaskDraft();
        renderExecute();
      }

      function openPhotoPreview(index, photoId) {
        const item = state.selectedItems[index];
        const photo = normalizePhotoList(item && item.photos).find((row) => row.id === photoId);
        if (!photo || !photo.url) {
          showToast("当前照片暂无可预览内容");
          return;
        }
        refs.photoPreviewImage.src = photo.url;
        refs.photoPreviewImage.alt = photo.name || "异常照片预览";
        refs.photoPreviewModal.classList.remove("hidden");
      }

      function closePhotoPreview() {
        refs.photoPreviewModal.classList.add("hidden");
        refs.photoPreviewImage.removeAttribute("src");
      }

      function setItemResult(index, result) {
        const item = state.selectedItems[index];
        if (!item || getItemExecuteMode(item) !== "normal_abnormal") {
          return;
        }

        if (result === "normal") {
          item.resultState = "normal";
        } else if (result === "abnormal") {
          item.resultState = "abnormal";
        } else {
          return;
        }

        saveCurrentTaskDraft();
        renderExecute();
      }

      function normalizeItemStateByValue(index, field) {
        const item = state.selectedItems[index];
        if (!item) {
          return;
        }

        const executeMode = getItemExecuteMode(item);

        if (field === "optionValue") {
          const value = String(item.optionValue || "").trim();
          if (executeMode === "status") {
            item.resultState = inferStatusResultState(item, value);
            return;
          }
          item.resultState = value ? "normal" : "pending";
          return;
        }

        if (field === "numericValue") {
          const judge = evaluateMeterValue(item);
          item.resultState = judge.status;
          return;
        }

        if (field === "inputValue") {
          const value = String(item.inputValue || "").trim();
          item.resultState = value ? "normal" : "pending";
        }
      }

      function updateProgress() {
        const total = state.selectedItems.length;
        const filled = state.selectedItems.filter((item) => isItemFilled(item)).length;
        refs.progressText.textContent = `${filled} / ${total} 项`;
        const pct = total ? Math.min(100, Math.round((filled / total) * 100)) : 0;
        refs.progressBar.style.width = `${pct}%`;
      }

      function scrollToNextPendingItem() {
        if (!state.selectedItems.length) {
          return;
        }
        const index = state.selectedItems.findIndex((item) => !isItemFilled(item));
        if (index < 0) {
          showToast("全部项目已填写，可直接提交");
          return;
        }
        const element = refs.executeItemList.querySelector(`[data-item-index='${index}']`);
        if (element) {
          element.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      }

      async function submitCurrentTask() {
        if (!state.selectedTask) {
          showToast("未选择任务");
          return;
        }
        if (!state.selectedItems.length) {
          showToast("当前任务没有可提交明细");
          return;
        }

        const reporter = refs.reporterInput.value.trim();
        if (!reporter) {
          showToast("请选择执行人");
          highlightBlock(refs.executeReporterCard);
          return;
        }
        localStorage.setItem("inspection_report_reporter", reporter);
        state.memberName = reporter;
        localStorage.setItem("inspection_member_name", reporter);

        const validation = validateBeforeSubmit(state.selectedItems);
        if (validation) {
          showToast(validation.message);
          highlightInvalidItem(validation.index, validation.field);
          return;
        }

        const payload = {
          taskId: state.selectedTask.id,
          scanValue: state.scanValue || refs.scanInput.value.trim(),
          reporter,
          remark: refs.reportRemarkInput.value.trim(),
          startedAt: state.reportStartAt || nowDateTimeText(),
          endedAt: nowDateTimeText(),
          items: state.selectedItems.map((item, index) => {
            const isAbnormal = item.resultState === "abnormal";
            const inputValue = item.inputValue || "";
            const optionValue = item.optionValue || "";
            const numericValue = item.numericValue;
            return {
              standardDetailId: item.standardDetailId,
              seq: index + 1,
              pointPart: item.pointPart,
              pointItem: item.pointItem,
              checkMethod: item.checkMethod || "",
              executeMode: getItemExecuteMode(item),
              judgeStandard: item.judgeStandard,
              unit: item.unit,
              inputValue,
              optionValue,
              numericValue: numericValue === "" || numericValue === null || numericValue === undefined ? "" : Number(numericValue),
              isAbnormal,
              abnormalDesc: item.abnormalDesc || "",
              handling: item.handling || "",
              photos: isAbnormal ? normalizePhotoList(item.photos).map((photo) => photo.name).filter(Boolean) : [],
            };
          }),
        };

        setLoading(true);
        setStatus("execute", "正在提交报工...");
        try {
          const resp = await requestApi("/inspection-report/submit", "POST", payload);
          const data = resp?.data || {};
          setStatus("execute", `提交成功，报工ID：${data.reportId || "-"}`);
          clearTaskDraft(state.selectedTask && state.selectedTask.id);
          buildSummary(data);
          renderSummary();
          switchView("summary");
          await loadDashboard();
        } catch (error) {
          setStatus("execute", `提交失败：${error.message}`, true);
          showToast(`提交失败：${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      function validateBeforeSubmit(items) {
        for (let i = 0; i < items.length; i += 1) {
          const item = items[i];
          if (!isItemFilled(item)) {
            return {
              index: i,
              field: resolvePrimaryInputField(item),
              message: `第 ${i + 1} 项尚未填写`,
            };
          }
          if (item.resultState === "abnormal" && item.requireDescOnAbnormal && !String(item.abnormalDesc || "").trim()) {
            return {
              index: i,
              field: "abnormalDesc",
              message: `第 ${i + 1} 项异常描述必填`,
            };
          }
          if (item.resultState === "abnormal" && item.requirePhotoOnAbnormal && !normalizePhotoList(item.photos).length) {
            return {
              index: i,
              field: "photoInput",
              message: `第 ${i + 1} 项异常照片必填`,
            };
          }
        }
        return null;
      }

      function resolvePrimaryInputField(item) {
        const mode = getItemExecuteMode(item);
        if (mode === "meter") {
          return "numericValue";
        }
        if (mode === "status") {
          return "optionValue";
        }
        if (mode === "text") {
          return "inputValue";
        }
        return "result";
      }

      function highlightInvalidItem(index, field = "") {
        const card = refs.executeItemList.querySelector(`[data-item-index='${index}']`);
        if (!(card instanceof HTMLElement)) {
          return;
        }
        clearValidationHighlights();
        card.classList.add("missing");
        card.scrollIntoView({ behavior: "smooth", block: "center" });
        window.setTimeout(() => {
          focusInvalidField(card, field);
        }, 260);
        window.setTimeout(() => {
          card.classList.remove("missing");
        }, 3200);
      }

      function highlightBlock(element) {
        if (!(element instanceof HTMLElement)) {
          return;
        }
        clearValidationHighlights();
        element.classList.add("missing");
        element.scrollIntoView({ behavior: "smooth", block: "center" });
        window.setTimeout(() => {
          const input = element.querySelector("input:not([type='hidden']), select, textarea, button");
          if (input && typeof input.focus === "function") {
            input.focus({ preventScroll: true });
          }
        }, 260);
        window.setTimeout(() => {
          element.classList.remove("missing");
        }, 3200);
      }

      function clearValidationHighlights() {
        document.querySelectorAll(".item-card.missing, .exec-card.missing, .exec-reporter-row.missing").forEach((node) => {
          node.classList.remove("missing");
        });
      }

      function focusInvalidField(card, field) {
        let target = null;
        if (field && field !== "result") {
          target = card.querySelector(`[data-field='${field}']`);
        }
        if (!target) {
          target = card.querySelector("[data-action='set-result'], input:not([type='hidden']), select, textarea");
        }
        if (target && typeof target.focus === "function") {
          target.focus({ preventScroll: true });
        }
      }

      function isItemFilled(item) {
        if (!item) {
          return false;
        }
        const executeMode = getItemExecuteMode(item);
        if (executeMode === "normal_abnormal") {
          return item.resultState === "normal" || item.resultState === "abnormal";
        }
        if (executeMode === "meter") {
          return item.numericValue !== "" && item.numericValue !== null && item.numericValue !== undefined && !Number.isNaN(Number(item.numericValue));
        }
        if (executeMode === "status") {
          return Boolean(String(item.optionValue || "").trim());
        }
        return Boolean(String(item.inputValue || "").trim());
      }

      function buildSummary(submitData) {
        const abnormalItems = state.selectedItems
          .map((item, index) => ({ item, index }))
          .filter(({ item }) => item.resultState === "abnormal")
          .map(({ item, index }) => ({
            index: index + 1,
            title: item.pointItem || item.pointPart || "-",
            desc: item.abnormalDesc || "未填写异常描述",
          }));

        const normalCount = state.selectedItems.filter((item) => item.resultState === "normal").length;
        const abnormalCount = state.selectedItems.filter((item) => item.resultState === "abnormal").length;

        state.lastSummary = {
          reportId: submitData.reportId || "",
          task: state.selectedTask,
          total: state.selectedItems.length,
          normalCount,
          abnormalCount,
          abnormalItems,
          reporter: refs.reporterInput.value.trim(),
          durationMinutes: estimateMinutes(state.reportStartAt, nowDateTimeText()),
          submitTime: nowDateTimeText(),
        };
      }

      function renderSummary() {
        const summary = state.lastSummary;
        if (!summary || !summary.task) {
          refs.summaryMainText.textContent = "任务已提交";
          refs.summaryNormalCount.textContent = "0";
          refs.summaryAbnormalCount.textContent = "0";
          refs.summaryTotalCount.textContent = "0";
          refs.summaryAbnormalWrap.innerHTML = "";
          setStatus("summary", "提交完成");
          return;
        }

        refs.summaryMainText.textContent = `${summary.task.deviceName || summary.task.deviceCode || "设备"} · ${summary.task.standardName || "点检"} · 用时 ${summary.durationMinutes} 分钟`;
        refs.summaryNormalCount.textContent = String(summary.normalCount);
        refs.summaryAbnormalCount.textContent = String(summary.abnormalCount);
        refs.summaryTotalCount.textContent = String(summary.total);

        refs.summaryAbnormalWrap.innerHTML = "";
        if (!summary.abnormalItems.length) {
          refs.summaryAbnormalWrap.innerHTML = '<div class="empty">本次未发现异常</div>';
        } else {
          summary.abnormalItems.forEach((item) => {
            const div = document.createElement("div");
            div.className = "abnormal-item";
            div.innerHTML = `
              <h4>项 ${escapeHtml(item.index)} · ${escapeHtml(item.title)}</h4>
              <p>${escapeHtml(item.desc)}</p>
            `;
            refs.summaryAbnormalWrap.appendChild(div);
          });
        }

        const nextTask = findNextPendingTask();
        refs.summaryNextBtn.disabled = !nextTask;
        refs.summaryNextBtn.textContent = nextTask ? "执行下一任务" : "无下一任务";

        setStatus("summary", `报工已提交：${summary.reportId || "-"}`);
      }

      function findNextPendingTask() {
        if (!state.selectedTask) {
          return null;
        }
        return (
          state.dashboardTasks.find(
            (task) =>
              String(task.deviceCode || "") === String(state.selectedTask.deviceCode || "") &&
              String(task.id || "") !== String(state.selectedTask.id || "") &&
              !isDoneStatus(task.taskStatus || task.statusText || "")
          ) || null
        );
      }

      function resolveReporterDefaultName(fallbackValue = "") {
        return String(
          state.memberName ||
            (state.currentMember && (state.currentMember.userName || state.currentMember.user || state.currentMember.account)) ||
            fallbackValue ||
            ""
        ).trim();
      }

      function buildTaskItemState(item) {
        const executeMode = getItemExecuteMode(item);
        const carryNumericValue =
          executeMode === "meter" && item && item.inputValue !== undefined && item.inputValue !== null && String(item.inputValue).trim()
            ? String(item.inputValue).trim()
            : "";
        return {
          ...item,
          executeMode,
          resultState: "pending",
          inputValue: "",
          optionValue: "",
          numericValue: carryNumericValue,
          abnormalDesc: "",
          handling: "",
          photos: [],
        };
      }

      function getTaskDraftKey(taskId) {
        return `${TASK_DRAFT_PREFIX}${String(taskId || "").trim()}`;
      }

      function getDraftItemKey(item) {
        const detailId = String(item && item.standardDetailId ? item.standardDetailId : "").trim();
        if (detailId) {
          return `id:${detailId}`;
        }
        return `seq:${String(item && item.seq ? item.seq : "").trim()}|${String(item && item.pointPart ? item.pointPart : "").trim()}|${String(item && item.pointItem ? item.pointItem : "").trim()}`;
      }

      function saveCurrentTaskDraft() {
        if (!state.selectedTask || !state.selectedTask.id || !state.selectedItems.length) {
          return;
        }

        try {
          const payload = {
            version: 2,
            taskId: state.selectedTask.id,
            updatedAt: nowDateTimeText(),
            reportStartAt: state.reportStartAt || nowDateTimeText(),
            reporter: refs.reporterInput.value.trim(),
            remark: refs.reportRemarkInput.value.trim(),
            items: state.selectedItems.map((item) => ({
              standardDetailId: item.standardDetailId || "",
              seq: item.seq || "",
              pointPart: item.pointPart || "",
              pointItem: item.pointItem || "",
              resultState: item.resultState || "pending",
              inputValue: item.inputValue || "",
              optionValue: item.optionValue || "",
              numericValue: item.numericValue === undefined || item.numericValue === null ? "" : item.numericValue,
              abnormalDesc: item.abnormalDesc || "",
              handling: item.handling || "",
              photos: normalizePhotoList(item.photos),
            })),
          };
          localStorage.setItem(getTaskDraftKey(state.selectedTask.id), JSON.stringify(payload));
        } catch (error) {
          console.warn("save draft failed:", error);
        }
      }

      function restoreTaskDraft(task) {
        if (!task || !task.id || !state.selectedItems.length) {
          return false;
        }

        try {
          const raw = localStorage.getItem(getTaskDraftKey(task.id));
          if (!raw) {
            return false;
          }
          const draft = safeJsonParse(raw);
          if (!draft || !Array.isArray(draft.items) || !draft.items.length) {
            return false;
          }

          const draftMap = new Map();
          draft.items.forEach((item) => {
            draftMap.set(getDraftItemKey(item), item);
          });

          state.selectedItems = state.selectedItems.map((item) => {
            const matched = draftMap.get(getDraftItemKey(item));
            if (!matched) {
              return item;
            }
            const merged = {
              ...item,
              resultState: normalizeResultState(matched.resultState),
              inputValue: String(matched.inputValue || ""),
              optionValue: String(matched.optionValue || ""),
              numericValue: matched.numericValue === undefined || matched.numericValue === null ? "" : String(matched.numericValue),
              abnormalDesc: String(matched.abnormalDesc || ""),
              handling: String(matched.handling || ""),
              photos: normalizePhotoList(matched.photos),
            };
            if (getItemExecuteMode(merged) === "meter" && !String(merged.numericValue || "").trim() && String(merged.inputValue || "").trim()) {
              merged.numericValue = String(merged.inputValue || "").trim();
              merged.inputValue = "";
            }
            normalizeDraftItemState(merged);
            return merged;
          });

          if (!state.memberName) {
            refs.reporterInput.value = String(draft.reporter || refs.reporterInput.value || "").trim();
          }
          syncReporterField();
          refs.reportRemarkInput.value = String(draft.remark || "").trim();
          state.reportStartAt = String(draft.reportStartAt || state.reportStartAt || nowDateTimeText()).trim();
          return true;
        } catch (error) {
          console.warn("restore draft failed:", error);
          return false;
        }
      }

      function clearTaskDraft(taskId) {
        const key = getTaskDraftKey(taskId);
        if (!taskId) {
          return;
        }
        try {
          localStorage.removeItem(key);
        } catch (error) {
          console.warn("clear draft failed:", error);
        }
      }

      function normalizeDraftItemState(item) {
        const mode = getItemExecuteMode(item);
        if (mode === "status") {
          item.resultState = inferStatusResultState(item, item.optionValue);
          return;
        }
        if (mode === "meter") {
          item.resultState = evaluateMeterValue(item).status;
          return;
        }
        if (mode === "text") {
          item.resultState = String(item.inputValue || "").trim() ? "normal" : "pending";
          return;
        }
        item.resultState = normalizeResultState(item.resultState);
      }

      function shouldRerenderOnFieldChange(field, eventType, previousStatus, nextStatus) {
        if (field === "photoInput" || field === "optionValue") {
          return true;
        }
        if (field === "numericValue") {
          return eventType === "change";
        }
        if (field === "inputValue" && (previousStatus !== nextStatus || eventType === "change")) {
          return false;
        }
        return false;
      }

      function updateSingleItemCard(index) {
        const item = state.selectedItems[index];
        if (!item) {
          return;
        }

        const card = refs.executeItemList.querySelector(`[data-item-index='${index}']`);
        if (!(card instanceof HTMLElement)) {
          return;
        }

        const filled = isItemFilled(item);
        const status = resolveItemResultState(item, filled);
        card.classList.toggle("abnormal", status === "abnormal");
        card.classList.toggle("done", status !== "abnormal" && filled);

        const statusEl = card.querySelector(".item-status");
        if (statusEl instanceof HTMLElement) {
          statusEl.className = `item-status ${status}`;
          statusEl.textContent = itemStatusText(status);
        }

        const judgeEl = card.querySelector("[data-role='meter-judge']");
        if (judgeEl instanceof HTMLElement) {
          const judge = evaluateMeterValue(item);
          judgeEl.className = `judge-hint ${judge.status || "pending"}`;
          judgeEl.innerHTML = `<span>自动判定</span><strong>${escapeHtml(judge.label || "待填")}</strong>${judge.detail ? `<em>${escapeHtml(judge.detail)}</em>` : ""}`;
        }
      }

      function setLoading(flag) {
        state.loading = flag;
        refs.scanBtn.disabled = flag;
        refs.cameraScanBtn.disabled = flag;
        refs.submitTaskBtn.disabled = flag;
        refs.nextPendingBtn.disabled = flag;
        refs.headerActionBtn.disabled = flag;
      }

      function setStatus(scope, message, error = false) {
        const target = scope === "execute" ? refs.executeStatus : scope === "summary" ? refs.summaryStatus : refs.dashboardStatus;
        target.textContent = message;
        target.classList.toggle("error", Boolean(error));
      }

      function showToast(message) {
        refs.toast.textContent = message;
        refs.toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => {
          refs.toast.classList.remove("show");
        }, 2200);
      }

      function inferCategory(ruleName, standardName, standardCode) {
        const text = `${String(ruleName || "")} ${String(standardName || "")} ${String(standardCode || "")}`;
        if (text.includes("周")) return "周检";
        if (text.includes("月")) return "月检";
        if (text.includes("定期")) return "定期点检";
        return "日检";
      }

      function isDoneStatus(text) {
        const value = String(text || "").trim();
        return ["已完成", "完成", "异常", "已报工", "已关闭", "作废", "失效"].includes(value);
      }

      function isTodayTask(task) {
        const taskDate = String(task && task.taskDateText ? task.taskDateText : "").trim();
        const today = String(state.today || formatDate(new Date())).trim();
        return Boolean(taskDate && today && taskDate === today);
      }

      function isBinaryNormalAbnormalSelect(item) {
        if (!item || item.inputType !== "select") {
          return false;
        }
        const options = Array.isArray(item.options) ? item.options.map((opt) => String(opt || "").trim()).filter(Boolean) : [];
        if (!options.length || options.length > 2) {
          return false;
        }
        return options.every((opt) => opt === "正常" || opt === "异常");
      }

      function getItemExecuteMode(item) {
        if (!item) {
          return "normal_abnormal";
        }
        const existing = String(item.executeMode || "").trim();
        const hasNumericJudgeRange = Boolean(parseJudgeRange(item.judgeStandard));
        if (existing) {
          if (hasNumericJudgeRange && existing !== "status" && existing !== "meter") {
            return "meter";
          }
          return existing;
        }

        const method = String(item.checkMethod || "").trim();
        if (method.includes("抄表") || item.inputType === "number" || hasNumericJudgeRange) {
          return "meter";
        }
        if (method.includes("状态")) {
          return "status";
        }
        if (method.includes("普通")) {
          return "normal_abnormal";
        }
        if (isBinaryNormalAbnormalSelect(item)) {
          return "normal_abnormal";
        }
        if (item.inputType === "select") {
          return "status";
        }
        if (item.inputType === "text") {
          return "text";
        }
        return "normal_abnormal";
      }

      function getExecuteModeLabel(mode) {
        if (mode === "meter") return "抄表录入";
        if (mode === "status") return "状态选择";
        if (mode === "text") return "文本录入";
        return "普通判断";
      }

      function normalizeResultState(value) {
        return value === "abnormal" || value === "normal" ? value : "pending";
      }

      function resolveItemResultState(item, fallbackFilled = isItemFilled(item)) {
        const status = normalizeResultState(item && item.resultState);
        if (status !== "pending") {
          return status;
        }
        return fallbackFilled ? "normal" : "pending";
      }

      function inferStatusResultState(item, value) {
        const text = String(value || "").trim();
        if (!text) {
          return "pending";
        }
        if (isBinaryNormalAbnormalSelect(item)) {
          return text === "异常" ? "abnormal" : "normal";
        }
        if (/(异常|故障|报警|停机|停用|维修|损坏|泄漏)/.test(text)) {
          return "abnormal";
        }
        return "normal";
      }

      function evaluateMeterValue(item) {
        const rawValue = String(item && item.numericValue !== undefined && item.numericValue !== null ? item.numericValue : "").trim();
        if (!rawValue) {
          return {
            status: "pending",
            label: "待填",
            detail: "",
          };
        }

        const numericValue = Number(rawValue);
        if (!Number.isFinite(numericValue)) {
          return {
            status: "pending",
            label: "待填",
            detail: "请输入有效数值",
          };
        }

        const rangeRule = parseJudgeRange(item && item.judgeStandard);
        if (!rangeRule) {
          return {
            status: "normal",
            label: "已录入",
            detail: "未识别标准范围，默认按已填写处理",
          };
        }

        const matched = isNumberInRange(numericValue, rangeRule);
        return {
          status: matched ? "normal" : "abnormal",
          label: matched ? "正常" : "异常",
          detail: `标准范围：${rangeRule.label}`,
        };
      }

      function parseJudgeRange(source) {
        const text = String(source || "").trim();
        if (!text) {
          return null;
        }

        const normalized = text.replace(/，/g, ",").replace(/\s+/g, "");
        const betweenMatch = normalized.match(/(-?\d+(?:\.\d+)?)\s*(?:~|～|—|–|-|至|到)\s*(-?\d+(?:\.\d+)?)/);
        if (betweenMatch) {
          const min = Number(betweenMatch[1]);
          const max = Number(betweenMatch[2]);
          if (Number.isFinite(min) && Number.isFinite(max)) {
            return {
              min: Math.min(min, max),
              max: Math.max(min, max),
              includeMin: true,
              includeMax: true,
              label: `${Math.min(min, max)}-${Math.max(min, max)}`,
            };
          }
        }

        let min = null;
        let max = null;
        let includeMin = true;
        let includeMax = true;
        const comparatorPattern = /(>=|<=|>|<|≥|≤)\s*(-?\d+(?:\.\d+)?)/g;
        for (const match of normalized.matchAll(comparatorPattern)) {
          const operator = match[1];
          const value = Number(match[2]);
          if (!Number.isFinite(value)) {
            continue;
          }
          if (operator === ">" || operator === ">=" || operator === "≥") {
            min = value;
            includeMin = operator !== ">";
          } else if (operator === "<" || operator === "<=" || operator === "≤") {
            max = value;
            includeMax = operator !== "<";
          }
        }

        if (min !== null || max !== null) {
          return {
            min,
            max,
            includeMin,
            includeMax,
            label: buildRangeLabel(min, max, includeMin, includeMax),
          };
        }

        if (/^-?\d+(?:\.\d+)?$/.test(normalized)) {
          const exact = Number(normalized);
          return {
            min: exact,
            max: exact,
            includeMin: true,
            includeMax: true,
            label: String(exact),
          };
        }

        return null;
      }

      function buildRangeLabel(min, max, includeMin, includeMax) {
        const parts = [];
        if (min !== null) {
          parts.push(`${includeMin ? ">=" : ">"}${min}`);
        }
        if (max !== null) {
          parts.push(`${includeMax ? "<=" : "<"}${max}`);
        }
        return parts.join(" 且 ");
      }

      function isNumberInRange(value, rangeRule) {
        if (!rangeRule || !Number.isFinite(value)) {
          return false;
        }
        if (rangeRule.min !== null) {
          if (rangeRule.includeMin ? value < rangeRule.min : value <= rangeRule.min) {
            return false;
          }
        }
        if (rangeRule.max !== null) {
          if (rangeRule.includeMax ? value > rangeRule.max : value >= rangeRule.max) {
            return false;
          }
        }
        return true;
      }

      function itemStatusText(status) {
        if (status === "normal") return "正常";
        if (status === "abnormal") return "异常";
        return "待填";
      }

      function formatDisplayDate(value) {
        const text = String(value || "").trim();
        if (!text) {
          return "今日";
        }
        const date = new Date(text.replace(/-/g, "/"));
        if (!Number.isFinite(date.getTime())) {
          return text;
        }
        const weekNames = ["日", "一", "二", "三", "四", "五", "六"];
        const m = date.getMonth() + 1;
        const d = date.getDate();
        const week = weekNames[date.getDay()];
        return `${date.getFullYear()}年${m}月${d}日 · 周${week}`;
      }

      function estimateMinutes(startText, endText) {
        const start = parseDateTime(startText);
        const end = parseDateTime(endText);
        if (!start || !end) {
          return 0;
        }
        const diff = Math.max(0, end.getTime() - start.getTime());
        return Math.max(1, Math.round(diff / 60000));
      }

      function parseDateTime(text) {
        const value = String(text || "").trim();
        if (!value) {
          return null;
        }
        const date = new Date(value.replace(/-/g, "/"));
        if (!Number.isFinite(date.getTime())) {
          return null;
        }
        return date;
      }

      async function requestApi(path, method = "GET", body) {
        const url = `${API_BASE}${path}`;
        const options = {
          method,
          headers: {
            "Content-Type": "application/json",
          },
        };
        if (method !== "GET" && method !== "HEAD") {
          options.body = JSON.stringify(body || {});
        }
        const resp = await fetch(url, options);
        const text = await resp.text();
        const json = safeJsonParse(text);
        if (!resp.ok) {
          throw new Error(extractErrorMessage(json) || text || `HTTP ${resp.status}`);
        }
        if (json && json.ok === false) {
          throw new Error(extractErrorMessage(json) || "请求失败");
        }
        return json;
      }

      async function requestApiSafe(path, method = "GET", body) {
        try {
          const payload = await requestApi(path, method, body);
          return {
            ok: true,
            payload,
          };
        } catch (error) {
          return {
            ok: false,
            error: error && error.message ? error.message : "request failed",
          };
        }
      }

      function extractErrorMessage(payload) {
        if (!payload || typeof payload !== "object") {
          return "";
        }
        const fields = [payload.message, payload.msg, payload.error, payload.detail];
        for (const value of fields) {
          if (typeof value === "string" && value.trim()) {
            return value.trim();
          }
        }
        return "";
      }

      function safeJsonParse(text) {
        if (!text) {
          return null;
        }
        try {
          return JSON.parse(text);
        } catch {
          return null;
        }
      }

      function nowDateTimeText() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        const ss = String(d.getSeconds()).padStart(2, "0");
        return `${y}-${m}-${day} ${hh}:${mm}:${ss}`;
      }

      function formatDate(date) {
        const d = date instanceof Date ? date : new Date(date);
        if (!Number.isFinite(d.getTime())) {
          return "";
        }
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
    </script>
  </body>
</html>
