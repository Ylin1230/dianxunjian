      async function saveStandard(event) {
        event.preventDefault();
        if (state.modal.standard.saving) {
          return;
        }
        const draft = state.modal.standard.draft;
        if (!draft) {
          return;
        }

        applyStandardFormToDraft(draft);

        if (!draft.name) {
          showToast("请填写标准名称");
          return;
        }

        if (!draft.category) {
          showToast("请选择执行规则");
          return;
        }

        if (!draft.applicableDeviceType) {
          showToast("请选择适用设备类型");
          return;
        }

        const dateValidation = validateAndRenderStandardDateRange();
        if (!dateValidation.ok) {
          refs.stdEndDisplayInput.focus();
          return;
        }

        const detailValidation = validateAndNormalizeDraftDetails(draft.details || []);
        if (!detailValidation.ok) {
          showToast(detailValidation.message);
          return;
        }
        draft.details = detailValidation.rows;

        setStandardSaveState(true);
        setLoading(true);
        setStatus("正在保存标准...");

        try {
          if (state.modal.standard.mode === "add") {
            const createdId = await createStandardWithRelations(draft);
            const taskSync = await syncStandardTasksAfterSave(createdId);
            closeStandardModalForce();
            await refreshAll({ preserveSelectedId: createdId });
            const message = formatSaveTaskSyncMessage("标准已新增", taskSync);
            showToast(message);
            setStatus(message, !taskSync.ok);
          } else {
            const updatedId = await updateStandardWithRelations(draft);
            const taskSync = await syncStandardTasksAfterSave(updatedId);
            closeStandardModalForce();
            await refreshAll({ preserveSelectedId: updatedId });
            const message = formatSaveTaskSyncMessage("标准已更新", taskSync);
            showToast(message);
            setStatus(message, !taskSync.ok);
          }
        } catch (error) {
          showToast(`保存失败：${error.message}`);
          setStatus(`保存失败：${error.message}`, true);
        } finally {
          setLoading(false);
          setStandardSaveState(false);
        }
      }

      async function syncStandardTasksAfterSave(standardId) {
        if (!standardId) {
          return {
            ok: false,
            message: "缺少点检标准ID，未触发任务生成",
          };
        }

        try {
          const result = await requestApi(
            "/rule-config/sync-standard-tasks",
            {},
            {
              method: "POST",
              body: {
                standardId,
              },
            }
          );
          return {
            ok: true,
            ...(result?.data || {}),
          };
        } catch (error) {
          return {
            ok: false,
            message: `任务生成失败：${error.message}`,
          };
        }
      }

      function formatSaveTaskSyncMessage(prefix, taskSync) {
        if (!taskSync) {
          return prefix;
        }

        if (!taskSync.ok) {
          return `${prefix}，但${taskSync.message || "任务生成失败"}`;
        }

        const sync = taskSync.sync || {};
        const created = Number(sync.created || 0);
        const skipped = Number(sync.skipped || 0);
        if (created > 0) {
          return `${prefix}，已生成今日任务 ${created} 条`;
        }
        if (skipped > 0) {
          return `${prefix}，今日任务已存在`;
        }
        return `${prefix}，${taskSync.message || "未生成今日任务"}`;
      }

      function applyStandardFormToDraft(draft) {
        syncStandardDateFields();
        draft.name = refs.stdNameInput.value.trim();
        draft.category = refs.stdCategoryInput.value.trim();
        draft.applicableDeviceType = normalizeApplicableDeviceType(refs.stdApplicableDeviceTypeInput.value);
        draft.version = refs.stdVersionInput.value.trim();
        draft.workshop = refs.stdWorkshopInput.value.trim();
        draft.area = refs.stdAreaInput.value.trim();
        draft.responsibilityPost = refs.stdPostInput.value.trim();
        draft.status = normalizeStatus(refs.stdStatusInput.value);
        const selectedDept = getSelectedDepartmentMeta();
        draft.responsibilityDept = selectedDept.name || "";
        draft.responsibilityDeptId = selectedDept.deptId || "";
        draft.responsibilityDeptRaw = draft.responsibilityDeptId || draft.responsibilityDept || null;
        refs.stdDeptIdInput.value = draft.responsibilityDeptId || "";

        const selectedOwner = getSelectedOwnerMeta();
        draft.defaultOwner = selectedOwner.name || "";
        draft.defaultOwnerId = selectedOwner.userId || "";
        draft.defaultOwnerRaw = draft.defaultOwnerId || draft.defaultOwner || null;
        refs.stdOwnerIdInput.value = draft.defaultOwnerId || "";
        if (!draft.defaultOwnerId) {
          draft.defaultOwnerId = extractComplexId(draft.defaultOwnerRaw);
          refs.stdOwnerIdInput.value = draft.defaultOwnerId || "";
        }
        draft.effectiveDate = refs.stdStartInput.value.trim();
        draft.expiryDate = refs.stdEndInput.value.trim();
        draft.scanRequired = "是";
        draft.remark = refs.stdRemarkInput.value.trim();
      }

      function validateStandardDateRange(draft) {
        const effectiveDate = normalizeDateInput(draft?.effectiveDate);
        const expiryDate = normalizeDateInput(draft?.expiryDate);
        if (effectiveDate && expiryDate && expiryDate < effectiveDate) {
          return {
            ok: false,
            message: "失效日期不能早于生效日期",
          };
        }
        return { ok: true };
      }

      function validateAndRenderStandardDateRange({ focus = true } = {}) {
        syncStandardDateFields();
        const draft = state.modal.standard.draft;
        if (draft) {
          draft.effectiveDate = refs.stdStartInput.value.trim();
          draft.expiryDate = refs.stdEndInput.value.trim();
        }
        const validation = validateStandardDateRange({
          effectiveDate: refs.stdStartInput.value,
          expiryDate: refs.stdEndInput.value,
        });
        setStandardDateError(validation.ok ? "" : validation.message, { focus });
        return validation;
      }

      function handleStandardDateChange() {
        validateAndRenderStandardDateRange({ focus: false });
      }

      function setStandardDateError(message, { focus = false } = {}) {
        const text = String(message || "").trim();
        if (refs.standardDateError) {
          refs.standardDateError.textContent = text;
          refs.standardDateError.classList.toggle("hidden", !text);
        }
        refs.stdStartDateField?.classList.toggle("is-error", Boolean(text));
        refs.stdEndDateField?.classList.toggle("is-error", Boolean(text));
        if (text && focus) {
          refs.standardDateError?.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      }

      function isStandardActiveForToday(standard) {
        return normalizeStatus(standard?.status || "启用") === "启用" && isStandardEffectiveOnDate(standard, getTodayDateText());
      }

      function isStandardEffectiveOnDate(standard, dateText) {
        const targetDate = normalizeDateInput(dateText) || getTodayDateText();
        const effectiveDate = normalizeDateInput(standard?.effectiveDate);
        const expiryDate = normalizeDateInput(standard?.expiryDate);
        if (effectiveDate && targetDate < effectiveDate) {
          return false;
        }
        if (expiryDate && targetDate > expiryDate) {
          return false;
        }
        return true;
      }

      function getTodayDateText() {
        const date = new Date();
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      async function fillCurrentOwnerFromApi({ silent = false } = {}) {
        const draft = state.modal.standard.draft;
        if (!draft) {
          return;
        }

        const currentContact = findCurrentContactUser();
        if (currentContact && applyCurrentUserToStandardDraft(currentContact, { silent })) {
          return;
        }

        try {
          const query = {};
          const ctx = state.externalContext || {};
          if (ctx.userId) query.webpage_user_id = ctx.userId;
          if (ctx.userName) query.webpage_user_name = ctx.userName;
          if (ctx.uniqueId) query.webpage_corp_user_id = ctx.uniqueId;
          if (ctx.mobile) query.webpage_phone = ctx.mobile;
          if (ctx.email) query.webpage_email = ctx.email;
          if (ctx.account) query.webpage_account = ctx.account;
          const result = await requestApi("/inspection-report/current-member", query);
          const data = result?.data || {};
          const member = data.member || null;
          if (!member) {
            if (!silent) {
              showToast(data.lookupError || "未识别到当前成员，请从下拉列表选择负责人");
            }
            return;
          }

          if (!applyCurrentUserToStandardDraft(member, { silent })) {
            if (!silent) {
              showToast("当前成员缺少 userId，无法自动写入负责人");
            }
          }
        } catch (error) {
          if (!silent) {
            showToast(`带入失败：${error.message}`);
          }
        }
      }

      async function createStandardWithRelations(draft) {
        const payload = buildMasterPayload(draft, draft.devices || [], "");
        const result = await requestEntry(API_CONFIG.masterEntryId, "data_create", { data: payload }, "POST");

        let cloudId = extractRecordId(result?.data || result);
        if (!cloudId) {
          throw new Error("主表新增成功但未返回记录ID");
        }

        let created = null;
        try {
          const retrieve = await requestEntry(API_CONFIG.masterEntryId, "data_retrieve", { data_id: cloudId }, "POST");
          created = mapStandardRecord(retrieve?.data || retrieve);
        } catch (error) {
          created = null;
        }

        const standard = created || {
          ...deepClone(draft),
          id: cloudId,
          cloudId,
          code: draft.code === "自动生成" ? "" : draft.code,
          detailsLoaded: true,
        };

        if (isStandardActiveForToday(standard)) {
          await updateRecord(API_CONFIG.masterEntryId, cloudId, {
            [MASTER_FIELD.activeRuleId]: cloudId,
          });
          standard.activeRuleId = cloudId;
        }

        await replaceStandardDetails(standard, draft.details || []);
        await bindDevicesToStandard((draft.devices || []).map((item) => item.deviceId), standard);

        return cloudId;
      }

      async function updateStandardWithRelations(draft) {
        if (!draft.cloudId) {
          throw new Error("缺少标准记录ID");
        }

        const desiredDeviceIds = new Set((draft.devices || []).map((item) => item.deviceId));
        const originDeviceIds = state.modal.standard.originDeviceIds;

        const payload = buildMasterPayload(draft, draft.devices || [], isStandardActiveForToday(draft) ? draft.cloudId : "");
        await updateRecord(API_CONFIG.masterEntryId, draft.cloudId, payload);

        const standard = {
          ...deepClone(draft),
          code: draft.code === "自动生成" ? "" : draft.code,
        };

        await replaceStandardDetails(standard, draft.details || []);

        const toBind = Array.from(desiredDeviceIds);
        const toUnbind = Array.from(originDeviceIds).filter((id) => !desiredDeviceIds.has(id));

        await bindDevicesToStandard(toBind, standard);
        await unbindDevicesFromStandard(toUnbind, {
          ...standard,
          applicableDeviceType: state.modal.standard.originDeviceType || standard.applicableDeviceType,
        });

        return draft.cloudId;
      }

      async function deleteSelectedStandard() {
        const current = getSelectedStandard();
        if (!current) {
          showToast("请先选择标准");
          return;
        }

        const ok = window.confirm(`确认删除标准“${current.name || current.code}”吗？`);
        if (!ok) {
          return;
        }

        setLoading(true);
        setStatus("正在删除标准...");

        try {
          await ensureStandardDetailsLoaded(current, { force: true });

          const linked = getStandardLinkedDevices(current);
          await unbindDevicesFromStandard(
            linked.map((item) => item.deviceId),
            current
          );

          const detailRecords = await fetchDetailRecordsByStandard(current);
          for (const row of detailRecords) {
            if (row.cloudId) {
              await requestEntry(API_CONFIG.detailEntryId, "data_delete", { data_id: row.cloudId }, "POST");
            }
          }

          await requestEntry(API_CONFIG.masterEntryId, "data_delete", { data_id: current.cloudId }, "POST");

          await refreshAll();
          showToast("标准已删除");
        } catch (error) {
          showToast(`删除失败：${error.message}`);
          setStatus(`删除失败：${error.message}`, true);
        } finally {
          setLoading(false);
        }
      }

      function buildMasterPayload(draft, linkedDevices, activeRuleId) {
        const objectSummary = buildStandardObjectSummaryValues(linkedDevices);
        const deptValue = coerceDepartmentSingleValue(
          draft.responsibilityDeptId,
          draft.responsibilityDeptRaw,
          draft.responsibilityDept
        );
        const ownerValue = coerceMemberSingleValue(draft.defaultOwnerId, draft.defaultOwnerRaw, draft.defaultOwner);

        const payload = {
          [MASTER_FIELD.name]: draft.name || "",
          [MASTER_FIELD.category]: draft.category || "",
          [MASTER_FIELD.applicableDeviceType]: normalizeApplicableDeviceType(draft.applicableDeviceType),
          [MASTER_FIELD.workshop]: draft.workshop || "",
          [MASTER_FIELD.area]: draft.area || "",
          [MASTER_FIELD.responsibilityPost]: draft.responsibilityPost || "",
          [MASTER_FIELD.responsibilityDept]: deptValue,
          [MASTER_FIELD.defaultOwner]: ownerValue,
          [MASTER_FIELD.status]: draft.status || "启用",
          [MASTER_FIELD.version]: draft.version || "",
          [MASTER_FIELD.effectiveDate]: formatDateTimeForApi(draft.effectiveDate),
          [MASTER_FIELD.expiryDate]: formatDateTimeForApi(draft.expiryDate),
          [MASTER_FIELD.scanRequired]: draft.scanRequired || "否",
          [MASTER_FIELD.remark]: draft.remark || "",

          [MASTER_FIELD.deviceName]: objectSummary.deviceNames,
          [MASTER_FIELD.deviceCode]: objectSummary.deviceCodes,
          [MASTER_FIELD.deviceType]: objectSummary.deviceTypes,
          [MASTER_FIELD.linkedDeviceType]: objectSummary.deviceTypes,
          [MASTER_FIELD.linkedDeviceRange]: objectSummary.deviceRanges,
          [MASTER_FIELD.activeRuleId]: activeRuleId || "",
        };

        return payload;
      }

      function buildStandardObjectSummaryValues(linkedDevices) {
        const rows = Array.isArray(linkedDevices) ? linkedDevices : [];
        return {
          deviceNames: unique(rows.map((item) => item.name)).join("、"),
          deviceCodes: unique(rows.map((item) => item.code)).join("、"),
          deviceTypes: unique(rows.map((item) => item.deviceType || item.category)).join("、"),
          deviceRanges: unique(
            rows.map((item) => {
              if (item.deviceType === "危化品库") {
                return item.location || item.name || item.area || item.workshop;
              }
              return item.workshop || item.area || item.location;
            })
          ).join("、"),
        };
      }

      function coerceDepartmentSingleValue(deptId, rawValue, fallbackText) {
        const directId = String(deptId || "").trim();
        if (directId) {
          return directId;
        }

        const rawId = String(extractComplexId(rawValue) || "").trim();
        if (rawId) {
          return rawId;
        }

        const text = String(fallbackText || "").trim();
        if (text && /^[A-Za-z0-9_-]{8,}$/.test(text)) {
          return text;
        }

        return null;
      }

      function coerceMemberSingleValue(ownerId, rawValue, fallbackText) {
        const directId = normalizeMemberId(ownerId);
        if (directId) {
          return directId;
        }

        const rawId = normalizeMemberId(extractComplexId(rawValue));
        if (rawId) {
          return rawId;
        }

        const parsed = parseJsonMaybe(String(fallbackText || "").trim());
        const parsedId = normalizeMemberId(extractComplexId(parsed));
        if (parsedId) {
          return parsedId;
        }

        const text = normalizeMemberId(fallbackText);
        if (text && isLikelyMemberId(text)) {
          return text;
        }

        return null;
      }

      function normalizeMemberId(value) {
        return String(value || "").trim();
      }

      function isLikelyMemberId(text) {
        return /^[A-Za-z0-9_-]{8,}$/.test(String(text || "").trim());
      }

      function extractComplexId(value) {
        if (value === null || value === undefined) {
          return "";
        }

        if (typeof value === "string" || typeof value === "number" || typeof value === "boolean") {
          return String(value).trim();
        }

        if (Array.isArray(value)) {
          for (const item of value) {
            const id = extractComplexId(item);
            if (id) {
              return id;
            }
          }
          return "";
        }

        if (typeof value === "object") {
          const keys = ["_id", "id", "user_id", "userId", "value", "code", "key"];
          for (const key of keys) {
            if (Object.prototype.hasOwnProperty.call(value, key)) {
              const text = String(value[key] || "").trim();
              if (text) {
                return text;
              }
            }
          }
        }

        return "";
      }

      function parseJsonMaybe(text) {
        if (!text) {
          return null;
        }
        if (!(text.startsWith("{") || text.startsWith("["))) {
          return null;
        }
        try {
          return JSON.parse(text);
        } catch (error) {
          return null;
        }
      }

      async function replaceStandardDetails(standard, detailRows) {
        const existing = await fetchDetailRecordsByStandard(standard);
        await Promise.all(
          existing
            .filter((row) => row.cloudId)
            .map((row) => requestEntry(API_CONFIG.detailEntryId, "data_delete", { data_id: row.cloudId }, "POST"))
        );

        await Promise.all(detailRows.map((row) => {
          const payload = buildDetailPayload(row, standard);
          return requestEntry(API_CONFIG.detailEntryId, "data_create", { data: payload }, "POST");
        }));
      }

      async function fetchDetailRecordsByStandard(standard) {
        const records = await fetchEntryRecords(API_CONFIG.detailEntryId);
        return records
          .filter((record) => isDetailBelongsToStandard(record, standard))
          .map((record) => mapDetailRecord(record));
      }

      function buildDetailPayload(detail, standard) {
        const normalized = deriveDetailByMode(detail);
        const executeMode = normalized.executeMode;
        const inspectType = normalized.inspectType || "日常点检";
        const standardContent = normalized.standard || "";
        const standardText = normalized.standardText || "";
        const range = executeMode === "抄表" ? parseNumericRange(standardText) : null;
        const lower = range && range.min !== null ? range.min : "";
        const upper = range && range.max !== null ? range.max : "";
        const judgeValue = executeMode === "抄表" ? standardText : "枚举判断";
        const resultOptions = executeMode === "抄表" ? "" : standardContent;
        const mobileInputMode = executeMode === "抄表" ? "数值录入" : "单选";

        return {
          [DETAIL_FIELD.standardId]: standard.cloudId || "",
          [DETAIL_FIELD.standardName]: standard.name || "",
          [DETAIL_FIELD.seq]: toIntOrDefault(normalized.no, 1),
          [DETAIL_FIELD.part]: normalized.part || "",
          [DETAIL_FIELD.item]: normalized.item || "",
          [DETAIL_FIELD.executeMode]: executeMode,
          [DETAIL_FIELD.method]: null,
          [DETAIL_FIELD.inspectType]: inspectType,
          [DETAIL_FIELD.standard]: standardContent,
          [DETAIL_FIELD.content]: standardContent,
          [DETAIL_FIELD.standardText]: standardText,
          [DETAIL_FIELD.judge]: judgeValue,
          [DETAIL_FIELD.lower]: lower,
          [DETAIL_FIELD.upper]: upper,
          [DETAIL_FIELD.resultType]: null,
          [DETAIL_FIELD.resultOptions]: resultOptions,
          [DETAIL_FIELD.mobileInputMode]: mobileInputMode,
          [DETAIL_FIELD.unit]: normalized.unit || "",
          [DETAIL_FIELD.sortNo]: toIntOrDefault(normalized.sortNo || normalized.no, 1),
          [DETAIL_FIELD.enabledStatus]: "启用",
          [DETAIL_FIELD.remark]: normalized.remark || "",
        };
      }

      async function bindDevicesToStandard(deviceIds, standard) {
        if (!deviceIds.length) {
          return;
        }

        const objectType = normalizeApplicableDeviceType(standard?.applicableDeviceType);
        const relationObjectType = getRelationObjectTypeValue(objectType);
        const ruleId = resolveRuleIdForStandard(standard);
        const pool = getObjectPool(objectType).filter((item) => isObjectLinkable(item, objectType));
        const uniqueDeviceIds = Array.from(new Set(deviceIds.map((id) => String(id || "").trim()).filter(Boolean)));
        await Promise.all(uniqueDeviceIds.map(async (deviceId) => {
          const device = pool.find((item) => item.id === deviceId);
          if (!device) {
            return;
          }
          const payload = buildRelationPayload(standard, device, relationObjectType, ruleId);
          const existing = findRelationRecord({
            standardId: standard.cloudId,
            objectType: relationObjectType,
            objectId: device.id,
            objectCode: device.code,
          });

          if (existing?.cloudId) {
            await updateRecord(API_CONFIG.relationEntryId, existing.cloudId, payload);
            applyLocalRelationUpsert(existing.cloudId, payload);
            return;
          }

          const created = await requestEntry(API_CONFIG.relationEntryId, "data_create", { data: payload }, "POST");
          applyLocalRelationUpsert(extractRecordId(created?.data || created), payload);
        }));
      }

      async function unbindDevicesFromStandard(deviceIds, standard) {
        if (!deviceIds.length) {
          return;
        }

        const objectType = normalizeApplicableDeviceType(standard?.applicableDeviceType);
        const relationObjectType = getRelationObjectTypeValue(objectType);
        const pool = getObjectPool(objectType);
        for (const deviceId of deviceIds) {
          const device = pool.find((item) => item.id === deviceId);
          if (!device) {
            continue;
          }
          const matchedRelations = state.relationPool.filter((item) => {
            const sameStandard = standard.cloudId && String(item.standardId || "") === String(standard.cloudId || "");
            const sameType = normalizeRelationObjectType(item.objectType) === relationObjectType;
            const sameId = String(item.objectId || "") === String(device.id || "");
            const sameCode = device.code && String(item.objectCode || "") === String(device.code || "");
            return sameStandard && sameType && (sameId || sameCode) && isRelationActive(item.status);
          });

          for (const relation of matchedRelations) {
            await updateRecord(API_CONFIG.relationEntryId, relation.cloudId, {
              [RELATION_FIELD.status]: "停用",
            });
            applyLocalRelationUpsert(relation.cloudId, {
              [RELATION_FIELD.standardId]: relation.standardId,
              [RELATION_FIELD.standardCode]: relation.standardCode,
              [RELATION_FIELD.ruleId]: relation.ruleId,
              [RELATION_FIELD.objectType]: relation.objectType,
              [RELATION_FIELD.objectId]: relation.objectId,
              [RELATION_FIELD.objectCode]: relation.objectCode,
              [RELATION_FIELD.status]: "停用",
            });
          }
        }
      }

      async function openDetailModal({ target, mode, detailId = "" }) {
        if (target === "active") {
          const current = getSelectedStandard();
          if (!current) {
            showToast("请先选择标准");
            return;
          }
          try {
            await ensureStandardDetailsLoaded(current);
          } catch (error) {
            showToast(`加载明细失败：${error.message}`);
            return;
          }
        }

        const list = getDetailList(target);
        const currentRow = list.find((item) => item.id === detailId);

        state.modal.detail.target = target;
        state.modal.detail.mode = mode;
        state.modal.detail.editingId = mode === "edit" ? detailId : "";

        refs.detailForm.reset();

        if (mode === "edit" && currentRow) {
          refs.detNoInput.value = toIntOrDefault(currentRow.no, 1);
          refs.detPartInput.value = currentRow.part || "";
          refs.detItemInput.value = currentRow.item || "";
          refs.detExecuteModeInput.value = currentRow.executeMode || "普通";
          refs.detInspectTypeInput.value = currentRow.inspectType || "日常点检";
          refs.detStandardTextInput.value = currentRow.standardText || "";
          refs.detUnitInput.value = currentRow.unit || "";
          refs.detStandardInput.value = currentRow.standard || "";
          refs.detRemarkInput.value = currentRow.remark || "";
          refs.detailModalTitle.textContent = "编辑点检明细";
        } else {
          refs.detNoInput.value = nextDetailNo(list);
          refs.detExecuteModeInput.value = "普通";
          refs.detInspectTypeInput.value = "日常点检";
          refs.detailModalTitle.textContent = "新增点检明细";
        }

        updateDetailModeRequiredState();
        refreshSelectProxies(refs.detailForm);
        refs.detailModal.classList.remove("hidden");
      }

      function closeDetailModal() {
        refs.detailModal.classList.add("hidden");
      }

      function updateDetailModeRequiredState() {
        const executeMode = normalizeExecuteMode(refs.detExecuteModeInput.value || "普通");
        const isMeter = executeMode === "抄表";
        refs.detUnitRequiredMark.classList.toggle("hidden", !isMeter);
        refs.detJudgeRequiredMark.classList.toggle("hidden", !isMeter);
        refs.detUnitInput.required = isMeter;
        refs.detStandardTextInput.required = isMeter;
        refs.detStandardTextInput.placeholder = isMeter
          ? "如 48-80、>10、>=10、<5"
          : executeMode === "状态"
            ? "与标准内容一致"
            : "例如 正常,异常";
        if (executeMode === "普通" && !refs.detStandardInput.value.trim()) {
          refs.detStandardInput.value = "正常,异常";
        }
        if (isMeter && (refs.detUnitInput.value.trim() === "-")) {
          refs.detUnitInput.value = "";
        }
      }

      async function saveDetail(event) {
        event.preventDefault();

        const target = state.modal.detail.target;
        const mode = state.modal.detail.mode;
        const editingId = state.modal.detail.editingId;
        const list = getDetailList(target);

        const detail = {
          id: mode === "edit" ? editingId : uid("det"),
          cloudId: mode === "edit" ? list.find((item) => item.id === editingId)?.cloudId || "" : "",
          no: toIntOrDefault(refs.detNoInput.value, 1),
          part: refs.detPartInput.value.trim(),
          item: refs.detItemInput.value.trim(),
          executeMode: refs.detExecuteModeInput.value.trim() || "普通",
          inspectType: refs.detInspectTypeInput.value.trim() || "日常点检",
          standardText: refs.detStandardTextInput.value.trim(),
          unit: refs.detUnitInput.value.trim(),
          standard: refs.detStandardInput.value.trim(),
          remark: refs.detRemarkInput.value.trim(),
          sortNo: toIntOrDefault(refs.detNoInput.value, 1),
          enabledStatus: "启用",
        };
        const normalizedDetail = deriveDetailByMode(detail);

        const validation = validateDetailRequiredFields(normalizedDetail);
        if (!validation.ok) {
          showToast(validation.message);
          return;
        }

        if (target === "draft") {
          if (mode === "edit") {
            const idx = list.findIndex((item) => item.id === editingId);
            if (idx >= 0) {
              list[idx] = normalizedDetail;
            }
            showToast("明细已更新");
          } else {
            list.push(normalizedDetail);
            showToast("明细已新增");
          }

          normalizeDetailList(list);
          closeDetailModal();
          renderDraftDetailTable();
          return;
        }

        const standard = getSelectedStandard();
        if (!standard || !standard.cloudId) {
          showToast("请先选择标准");
          return;
        }

        setLoading(true);
        setStatus("正在保存明细...");

        try {
          if (mode === "edit") {
            if (!normalizedDetail.cloudId) {
              throw new Error("明细记录缺少ID，无法更新");
            }
            await updateRecord(API_CONFIG.detailEntryId, normalizedDetail.cloudId, buildDetailPayload(normalizedDetail, standard));
            const idx = list.findIndex((item) => item.id === editingId);
            if (idx >= 0) {
              list[idx] = normalizedDetail;
            }
            showToast("明细已更新");
          } else {
            const result = await requestEntry(
              API_CONFIG.detailEntryId,
              "data_create",
              { data: buildDetailPayload(normalizedDetail, standard) },
              "POST"
            );
            const cloudId = extractRecordId(result?.data || result);
            normalizedDetail.cloudId = cloudId;
            normalizedDetail.id = cloudId || normalizedDetail.id;
            list.push(normalizedDetail);
            showToast("明细已新增");
          }

          normalizeDetailList(list);
          closeDetailModal();
          renderDetailsTable();
          setStatus("明细保存成功");
        } catch (error) {
          showToast(`明细保存失败：${error.message}`);
          setStatus(`明细保存失败：${error.message}`, true);
        } finally {
          setLoading(false);
        }
      }

      async function removeDetails(target, ids) {
        if (!ids.length) {
          showToast("请先选择要删除的明细");
          return;
        }

        const ok = window.confirm(`确认删除 ${ids.length} 条明细吗？`);
        if (!ok) {
          return;
        }

        const list = getDetailList(target);
        const inline = getInlineDetail(target);
        if (inline && inline.mode === "edit" && ids.includes(inline.rowId)) {
          clearInlineDetailState(target);
          renderActionDisabled();
        }

        if (target === "draft") {
          const idSet = new Set(ids);
          for (let i = list.length - 1; i >= 0; i -= 1) {
            if (idSet.has(list[i].id)) {
              list.splice(i, 1);
            }
          }
          ids.forEach((id) => state.modal.standard.selectedDetailIds.delete(id));
          renderDraftDetailTable();
          showToast(`已删除 ${ids.length} 条明细`);
          return;
        }

        setLoading(true);
        setStatus("正在删除明细...");

        try {
          const idSet = new Set(ids);
          const toDelete = list.filter((item) => idSet.has(item.id));

          for (const row of toDelete) {
            if (row.cloudId) {
              await requestEntry(API_CONFIG.detailEntryId, "data_delete", { data_id: row.cloudId }, "POST");
            }
          }

          for (let i = list.length - 1; i >= 0; i -= 1) {
            if (idSet.has(list[i].id)) {
              list.splice(i, 1);
            }
          }

          ids.forEach((id) => state.selected.detailIds.delete(id));
          renderDetailsTable();
          showToast(`已删除 ${ids.length} 条明细`);
          setStatus("明细已删除");
        } catch (error) {
          showToast(`删除失败：${error.message}`);
          setStatus(`删除失败：${error.message}`, true);
        } finally {
          setLoading(false);
        }
      }

      function normalizeDetailList(list) {
        list.sort((a, b) => Number(a.sortNo || a.no || 0) - Number(b.sortNo || b.no || 0));
      }

      function nextDetailNo(list) {
        if (!list.length) {
          return 1;
        }
        let maxNo = 0;
        list.forEach((row) => {
          maxNo = Math.max(maxNo, toIntOrDefault(row.no, 0));
        });
        return maxNo + 1;
      }

      function getDetailList(target) {
        if (target === "draft") {
          return getDraftDetails();
        }
        return getSelectedStandard()?.details || [];
      }

      function getInlineDetail(target) {
        if (state.inlineDetail.target !== target || !state.inlineDetail.draft) {
          return null;
        }
        return state.inlineDetail;
      }

      function clearInlineDetailState(target = "") {
        if (target && state.inlineDetail.target !== target) {
          return;
        }
        state.inlineDetail.target = "";
        state.inlineDetail.mode = "";
        state.inlineDetail.rowId = "";
        state.inlineDetail.draft = null;
      }

      async function beginInlineDetailEdit(target, mode, detailId = "") {
        if (target === "active") {
          const current = getSelectedStandard();
          if (!current) {
            showToast("请先选择标准");
            return;
          }
          try {
            await ensureStandardDetailsLoaded(current);
          } catch (error) {
            showToast(`加载明细失败：${error.message}`);
            return;
          }
        }

        const list = getDetailList(target);
        const editingRow = mode === "edit" ? list.find((item) => item.id === detailId) : null;
        if (mode === "edit" && !editingRow) {
          showToast("未找到要编辑的明细");
          return;
        }

        if (state.inlineDetail.draft) {
          const sameEditing =
            state.inlineDetail.target === target &&
            state.inlineDetail.mode === mode &&
            (mode === "add" || state.inlineDetail.rowId === detailId);
          if (sameEditing) {
            return;
          }
          const ok = window.confirm("当前有未保存的明细编辑，是否放弃并继续？");
          if (!ok) {
            return;
          }
          clearInlineDetailState();
        }

        const fallbackNo = mode === "add" ? nextDetailNo(list) : toIntOrDefault(editingRow?.no, 1);
        state.inlineDetail.target = target;
        state.inlineDetail.mode = mode;
        state.inlineDetail.rowId = mode === "edit" ? detailId : uid("det_inline");
        state.inlineDetail.draft = normalizeInlineDraftByMode({
          id: mode === "edit" ? editingRow.id : uid("det"),
          cloudId: mode === "edit" ? editingRow.cloudId || "" : "",
          no: fallbackNo,
          part: editingRow?.part || "",
          item: editingRow?.item || "",
          executeMode: editingRow?.executeMode || "普通",
          inspectType: editingRow?.inspectType || "日常点检",
          standard: editingRow?.standard || "",
          unit: editingRow?.unit || "",
          standardText: editingRow?.standardText || "",
          remark: editingRow?.remark || "",
          sortNo: toIntOrDefault(editingRow?.sortNo || fallbackNo, fallbackNo),
          enabledStatus: "启用",
        });

        if (target === "active") {
          state.selected.detailIds.clear();
          renderDetailsTable();
        } else {
          state.modal.standard.selectedDetailIds.clear();
          renderDraftDetailTable();
        }
        renderActionDisabled();
      }

      function updateInlineDetailField(target, field, value) {
        const inline = getInlineDetail(target);
        if (!inline) {
          return;
        }
        const draft = { ...inline.draft, [field]: value };
        const trigger = applyRangeInputValue(draft, field, value);
        if (field === "no") {
          draft.no = toIntOrDefault(value, 1);
          draft.sortNo = draft.no;
        }
        inline.draft = normalizeInlineDraftByMode(draft, { trigger });
      }

      function cancelInlineDetail(target, { silent = false } = {}) {
        if (!getInlineDetail(target)) {
          return;
        }
        clearInlineDetailState(target);
        if (target === "active") {
          renderDetailsTable();
        } else {
          renderDraftDetailTable();
        }
        renderActionDisabled();
        if (!silent) {
          showToast("已取消编辑");
        }
      }

      async function saveInlineDetail(target) {
        const inline = getInlineDetail(target);
        if (!inline) {
          return;
        }

        const list = getDetailList(target);
        const existing = inline.mode === "edit" ? list.find((item) => item.id === inline.rowId) : null;
        const fallbackNo = inline.mode === "edit" ? toIntOrDefault(existing?.no, 1) : nextDetailNo(list);
        const no = toIntOrDefault(inline.draft.no, fallbackNo);

        const detail = {
          id: inline.mode === "edit" ? inline.rowId : inline.draft.id || uid("det"),
          cloudId: inline.mode === "edit" ? existing?.cloudId || inline.draft.cloudId || "" : "",
          no,
          part: String(inline.draft.part || "").trim(),
          item: String(inline.draft.item || "").trim(),
          executeMode: String(inline.draft.executeMode || "普通").trim() || "普通",
          inspectType: String(inline.draft.inspectType || "日常点检").trim() || "日常点检",
          standard: String(inline.draft.standard || "").trim(),
          unit: String(inline.draft.unit || "").trim(),
          standardText: String(inline.draft.standardText || "").trim(),
          remark: String(inline.draft.remark || "").trim(),
          sortNo: no,
          enabledStatus: "启用",
        };
        const normalizedDetail = deriveDetailByMode(detail);

        const validation = validateDetailRequiredFields(normalizedDetail);
        if (!validation.ok) {
          showToast(validation.message);
          return;
        }

        if (target === "draft") {
          if (inline.mode === "edit") {
            const index = list.findIndex((item) => item.id === inline.rowId);
            if (index >= 0) {
              list[index] = normalizedDetail;
            }
            showToast("明细已更新");
          } else {
            list.push(normalizedDetail);
            showToast("明细已新增");
          }
          normalizeDetailList(list);
          clearInlineDetailState("draft");
          renderDraftDetailTable();
          renderActionDisabled();
          return;
        }

        const standard = getSelectedStandard();
        if (!standard || !standard.cloudId) {
          showToast("请先选择标准");
          return;
        }

        setLoading(true);
        setStatus("正在保存明细...");
        try {
          if (inline.mode === "edit") {
            if (!normalizedDetail.cloudId) {
              throw new Error("明细记录缺少ID，无法更新");
            }
            await updateRecord(API_CONFIG.detailEntryId, normalizedDetail.cloudId, buildDetailPayload(normalizedDetail, standard));
            const index = list.findIndex((item) => item.id === inline.rowId);
            if (index >= 0) {
              list[index] = normalizedDetail;
            }
            showToast("明细已更新");
          } else {
            const result = await requestEntry(
              API_CONFIG.detailEntryId,
              "data_create",
              { data: buildDetailPayload(normalizedDetail, standard) },
              "POST"
            );
            const cloudId = extractRecordId(result?.data || result);
            normalizedDetail.cloudId = cloudId;
            normalizedDetail.id = cloudId || normalizedDetail.id;
            list.push(normalizedDetail);
            showToast("明细已新增");
          }

          normalizeDetailList(list);
          clearInlineDetailState("active");
          renderDetailsTable();
          renderActionDisabled();
          setStatus("明细保存成功");
        } catch (error) {
          showToast(`明细保存失败：${error.message}`);
          setStatus(`明细保存失败：${error.message}`, true);
        } finally {
          setLoading(false);
        }
      }

      function appendInlineDetailRow(container, inline) {
        const row = normalizeInlineDraftByMode(inline.draft || {});
        const executeMode = normalizeExecuteMode(row.executeMode || "普通");
        const standardReadonly = executeMode === "状态" ? "" : "readonly";
        const judgeReadonly = executeMode === "抄表" ? "" : "readonly";
        const standardPlaceholder = executeMode === "状态" ? "例如 前进,待修,停用" : defaultStandardByMode(executeMode);
        const judgePlaceholder =
          executeMode === "抄表" ? "如 48-80、>10、>=10、<5" : executeMode === "状态" ? "与标准内容一致" : "正常,异常";
        const judgeControl =
          executeMode === "抄表"
            ? renderRangeInputControl(row)
            : `<input class="input" type="text" data-inline-field="standardText" ${judgeReadonly} placeholder="${escapeHtml(judgePlaceholder)}" value="${escapeHtml(row.standardText || "")}" />`;
        const tr = document.createElement("tr");
        tr.className = "row-editor";
        tr.innerHTML = `
          <td style="text-align:center;color:#7e8a9b">-</td>
          <td><input class="input" type="number" min="1" step="1" data-inline-field="no" value="${escapeHtml(row.no ?? "")}" /></td>
          <td><input class="input" type="text" data-inline-field="part" value="${escapeHtml(row.part || "")}" /></td>
          <td><input class="input" type="text" data-inline-field="item" value="${escapeHtml(row.item || "")}" /></td>
          <td>
            <select class="select" data-inline-field="executeMode">
              ${renderInlineSelectOptions(["普通", "状态", "抄表"], executeMode)}
            </select>
          </td>
          <td>
            <select class="select" data-inline-field="inspectType">
              ${renderInlineSelectOptions(["日常点检", "重点点检"], row.inspectType || "日常点检")}
            </select>
          </td>
          <td><input class="input" type="text" data-inline-field="standard" ${standardReadonly} placeholder="${escapeHtml(standardPlaceholder)}" value="${escapeHtml(row.standard || "")}" /></td>
          <td><input class="input" type="text" data-inline-field="unit" value="${escapeHtml(row.unit || "")}" /></td>
          <td>${judgeControl}</td>
          <td>
            <div class="cell-actions">
              <button class="text-btn" data-action="save">保存</button>
              <button class="text-btn danger" data-action="cancel">取消</button>
            </div>
          </td>
        `;
        container.appendChild(tr);
      }

      function renderInlineSelectOptions(options, selectedValue) {
        const current = String(selectedValue || "");
        return options
          .map((item) => {
            const selected = item === current ? "selected" : "";
            return `<option value="${escapeHtml(item)}" ${selected}>${escapeHtml(item)}</option>`;
          })
          .join("");
      }

      function renderDraftDetailTable() {
        const rows = getDraftDetails();
        refs.modalDetailTableBody.innerHTML = "";

        if (!rows.length) {
          refs.modalDetailTableBody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#7e8a9b;padding:16px">暂无明细</td></tr>';
          return;
        }

        rows.forEach((rawRow) => {
          const row = normalizeInlineDraftByMode(rawRow);
          if (row !== rawRow) {
            Object.assign(rawRow, row);
          }
          const executeMode = normalizeExecuteMode(row.executeMode || "普通");
          const standardReadonly = executeMode === "状态" ? "" : "readonly";
          const judgeReadonly = executeMode === "抄表" ? "" : "readonly";
          const standardPlaceholder = executeMode === "状态" ? "例如 前进,待修,停用" : defaultStandardByMode(executeMode);
          const judgePlaceholder =
            executeMode === "抄表" ? "如 48-80、>10、>=10、<5" : executeMode === "状态" ? "与标准内容一致" : "正常,异常";
          const judgeControl =
            executeMode === "抄表"
              ? renderRangeInputControl(row, { rowId: row.id })
              : `<input class="input" type="text" data-row-id="${escapeHtml(row.id)}" data-inline-field="standardText" ${judgeReadonly} placeholder="${escapeHtml(judgePlaceholder)}" value="${escapeHtml(row.standardText || "")}" />`;
          const unitRequiredMark = executeMode === "抄表" ? '<span class="required">*</span>' : "";
          const unitPlaceholder = executeMode === "抄表" ? "必填" : "-";
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><input class="input" type="number" min="1" step="1" data-row-id="${escapeHtml(row.id)}" data-inline-field="no" value="${escapeHtml(row.no ?? "")}" /></td>
            <td><input class="input" type="text" data-row-id="${escapeHtml(row.id)}" data-inline-field="part" required value="${escapeHtml(row.part || "")}" /></td>
            <td><input class="input" type="text" data-row-id="${escapeHtml(row.id)}" data-inline-field="item" required value="${escapeHtml(row.item || "")}" /></td>
            <td>
              <select class="select" data-row-id="${escapeHtml(row.id)}" data-inline-field="executeMode" required>
                ${renderInlineSelectOptions(["普通", "状态", "抄表"], executeMode)}
              </select>
            </td>
            <td>
              <select class="select" data-row-id="${escapeHtml(row.id)}" data-inline-field="inspectType">
                ${renderInlineSelectOptions(["日常点检", "重点点检"], row.inspectType || "日常点检")}
              </select>
            </td>
            <td><input class="input" type="text" data-row-id="${escapeHtml(row.id)}" data-inline-field="standard" ${standardReadonly} required placeholder="${escapeHtml(standardPlaceholder)}" value="${escapeHtml(row.standard || "")}" /></td>
            <td>
              <div class="inline-required-cell">
                ${unitRequiredMark}
                <input class="input" type="text" data-row-id="${escapeHtml(row.id)}" data-inline-field="unit" ${executeMode === "抄表" ? "required" : ""} placeholder="${escapeHtml(unitPlaceholder)}" value="${escapeHtml(row.unit || "")}" />
              </div>
            </td>
            <td>${judgeControl}</td>
            <td>
              <div class="cell-actions">
                <button class="text-btn danger" data-action="delete" data-id="${escapeHtml(row.id)}">删除</button>
              </div>
            </td>
          `;
          refs.modalDetailTableBody.appendChild(tr);
        });
      }

      function renderRangeInputControl(row, { rowId = "" } = {}) {
        const rowAttr = rowId ? ` data-row-id="${escapeHtml(rowId)}"` : "";
        return `
          <div class="range-input" aria-label="判断标准条件">
            <input class="input" type="text" inputmode="decimal" autocomplete="off"${rowAttr} data-inline-field="standardText" required placeholder="48-80 / >10" value="${escapeHtml(row.standardText || "")}" />
          </div>
        `;
      }

      function getRangeInputParts(row) {
        const directMin = row && row.rangeMin !== undefined && row.rangeMin !== null ? String(row.rangeMin).trim() : "";
        const directMax = row && row.rangeMax !== undefined && row.rangeMax !== null ? String(row.rangeMax).trim() : "";
        if (directMin || directMax) {
          return { min: directMin, max: directMax };
        }

        const range = parseNumericRange(row && row.standardText);
        if (!range) {
          return { min: "", max: "" };
        }
        return {
          min: range.min !== null ? formatNumeric(range.min) : "",
          max: range.max !== null ? formatNumeric(range.max) : "",
        };
      }

      function applyRangeInputValue(draft, field, value) {
        if (field !== "rangeMin" && field !== "rangeMax") {
          return field;
        }

        const current = getRangeInputParts(draft);
        if (field === "rangeMin") {
          current.min = sanitizeRangeNumberText(value);
        } else {
          current.max = sanitizeRangeNumberText(value);
        }
        draft.rangeMin = current.min;
        draft.rangeMax = current.max;
        draft.standardText = composeRangeText(current.min, current.max);
        return "standardText";
      }

      function isRangeInputField(field) {
        return field === "rangeMin" || field === "rangeMax";
      }

      function sanitizeRangeInputElement(element) {
        const value = sanitizeRangeNumberText(element.value);
        if (element.value !== value) {
          element.value = value;
        }
        return value;
      }

      function sanitizeRangeNumberText(value) {
        let text = String(value || "")
          .replace(/[^\d.-]/g, "")
          .replace(/(?!^)-/g, "");
        const negative = text.startsWith("-");
        text = `${negative ? "-" : ""}${text.replace(/-/g, "")}`;
        const parts = text.split(".");
        if (parts.length > 2) {
          text = `${parts.shift()}.${parts.join("")}`;
        }
        return text;
      }

      function composeRangeText(minValue, maxValue) {
        const min = String(minValue || "").trim();
        const max = String(maxValue || "").trim();
        if (!min && !max) {
          return "";
        }
        if (!min || !max) {
          return `${min}-${max}`;
        }

        const minNumber = Number(min);
        const maxNumber = Number(max);
        if (Number.isFinite(minNumber) && Number.isFinite(maxNumber)) {
          return `${formatNumeric(Math.min(minNumber, maxNumber))}-${formatNumeric(Math.max(minNumber, maxNumber))}`;
        }
        return `${min}-${max}`;
      }

      function openDevicePicker(target) {
        if (target === "active") {
          const current = getSelectedStandard();
          if (!current) {
            showToast("请先选择标准");
            return;
          }
        }

        state.modal.picker.target = target;
        state.modal.picker.keyword = "";
        state.modal.picker.selectedIds.clear();

        const existingIds = new Set(
          target === "draft"
            ? getDraftDevices().map((item) => item.deviceId)
            : getCurrentLinkedDevices().map((item) => item.deviceId)
        );

        state.modal.picker.excludedIds = existingIds;
        refs.pickerKeywordInput.value = "";
        const objectType = getPickerObjectType();
        refs.pickerTitle.textContent = `选择${getObjectTypeLabel(objectType)}`;
        refs.pickerKeywordInput.placeholder = getObjectSearchPlaceholder(objectType);
        renderObjectTableHead(refs.pickerTableHead, objectType, { selectable: true });
        renderPickerTable();
        refs.devicePickerModal.classList.remove("hidden");
      }

      function closeDevicePicker() {
        refs.devicePickerModal.classList.add("hidden");
      }

      function filterPickerDevices() {
        const excludedIds = state.modal.picker.excludedIds;
        const keyword = state.modal.picker.keyword.trim().toLowerCase();
        const objectType = getPickerObjectType();

        return getObjectPool(objectType).filter((item) => {
          if (excludedIds.has(item.id)) {
            return false;
          }
          if (!isObjectLinkable(item, objectType)) {
            return false;
          }
          if (!keyword) {
            return true;
          }
          const text = [item.code, item.name, item.deviceType, item.category, item.area, item.department, item.owner, item.riskLevel, item.location]
            .join(" ")
            .toLowerCase();
          return text.includes(keyword);
        });
      }

      function renderPickerTable() {
        const rows = filterPickerDevices();
        const objectType = getPickerObjectType();
        renderObjectTableHead(refs.pickerTableHead, objectType, { selectable: true });
        refs.pickerTableBody.innerHTML = "";
        cleanupSelection(state.modal.picker.selectedIds, rows.map((item) => item.id));

        if (!rows.length) {
          refs.pickerTableBody.innerHTML = `<tr><td colspan="9" style="text-align:center;color:#7e8a9b;padding:16px">暂无可关联${escapeHtml(getObjectTypeLabel(objectType))}</td></tr>`;
          refs.pickerCheckAll.checked = false;
          refs.pickerCheckAll.indeterminate = false;
          return;
        }

        rows.forEach((row, index) => {
          const tr = document.createElement("tr");
          tr.innerHTML = renderObjectTableRow(row, index, objectType, {
            selectable: true,
            selectedIds: state.modal.picker.selectedIds,
          });
          refs.pickerTableBody.appendChild(tr);
        });

        syncCheckAll(refs.pickerCheckAll, rows, state.modal.picker.selectedIds);
      }

      async function confirmPickDevices() {
        const selectedIds = Array.from(state.modal.picker.selectedIds);
        if (!selectedIds.length) {
          showToast("请先选择对象");
          return;
        }

        const target = state.modal.picker.target;

        if (target === "draft") {
          const draftDevices = getDraftDevices();
          const objectType = getPickerObjectType();
          const pool = getObjectPool(objectType).filter((item) => isObjectLinkable(item, objectType));
          let addedCount = 0;
          selectedIds.forEach((id) => {
            const device = pool.find((item) => item.id === id);
            if (!device) {
              return;
            }
            draftDevices.push(toDeviceRelation(device, objectType));
            addedCount += 1;
          });
          if (!addedCount) {
            showToast("请选择启用中的对象");
            return;
          }
          closeDevicePicker();
          renderDraftDeviceTable();
          showToast(`已关联 ${addedCount} 个${getObjectTypeLabel(objectType)}`);
          return;
        }

        const current = getSelectedStandard();
        if (!current || !current.cloudId) {
          showToast("请先选择标准");
          return;
        }

        setLoading(true);
        setStatus("正在关联对象...");

        try {
          const objectType = getPickerObjectType();
          const pool = getObjectPool(objectType).filter((item) => isObjectLinkable(item, objectType));
          const linkableIds = selectedIds.filter((id) => pool.some((item) => item.id === id));
          if (!linkableIds.length) {
            showToast("请选择启用中的对象");
            return;
          }
          await bindDevicesToStandard(linkableIds, current);
          await syncStandardObjectSummary(current);
          closeDevicePicker();
          renderDeviceTable();
          showToast(`已关联 ${linkableIds.length} 个${getObjectTypeLabel(current.applicableDeviceType)}`);
          setStatus("对象关联成功");
        } catch (error) {
          showToast(`关联失败：${error.message}`);
          setStatus(`关联失败：${error.message}`, true);
        } finally {
          setLoading(false);
        }
      }

      async function removeDevices(target, ids) {
        if (!ids.length) {
          showToast("请先选择要移除的对象");
          return;
        }

        const ok = window.confirm(`确认移除 ${ids.length} 个对象关联吗？`);
        if (!ok) {
          return;
        }

        if (target === "draft") {
          const list = getDraftDevices();
          const idSet = new Set(ids);
          for (let i = list.length - 1; i >= 0; i -= 1) {
            if (idSet.has(list[i].id)) {
              list.splice(i, 1);
            }
          }
          ids.forEach((id) => state.modal.standard.selectedDeviceIds.delete(id));
          renderDraftDeviceTable();
          showToast(`已移除 ${ids.length} 个对象`);
          return;
        }

        const standard = getSelectedStandard();
        if (!standard) {
          showToast("请先选择标准");
          return;
        }

        setLoading(true);
        setStatus("正在移除关联对象...");
        try {
          await unbindDevicesFromStandard(ids, standard);
          await syncStandardObjectSummary(standard);
          ids.forEach((id) => state.selected.deviceIds.delete(id));
          renderDeviceTable();
          showToast(`已移除 ${ids.length} 个对象`);
          setStatus("对象关联已移除");
        } catch (error) {
          showToast(`移除失败：${error.message}`);
          setStatus(`移除失败：${error.message}`, true);
        } finally {
          setLoading(false);
        }
      }

      function getCurrentLinkedDevices() {
        const current = getSelectedStandard();
        if (!current) {
          return [];
        }
        return getStandardLinkedDevices(current);
      }

      function getStandardLinkedDevices(standard) {
        if (!standard) {
          return [];
        }

        const objectType = normalizeApplicableDeviceType(standard.applicableDeviceType);
        const relations = getActiveRelationsByStandard(standard).filter((item) => normalizeRelationObjectType(item.objectType) === getRelationObjectTypeValue(objectType));
        return relations
          .map((relation) => resolveRelationObject(relation, objectType))
          .filter(Boolean)
          .map((item) => toDeviceRelation(item, objectType));
      }

      function toDeviceRelation(device, objectType = "设备") {
        const normalizedType = normalizeApplicableDeviceType(objectType);
        return {
          id: device.id,
          deviceId: device.id,
          code: device.code,
          name: device.name,
          category: device.category,
          deviceType: device.deviceType,
          workshop: device.workshop,
          area: device.area,
          department: device.department,
          owner: device.owner || "",
          riskLevel: device.riskLevel,
          location: device.location,
          status: device.status,
          objectType: normalizedType,
          included: device.included || "",
          maxStorage: device.maxStorage || "",
          usageAmount: device.usageAmount || "",
          chemicalCount: device.chemicalCount || 0,
        };
      }

      function getDraftDevices() {
        return state.modal.standard.draft?.devices || [];
      }

      function addDraftDetailRow() {
        const rows = getDraftDetails();
        const no = nextDetailNo(rows);
        rows.push(
          normalizeInlineDraftByMode({
            id: uid("det"),
            cloudId: "",
            no,
            part: "",
            item: "",
            executeMode: "普通",
            inspectType: "日常点检",
            standard: "",
            unit: "",
            standardText: "",
            remark: "",
            sortNo: no,
            enabledStatus: "启用",
          })
        );
        renderDraftDetailTable();
      }

      function updateDraftDetailRowField(rowId, field, value) {
        const rows = getDraftDetails();
        const index = rows.findIndex((item) => String(item.id) === String(rowId));
        if (index < 0) {
          return;
        }
        const current = rows[index];
        const draft = { ...current, [field]: value };
        const trigger = applyRangeInputValue(draft, field, value);
        if (field === "no") {
          draft.no = toIntOrDefault(value, 1);
          draft.sortNo = draft.no;
        }
        rows[index] = normalizeInlineDraftByMode(draft, { trigger });
      }

      function removeDraftDetailRow(rowId) {
        const rows = getDraftDetails();
        const index = rows.findIndex((item) => String(item.id) === String(rowId));
        if (index < 0) {
          return;
        }
        rows.splice(index, 1);
        renderDraftDetailTable();
      }

      function renderDraftDeviceTable() {
        const rows = getDraftDevices();
        const objectType = normalizeApplicableDeviceType(state.modal.standard.draft?.applicableDeviceType);
        refs.modalObjectSectionTitle.textContent = objectType === "危化品" ? "适用危化品库" : "适用范围";
        refs.modalBindDeviceBtn.textContent = objectType === "危化品" ? "关联危化品库" : "关联对象";
        renderObjectTableHead(refs.modalDeviceTableHead, objectType, { selectable: true });
        refs.modalDeviceTableBody.innerHTML = "";
        cleanupSelection(state.modal.standard.selectedDeviceIds, rows.map((item) => item.id));

        if (!rows.length) {
          refs.modalDeviceTableBody.innerHTML = `<tr><td colspan="9" style="text-align:center;color:#7e8a9b;padding:16px">暂无适用范围</td></tr>`;
          refs.modalDeviceCheckAll.checked = false;
          refs.modalDeviceCheckAll.indeterminate = false;
          return;
        }

        rows.forEach((row, index) => {
          const tr = document.createElement("tr");
          tr.innerHTML = renderObjectTableRow(row, index, objectType, {
            selectable: true,
            selectedIds: state.modal.standard.selectedDeviceIds,
          });
          refs.modalDeviceTableBody.appendChild(tr);
        });

        syncCheckAll(refs.modalDeviceCheckAll, rows, state.modal.standard.selectedDeviceIds);
      }

      function getDraftDetails() {
        return state.modal.standard.draft?.details || [];
      }

      function normalizeRuleBindingText(value) {
        return toDisplayText(value).replace(/\s+/g, "").trim().toLowerCase();
      }

      function resolveRuleIdForStandard(standard) {
        const binding = normalizeRuleBindingText(standard?.category);
        if (!binding) {
          return "";
        }
        const matched = state.rules.find((rule) => {
          return (
            binding === normalizeRuleBindingText(rule.name) ||
            binding === normalizeRuleBindingText(rule.code) ||
            binding === normalizeRuleBindingText(rule.category)
          );
        });
        return matched?.id || "";
      }

      function normalizeApplicableDeviceType(value) {
        const text = toDisplayText(value);
        if (text.includes("危") || text.includes("化")) {
          return "危化品";
        }
        return "设备";
      }

      function normalizeRelationObjectType(value) {
        const text = toDisplayText(value);
        if (text.includes("危") || text.includes("化")) {
          return "危化品库";
        }
        return "设备";
      }

      function getRelationObjectTypeValue(objectType) {
        return normalizeApplicableDeviceType(objectType) === "危化品" ? "危化品库" : "设备";
      }

      function isRelationActive(status) {
        return normalizeStatus(status || "启用") === "启用";
      }

      function getActiveRelationsByStandard(standard) {
        const standardId = String(standard?.cloudId || standard?.id || "").trim();
        if (!standardId) {
          return [];
        }
        return state.relationPool.filter((item) => String(item.standardId || "").trim() === standardId && isRelationActive(item.status));
      }

      function findRelationRecord({ standardId = "", objectType = "", objectId = "", objectCode = "" } = {}) {
        const normalizedStandardId = String(standardId || "").trim();
        const normalizedType = normalizeRelationObjectType(objectType);
        const normalizedObjectId = String(objectId || "").trim();
        const normalizedObjectCode = String(objectCode || "").trim();
        return state.relationPool.find((item) => {
          const sameStandard = String(item.standardId || "").trim() === normalizedStandardId;
          const sameType = normalizeRelationObjectType(item.objectType) === normalizedType;
          const sameId = normalizedObjectId && String(item.objectId || "").trim() === normalizedObjectId;
          const sameCode = normalizedObjectCode && String(item.objectCode || "").trim() === normalizedObjectCode;
          return sameStandard && sameType && (sameId || sameCode);
        }) || null;
      }

      function resolveRelationObject(relation, objectType) {
        const pool = getObjectPool(objectType);
        const objectId = String(relation?.objectId || "").trim();
        const objectCode = String(relation?.objectCode || "").trim();
        const matched =
          pool.find((item) => objectId && String(item.id || "").trim() === objectId) ||
          pool.find((item) => objectCode && String(item.code || "").trim() === objectCode) ||
          null;
        if (matched) {
          return matched;
        }
        if (normalizeApplicableDeviceType(objectType) === "危化品" && objectCode) {
          return {
            id: objectId || `store:${normalizeCompareText(objectCode)}`,
            cloudId: objectId || "",
            code: objectCode,
            name: objectCode,
            category: "危化品库",
            deviceType: "危化品库",
            workshop: "",
            area: "",
            owner: "",
            location: objectCode,
            status: "启用",
            objectType: "危化品库",
            chemicalCount: state.chemicalPool.filter((item) => isSameStoreName(item.location, objectCode) || isSameStoreName(item.area, objectCode)).length,
          };
        }
        return null;
      }

      function buildRelationPayload(standard, object, relationObjectType, ruleId) {
        return {
          [RELATION_FIELD.standardId]: standard.cloudId || standard.id || "",
          [RELATION_FIELD.standardCode]: standard.code || "",
          [RELATION_FIELD.ruleId]: ruleId || "",
          [RELATION_FIELD.objectType]: normalizeRelationObjectType(relationObjectType),
          [RELATION_FIELD.objectId]: object.id || object.cloudId || "",
          [RELATION_FIELD.objectCode]: object.code || "",
          [RELATION_FIELD.status]: "启用",
        };
      }

      function applyLocalRelationUpsert(cloudId, payload) {
        const normalized = {
          id: cloudId || uid("rel"),
          cloudId: cloudId || "",
          standardId: toDisplayText(payload?.[RELATION_FIELD.standardId]),
          standardCode: toDisplayText(payload?.[RELATION_FIELD.standardCode]),
          ruleId: toDisplayText(payload?.[RELATION_FIELD.ruleId]),
          objectType: normalizeRelationObjectType(payload?.[RELATION_FIELD.objectType]),
          objectId: toDisplayText(payload?.[RELATION_FIELD.objectId]),
          objectCode: toDisplayText(payload?.[RELATION_FIELD.objectCode]),
          status: normalizeStatus(toDisplayText(payload?.[RELATION_FIELD.status]) || "启用"),
        };
        const index = state.relationPool.findIndex((item) => item.cloudId && cloudId && item.cloudId === cloudId);
        if (index >= 0) {
          state.relationPool.splice(index, 1, normalized);
          return normalized;
        }
        state.relationPool.push(normalized);
        return normalized;
      }

      async function syncStandardObjectSummary(standard) {
        if (!standard?.cloudId) {
          return;
        }
        const linkedDevices = getStandardLinkedDevices(standard);
        const summary = buildStandardObjectSummaryValues(linkedDevices);
        await updateRecord(API_CONFIG.masterEntryId, standard.cloudId, {
          [MASTER_FIELD.deviceName]: summary.deviceNames,
          [MASTER_FIELD.deviceCode]: summary.deviceCodes,
          [MASTER_FIELD.deviceType]: summary.deviceTypes,
          [MASTER_FIELD.linkedDeviceType]: summary.deviceTypes,
          [MASTER_FIELD.linkedDeviceRange]: summary.deviceRanges,
        });
        standard.backendDeviceName = summary.deviceNames;
        standard.backendDeviceCode = summary.deviceCodes;
        standard.backendDeviceType = summary.deviceTypes;
        standard.backendLinkedType = summary.deviceTypes;
        standard.backendLinkedRange = summary.deviceRanges;
      }

      function getObjectTypeLabel(objectType) {
        return normalizeApplicableDeviceType(objectType) === "危化品" ? "危化品库" : "设备";
      }

      function getObjectSearchPlaceholder(objectType) {
        return normalizeApplicableDeviceType(objectType) === "危化品"
          ? "场地编码/场地名称/所属区域"
          : "设备编号/设备名称/设备类型/区域";
      }

      function getObjectPool(objectType) {
        return normalizeApplicableDeviceType(objectType) === "危化品" ? state.sitePool : state.devicePool;
      }

      function isObjectLinkable(item, objectType) {
        if (!item) {
          return false;
        }
        const normalizedType = normalizeApplicableDeviceType(objectType);
        if (normalizedType === "设备") {
          return normalizeStatus(item.status) === "启用";
        }
        return normalizeStatus(item.status || "启用") === "启用";
      }

      function sitesFromChemicals(chemicals) {
        const seen = new Set();
        const output = [];
        (Array.isArray(chemicals) ? chemicals : []).forEach((chemical) => {
          const site = getSiteForChemical(chemical);
          if (!site) {
            return;
          }
          const key = getStoreKey(site);
          if (seen.has(key)) {
            return;
          }
          seen.add(key);
          output.push({
            ...site,
            chemicalCount: state.chemicalPool.filter((item) => isChemicalInStore(item, site)).length,
          });
        });
        return output.sort((a, b) => String(a.area || "").localeCompare(String(b.area || ""), "zh-CN") || String(a.name || "").localeCompare(String(b.name || ""), "zh-CN"));
      }

      function getSiteForChemical(chemical) {
        const storage = String(chemical?.location || chemical?.area || "").trim();
        const site = state.sitePool.find((item) => isSameStoreName(item.name, storage) || isSameStoreName(item.code, storage));
        if (site) {
          return site;
        }
        if (!storage) {
          return null;
        }
        return {
          id: `store:${getStoreKey({ name: storage })}`,
          code: "",
          name: storage,
          category: "危化品库",
          deviceType: "危化品库",
          workshop: chemical?.workshop || "",
          area: chemical?.workshop || "",
          owner: "",
          location: storage,
          status: "启用",
          objectType: "危化品库",
          chemicalCount: 0,
        };
      }

      function isChemicalInStore(chemical, site) {
        if (!chemical || !site) {
          return false;
        }
        return isSameStoreName(chemical.location, site.name) || isSameStoreName(chemical.area, site.name) || isSameStoreName(chemical.location, site.code);
      }

      function getStoreKey(site) {
        return normalizeCompareText(site?.code || site?.name || site?.location || site?.id);
      }

      function isSameStoreName(left, right) {
        const a = normalizeCompareText(left);
        const b = normalizeCompareText(right);
        return Boolean(a && b && a === b);
      }

      function getPickerObjectType() {

      function validateAndNormalizeDraftDetails(rows) {
        const list = Array.isArray(rows) ? rows : [];
        const output = [];

        for (let i = 0; i < list.length; i += 1) {
          const source = list[i] || {};
          const normalizedNo = toIntOrDefault(source.no, i + 1);
          const hasUserInput = [source.part, source.item, source.standard, source.standardText, source.unit, source.remark]
            .map((item) => String(item || "").trim())
            .some(Boolean);

          if (!hasUserInput) {
            continue;
          }

          const normalized = deriveDetailByMode({
            id: source.id || uid("det"),
            cloudId: source.cloudId || "",
            no: normalizedNo,
            part: source.part || "",
            item: source.item || "",
            executeMode: source.executeMode || "普通",
            inspectType: source.inspectType || "日常点检",
            standard: source.standard || "",
            unit: source.unit || "",
            standardText: source.standardText || "",
            remark: source.remark || "",
            sortNo: toIntOrDefault(source.sortNo || normalizedNo, normalizedNo),
          enabledStatus: "启用",
          });

          const rowNo = i + 1;

          const validation = validateDetailRequiredFields(normalized, { rowNo });
          if (!validation.ok) {
            return validation;

          output.push(normalized);

        if (!output.length) {
          return { ok: false, message: "请至少填写一条点检明细" };

      function validateDetailRequiredFields(detail, { rowNo = "" } = {}) {
        const prefix = rowNo ? `明细第 ${rowNo} 行` : "明细";
        const executeMode = normalizeExecuteMode(detail.executeMode || "");
        if (!String(detail.part || "").trim()) {
          return { ok: false, message: `${prefix}请填写点检部位` };
        }
        if (!String(detail.item || "").trim()) {
          return { ok: false, message: `${prefix}请填写点检项目名称` };
        }
        if (!executeMode) {
          return { ok: false, message: `${prefix}请选择执行方式` };
        }
        if (!String(detail.standard || "").trim()) {
          return { ok: false, message: `${prefix}请填写标准内容` };
        }
        if (executeMode === "状态") {
          const options = splitStateOptions(detail.standard);
          if (options.length < 2) {
            return { ok: false, message: `${prefix}执行方式为“状态”时，标准内容请至少填写2个状态（用英文逗号分隔）` };
          }
        }
        if (executeMode === "抄表") {
          if (!String(detail.unit || "").trim() || String(detail.unit || "").trim() === "-") {
            return { ok: false, message: `${prefix}执行方式为“抄表”时，请填写参数单位` };
          }
          if (!parseNumericRange(detail.standardText)) {
            return { ok: false, message: `${prefix}执行方式为“抄表”时，判断标准请填写数值范围或单边条件（如 48-80、>10、>=10、<5）` };
          }
        }
        return { ok: true };
      }

      function renderStatusTag(status) {
        const text = normalizeStatus(status);
