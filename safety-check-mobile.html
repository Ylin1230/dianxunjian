        ctx.moveTo(state.signaturePad.lastX, state.signaturePad.lastY);
        ctx.lineTo(point.x, point.y);
        ctx.stroke();
        state.signaturePad.lastX = point.x;
        state.signaturePad.lastY = point.y;
        state.signaturePad.dirty = true;
      }

      function handleSignaturePointerUp(event) {
        const canvas = refs.signatureCanvas;
        if (!(canvas instanceof HTMLCanvasElement)) {
          return;
        }
        if (state.signaturePad.pointerId !== null && state.signaturePad.pointerId !== event.pointerId) {
          return;
        }
        event.preventDefault();
        state.signaturePad.drawing = false;
        state.signaturePad.pointerId = null;
        if (state.signaturePad.dirty) {
          refs.signatureStatus.textContent = "签名完成，点击保存后回填";
        }
        if (typeof canvas.releasePointerCapture === "function") {
          try {
            canvas.releasePointerCapture(event.pointerId);
          } catch {
            // ignore pointer capture errors
          }
        }
      }

      function getCanvasPoint(canvas, event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top,
        };
      }

      function saveSignature() {
        if (!state.signaturePad.dirty) {
          refs.signatureStatus.textContent = "请先在签名区完成签名";
          return;
        }
        const index = state.activeSignatureIndex;
        const isPrincipal = state.activeSignatureTarget === "principal";
        if (!isPrincipal && (!Number.isFinite(index) || !state.signatures[index])) {
          refs.signatureStatus.textContent = "当前签名行不存在，请关闭后重试";
          return;
        }
        const canvas = refs.signatureCanvas;
        if (!(canvas instanceof HTMLCanvasElement)) {
          refs.signatureStatus.textContent = "签名板不可用，请刷新后重试";
          return;
        }
        const dataUrl = canvas.toDataURL("image/png");
        if (isPrincipal) {
          state.principalSignature = {
            ...(state.principalSignature || createSignatureRow()),
            name: `safety-check-principal-signature-${Date.now()}.png`,
            dataUrl,
            previewUrl: dataUrl,
            signTime: nowDateTimeText(),
          };
        } else {
          state.signatures[index] = {
            ...state.signatures[index],
            name: `safety-check-signature-${Date.now()}.png`,
            dataUrl,
            previewUrl: dataUrl,
            signTime: nowDateTimeText(),
          };
        }
        renderSubmitExtras();
        showToast("签名已保存");
        closeSignatureModal();
      }

      function clearSavedSignature(index) {
        if (!Number.isFinite(index) || !state.signatures[index]) {
          return;
        }
        state.signatures[index] = {
          ...state.signatures[index],
          name: "",
          dataUrl: "",
          previewUrl: "",
          signTime: "",
        };
        renderSubmitExtras();
        showToast("签名已清空");
      }

      function clearPrincipalSignature() {
        state.principalSignature = {
          ...(state.principalSignature || createSignatureRow()),
          name: "",
          dataUrl: "",
          previewUrl: "",
          signTime: "",
        };
        renderSubmitExtras();
        showToast("主要负责人签字已清空");
      }

      function updateProgress() {
        const total = state.selectedItems.length;
        const done = state.selectedItems.filter(isItemDone).length;
        const abnormal = state.selectedItems.filter((item) => item.result === "异常").length;
        refs.progressText.textContent = `${done} / ${total} 项`;
        refs.progressBar.style.width = `${total ? Math.round((done / total) * 100) : 0}%`;
        refs.abnormalCountTag.textContent = `${abnormal} 异常`;
        refs.abnormalCountTag.className = `tag ${abnormal ? "danger" : "ok"}`;
      }

      function markAllNormal() {
        state.selectedItems.forEach((item) => {
          if (!item.result) item.result = "正常";
        });
        renderExecute();
      }

      function saveInspectionDraft() {
        if (!state.selectedTemplate || !state.selectedItems.length) {
          showToast("当前没有可暂存的检查内容");
          return;
        }
        const draft = buildInspectionDraft();
        try {
          localStorage.setItem(getInspectionDraftKey(), JSON.stringify(draft));
          renderHome();
          switchView("home");
          showToast("已暂存，已返回任务列表，下次打开该任务可继续填写");
        } catch (error) {
          showToast("暂存失败：照片或签名内容较大，请删除部分图片后重试");
        }
      }

      function restoreInspectionDraftIfAvailable() {
        const draft = readInspectionDraft();
        if (!draft) {
          return;
        }
        const savedAt = draft.savedAt ? shortDateTime(draft.savedAt) : "";
        const shouldRestore = window.confirm(`检测到该任务有暂存内容${savedAt ? `（${savedAt}）` : ""}，是否继续填写？`);
        if (!shouldRestore) {
          return;
        }
        applyInspectionDraft(draft);
        showToast("已恢复暂存内容");
      }

      function buildInspectionDraft() {
        const inspector = selectedInspector();
        return {
          version: 1,
          savedAt: nowDateTimeText(),
          taskId: state.selectedTask?.id || "",
          templateId: state.selectedTemplate?.id || "",
          templateName: state.selectedTemplate?.name || "",
          target: state.target || "",
          inspectorId: inspector.id || "",
          inspectorName: inspector.label || "",
          startTime: state.startTime || nowDateTimeText(),
          submitPhotos: serializeDraftPhotos(state.submitPhotos),
          signatures: (Array.isArray(state.signatures) ? state.signatures : []).map(serializeDraftSignature),
          principalSignature: serializeDraftSignature(state.principalSignature),
          items: state.selectedItems.map((item) => ({
            id: item.id || "",
            seq: item.seq || "",
            result: item.result || "",
            inputValue: item.inputValue || "",
            abnormalDesc: item.abnormalDesc || "",
            handling: item.handling || "",
            handlingStatus: item.handlingStatus || "待处理",
            photos: serializeDraftPhotos(item.photos),
          })),
        };
      }

      function applyInspectionDraft(draft) {
        if (!draft || typeof draft !== "object") {
          return;
        }
        if (draft.startTime) {
          state.startTime = draft.startTime;
        }
        if (draft.target) {
          state.target = draft.target;
        }
        const savedItems = Array.isArray(draft.items) ? draft.items : [];
        state.selectedItems = state.selectedItems.map((item) => {
          const saved = savedItems.find((row) => row && (
            (row.id && row.id === item.id) ||
            (String(row.seq || "") && String(row.seq || "") === String(item.seq || ""))
          ));
          if (!saved) {
            return item;
          }
          return {
            ...item,
            result: saved.result || "",
            inputValue: saved.inputValue || "",
            abnormalDesc: saved.abnormalDesc || "",
            handling: saved.handling || "",
            handlingStatus: saved.handlingStatus || "待处理",
            photos: normalizePhotoList(saved.photos),
          };
        });
        state.submitPhotos = normalizePhotoList(draft.submitPhotos);
        state.signatures = (Array.isArray(draft.signatures) ? draft.signatures : [])
          .map(normalizeDraftSignature)
          .filter((item) => item && (item.dataUrl || item.previewUrl || item.signTime));
        if (!state.signatures.length) {
          state.signatures = [createSignatureRow()];
        }
        state.principalSignature = normalizeDraftSignature(draft.principalSignature) || createSignatureRow();
      }

      function serializeDraftPhotos(value) {
        return normalizePhotoList(value).map((photo) => ({
          id: photo.id || "",
          name: photo.name || "",
          url: photo.url || "",
          dataUrl: photo.dataUrl || (/^data:image\//i.test(photo.url || "") ? photo.url : ""),
        }));
      }

      function serializeDraftSignature(signature) {
        if (!signature || typeof signature !== "object") {
          return createSignatureRow();
        }
        return {
          id: signature.id || "",
          name: signature.name || "",
          dataUrl: signature.dataUrl || "",
          previewUrl: signature.previewUrl || signature.dataUrl || "",
          signTime: signature.signTime || "",
        };
      }

      function normalizeDraftSignature(signature) {
        if (!signature || typeof signature !== "object") {
          return null;
        }
        return {
          id: signature.id || `signature_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
          name: signature.name || "",
          dataUrl: signature.dataUrl || (/^data:image\//i.test(signature.previewUrl || "") ? signature.previewUrl : ""),
          previewUrl: signature.previewUrl || signature.dataUrl || "",
          signTime: signature.signTime || "",
        };
      }

      function readInspectionDraft() {
        try {
          const raw = localStorage.getItem(getInspectionDraftKey());
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      function removeInspectionDraft() {
        try {
          localStorage.removeItem(getInspectionDraftKey());
        } catch {
          // ignore localStorage cleanup failures
        }
      }

      function getInspectionDraftKey() {
        const taskId = state.selectedTask?.id || "";
        const templateId = state.selectedTemplate?.id || "";
        const target = state.target || "";
        return `${DRAFT_STORAGE_PREFIX}${taskId || `${templateId}:${target}`}`;
      }

      async function submitInspection() {
        const validation = validateInspection();
        if (validation) {
          showToast(validation);
          return;
        }
        const inspector = selectedInspector();
        const payload = {
          taskId: state.selectedTask?.id || "",
          templateId: state.selectedTemplate?.id || "",
          templateName: state.selectedTemplate?.name || "",
          target: state.target || "",
          inspector: inspector.label,
          inspectorId: inspector.id,
          operatorUserId: state.currentUserId || inspector.id,
          corpId: state.currentCorpId,
          startTime: state.startTime,
          endTime: nowDateTimeText(),
          photos: normalizePhotoList(state.submitPhotos)
            .map((photo) => ({
              name: photo.name,
              dataUrl: photo.dataUrl || (/^data:image\//i.test(photo.url || "") ? photo.url : ""),
            }))
            .filter((photo) => photo.name || photo.dataUrl),
          signature: (Array.isArray(state.signatures) ? state.signatures : [])
            .filter((signature) => signature && signature.dataUrl)
            .map((signature) => ({
              name: signature.name,
              dataUrl: signature.dataUrl,
              signTime: signature.signTime,
            })),
          principalSignature: state.principalSignature && state.principalSignature.dataUrl
            ? {
                name: state.principalSignature.name,
                dataUrl: state.principalSignature.dataUrl,
                signTime: state.principalSignature.signTime,
              }
            : null,
          items: state.selectedItems.map((item) => ({
            itemId: item.id,
            seq: item.seq,
            category: item.category,
            item: item.item,
            content: item.content,
            standard: item.standard,
            result: item.result,
            inputValue: item.inputValue,
            isAbnormal: item.result === "异常" ? "是" : "否",
            abnormalDesc: item.abnormalDesc,
            handling: item.handling,
            handlingStatus: item.result === "异常" ? (item.handlingStatus || "待处理") : "",
            photos: item.result === "异常" ? normalizePhotoList(item.photos)
              .map((photo) => ({
                name: photo.name,
                dataUrl: photo.dataUrl || (/^data:image\//i.test(photo.url || "") ? photo.url : ""),
              }))
              .filter((photo) => photo.name || photo.dataUrl) : [],
            ...(item.riskLevel ? { riskLevel: item.riskLevel } : {}),
            deadlineDays: item.deadlineDays,
            defaultDept: item.defaultDept,
            defaultDeptId: item.defaultDeptId,
          })),
        };
        refs.submitBtn.disabled = true;
        try {
          const resp = await requestApi("/safety-check/submit", "POST", payload);
          state.summary = resp.data || {};
          removeInspectionDraft();
          renderSummary();
          switchView("summary");
          await loadData();
        } catch (error) {
          showToast(`提交失败：${error.message}`);
        } finally {
          refs.submitBtn.disabled = false;
        }
      }

      function validateInspection() {
        for (let i = 0; i < state.selectedItems.length; i += 1) {
          const item = state.selectedItems[i];
          if (!isItemDone(item)) return `第 ${item.seq || i + 1} 项未填写`;
          if (item.result === "异常" && item.abnormalDescRequired === "是" && !String(item.abnormalDesc || "").trim()) {
            return `第 ${item.seq || i + 1} 项异常说明必填`;
          }
          if (item.result === "异常" && item.abnormalPhotoRequired === "是" && !normalizePhotoList(item.photos).length) {
            return `第 ${item.seq || i + 1} 项异常照片必传`;
          }
          if (item.result === "异常" && !["已处理", "待处理"].includes(String(item.handlingStatus || "").trim())) {
            return `第 ${item.seq || i + 1} 项请选择处理情况`;
          }
        }
        return "";
      }

      function isItemDone(item) {
        if (!item.result) return false;
        if ((item.resultType === "数值录入" || item.resultType === "文本说明") && !String(item.inputValue || "").trim()) {
          return false;
        }
        return true;
      }

      function renderSummary() {
        const data = state.summary || {};
        const abnormalItems = state.selectedItems.filter((item) => item.result === "异常");
        const flowCount = Number(data.flowStartCount || (Array.isArray(data.flowIds) ? data.flowIds.length : 0));
        const closedCount = Number(data.closedHazardCount || (Array.isArray(data.closedHazardIds) ? data.closedHazardIds.length : 0));
        const flowText = [
          flowCount ? `已发起 ${flowCount} 条整改流程` : "",
          closedCount ? `已关闭 ${closedCount} 条隐患工单` : "",
        ].filter(Boolean).join(" · ");
        refs.summaryResultTag.textContent = data.result || "正常";
        refs.summaryResultTag.className = "summary-badge";
        refs.summaryText.textContent = `${state.selectedTemplate?.name || "安全检查"} · ${state.target || ""} · ${data.detailCount || state.selectedItems.length} 项 · ${data.abnormalCount || 0} 异常${flowText ? ` · ${flowText}` : ""}`;
        refs.summaryAbnormalList.innerHTML = abnormalItems.length ? abnormalItems.map((item) => `
          <article class="card">
            <h3>${escapeHtml(item.item || "异常项")}</h3>
            <div class="meta">${escapeHtml(item.abnormalDesc || "未填写异常说明")}</div>
            <span class="tag ${item.handlingStatus === "已处理" ? "ok" : "warn"}">${item.handlingStatus === "已处理" ? "已处理并关闭工单" : "待处理，已发起整改流程"}</span>
          </article>
        `).join("") : `<div class="empty">本次未发现异常</div>`;
      }

      function switchView(name) {
        closeInspectorPicker();
        refs.homeView.classList.toggle("active", name === "home");
        refs.executeView.classList.toggle("active", name === "execute");
        refs.summaryView.classList.toggle("active", name === "summary");
        refs.bottomBar.classList.toggle("hidden", name !== "execute");
        if (name === "home") refs.title.textContent = "安全检查";
        if (name === "summary") refs.title.textContent = "检查完成";
      }

      async function requestApi(path, method = "GET", body = null) {
        const resp = await fetch(`${API_BASE}${path}`, {
          method,
          headers: { "Content-Type": "application/json" },
          ...(method === "GET" ? {} : { body: JSON.stringify(body || {}) }),
        });
        const text = await resp.text();
        let data = null;
        try {
          data = text ? JSON.parse(text) : null;
        } catch {
          data = { raw: text };
        }
        if (!resp.ok || data?.ok === false) {
          throw new Error(data?.message || data?.detail || text || `HTTP ${resp.status}`);
        }
        return data || {};
      }

      function renderTaskTag(task) {
        const overdue = task.overdue === "是";
        return `<span class="tag ${overdue ? "danger" : "warn"}">${escapeHtml(overdue ? "逾期" : task.status || "待检查")}</span>`;
      }

      function shortDateTime(value) {
        return String(value || "").replace("T", " ").slice(0, 16) || "-";
      }

      function dateKeyOf(value) {
        if (value instanceof Date) {
          const pad = (n) => String(n).padStart(2, "0");
          return `${value.getFullYear()}-${pad(value.getMonth() + 1)}-${pad(value.getDate())}`;
        }
        const text = String(value || "").trim();
        const match = text.match(/(\d{4})[-/年](\d{1,2})[-/月](\d{1,2})/);
        if (!match) {
          return "";
        }
        return `${match[1]}-${match[2].padStart(2, "0")}-${match[3].padStart(2, "0")}`;
      }

      function formatChineseDate(date) {
        const weekdays = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 · ${weekdays[date.getDay()]}`;
      }

      function nowDateTimeText() {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      }

      function resolveApiBaseUrl() {
        if (window.location.protocol === "http:" || window.location.protocol === "https:") {
          return `${window.location.origin}/api`;
        }
        return "http://localhost:3001/api";
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[ch]);
      }

      function showToast(message) {
        refs.toast.textContent = message;
        refs.toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => refs.toast.classList.remove("show"), 2200);
      }
    </script>
  </body>
</html>
